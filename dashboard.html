let _dashTriageFilter = 'all';


// ── Dashboard Complaint Pattern Detection ─────────────────────

function detectDashComplaintPatterns(complaints, windowDays = 7) {
  const cutoff = Date.now() - windowDays * 24 * 60 * 60 * 1000;
  const recent = (complaints || []).filter(c =>
    new Date(c.created_at).getTime() > cutoff &&
    !['closed','resolved'].includes(c.status)
  );
  if (recent.length < 2) return [];

  const groups = {};
  recent.forEach(c => {
    const keys = [];
    if (c.barcode) keys.push('barcode:' + c.barcode.trim().toLowerCase());
    if (c.product_name) {
      const word = c.product_name.trim().toLowerCase().split(/\s+/)[0];
      if (word && word.length > 2) keys.push('name:' + word);
    }
    keys.forEach(k => {
      if (!groups[k]) groups[k] = { key: k, complaints: [], productName: c.product_name, barcode: c.barcode, lotNumbers: new Set(), stores: new Set() };
      groups[k].complaints.push(c);
      if (c.lot_number) groups[k].lotNumbers.add(c.lot_number);
      if (c.purchase_store || c.store_name) groups[k].stores.add(c.purchase_store || c.store_name);
    });
  });

  const seen = new Set();
  const patterns = [];
  Object.values(groups)
    .filter(g => g.complaints.length >= 2)
    .sort((a, b) => b.complaints.length - a.complaints.length)
    .forEach(g => {
      const unique = g.complaints.filter(c => !seen.has(c.id));
      if (unique.length < 2) return;
      unique.forEach(c => seen.add(c.id));
      const criticalCount = unique.filter(c => c.triage_level === 'critical').length;
      const seriousCount  = unique.filter(c => c.triage_level === 'serious').length;
      const total = unique.length;
      const multiStore = g.stores.size > 1;
      let level, title, colour, bg;
      if (criticalCount >= 2 || (criticalCount >= 1 && seriousCount >= 1) || multiStore) {
        level = 'systemic'; colour = 'var(--danger)'; bg = 'rgba(255,92,92,0.07)';
        title = multiStore && total >= 2 ? 'Multi-store pattern' : 'Potential systemic issue';
      } else if (total >= 5 || seriousCount >= 3) {
        level = 'volume'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.07)';
        title = 'Volume alert';
      } else {
        level = 'emerging'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.05)';
        title = 'Emerging pattern';
      }
      const lots = [...g.lotNumbers].slice(0, 3).join(', ');
      const storeList = [...g.stores].slice(0, 3).join(', ');
      patterns.push({ level, title, colour, bg, productName: g.productName, barcode: g.barcode, lots, storeList, multiStore, total, criticalCount, seriousCount, complaints: unique, windowDays });
    });
  return patterns;
}

function dashPatternAlertHTML(pattern, idx) {
  const lotStr = pattern.lots ? ` · Lot: <span style="font-family:'DM Mono',monospace;">${pattern.lots}</span>` : '';
  const storeStr = pattern.storeList ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">Stores: ${pattern.storeList}${pattern.multiStore ? ' <span style="color:var(--danger);font-weight:600;">· multiple stores</span>' : ''}</div>` : '';
  const breakdown = [
    pattern.criticalCount ? `<span style="color:var(--danger);font-weight:700;">${pattern.criticalCount} critical</span>` : '',
    pattern.seriousCount  ? `<span style="color:var(--warn);">${pattern.seriousCount} serious</span>` : '',
    (pattern.total - pattern.criticalCount - pattern.seriousCount) > 0 ? `<span style="color:var(--muted);">${pattern.total - pattern.criticalCount - pattern.seriousCount} monitor</span>` : ''
  ].filter(Boolean).join(' · ');

  const borderColour = pattern.colour.includes('danger') ? 'rgba(255,92,92,0.3)' : 'rgba(245,166,35,0.3)';
  return `
    <div id="dash-pattern-${idx}" style="background:${pattern.bg};border:1px solid ${borderColour};border-radius:12px;padding:16px;position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">

            <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${pattern.total} complaints · ${pattern.windowDays}d window</span>
          </div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:3px;">${pattern.productName || 'Unknown product'}${lotStr}</div>
          <div style="font-size:12px;color:var(--muted);">${breakdown}</div>
          ${storeStr}
        </div>
        <div style="display:flex;gap:8px;align-items:flex-start;flex-shrink:0;flex-wrap:wrap;">
          <button onclick="notifyManufacturerOfPattern(${JSON.stringify(pattern.productName||'')},${JSON.stringify(pattern.lots||'')},${pattern.total},${JSON.stringify(pattern.title)})"
            style="background:transparent;border:1px solid ${borderColour};color:${pattern.colour};border-radius:7px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">
            Notify manufacturer
          </button>
          <button onclick="document.getElementById('dash-pattern-${idx}').style.display='none'"
            style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;" title="Dismiss">×</button>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
        ${pattern.complaints.slice(0,4).map(c => `
          <span onclick="_dashTriageView='detail';_dashTriageComplaint='${c.id}';renderDashboardTriage()"
            style="font-size:11px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--border);">
            ${c.complaint_number || c.id.slice(0,8)}
          </span>`).join('')}
        ${pattern.complaints.length > 4 ? `<span style="font-size:11px;color:var(--muted);padding:2px 4px;">+${pattern.complaints.length-4} more</span>` : ''}
      </div>
    </div>`;
}

function notifyManufacturerOfPattern(productName, lots, count, patternTitle) {
  // Open the manufacturers panel — the corp admin can notify their trading partner manufacturer
  const msg = `Pattern alert: ${count} complaints about "${productName}" in 7 days (${patternTitle}). Lot(s): ${lots || 'unknown'}. Please review and consider a recall.`;
  if (confirm(`Send a pattern alert to the manufacturer of "${productName}"?

Message:
"${msg}"

This will open the Manufacturers panel where you can contact your trading partners.`)) {
    showPanel('partners');
  }
}

async function renderDashboardTriage() {
  const el = document.getElementById('main-content');
  if (_dashTriageView === 'new') { renderDashTriageForm(el); return; }
  if (_dashTriageView === 'detail' && _dashTriageComplaint) { await renderDashTriageDetail(el); return; }
  await renderDashTriageList(el);
}

function dashTriageLevelStyle(level) {
  if (level === 'critical') return { bg: 'rgba(255,92,92,0.12)',  color: 'var(--danger)', label: 'CRITICAL' };
  if (level === 'serious')  return { bg: 'rgba(245,166,35,0.12)', color: 'var(--warn)',   label: 'SERIOUS'  };
  if (level === 'monitor')  return { bg: 'rgba(52,211,153,0.10)', color: 'var(--accent)', label: 'MONITOR'  };
  return                           { bg: 'rgba(56,189,248,0.10)', color: 'var(--info)',   label: 'PENDING'  };
}

function dashTriageStatusLabel(status) {
  const map = { new:'New', triaged:'Triaged', follow_up_sent:'Follow-up Sent', investigating:'Investigating', resolved:'Resolved', recall_triggered:'Recall Triggered', closed:'Closed' };
  return map[status] || status;
}

async function submitDashPhoneComplaint() {
  const text = document.getElementById('dtc-text').value.trim();
  if (!text) { showDashTriageMsg('Complaint details are required.', 'error'); return; }
  const btn = document.getElementById('dtc-submit');
  btn.disabled = true; btn.innerHTML = '<span style="display:flex;align-items:center;gap:6px;"><div class="spinner" style="width:12px;height:12px;border-width:2px;"></div> Triaging...</span>';
  const dtcHasProduct = document.getElementById('dtc-hasproduct')?.value || '';
  const payload = {
    source: 'phone', receiving_org_id: _orgId, manufacturer_id: null,
    org_name: _orgName, lang: 'en',
    product_name: document.getElementById('dtc-product').value.trim() || null,
    barcode: document.getElementById('dtc-barcode')?.value.trim() || null,
    lot_number: document.getElementById('dtc-lot').value.trim() || null,
    best_before_date: document.getElementById('dtc-bestbefore')?.value || null,
    complaint_text: text,
    customer_name: document.getElementById('dtc-name').value.trim() || null,
    customer_email: document.getElementById('dtc-email').value.trim() || null,
    customer_phone: document.getElementById('dtc-phone').value.trim() || null,
    country: document.getElementById('dtc-country')?.value || null,
    store_name: document.getElementById('dtc-store')?.value.trim() || null,
    purchase_city: document.getElementById('dtc-city')?.value.trim() || null,
    purchase_state: document.getElementById('dtc-state')?.value || null,
    people_affected: document.getElementById('dtc-affected')?.value || null,
    medical_attention: document.getElementById('dtc-medical')?.value || null,
    still_has_product: dtcHasProduct.startsWith('Yes') ? true : dtcHasProduct.startsWith('No') ? false : null,
    storage_method: document.getElementById('dtc-storage')?.value || null,
    submitted_by_label: 'Staff (phone intake)'
  };
  try {
    const res = await fetch('/.netlify/functions/triage-complaint', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Submission failed');
    const s = dashTriageLevelStyle(data.triage_level);
    document.getElementById('main-content').innerHTML = `
      <div style="max-width:600px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;">
          <div style="display:inline-block;background:${s.bg};color:${s.color};font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:6px;letter-spacing:0.05em;margin-bottom:16px;">${s.label}</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">Complaint logged and triaged</div>
          <div style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:16px;">${data.complaint_number}</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;">${data.triage_summary}</div>
          ${payload.customer_email ? `<div style="font-size:12px;color:var(--muted);margin-bottom:20px;">Follow-up email sent to ${payload.customer_email}.</div>` : ''}
          ${data.pattern_alert ? `
            <div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;text-align:left;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.6" fill="var(--warn)" stroke="none"/></svg>
                <span style="font-size:12px;font-weight:700;color:var(--warn);">PATTERN DETECTED: ${data.pattern_alert.title.toUpperCase()}</span>
              </div>
              <div style="font-size:12px;color:var(--muted);">${data.pattern_alert.count} complaints about this product in the last 7 days. Consider notifying the manufacturer.</div>
            </div>
          ` : ''}
          <div style="display:flex;justify-content:center;gap:10px;">
            <button onclick="_dashTriageView='list';renderDashboardTriage()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">View All Complaints</button>
            <button onclick="_dashTriageView='new';renderDashboardTriage()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;">Log Another</button>
          </div>
        </div>
      </div>`;
  } catch(e) {
    btn.disabled = false; btn.innerHTML = 'Submit and Triage';
    showDashTriageMsg(e.message, 'error');
  }
}

function showDashTriageMsg(txt, type) {
  const el = document.getElementById('dtc-msg');
  if (!el) return;
  el.textContent = txt; el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(255,92,92,0.3)' : 'rgba(52,211,153,0.3)'}`;
}

          <div style="display:flex;flex-direction:column;gap:10px;">${msgs.map(m=>`

        </div>` : ''}
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;margin-bottom:16px;">
          <div style="font-size:11px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:14px;">AUDIT TRAIL</div>
          <div style="display:flex;flex-direction:column;gap:0;">${log.map((entry,i)=>`
            <div style="display:flex;gap:12px;align-items:flex-start;padding:8px 0;${i<log.length-1?'border-bottom:1px solid var(--border);':''}">
              <div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);white-space:nowrap;min-width:130px;">${new Date(entry.created_at).toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
              <div><div style="font-size:12px;color:var(--text);">${entry.action.replace(/_/g,' ')}</div><div style="font-size:11px;color:var(--muted);">${entry.actor_label||''}</div></div>
            </div>`).join('')}</div>
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap;">

async function updateDashTriageStatus(id, newStatus) {

}

async function rejectPartner(id) {
  if (!confirm('Decline this connection request?')) return;
  const { error } = await sb.from('trading_partners').update({ status: 'rejected' }).eq('id', id);
  if (error) { alert('Could not decline request: ' + error.message); return; }
  renderPartners();
}

<script>
// ═══════════════════════════════════════════════════════════════
// CSV IMPORT ENGINE (dashboard)
// ═══════════════════════════════════════════════════════════════

// Shared engine — identical to manufacturer portal version
// (openCSVImport, csvDownloadTemplate, csvHandleDrop, csvHandleFile,
//  csvParseText, csvParseAndPreview, csvGoBack, csvRunImport)
// Defined here for the dashboard context:

async function openCSVImport(config) {
  document.getElementById('csv-import-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'csv-import-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(4,12,14,0.92);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">
      <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;">
        <div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            ${config.title}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${config.description}</div>
        </div>
        <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:22px 26px;" id="csv-import-body">
        <div id="csv-step-upload">
          <div style="background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div><div style="font-size:12px;font-weight:600;color:var(--accent);">Start with our template</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Download a pre-formatted CSV</div></div>
            <button onclick="csvDownloadTemplate()" style="background:var(--accent);color:#065f46;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">↓ Download template</button>
          </div>
          <div id="csv-dropzone" ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.background='rgba(52,211,153,0.08)';" ondragleave="this.style.borderColor='var(--border)';this.style.background='var(--surface2)';" ondrop="csvHandleDrop(event)" onclick="document.getElementById('csv-file-input').click()" style="border:2px dashed var(--border);border-radius:12px;background:var(--surface2);padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:28px;margin-bottom:8px;">📄</div>
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">Drop your CSV here</div>
            <div style="font-size:12px;color:var(--muted);">or click to browse — .csv files only</div>
          </div>
          <input type="file" id="csv-file-input" accept=".csv" style="display:none;" onchange="csvHandleFile(this.files[0])">
          <div style="margin-top:16px;">
            <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em;">Available fields</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;">After uploading, you'll choose which of your columns maps to each field. Import from any spreadsheet — no renaming needed.</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${config.fields.map(f => `<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-family:'DM Mono',monospace;color:${f.required?'var(--text)':'var(--muted)'};">${f.label}${f.required?' <span style="color:var(--accent)">★</span>':''}</div>`).join('')}
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:8px;"><span style="color:var(--accent)">★</span> needed for import · all others optional</div>
          </div>
        </div>
        <div id="csv-step-preview" style="display:none;"><div id="csv-preview-content"></div></div>
        <div id="csv-step-progress" style="display:none;"><div style="text-align:center;padding:20px 0;"><div class="spinner" style="margin:0 auto 16px;"></div><div style="font-size:14px;font-weight:600;color:var(--text);" id="csv-progress-label">Importing…</div><div style="background:var(--surface2);border-radius:8px;height:6px;margin:12px 0;overflow:hidden;"><div id="csv-progress-bar" style="height:100%;background:var(--accent);border-radius:8px;width:0%;transition:width 0.2s;"></div></div><div style="font-size:12px;color:var(--muted);" id="csv-progress-sub"></div></div></div>
        <div id="csv-step-result" style="display:none;"></div>
      </div>
      <div style="padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;" id="csv-footer">
        <div style="font-size:11px;color:var(--muted);" id="csv-footer-info"></div>
        <div style="display:flex;gap:8px;" id="csv-footer-btns">
          <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
  modal._csvConfig = config;
}

function csvDownloadTemplate() {
  const modal = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const headers = config.fields.map(f => f.label).join(',');
  const examples = (config.templateExample||[[]]).map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const csv = headers + '\n' + examples;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`batched_${config.title.toLowerCase().replace(/\s+/g,'_')}_template.csv`; a.click();
  URL.revokeObjectURL(url);
}

function csvHandleDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('csv-dropzone');
  dz.style.borderColor='var(--border)'; dz.style.background='var(--surface2)';
  const file = e.dataTransfer.files[0];
  if (file) csvHandleFile(file);
}

function csvHandleFile(file) {
  if (!file || !file.name.endsWith('.csv')) { showToast('Please upload a .csv file','error',3000); return; }
  const reader = new FileReader();
  reader.onload = e => csvParseAndPreview(e.target.result, file.name);
  reader.readAsText(file);
}

function csvParseText(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers:[], rows:[] };
  const parseRow = line => {
    const cells=[]; let cur='', inQ=false;
    for (let i=0; i<line.length; i++) {
      const ch=line[i];
      if (ch==='"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch===',' && !inQ) { cells.push(cur.trim()); cur=''; } else cur+=ch;
    }
    cells.push(cur.trim()); return cells;
  };
  const headers = parseRow(lines[0]).map(h => h.toLowerCase().trim());
  const rows = lines.slice(1).filter(l=>l.trim()).map(l => {
    const cells=parseRow(l); const obj={};
    headers.forEach((h,i) => { obj[h]=(cells[i]||'').trim(); }); return obj;
  });
  return { headers, rows };
}

// ── CSV column mapper ─────────────────────────────────────────

async function csvParseAndPreview(text, filename) {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const { headers, rows } = csvParseText(text);
  modal._csvRows    = rows;
  modal._csvHeaders = headers;

  const autoMap = {};
  config.fields.forEach(f => {
    const fLabel = f.label.toLowerCase().replace(/[^a-z0-9]/g,'');
    const fKey   = f.key.toLowerCase();
    const match  = headers.find(h => {
      const hn = h.toLowerCase().replace(/[^a-z0-9]/g,'');
      return hn === fLabel || hn === fKey || hn.includes(fLabel.slice(0,6)) || fLabel.includes(hn.slice(0,6));
    });
    if (match) autoMap[f.key] = match;
  });

  document.getElementById('csv-step-upload').style.display = 'none';
  document.getElementById('csv-step-preview').style.display = '';

  const optionsHtml = `<option value="">— skip this field —</option>${headers.map(h =>
    `<option value="${h}">${h}</option>`).join('')}`;

  const sel = (key) =>
    `<select id="csv-map-${key}" onchange="csvUpdatePreview()" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-width:180px;cursor:pointer;outline:none;appearance:auto;">${optionsHtml}</select>`;

  document.getElementById('csv-preview-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      <div style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent);">✓ ${rows.length} rows · ${headers.length} columns</div>
      <div style="font-size:12px;color:var(--muted);">${filename}</div>
    </div>

    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em;">Map your columns</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Match each Batch'd field to a column from your file. Fields marked <span style="color:var(--accent)">★</span> are needed for import — others are optional.</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${config.fields.map(f => `
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;">
            <div style="font-size:13px;color:var(--text);font-weight:500;">
              ${f.label}
              ${f.required ? '<span style="color:var(--accent);margin-left:4px;">★</span>' : '<span style="font-size:10px;color:var(--muted);margin-left:4px;">(optional)</span>'}
            </div>
            <div style="font-size:12px;color:var(--muted);">→</div>
            <div>${sel(f.key)}</div>
          </div>`).join('')}
      </div>
    </div>

    <div id="csv-live-preview">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.07em;">Preview (first 5 rows)</div>
      <div id="csv-preview-table" style="overflow-x:auto;border:1px solid var(--border);border-radius:10px;"></div>
      ${rows.length > 5 ? `<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;">+ ${rows.length - 5} more rows</div>` : ''}
    </div>`;

  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && autoMap[f.key]) el.value = autoMap[f.key];
  });

  csvUpdatePreview();

  document.getElementById('csv-footer-info').textContent = `${rows.length} rows ready`;
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="csvGoBack()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">← Back</button>
    <button onclick="csvRunImport()" id="csv-import-btn" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Import ${rows.length} row${rows.length!==1?'s':''}</button>`;
}

function csvGetCurrentMapping() {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const map    = {};
  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && el.value) map[f.key] = el.value;
  });
  return map;
}

function csvUpdatePreview() {
  const modal    = document.getElementById('csv-import-modal');
  const config   = modal._csvConfig;
  const rows     = modal._csvRows || [];
  const fieldMap = csvGetCurrentMapping();
  const mapped   = config.fields.filter(f => fieldMap[f.key]);
  const tableEl  = document.getElementById('csv-preview-table');
  if (!tableEl) return;

  if (mapped.length === 0) {
    tableEl.innerHTML = `<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted);">Assign at least one column above to see a preview.</div>`;
    return;
  }

  const missingRequired = config.fields.filter(f => f.required && !fieldMap[f.key]);
  const btn = document.getElementById('csv-import-btn');
  if (btn) {
    btn.disabled       = missingRequired.length > 0;
    btn.style.opacity  = missingRequired.length > 0 ? '0.45' : '1';
    btn.style.cursor   = missingRequired.length > 0 ? 'not-allowed' : 'pointer';
  }

  const preview = rows.slice(0, 5);
  tableEl.innerHTML = `<table style="width:100%;border-collapse:collapse;min-width:300px;">
    <thead><tr>
      ${mapped.map(f => `<th style="font-size:10px;color:var(--muted);text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);white-space:nowrap;">
        ${f.label}${f.required?'<span style="color:var(--accent);margin-left:3px;">★</span>':''}
        <div style="font-size:9px;color:rgba(106,175,158,0.5);font-family:'DM Mono',monospace;margin-top:1px;">← ${fieldMap[f.key]}</div>
      </th>`).join('')}
    </tr></thead>
    <tbody>
      ${preview.map((row,i) => `<tr style="background:${i%2?'rgba(0,0,0,0.1)':'transparent'};">
        ${mapped.map(f => {
          const val = row[fieldMap[f.key]] || '';
          return `<td style="font-size:11px;color:${val?'var(--text)':'rgba(106,175,158,0.3)'};padding:8px 10px;border-bottom:1px solid rgba(22,61,55,0.4);font-family:${f.type==='mono'?'DM Mono,monospace':'inherit'};max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${val||'—'}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  ${missingRequired.length > 0 ? `<div style="padding:10px 14px;background:rgba(52,211,153,0.05);border-top:1px solid var(--border);font-size:11px;color:var(--muted);">Assign required fields to import: <strong style="color:var(--accent);">${missingRequired.map(f=>f.label).join(', ')}</strong></div>` : ''}`;
}

function csvGoBack() {
  document.getElementById('csv-step-preview').style.display = 'none';
  document.getElementById('csv-step-upload').style.display  = '';
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>`;
  document.getElementById('csv-footer-info').textContent = '';
}

async function csvRunImport() {
  const modal    = document.getElementById('csv-import-modal');
  const config   = modal._csvConfig;
  const rows     = modal._csvRows;
  const fieldMap = csvGetCurrentMapping();

  document.getElementById('csv-step-preview').style.display  = 'none';
  document.getElementById('csv-step-progress').style.display = '';
  document.getElementById('csv-footer-btns').innerHTML = '';
  document.getElementById('csv-footer-info').textContent = 'Do not close this window…';

  const mapped = rows.map(row => {
    const obj = {};
    config.fields.forEach(f => { obj[f.key] = fieldMap[f.key] ? (row[fieldMap[f.key]] || '') : ''; });
    return obj;
  }).filter(r => config.fields.filter(f => f.required).every(f => r[f.key]?.trim()));

  document.getElementById('csv-progress-label').textContent = `Importing ${mapped.length} rows…`;

  let inserted = 0, failed = 0, errors = [];
  for (let i = 0; i < mapped.length; i++) {
    document.getElementById('csv-progress-bar').style.width = Math.round((i/mapped.length)*100) + '%';
    document.getElementById('csv-progress-sub').textContent = `${i+1} of ${mapped.length}`;
    try {
      const result = await config.insertRow(mapped[i]);
      if (result.error) { failed++; errors.push(`Row ${i+2}: ${result.error}`); }
      else inserted++;
    } catch(e) { failed++; errors.push(`Row ${i+2}: ${e.message}`); }
  }

  document.getElementById('csv-progress-bar').style.width = '100%';
  document.getElementById('csv-step-progress').style.display = 'none';
  document.getElementById('csv-step-result').style.display   = '';
  document.getElementById('csv-step-result').innerHTML = `
    <div style="text-align:center;padding:16px 0 8px;">
      <div style="font-size:40px;margin-bottom:12px;">${failed===0?'✅':inserted>0?'⚠️':'❌'}</div>
      <div style="font-size:17px;font-weight:700;color:${failed===0?'var(--accent)':inserted>0?'var(--warn)':'var(--danger)'};margin-bottom:6px;">${failed===0?'Import complete':inserted>0?'Partially imported':'Import failed'}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">
        ${inserted>0?`<span style="color:var(--accent)">${inserted} row${inserted!==1?'s':''} imported</span>`:''}
        ${failed>0?`${inserted>0?' · ':''}<span style="color:var(--danger)">${failed} failed</span>`:''}
      </div>
      ${errors.length>0?`<div style="background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2);border-radius:8px;padding:10px 14px;text-align:left;font-size:11px;color:var(--danger);max-height:120px;overflow-y:auto;">
        ${errors.slice(0,10).map(e=>`<div>• ${e}</div>`).join('')}
        ${errors.length>10?`<div style="color:var(--muted);margin-top:4px;">…and ${errors.length-10} more</div>`:''}
      </div>`:''}
    </div>`;

  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Done</button>`;
  document.getElementById('csv-footer-info').textContent = '';
  if (config.onComplete) { try { new Function(config.onComplete)(); } catch(e) {} }
}

// 5. Staff bulk invite
function importStaff() {
  openCSVImport({
    title: 'Bulk Invite Staff',
    description: 'Send invitations to multiple team members at once',
    fields: [
      { key:'email', label:'Email Address', required:true,  type:'text' },
      { key:'role',  label:'Role',          required:false, type:'text' },
      { key:'store', label:'Store Name',    required:false, type:'text' },
    ],
    templateExample: [
      ['anna.hansen@company.no','store_manager','Oslo - Grünerløkka'],
      ['kari.berg@company.no','staff','Bergen - Sentrum'],
      ['ole.nilsen@company.no','staff','Bergen - Sentrum'],
    ],
    insertRow: async (row) => {
      // Validate role
      const validRoles = ['staff','store_manager','corp_admin'];
      const role = validRoles.includes(row.role?.toLowerCase()) ? row.role.toLowerCase() : 'staff';

      // Look up store if provided
      let storeId = null;
      if (row.store) {
        const { data: stores } = await sb.from('stores').select('id,name').eq('organisation_id',_orgId);
        const match = (stores||[]).find(s => s.name.toLowerCase() === row.store.toLowerCase() || s.name.toLowerCase().includes(row.store.toLowerCase()));
        if (match) storeId = match.id;
      }

      // Create invitation token
      const token = crypto.randomUUID();
      const expiresAt = new Date(Date.now() + 7*24*60*60*1000).toISOString();

      const { error } = await sb.from('invitations').insert({
        organisation_id: _orgId,
        email: row.email.toLowerCase().trim(),
        role,
        store_id: storeId,
        token,
        expires_at: expiresAt,
        invited_by: _session?.user?.id || null,
      });
      if (error) return { error: error.message };

      // Send invite email
      try {
        await fetch('/.netlify/functions/send-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'staff_invite',
            to: row.email,
            orgName: _orgName,
            role,
            inviteUrl: `https://batchdapp.com/join?token=${token}`,
          }),
        });
      } catch(e) { /* email failure doesn't block the invite record */ }

      return { error: null };
    },
    onComplete: 'renderStaff()',
  });
}
</script>

<script>

    const issueLabels = { foreign_object:'Foreign object', mold:'Mold / spoilage', mislabeling:'Mislabeling', allergen:'Allergen concern', contamination:'Contamination', discoloration:'Discoloration', pest:'Pest', packaging:'Packaging defect', other:'Other' };

    const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';
    const fmtTime = d => {
      if (!d) return '—';
      const ms = Date.now() - new Date(d);
      if (ms < 3600000) return Math.floor(ms/60000) + 'm ago';
      if (ms < 86400000) return Math.floor(ms/3600000) + 'h ago';
      return Math.floor(ms/86400000) + 'd ago';

    el.innerHTML = `

      </div>

            <div style="padding:16px 20px;display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap;">

  }
}

          ${inv.instructions ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;">📋 <strong>Instructions:</strong> ${inv.instructions}</div>` : ''}
        </div>
        <button onclick="document.getElementById('dash-invest-resp-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
      </div>

      <div style="padding:22px 26px;display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);display:block;margin-bottom:8px;">Did you find the issue? *</label>
          <div style="display:flex;gap:10px;">
            <button id="inv-r-yes" onclick="dashSetInvestFound(true)" style="flex:1;padding:11px;border:2px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:13px;font-family:'Figtree',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s;">✓ Yes, found it</button>
            <button id="inv-r-no"  onclick="dashSetInvestFound(false)" style="flex:1;padding:11px;border:2px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:13px;font-family:'Figtree',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s;">✗ Not found</button>
          </div>
          <input type="hidden" id="inv-r-found" value="">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Store *</label>
          <select id="inv-r-store" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;">
            <option value="">— Select store —</option>
            ${(stores||[]).map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name}</option>`).join('')}
          </select></div>
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Units inspected</label>
          <input id="inv-r-units" type="number" min="0" placeholder="e.g. 24" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>
        </div>

        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Units affected (if any found)</label>
        <input id="inv-r-affected" type="number" min="0" value="0" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>

        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Findings description *</label>
        <textarea id="inv-r-desc" rows="3" placeholder="Describe what you found, where, and current status…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;resize:vertical;box-sizing:border-box;font-family:inherit;line-height:1.5;"></textarea></div>

        <div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Photos (optional — up to 4)</label>
          <input type="file" id="inv-r-photo-input" accept="image/*" multiple style="display:none;" onchange="dashHandleInvestPhotos(this)">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;" id="inv-r-photo-previews"></div>
          <button onclick="document.getElementById('inv-r-photo-input').click()" style="background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;">+ Add photo</button>
        </div>

        <div id="inv-r-msg" style="display:none;font-size:12px;padding:9px 12px;border-radius:8px;"></div>

        <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px;">
          <button onclick="document.getElementById('dash-invest-resp-modal').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
          <button onclick="submitDashInvestResponse('${invId}')" id="inv-r-submit" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Submit response</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(modal);
}

function dashSetInvestFound(found) {
  document.getElementById('inv-r-found').value = found ? 'yes' : 'no';
  const yes = document.getElementById('inv-r-yes');
  const no  = document.getElementById('inv-r-no');
  if (found) {
    yes.style.borderColor = 'var(--accent)'; yes.style.color = 'var(--accent)'; yes.style.background = 'rgba(52,211,153,0.08)';
    no.style.borderColor  = 'var(--border)'; no.style.color  = 'var(--muted)';  no.style.background  = 'transparent';
  } else {
    no.style.borderColor  = 'var(--accent)'; no.style.color  = 'var(--accent)'; no.style.background  = 'rgba(52,211,153,0.08)';
    yes.style.borderColor = 'var(--border)'; yes.style.color = 'var(--muted)';  yes.style.background = 'transparent';
  }
}

function dashHandleInvestPhotos(input) {
  const files = Array.from(input.files).slice(0, 4 - _dashInvestPhotos.length);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      _dashInvestPhotos.push(e.target.result.split(',')[1]);
      const prev = document.getElementById('inv-r-photo-previews');
      if (prev) {
        const idx = _dashInvestPhotos.length - 1;
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;width:64px;height:64px;';
        div.innerHTML = `<img src="${e.target.result}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--border);">
          <button onclick="_dashInvestPhotos.splice(${idx},1);this.parentElement.remove()" style="position:absolute;top:-6px;right:-6px;background:var(--danger);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1;">✕</button>`;
        prev.appendChild(div);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

async function submitDashInvestResponse(invId) {
  const found    = document.getElementById('inv-r-found').value;
  const storeEl  = document.getElementById('inv-r-store');
  const storeId  = storeEl?.value;
  const storeName = storeEl?.selectedOptions?.[0]?.dataset?.name || storeEl?.selectedOptions?.[0]?.textContent;
  const units    = parseInt(document.getElementById('inv-r-units')?.value) || 0;
  const affected = parseInt(document.getElementById('inv-r-affected')?.value) || 0;
  const desc     = document.getElementById('inv-r-desc')?.value.trim();
  const msg      = document.getElementById('inv-r-msg');
  const btn      = document.getElementById('inv-r-submit');

  const showMsg = (txt, ok) => {
    msg.style.display='block'; msg.style.background=ok?'rgba(52,211,153,0.1)':'rgba(255,92,92,0.1)';
    msg.style.color=ok?'var(--accent)':'var(--danger)'; msg.style.border=`1px solid ${ok?'rgba(52,211,153,0.3)':'rgba(255,92,92,0.3)'}`;
    msg.textContent=txt;
  };

  if (!found)   { showMsg('Please indicate whether the issue was found.', false); return; }
  if (!storeId) { showMsg('Please select a store.', false); return; }
  if (!desc)    { showMsg('Please describe your findings.', false); return; }

  btn.disabled = true; btn.textContent = 'Submitting…';

  const { data: { user } } = await sb.auth.getUser();

  const { error } = await sb.from('investigation_responses').insert({
    investigation_id: invId,
    retailer_org_id:  _orgId,
    store_id:         storeId,
    store_name:       storeName,
    responder_user_id: user?.id,
    responder_name:   user?.user_metadata?.first_name || user?.email?.split('@')[0] || 'Unknown',
    units_inspected:  units,
    units_affected:   affected,
    issue_found:      found === 'yes',
    issue_description: desc,
    photos:           _dashInvestPhotos.length > 0 ? _dashInvestPhotos : [],
    status: 'submitted',
  });

  if (error) { showMsg('Error: ' + error.message, false); btn.disabled=false; btn.textContent='Submit response'; return; }

  // Mark investigation as in_progress if still open
  await sb.from('investigation_requests').update({ status: 'in_progress' }).eq('id', invId).eq('status', 'open');

  document.getElementById('dash-invest-resp-modal').remove();
  showToast('Response submitted successfully', 'ok', 3000);
  renderDashInvestigations();
}
</script>
