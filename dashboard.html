// ── Consumer notify search + show-more functions ──────────────
window._cnShowCount = 5;  // how many recalls to show; grows by 10 per click

function cnInit() {
  const el = document.getElementById('cn-recalls-data');
  if (!el) return;
  try {
    window._cnAllRecalls = JSON.parse(decodeURIComponent(el.dataset.recalls || '[]'));
    window._cnSelected   = el.dataset.selected || '';
    window._cnShowCount  = 5;
  } catch(e) { window._cnAllRecalls = []; }
}

function cnToggleShowAll() {
  const all   = window._cnAllRecalls || [];
  const total = all.length;
  // If we've already shown everything, collapse back to 5
  if (window._cnShowCount >= total) {
    window._cnShowCount = 5;
  } else {
    window._cnShowCount = Math.min(window._cnShowCount + 10, total);
  }
  cnFilterRecalls();
}

function cnFilterRecalls() {
  const query   = (document.getElementById('cn-recall-search')?.value || '').toLowerCase().trim();
  const all     = window._cnAllRecalls || [];
  const listEl  = document.getElementById('cn-recall-list');
  const noRes   = document.getElementById('cn-no-results');
  const moreRow = document.getElementById('cn-show-more-row');
  const btn     = document.getElementById('cn-show-more-btn');
  const label   = document.getElementById('cn-count-label');
  if (!listEl) return;

  // When searching, reset show count so user sees all filtered results
  if (query) window._cnShowCount = all.length;

  const filtered = query ? all.filter(r =>
    r.product_name.toLowerCase().includes(query) ||
    r.lot_number.toLowerCase().includes(query) ||
    r.severity.toLowerCase().includes(query) ||
    r._type.toLowerCase().includes(query) ||
    r.reason.toLowerCase().includes(query) ||
    r.date.toLowerCase().includes(query)
  ) : all;

  const showCount = query ? filtered.length : Math.min(window._cnShowCount, filtered.length);
  const visible = filtered.slice(0, showCount);
  const remaining = filtered.length - showCount;

  // Update show-more button and label
  if (moreRow) moreRow.style.display = (!query && filtered.length > 5 && filtered.length > showCount) || (!query && showCount > 5 && showCount <= filtered.length) ? '' : 'none';
  if (remaining > 0) {
    if (btn)   btn.textContent = 'Show ' + Math.min(remaining, 10) + ' more ↓';
    if (label) label.textContent = 'Showing ' + showCount + ' of ' + filtered.length + ' recalls';
    if (moreRow) moreRow.style.display = '';
  } else if (showCount > 5 && !query) {
    if (btn)   btn.textContent = 'Show less ↑';
    if (label) label.textContent = 'Showing all ' + filtered.length + ' recalls';
    if (moreRow) moreRow.style.display = '';
  } else {
    if (moreRow) moreRow.style.display = 'none';
  }
  if (noRes) noRes.style.display = filtered.length === 0 ? '' : 'none';

  const selected = window._cnSelected || '';
  listEl.innerHTML = visible.map(r => {
    const isSel = selected === r.id;
    const selBg = 'rgba(var(--accent-rgb),0.06)';
    return `<div onclick="selectNotifRecall('${r.id}','${encodeURIComponent(r.product_name)}','${encodeURIComponent(r.lot_number)}','${encodeURIComponent(r.reason)}')"
      style="display:flex;align-items:center;gap:14px;padding:14px 18px;border-bottom:1px solid var(--border);cursor:pointer;background:${isSel?selBg:'transparent'};transition:background 0.15s;"
      onmouseover="if(this.style.background!=='${selBg}')this.style.background='rgba(var(--accent-rgb),0.04)'"
      onmouseout="if(this.style.background!=='${selBg}')this.style.background='transparent'">
      <div style="width:20px;height:20px;border-radius:50%;border:2px solid ${isSel?'var(--accent)':'var(--border)'};background:${isSel?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;flex-shrink:0;">
        ${isSel?'<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dim)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>':''}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${r.product_name||'—'}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">
          ${r.lot_number?`Lot: <span style="font-family:'DM Mono',monospace;">${r.lot_number}</span> · `:''}
          ${r._type==='pushed'?'Manufacturer push':'Manual'} · ${r.date}
        </div>
      </div>
      ${r.severity?`<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(var(--danger-rgb),0.1);color:var(--danger);white-space:nowrap;flex-shrink:0;">${r.severity}</span>`:''}
    </div>`;
  }).join('');
}

function selectNotifRecall(id, productEncoded, lotEncoded, reasonEncoded) {
  _consumerNotifRecallId = id;
  // Store context on customers
  _consumerNotifCustomers.forEach(c => {
    c._product = decodeURIComponent(productEncoded);
    c._lot     = decodeURIComponent(lotEncoded);
    c._reason  = decodeURIComponent(reasonEncoded);
  });
  renderConsumerNotification();
}

function openConsumerCSVImport(mode) {
  const isMatched = mode === 'matched';

  // Broad field definitions so the auto-mapper catches common CSV formats:
  // "Email", "Email Address", "E-mail", "Customer Email", "contact_email", etc.
  const broadcastFields = [
    { key:'email', label:'Customer Email', required:true,  type:'text',
      aliases:['email','e-mail','emailaddress','email_address','customeremail','contactemail','mail','customer_email','email address'] },
    { key:'name',  label:'Customer Name',  required:false, type:'text',
      aliases:['name','fullname','full_name','customername','customer_name','customer','firstname','first_name','contact','recipient'] },
  ];
  const matchedFields = [
    { key:'email',        label:'Customer Email',  required:true,  type:'text',
      aliases:['email','e-mail','emailaddress','email_address','customeremail','contactemail','mail','customer_email','email address'] },
    { key:'name',         label:'Customer Name',   required:false, type:'text',
      aliases:['name','fullname','full_name','customername','customer_name','customer','firstname','first_name','contact'] },
    { key:'product_name', label:'Product Name',    required:false, type:'text',
      aliases:['product','productname','product_name','item','itemname','description','product name'] },
    { key:'lot_number',   label:'Lot Number',      required:false, type:'mono',
      aliases:['lot','lotnumber','lot_number','batch','batchnumber','batch_number','lotcode','lot_code','lot number','batch number'] },
  ];

  openCSVImport({
    title: isMatched ? 'Upload Purchase History' : 'Upload Customer Emails',
    description: isMatched
      ? "Upload any customer spreadsheet — we'll map your columns automatically"
      : "Upload any email list — Batch'd detects email and name columns regardless of how they're named",
    fields: isMatched ? matchedFields : broadcastFields,
    templateExample: isMatched
      ? [['sarah@example.com','Sarah Hansen','Organic Olive Oil 500ml','L2026-04-01A'],['tom@example.com','Tom Nilsen','Gilde Bacon 200g','B2026-03-15']]
      : [['sarah@example.com','Sarah Hansen'],['tom@example.com','Tom Nilsen']],
    autoMapFn: (headers) => {
      // Enhanced auto-mapping: try aliases first, then partial match, then email-pattern detection
      const fields = isMatched ? matchedFields : broadcastFields;
      const map = {};
      const norm = h => h.toLowerCase().replace(/[^a-z0-9]/g,'');
      fields.forEach(f => {
        // 1. Try exact alias match
        let match = headers.find(h => f.aliases && f.aliases.includes(norm(h)));
        // 2. Try partial alias match
        if (!match) match = headers.find(h => f.aliases && f.aliases.some(a => norm(h).includes(a) || a.includes(norm(h))));
        // 3. For email field: detect by looking for @ in data values
        if (!match && f.key === 'email') match = headers.find(h => norm(h).includes('mail'));
        if (match) map[f.key] = match;
      });
      return map;
    },
    insertRow: async (row) => {
      // Validate email looks like an email
      const email = (row.email || '').trim();
      if (!email || !email.includes('@') || !email.includes('.')) return { error: null }; // skip invalid

      const name = (row.name || '').trim();
      const recallProduct = _consumerNotifCustomers[0]?._product || '';
      const recallLot     = _consumerNotifCustomers[0]?._lot || '';

      if (isMatched) {
        // INTENTIONALLY LENIENT MATCHING — do not tighten to the strict
        // three-condition rule used everywhere else in the platform. This is
        // CONSUMER NOTIFICATION (outreach), not active-recall counting (KPIs).
        // Failure modes are asymmetric:
        //   - False positive: customer notified about something they didn't buy.
        //     Annoying, but no legal exposure. Most jurisdictions allow over-notification.
        //   - False negative: real purchaser of recalled product is NOT notified.
        //     Health risk + direct legal exposure (FSMA 204, EU 178/2002).
        // Lenient matching deliberately favors over-notification on safety grounds.
        const rp = recallProduct.toLowerCase();
        const rl = recallLot.toLowerCase();
        const rowProduct = (row.product_name||'').toLowerCase();
        const rowLot     = (row.lot_number||'').toLowerCase();

        // Include if: no filter columns present, or lot matches, or product name overlaps
        const noFilters  = !rowProduct && !rowLot;
        const lotMatch   = rl && rowLot && (rowLot === rl || rowLot.includes(rl) || rl.includes(rowLot));
        const prodMatch  = rp && rowProduct && (
          rowProduct.includes(rp.split(' ')[0]) || rp.includes(rowProduct.split(' ')[0])
        );
        if (noFilters || lotMatch || prodMatch) {
          _consumerNotifCustomers.push({ email, name, mode: 'matched' });
        }
      } else {
        _consumerNotifCustomers.push({ email, name, mode: 'broadcast' });
      }
      return { error: null };
    },
    onComplete: 'renderConsumerNotification()',
  });
}

async function sendConsumerNotifications() {
  if (!_consumerNotifRecallId || !_consumerNotifCustomers.length) return;

  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }

  try {
    const res = await fetch('/.netlify/functions/notify-consumers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recall_event_id: _consumerNotifRecallId,
        org_id:   _orgId,
        org_name: _orgName,
        customers: _consumerNotifCustomers,
        product_name: _consumerNotifCustomers[0]?._product || 'Recalled product',
        lot_number:   _consumerNotifCustomers[0]?._lot || null,
        reason:       _consumerNotifCustomers[0]?._reason || null,
      }),
    });

    const data = await res.json();
    showToast(`Sent to ${data.sent || 0} customer${(data.sent||0)!==1?'s':''}`, 'ok', 4000);
    _consumerNotifCustomers = [];
    _consumerNotifRecallId  = null;
    renderConsumerNotification();

  } catch(e) {
    showToast('Send failed: ' + e.message, 'error', 4000);
    if (btn) { btn.disabled = false; btn.textContent = 'Retry'; }
  }
}

// ── Help tooltip system (data-attribute delegated) ───────────────────────────
(function() {
  var tip = null;

  function getTip() {
    if (!tip) {
      tip = document.createElement('div');
      tip.id = 'batchd-help-tip';
      document.body.appendChild(tip);
    }
    return tip;
  }

  function positionTip(el) {
    var t = getTip();
    var r = el.getBoundingClientRect();
    var tw = 260, th = t.offsetHeight || 100;
    var left = Math.round(r.left);
    var top  = Math.round(r.bottom + 6);
    if (left + tw > window.innerWidth - 10) left = window.innerWidth - tw - 10;
    if (left < 6) left = 6;
    if (top + th > window.innerHeight - 10) top = Math.round(r.top - th - 6);
    if (top < 6) top = 6;
    t.style.left = left + 'px';
    t.style.top  = top  + 'px';
  }

  function showTip(el) {
    var title = el.getAttribute('data-tip-title') || '';
    var body  = el.getAttribute('data-tip-body')  || '';
    if (!body) return;
    var t = getTip();
    t.innerHTML = (title ? '<div class="help-tip-title">' + title + '</div>' : '') + body;
    t.style.display = 'block';
    positionTip(el);
  }

  function hideTip() {
    var t = document.getElementById('batchd-help-tip');
    if (t) t.style.display = 'none';
  }

  // Delegated listeners — work on dynamically rendered HTML
  document.addEventListener('click', function(e) {
    var icon = e.target.closest ? e.target.closest('.help-icon') : null;
    if (icon) {
      e.stopPropagation();
      var t = getTip();
      if (t.style.display === 'block') { hideTip(); return; }
      showTip(icon);
      return;
    }
    hideTip();
  });

  document.addEventListener('mouseover', function(e) {
    var icon = e.target.closest ? e.target.closest('.help-icon') : null;
    if (icon) showTip(icon);
  });

  document.addEventListener('mouseout', function(e) {
    var icon = e.target.closest ? e.target.closest('.help-icon') : null;
    if (icon) hideTip();
  });

  // Keep old API for any remaining inline calls
  window.showHelp = function(el, title, body) {
    var t = getTip();
    t.innerHTML = (title ? '<div class="help-tip-title">' + title + '</div>' : '') + body;
    t.style.display = 'block';
    positionTip(el);
  };
  window.hideHelp = hideTip;
})();

// ── Toast notification ───────────────────────────────────────
(function() {
  // Inject toast element if not present
  if (!document.getElementById('dash-toast')) {
    const div = document.createElement('div');
    div.id = 'dash-toast';
    div.style.cssText = [
      'position:fixed', 'bottom:24px', 'right:24px', 'z-index:99999',
      'font-family:\'DM Mono\',monospace', 'font-size:12px',
      'padding:10px 18px', 'border-radius:10px', 'max-width:360px',
      'box-shadow:0 4px 24px rgba(0,0,0,0.4)', 'opacity:0',
      'transform:translateY(8px)', 'transition:opacity 0.2s,transform 0.2s',
      'pointer-events:none', 'display:none',
    ].join(';');
    document.body.appendChild(div);
  }
})();

let _toastTimer = null;
function showToast(msg, type, duration) {
  duration = duration || 3000;
  const el = document.getElementById('dash-toast');
  if (!el) return;
  if (_toastTimer) { clearTimeout(_toastTimer); _toastTimer = null; }
  // Toast text colors: each `color:` resolves correctly per theme. `--accent-on-primary`
  // is dark on bright mint in dark mode, white on dark emerald in light mode. For
  // warn/info/error the bg uses 95% alpha of the semantic color — text needs to stay
  // readable on both the dark-mode bright variant and the light-mode darker variant.
  const styles = {
    ok:    { bg: 'rgba(var(--accent-rgb),0.95)',     color: 'var(--accent-on-primary)', border: 'rgba(var(--accent-rgb),0.6)' },
    error: { bg: 'rgba(var(--danger-rgb),0.95)',     color: '#fff',                     border: 'rgba(var(--danger-rgb),0.6)' },
    warn:  { bg: 'rgba(var(--warn-rgb),0.95)',       color: '#fff',                     border: 'rgba(var(--warn-rgb),0.6)' },
    info:  { bg: 'rgba(var(--info-light-rgb),0.95)', color: '#fff',                     border: 'rgba(var(--info-light-rgb),0.6)' },
  };
  const s = styles[type] || styles.info;
  el.textContent = msg;
  el.style.background = s.bg;
  el.style.color = s.color;
  el.style.border = '1px solid ' + s.border;
  el.style.display = 'block';
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
  _toastTimer = setTimeout(() => {
    el.style.opacity = '0'; el.style.transform = 'translateY(8px)';
    setTimeout(() => { el.style.display = 'none'; }, 220);
    _toastTimer = null;
  }, duration);
}

// ── Store timeline modal ──────────────────────────────────────
async function showStoreTimeline(ackId) {
  document.getElementById('dash-store-timeline-modal')?.remove();
  // Audit fix: org-scope explicitly (defence-in-depth alongside RLS).
  const { data: a } = await sb.from('recall_acknowledgements')
    .select('*, stores(name), recall_events(product_name, lot_number, published_at)')
    .eq('id', ackId)
    .eq('organisation_id', _orgId)
    .single();
  if (!a) return;

  const steps = [
    { label: 'Notified',      time: a.created_at,        icon: '🔔' },
    { label: 'Acknowledged',  time: a.acknowledged_at,   icon: '✅' },
    { label: 'Pulled',        time: a.pulled_at,         icon: '📦' },
    { label: 'Disposed',      time: a.disposed_at,       icon: '🗑' },
    { label: 'Confirmed',     time: a.confirmed_at,      icon: '✓' },
  ];
  const fmtT = d => d ? new Date(d).toLocaleString(_dashLocale(), { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' }) : '—';
  const ev = a.recall_events || {};

  const m = document.createElement('div');
  m.id = 'dash-store-timeline-modal';
  m.style.cssText = 'position:fixed;inset:0;background:rgba(4,12,14,0.88);z-index:9900;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
  m.onclick = e => { if (e.target === m) m.remove(); };
  m.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;width:100%;max-width:440px;box-shadow:var(--shadow-xl);">
      <div style="padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
        <div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;">${a.stores?.name||'Store'} — Response timeline</div>
          <div style="font-size:11px;color:var(--muted);margin-top:3px;">${ev.product_name||''}${ev.lot_number?' · Lot: '+ev.lot_number:''}</div>
        </div>
        <button onclick="document.getElementById('dash-store-timeline-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;line-height:1;padding:0;">✕</button>
      </div>
      <div style="padding:18px 22px;">
        ${steps.map((s, i) => {
          const done = !!s.time;
          return `<div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:${i<4?'16px':'0'};">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;">
              <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;background:${done?'rgba(var(--accent-rgb),0.15)':'var(--surface2)'};border:1.5px solid ${done?'rgba(var(--accent-rgb),0.4)':'var(--border)'};">${done?s.icon:'<span style="font-size:11px;color:var(--muted);">'+(i+1)+'</span>'}</div>
              ${i < 4 ? '<div style="width:1.5px;height:16px;background:'+( done?'rgba(var(--accent-rgb),0.3)':'var(--border)')+';margin-top:2px;"></div>' : ''}
            </div>
            <div style="padding-top:6px;">
              <div style="font-size:12px;font-weight:600;color:${done?'var(--text)':'var(--muted)'};">${s.label}</div>
              <div style="font-size:11px;font-family:'DM Mono',monospace;color:${done?'var(--accent)':'var(--muted)'};">${fmtT(s.time)}</div>
            </div>
          </div>`;
        }).join('')}
        ${a.units_pulled ? `<div style="margin-top:14px;padding-top:14px;border-top:1px solid var(--border);font-size:12px;color:var(--muted);">Units pulled from shelf: <strong style="color:var(--text);">${a.units_pulled}</strong></div>` : ''}
      </div>
    </div>`;
  document.body.appendChild(m);
}

</script>
