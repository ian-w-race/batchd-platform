    const liveBadge = `
      <div style="display:inline-flex;align-items:center;gap:7px;background:${badgeBg};border:1px solid ${badgeBorder};color:${badgeColor};font-family:'DM Mono',monospace;font-size:11px;font-weight:700;padding:6px 13px;border-radius:7px;letter-spacing:0.05em;">
        <span style="width:7px;height:7px;border-radius:50%;background:${badgeDot};${badgePulse}"></span>
        ${badgeText} · ${total} STORES
      </div>`;

    // Drill badge for the title row.
    const drillBadge = ev.is_drill
      ? `<span style="display:inline-block;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;background:rgba(var(--warn-rgb),0.14);border:1px solid rgba(var(--warn-rgb),0.4);color:#f5a623;margin-right:10px;vertical-align:middle;letter-spacing:0.05em;">DRILL</span>`
      : '';

    // Pretty date for the metadata row.
    const fmtDate = (iso) => iso ? new Date(iso).toLocaleString(_dashLocale(), {
      day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
    }) : '—';

    // Action button factory. Disabled (greyed out + tooltip) when the
    // recall is locked (administratively closed OR all stores resolved).
    const actionBtn = (label, onclickJs, opts) => {
      opts = opts || {};
      const disabled = !!opts.disabled;
      const hoverColor = opts.hoverColor || 'var(--accent)';
      return `<button
        ${disabled ? 'disabled' : `onclick="${onclickJs}"`}
        title="${disabled ? esc(opts.disabledTooltip || 'Audit trail locked.') : ''}"
        style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:${disabled ? 'not-allowed' : 'pointer'};letter-spacing:0.02em;opacity:${disabled ? '0.5' : '1'};transition:border-color 0.15s,color 0.15s;"
        ${disabled ? '' : `onmouseenter="this.style.borderColor='${hoverColor}';this.style.color='${hoverColor}'" onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'"`}
      >${esc(label)}</button>`;
    };
    const disabledTooltip = isClosed
      ? 'Recall is administratively closed.'
      : 'All stores have reached Resolved — audit trail locked.';

    el.innerHTML = `
      <!-- Top row: back button + action buttons -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px;flex-wrap:wrap;">
        <button onclick="showPanel('overview')"
                style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;letter-spacing:0.02em;">
          ← Dashboard
        </button>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          ${actionBtn('Send reminders', `sendRecallReminders('${ev.id}')`, { disabled: isLocked, disabledTooltip, hoverColor: 'var(--warn)' })}
          ${actionBtn('Mark complete',  `markRecallComplete('${ev.id}')`,  { disabled: isLocked, disabledTooltip, hoverColor: 'var(--accent)' })}
        </div>
      </div>

      <!-- Recall info card -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px 22px;margin-bottom:14px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:12px;">
          <div style="flex:1;min-width:240px;">
            <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--text);line-height:1.3;">
              ${drillBadge}${esc(ev.product_name || 'Recall')}
            </div>
            ${ev.reason ? `<div style="font-size:13px;color:var(--muted);margin-top:6px;line-height:1.55;">${esc(ev.reason)}</div>` : ''}
          </div>
          ${liveBadge}
        </div>

        <!-- Metadata row -->
        <div style="display:flex;flex-wrap:wrap;gap:24px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);">
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px;">Severity</div>
            <div>${sevBadge}</div>
          </div>
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px;">Lot code${(ev.lot_number || '').includes(',') ? 's' : ''}</div>
            <div style="font-family:'DM Mono',monospace;font-size:12.5px;font-weight:600;color:var(--text);">${esc(ev.lot_number || '—')}</div>
          </div>
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px;">Recall ID</div>
            <div style="font-family:'DM Mono',monospace;font-size:12.5px;font-weight:600;color:var(--text);">${esc(ev.id.slice(0, 8))}…</div>
          </div>
          <div>
            <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px;">Published</div>
            <div style="font-size:12.5px;color:var(--text);">${fmtDate(ev.published_at)}</div>
          </div>
        </div>
      </div>

      <!-- Closure banner — only when administratively closed via Mark
           complete (closed_at set). Distinct from the natural all-
           stores-resolved state which is conveyed by the COMPLETED
           badge in the header. -->
      ${isClosed ? `
        <div style="background:rgba(var(--warn-rgb),0.06);border:1px solid rgba(var(--warn-rgb),0.25);border-radius:10px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:flex-start;gap:12px;">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0;margin-top:1px;">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
          </svg>
          <div style="flex:1;min-width:0;">
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:3px;">Audit trail locked — recall closed by coordinator</div>
            <div style="font-size:11.5px;color:var(--muted);line-height:1.55;">
              Closed ${fmtDate(ev.closed_at)}${ev.closed_note ? ' · ' + esc(ev.closed_note) : ''}
            </div>
          </div>
        </div>` : ''}

      <!-- 5-stage counter strip — at-a-glance status. Each tile shows
           count/total + stage label + sub-info (median time between
           stages, or "first store · time ago" for RESOLVED). Auto-fits
           to 1 row on desktop, wraps to 2-3 per row on narrow widths. -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:10px;margin-bottom:14px;">
        ${counterTiles.map(t => {
          const pct = total > 0 ? Math.round((t.count / total) * 100) : 0;
          const isComplete = total > 0 && t.count === total;
          const isPartial  = t.count > 0 && t.count < total;
          const barColor   = isComplete ? 'var(--accent)'
                            : isPartial  ? 'var(--accent-dim, rgba(var(--accent-alt-rgb),0.55))'
                                          : 'var(--border)';
          const countColor = isComplete ? 'var(--accent)' : (isPartial ? 'var(--text)' : 'var(--muted)');
          return `
            <div style="position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px 12px;overflow:hidden;">
              <!-- Progress bar at the top of the tile -->
              <div style="position:absolute;top:0;left:0;right:0;height:3px;background:var(--border);">
                <div style="height:100%;width:${pct}%;background:${barColor};transition:width 0.3s;"></div>
              </div>
              <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:24px;color:${countColor};line-height:1;margin-top:8px;">
                ${t.count}<span style="color:var(--muted);font-weight:600;font-size:15px;">/${total || 0}</span>
              </div>
              <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;font-weight:700;color:var(--muted);margin-top:5px;">
                ${t.label}
              </div>
              <div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4;min-height:14px;">
                ${t.sub}
              </div>
            </div>`;
        }).join('')}
      </div>

      <!-- FSMA 204 records production hero -->
      <div style="background:linear-gradient(135deg, rgba(var(--info-rgb),0.07), rgba(var(--info-rgb),0.015) 65%);border:1px solid rgba(var(--info-rgb),0.35);border-radius:12px;padding:18px 22px;margin-bottom:10px;">
        <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
          <div style="width:38px;height:38px;border-radius:10px;background:rgba(var(--info-rgb),0.14);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7ba9ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
          </div>
          <div style="flex:1;min-width:260px;">
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;">FSMA 204 — 24-hour records production</div>
            <div style="font-size:12px;color:var(--muted);line-height:1.55;">When the FDA invokes <strong style="color:#7ba9ff;font-family:'DM Mono',monospace;">21 CFR 1.1455</strong>, you have 24 hours to produce an electronic sortable spreadsheet of the Receiving KDEs for this lot. Batch'd has them — one click exports the regulator-ready CSV.</div>
          </div>
          <button id="btn-produce-fsma204"
                  onclick="produceFsma204Records('${ev.id}')"
                  style="display:inline-flex;align-items:center;gap:8px;font-family:'Figtree',sans-serif;font-weight:700;font-size:13px;padding:11px 22px;border-radius:10px;border:none;background:#4682ff;color:#fff;cursor:pointer;box-shadow:0 4px 14px rgba(var(--info-rgb),0.25);transition:transform 0.15s,box-shadow 0.15s;flex-shrink:0;"
                  onmouseenter="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 18px rgba(var(--info-rgb),0.35)'"
                  onmouseleave="this.style.transform='none';this.style.boxShadow='0 4px 14px rgba(var(--info-rgb),0.25)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Produce records
          </button>
        </div>
      </div>

      <!-- FDA 21 CFR 7.46 recall notification draft (v2 — 2026-05) -->
      <div style="background:linear-gradient(135deg, rgba(var(--info-soft-rgb),0.06), rgba(var(--info-soft-rgb),0.012) 65%);border:1px solid rgba(var(--info-soft-rgb),0.3);border-radius:12px;padding:18px 22px;margin-bottom:14px;">
        <div style="display:flex;align-items:center;gap:18px;flex-wrap:wrap;">
          <div style="width:38px;height:38px;border-radius:10px;background:rgba(var(--info-soft-rgb),0.12);display:inline-flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#7ba9ff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6"/><path d="M9 16h6"/><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
          </div>
          <div style="flex:1;min-width:260px;">
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);margin-bottom:3px;">FDA recall notification draft</div>
            <div style="font-size:12px;color:var(--muted);line-height:1.55;">Auto-fills the firm-initiated recall submission required by <strong style="color:#7ba9ff;font-family:'DM Mono',monospace;">21 CFR 7.46</strong> within 24h of initiation. A firm officer reviews placeholders before submission.</div>
          </div>
          <button onclick="openFdaNotificationFromRecallEvent('${ev.id}')"
                  style="display:inline-flex;align-items:center;gap:8px;font-family:'Figtree',sans-serif;font-weight:600;font-size:13px;padding:10px 18px;border-radius:10px;border:1px solid #7ba9ff;background:none;color:#7ba9ff;cursor:pointer;transition:background 0.15s,color 0.15s;flex-shrink:0;"
                  onmouseenter="this.style.background='rgba(var(--info-soft-rgb),0.12)'"
                  onmouseleave="this.style.background='none'">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
            Generate draft
          </button>
        </div>
      </div>

      <!-- Affected stores map (Step 4). Reuses renderStoreMap with the
           stage palette and a recall-aware popup. Empty state when no
           affected stores have coordinates yet. -->
      ${storesOnMap.length > 0 ? `
        <div style="margin-bottom:14px;">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px;">
            <div>
              <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">Stores affected</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">
                ${storesOnMap.length} on the map${storesOffMap.length > 0 ? ' · ' + storesOffMap.length + ' not yet placed' : ''}
              </div>
            </div>
          </div>
          <div id="recall-detail-map"></div>
        </div>` : `
        <div style="margin-bottom:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.6;">
          <strong style="color:var(--text);">No affected stores on the map yet.</strong>
          ${storesOffMap.length > 0
            ? ` ${storesOffMap.length} affected store${storesOffMap.length===1?' has':'s have'} an address but no coordinates. Verify the address in <strong style="color:var(--text);">Store Network</strong> so Batch'd can geocode it.`
            : ' This recall has no stores assigned.'}
        </div>`}

      <!-- Stores response-progress list (Step 5) — sorted most-urgent
           first. Click a row with coords to jump to its marker on the
           map above. -->
      ${storesAckListHtml}

      <!-- Live event ticker — newest-first chronological feed of
           step transitions, recall pushes, and reminders sent. -->
      ${eventTickerHtml}

      ${srm.length > 0 ? `
        <div style="margin-top:6px;font-size:10.5px;color:var(--accent);font-family:'DM Mono',monospace;letter-spacing:0.02em;line-height:1.6;">
          ${srm.length} scan-recall match${srm.length === 1 ? '' : 'es'} on file for this recall
        </div>` : ''}`;

    // Mount the map after the container is in the DOM. Stash the
    // controller so the stores list row clicks below can zoom + open
    // the corresponding marker's popup.
    let mapCtrl = null;
    if (storesOnMap.length > 0) {
      const mapContainer = document.getElementById('recall-detail-map');
      if (mapContainer) {
        mapCtrl = renderStoreMap(mapContainer, storesOnMap, {
          height: '480px',
          colors: _RECALL_DETAIL_STAGE_COLORS,
          labels: _RECALL_DETAIL_STAGE_LABELS,
          legendNote: ev.is_drill
            ? 'Mock drill — stores progress through the same 5-stage chain.'
            : 'Each marker shows the store\'s current stage in the recall response chain.',
          popupBuilder: _recallDetailPopup
        });
      }
    }

    // Wire stores ack list row clicks → scroll to map + open marker popup.
    // Rows without coordinates show a toast pointing to Store Network.
    document.querySelectorAll('.batchd-store-ack-row').forEach(row => {
      row.addEventListener('click', () => {
        const sid = row.dataset.storeId;
        const store = mapStores.find(s => s.id === sid);
        if (!store) return;
        if (store.latitude == null || store.longitude == null) {
          showToast("This store isn't on the map yet. Verify its address in Store Network.", 'info', 3500);
          return;
        }
        if (!mapCtrl || !mapCtrl.map) return;

        // Scroll the map into view (smooth) then zoom + open popup.
        // 350ms delay so the smooth scroll has time to complete before
        // Leaflet animates the pan — looks much better than instant.
        const mapContainer = document.getElementById('recall-detail-map');
        if (mapContainer) mapContainer.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => {
          try {
            mapCtrl.map.setView([store.latitude, store.longitude], 12, { animate: true });
            // Find the corresponding marker by matching lat/lng.
            // markersByStatus is keyed by stage, so flatten across all stages.
            const allMarkers = Object.values(mapCtrl.markersByStatus).flat();
            const marker = allMarkers.find(m => {
              const ll = m.getLatLng();
              return Math.abs(ll.lat - store.latitude) < 0.0001 && Math.abs(ll.lng - store.longitude) < 0.0001;
            });
            if (marker) marker.openPopup();
          } catch (_) { /* swallow — non-fatal */ }
        }, 350);
      });
    });

  } catch (e) {
    console.error('[renderRecallDetail]', e);
    el.innerHTML = `
      <div style="max-width:520px;padding:24px;background:var(--surface);border:1px solid rgba(var(--danger-rgb),0.3);border-radius:12px;">
        <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--danger);margin-bottom:6px;">Error loading recall</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:14px;">${esc(e.message || 'Unknown error')}</div>
        <button onclick="showPanel('overview')" style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;">← Back to Dashboard</button>
      </div>`;
  }
}

// ── Stores panel ──────────────────────────────────────────────
async function renderStores() {
  const _errEl = document.getElementById('main-content');
  try {

  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading stores…</div>`;
  try {
  const { data: stores } = await sb.from('stores').select('*').eq('organisation_id', _orgId).order('name');
  const list = stores || [];

  // Cache the full row by id so the Edit button can pass just the id and
  // editStore() can look up all the structured fields. Avoids fragile
  // string-escaping into onclick attributes.
  window._storesById = {};
  list.forEach(s => { window._storesById[s.id] = s; });

  // ── Map readiness helpers ──────────────────────────────────────
  // Used both by the per-row indicator and the two distinct banners
  // below. These will be reused in Step 2 when the map filters to
  // map-ready stores.
  const _hasStructuredAddress = s =>
    !!(s.street_address && s.city && s.region && s.postal_code && s.country);
  const _hasCoords = s =>
    s.latitude != null && s.longitude != null;

  // Two distinct cases for "not on the map yet" — kept separate because
  // the corrective action differs:
  //   incomplete = needs more form data
  //   failedGeocode = data looks complete but Nominatim returned no hit
  //                   (typo, very rural address, etc.) — user should
  //                   verify and re-save.

let _editingStoreId = null;

// openStoreForm: pass `null`/no-arg for "Add new", or a store row object for "Edit".
// The structured address fields are populated from the row; legacy rows that
// only have the freeform `address` will leave the structured fields blank,
// and the user fills them in to enable geocoding + map placement.
function openStoreForm(store) {
  store = store || {};
  _editingStoreId = store.id || null;
  document.getElementById('store-form-label').textContent = store.id ? 'Edit store' : 'Add new store';
  document.getElementById('sf-name').value     = store.name           || '';
  document.getElementById('sf-code').value     = store.store_code     || '';
  document.getElementById('sf-street').value   = store.street_address || '';
  document.getElementById('sf-city').value     = store.city           || '';
  document.getElementById('sf-region').value   = store.region         || '';
  document.getElementById('sf-postal').value   = store.postal_code    || '';
  document.getElementById('sf-country').value  = store.country        || (_orgRegion === 'no' ? 'NO' : 'US');
  document.getElementById('sf-phone').value    = store.phone          || '';
  document.getElementById('sf-active').value   = store.active !== undefined ? String(store.active) : 'true';
  document.getElementById('store-form-msg').style.display = 'none';
  document.getElementById('store-geocode-status').style.display = 'none';
  document.getElementById('store-form').style.display = 'block';
  setTimeout(() => document.getElementById('sf-name').focus(), 50);
}

// editStore: looks up the full store row from the renderStores cache so the
// table button only has to pass the id (no string-escaping in onclick).
function editStore(id) {
  const store = (window._storesById || {})[id];
  if (!store) {
    showToast('Could not find store to edit. Try refreshing.', 'error', 3500);
    return;
  }
  openStoreForm(store);
  document.getElementById('store-form').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeStoreForm() {
  document.getElementById('store-form').style.display = 'none';
  _editingStoreId = null;
}

// Delete a store. Behaviour depends on whether the store has historical
// scans or recall acknowledgements:
//   - No history → hard delete (DELETE FROM stores)
//   - Has history → refuse hard delete and offer to deactivate instead
//                   (recall_acknowledgements.store_id has ON DELETE CASCADE,
//                   so a hard delete would wipe the compliance audit trail)
async function deleteStore(id) {
  const store = (window._storesById || {})[id];
  if (!store) {
    showToast('Could not find store. Try refreshing.', 'error', 3500);
    return;
  }

  // Check for associated data so we know whether hard delete is safe
  const [scansRes, acksRes] = await Promise.all([
    sb.from('scans').select('id', { count: 'exact', head: true }).eq('store_id', id).eq('organisation_id', _orgId),
    sb.from('recall_acknowledgements').select('id', { count: 'exact', head: true }).eq('store_id', id).eq('organisation_id', _orgId)
  ]);
  const scanCount = scansRes.count || 0;
  const ackCount  = acksRes.count  || 0;

  if (scanCount > 0 || ackCount > 0) {
    // Has history — refuse hard delete, offer deactivation
    const parts = [];
    if (scanCount > 0) parts.push(`${scanCount} scan${scanCount === 1 ? '' : 's'}`);
    if (ackCount  > 0) parts.push(`${ackCount} recall response${ackCount === 1 ? '' : 's'}`);
    const msg = `"${store.name}" has ${parts.join(' and ')} on file.\n\n`
              + `To preserve the compliance audit trail, this store can\'t be permanently deleted.\n\n`
              + `Deactivate it instead? It will be hidden from the active store list but its history stays intact.`;
    if (!confirm(msg)) return;

    const { error } = await sb.from('stores')
      .update({ active: false })
      .eq('id', id)
      .eq('organisation_id', _orgId);
    if (error) {
      showToast('Could not deactivate: ' + error.message, 'error', 4000);
      return;
    }
    showToast(`"${store.name}" deactivated. History preserved.`, 'ok', 3500);
    invalidateOverviewCache();
    renderStores();
    return;
  }

  // No history — safe to hard delete
  if (!confirm(`Permanently delete "${store.name}"?\n\nThis cannot be undone.`)) return;
  const { error } = await sb.from('stores')
    .delete()
    .eq('id', id)
    .eq('organisation_id', _orgId);
  if (error) {
    showToast('Could not delete: ' + error.message, 'error', 4000);
    return;
  }
  showToast(`"${store.name}" deleted.`, 'ok', 3000);
  invalidateOverviewCache();
  renderStores();
}

async function saveStore() {
  invalidateOverviewCache(); // store changes overview

  const name        = document.getElementById('sf-name').value.trim();
  const code        = document.getElementById('sf-code').value.trim();
  const street      = document.getElementById('sf-street').value.trim();
  const city        = document.getElementById('sf-city').value.trim();
  const region      = document.getElementById('sf-region').value.trim();
  const postal      = document.getElementById('sf-postal').value.trim();
  const country     = document.getElementById('sf-country').value;
  const phone       = document.getElementById('sf-phone').value.trim();
  const active      = document.getElementById('sf-active').value === 'true';
  const btn         = document.getElementById('btn-save-store');
  const msgEl       = document.getElementById('store-form-msg');
  const geoStatusEl = document.getElementById('store-geocode-status');

  // Validate required fields. Address fields are mandatory so we can geocode
  // for the live store map (Step 1 of the Command Center pivot, 2026-05).
  const missing = [];
  if (!name)    missing.push('Store name');
  if (!street)  missing.push('Street address');
  if (!city)    missing.push('City');
  if (!region)  missing.push('State / Region');
  if (!postal)  missing.push('Postal code');
  if (!country) missing.push('Country');

  if (missing.length) {
    msgEl.textContent = `Required: ${missing.join(', ')}`;
    msgEl.style.cssText = 'display:block;background:rgba(var(--danger-rgb),0.1);border:1px solid rgba(var(--danger-rgb),0.3);color:var(--danger);font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:var(--accent-on-primary);"></div> Saving…';

  // Geocode the address. Failure is non-fatal — store still saves, but
  // it won't appear on the map until the user re-saves with corrected
  // address. Show inline status so the user knows what's happening.
  geoStatusEl.style.display = 'block';
  geoStatusEl.style.color = 'var(--muted)';
  geoStatusEl.textContent = '· Looking up location…';

  const geoResult = await _geocodeAddress({
    street, city, region, postalCode: postal, country
  });

  if (geoResult) {
    geoStatusEl.style.color = 'var(--accent)';
    geoStatusEl.textContent = `· Located: ${geoResult.lat.toFixed(4)}, ${geoResult.lng.toFixed(4)}`;
  } else {
    geoStatusEl.style.color = 'var(--warn, #f5a623)';
    geoStatusEl.textContent = '· Could not auto-locate address. Saving anyway — store won\'t appear on the map until address is corrected.';
  }

  // Compose the freeform `address` for backward compat (lot lookup, drill
  // launcher, recall-distribution joins all read this). Reassembled from
  // structured fields so it stays in sync.
  const composedAddress = [
    street,
    city,
    [region, postal].filter(Boolean).join(' '),
    country
  ].filter(Boolean).join(', ');

  const payload = {
    name,
    store_code:       code || null,
    address:          composedAddress,
    street_address:   street,
    city,
    region,
    postal_code:      postal,
    country,
    phone:            phone || null,
    active,
    organisation_id:  _orgId,
    latitude:         geoResult ? geoResult.lat : null,
    longitude:        geoResult ? geoResult.lng : null,
    geocoded_at:      geoResult ? new Date().toISOString() : null,
    geocoding_source: geoResult ? geoResult.source : null
  };

  // UPDATE branch scopes by org_id so a forged _editingStoreId can't rewrite
  // another org's store row (which would also overwrite that store's
  // organisation_id with this user's, since payload includes organisation_id).
  const { error } = _editingStoreId
    ? await sb.from('stores').update(payload).eq('id', _editingStoreId).eq('organisation_id', _orgId)
    : await sb.from('stores').insert(payload);

  if (error) {
    msgEl.textContent = error.message || 'Could not save store.';
    msgEl.style.cssText = 'display:block;background:rgba(var(--danger-rgb),0.1);border:1px solid rgba(var(--danger-rgb),0.3);color:var(--danger);font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;';
    btn.disabled = false;
    btn.innerHTML = 'Save store';
    return;
  }

  closeStoreForm();
  renderStores();
}

}

// Perf fix #26: debounce the traceability filter. 500-row tbody rebuilds
// (~350KB innerHTML) on every keystroke became a 4-letter search = 4
// rebuilds. 200ms debounce collapses to 1 rebuild.
let _filterTraceabilityTimer = null;
function filterTraceabilityDebounced() {
  clearTimeout(_filterTraceabilityTimer);
  _filterTraceabilityTimer = setTimeout(filterTraceability, 200);
}

function filterTraceability() {
  const search  = (document.getElementById('trace-search')?.value || '').toLowerCase();
  const store   = document.getElementById('trace-store')?.value  || '';
  const status  = document.getElementById('trace-status')?.value || '';
  const all     = window._traceAllScans || [];
  const filtered = all.filter(s => {
    const matchSearch = !search ||
      (s.product_name||'').toLowerCase().includes(search) ||
      (s.lot_number||'').toLowerCase().includes(search) ||
      (s.barcode_number||'').toLowerCase().includes(search) ||
      (s.scanned_by||'').toLowerCase().includes(search);
    const matchStore = !store || s.store_name === store;
    const matchStatus = !status ||
      (status === 'resolved' && s.recall_resolved) ||
      (status === 'removed'  && !s.recall_resolved && s.removed_from_shelf_at) ||
      (status === 'shelf'    && !s.recall_resolved && !s.removed_from_shelf_at);
    return matchSearch && matchStore && matchStatus;
  });
  const tbody = document.getElementById('trace-tbody');
  const count = document.getElementById('trace-count');
  if (tbody) tbody.innerHTML = renderTraceRows(filtered);
  if (count) count.textContent = `${filtered.length} of ${all.length} records`;
}

async function deletePattern(id, btn) {
  if (!confirm('Delete this learned pattern? The scanning app will re-learn it from future scans.')) return;
  btn.disabled = true; btn.textContent = '…';
  // Scope by org_id so a forged pattern id can't delete another org's row.
  const { data: deleted, error } = await sb.from('code_patterns')
    .delete()
    .eq('id', id)
    .eq('organisation_id', _orgId)
    .select('id');
  if (error)               { btn.disabled = false; btn.textContent = 'Delete'; showToast('Error: ' + error.message, 'error', 4000); return; }
  if (!deleted || !deleted.length) { btn.disabled = false; btn.textContent = 'Delete'; showToast('Could not delete — pattern not found in your organisation.', 'error', 4000); return; }
  renderTraceability('patterns');
}

                    ${roleLabel}${store ? ` · ${store.name}` : ''}
                    ${m.joined_at ? ` · Joined ${fmtDash(m.joined_at)}` : ''}
                  </div>
                </div>
                <span class="recall-status status-resolved" style="flex-shrink:0;">Active</span>
                <button onclick="deactivateMember('${m.user_id}', '${getEmail(m.user_id, m.role) || m.user_id}')"

                  onmouseenter="this.style.borderColor='var(--danger)';this.style.color='var(--danger)'"
                  onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'"
                  title="Deactivate — removes access without deleting scan history">
                  Deactivate
                </button>
              </div>`;}).join('')}
      </div>
    </div>

    ${expired.length > 0 ? `
    <div class="panel" style="margin-top:14px;border-color:var(--danger);">
      <div class="panel-header"><div class="panel-title" style="color:var(--danger);">Expired invitations</div><div class="panel-sub">${expired.length} invitation${expired.length!==1?'s':''} — links no longer work</div></div>
      <div class="panel-body">
        ${expired.map(inv => `
          <div class="activity-item">
            <div class="activity-dot" style="background:var(--danger);"></div>
            <div class="activity-text">
              <strong>${inv.email}</strong> — ${inv.role.replace('_',' ')}
              <span style="font-size:10px;color:var(--muted);margin-left:6px;">Expired ${fmtDash(inv.expires_at)}</span>
            </div>
            <span class="recall-status status-active">Expired</span>
          </div>`).join('')}
      </div>
    </div>` : ''}

    ${deactivated.length > 0 ? `
    <div class="panel" style="margin-top:14px;border-color:rgba(var(--danger-rgb),0.15);opacity:0.8;">
      <div class="panel-header">
        <div class="panel-title" style="color:var(--muted);">Deactivated accounts</div>
        <div class="panel-sub">${deactivated.length} account${deactivated.length!==1?'s':''} — no access, history preserved</div>
      </div>
      <div class="panel-body">
        ${deactivated.map(m => {
          const email = getEmail(m.user_id, m.role) || m.user_id.slice(0,8) + '…';
          return `
          <div class="activity-item" style="opacity:0.65;">
            <div class="activity-dot" style="background:var(--border);"></div>
            <div class="activity-text">
              <strong>${email}</strong>
              <span class="role-badge">${m.role.replace(/_/g,' ')}</span>
            </div>
            <span class="recall-status" style="background:rgba(var(--accent-muted-rgb),0.08);color:var(--muted);">Deactivated</span>
          </div>`;
        }).join('')}
      </div>
    </div>` : ''}`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading staff: ${e.message}</div>`;
  }

  } catch(_renderErr) {
    console.error('[renderStaff]', _renderErr);
    if (_errEl) _errEl.innerHTML += `<div style="margin:20px 0;padding:16px;background:rgba(var(--danger-rgb),0.08);border:1px solid rgba(var(--danger-rgb),0.2);border-radius:10px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;"><strong style="color:var(--danger);">Error loading Staff</strong><br>${_renderErr.message}</div>`;
  }
}

async function deactivateMember(userId, identifier) {
  const confirmed = confirm(
    `Deactivate ${identifier}?\n\nThis removes their access to Batch'd immediately. Their scan history is preserved. You can reactivate them later by contacting support.`
  );
  if (!confirmed) return;

  // Prevent self-deactivation
  const { data: { user } } = await sb.auth.getUser();
  if (userId === user?.id) {
    showToast('You cannot deactivate your own account.', 'error', 4000);
    return;
  }

  const { error } = await sb.from('organisation_members')
    .update({ active: false })
    .eq('user_id', userId)
    .eq('organisation_id', _orgId);

  if (error) {
    showToast('Could not deactivate: ' + error.message, 'error', 4000);
    return;
  }

  showToast(`${identifier} deactivated — access removed`, 'ok', 3000);
  renderStaff();
}

function openInviteForm() {
  document.getElementById('invite-form').style.display = 'block';

}

function closeInviteForm() {
  document.getElementById('invite-form').style.display = 'none';
  ['inv-email','inv-full-name','inv-phone','inv-store-role','inv-employee-id','inv-hire-date'].forEach(id => {

function onInvRoleChange() {
  const role        = document.getElementById('inv-role').value;
  const storeWrap   = document.getElementById('inv-store-wrap');
  const storeLabel  = document.getElementById('inv-store-label');
  const singleSel   = document.getElementById('inv-store');
  const multiSel    = document.getElementById('inv-store-multi');

  if (role === 'corp_admin') {

async function sendInvitation() {
  const email      = document.getElementById('inv-email').value.trim();
  const role       = document.getElementById('inv-role').value;
  const msgEl      = document.getElementById('invite-msg');
  const btn        = document.getElementById('btn-send-invite');

  msgEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    showInvMsg('Please enter a valid email address.', 'error'); return;
  }

  // Resolve store assignment by role shape
  //   staff       → single store (becomes primary on accept)
  //   store_manager → multi-store array (becomes manager_store_ids)
  //   corp_admin  → no store
  let primaryStoreId = null;
  let managerStoreIds = null;
  if (role === 'staff') {
    primaryStoreId = document.getElementById('inv-store')?.value || null;
    if (!primaryStoreId) {
      showInvMsg('Please select a store for this staff member.', 'error'); return;
    }
  } else if (role === 'store_manager') {
    managerStoreIds = [...document.querySelectorAll('.inv-store-cb:checked')].map(cb => cb.value);
    if (managerStoreIds.length === 0) {
      showInvMsg('Please tick at least one store this manager will oversee.', 'error'); return;
    }
  }

  // Optional HR pre-fill — invitee can edit on accept
  const fullName     = document.getElementById('inv-full-name')?.value?.trim()    || null;
  const phoneNumber  = document.getElementById('inv-phone')?.value?.trim()        || null;
  const storeRole    = document.getElementById('inv-store-role')?.value?.trim()   || null;
  const employeeId   = document.getElementById('inv-employee-id')?.value?.trim()  || null;
  const hireDate     = document.getElementById('inv-hire-date')?.value             || null;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending…';

  try {
    // Step 1: create the base invitation row via the existing RPC.
    // The RPC writes email/role/store_id/token under the canonical
    // security-definer path and returns the token + display names.
    const { data: inv, error } = await sb.rpc('send_invitation', {
      p_organisation_id: _orgId,
      p_email: email,
      p_role:  role,
      // For managers we leave store_id NULL (manager_store_ids is canonical);
      // for staff we pass the selected primary store.
      p_store_id: primaryStoreId,
    });
    if (error) throw error;

    // Step 2: enrich the row with HR fields + multi-store manager array.
    // The RPC doesn't know about these new columns (added in migration 010);
    // we patch them in with a follow-up UPDATE, identified by token.
    const updatePayload = {};
    if (fullName)       updatePayload.full_name     = fullName;
    if (phoneNumber)    updatePayload.phone_number  = phoneNumber;
    if (storeRole)      updatePayload.store_role    = storeRole;
    if (employeeId)     updatePayload.employee_id   = employeeId;
    if (hireDate)       updatePayload.hire_date     = hireDate;
    if (managerStoreIds) updatePayload.manager_store_ids = managerStoreIds;
    if (Object.keys(updatePayload).length > 0) {
      const { error: upErr } = await sb.from('invitations')
        .update(updatePayload)
        .eq('token', inv.token);
      if (upErr) console.warn('[sendInvitation] HR field update failed:', upErr.message);
      // Don't block on this — the invite still works without HR pre-fill.
    }

    // Step 3: email the invitee via Netlify function
    const inviteUrl = `https://batchdapp.com/join?token=${inv.token}`;
    const roleLabel = role.replace(/_/g, ' ');

    const emailRes = await fetch('/.netlify/functions/send-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: email,
        orgName: inv.org_name,
        inviterEmail: inv.inviter_email,
        role: roleLabel,
        inviteUrl,
      }),
    });

    if (!emailRes.ok) throw new Error('Email failed to send');

    showInvMsg(`Invitation sent to ${email} ✓`, 'success');
    btn.disabled = false;
    btn.innerHTML = 'Send invitation email →';
    // Reset the form so a second invite can't accidentally duplicate fields
    ['inv-email','inv-full-name','inv-phone','inv-store-role','inv-employee-id','inv-hire-date'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.querySelectorAll('.inv-store-cb').forEach(cb => cb.checked = false);
    // Refresh staff panel after 1.5s
    setTimeout(() => renderStaff(), 1500);

  } catch(e) {
    showInvMsg('Error: ' + (e.message || 'Could not send invitation.'), 'error');
    btn.disabled = false;
    btn.innerHTML = 'Send invitation email →';
  }
}

function showInvMsg(txt, type) {
  const el = document.getElementById('invite-msg');
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(var(--danger-rgb),0.1)' : 'rgba(var(--accent-rgb),0.1)';
  el.style.border = type === 'error' ? '1px solid rgba(var(--danger-rgb),0.3)' : '1px solid rgba(var(--accent-rgb),0.3)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
}

// Compliance assessment state
let _complianceStep = 0;  // 0=live dashboard, 1-4=detail categories, 5=results
let _complianceData = null;

async function renderCompliance() {
  const _errEl = document.getElementById('main-content');
  try {

  const el = document.getElementById('main-content');
  // Detail view requested (from "Full assessment" button)
  if (_complianceStep >= 1 && _complianceStep <= 4) {
    if (!_complianceData) { await loadComplianceData(el); }
    renderComplianceCategory(el, _complianceStep);
    return;
  }
  if (_complianceStep === 5) {
    if (!_complianceData) { await loadComplianceData(el); }
    renderComplianceResults(el);
    return;
  }
  // Default: always-on live dashboard
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading compliance data…</div>`;
  await loadComplianceData(el);
  renderComplianceDashboard(el);

  } catch(_renderErr) {
    console.error('[renderCompliance]', _renderErr);
    if (_errEl) _errEl.innerHTML += `<div style="margin:20px 0;padding:16px;background:rgba(var(--danger-rgb),0.08);border:1px solid rgba(var(--danger-rgb),0.2);border-radius:10px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;"><strong style="color:var(--danger);">Error loading Compliance</strong><br>${_renderErr.message}</div>`;
  }
}

  const d = _complianceData;

  const scoreColor = v => v >= 80 ? 'var(--accent)' : v >= 50 ? 'var(--warn)' : 'var(--danger)';

  const fmtDate = dt => new Date(dt).toLocaleDateString(_dashLocale(),{day:'numeric',month:'short',year:'numeric'});

  // Build priority actions list
  const gaps = [];

  if (d.supplierScans === 0 && d.scans.length > 0)                      gaps.push({ cat:'Traceability',       msg:`Supplier names not recorded on any scans — ask staff to enter supplier during scanning`, link:null });
  if (isUS && (d.tlcSourceScans||0) === 0 && d.scans.length > 0)        gaps.push({ cat:'Traceability',       msg:`TLC source not recorded on any scans — required KDE under FSMA 204 §1.1330`, link:null });
  if (isUS && (d.refDocScans||0) === 0 && d.scans.length > 0)           gaps.push({ cat:'Traceability',       msg:`Reference document not recorded on any scans — required KDE under FSMA 204 §1.1330`, link:null });
  if (!d.drillInYear)                                                    gaps.push({ cat:'Recall readiness',   msg:'No mock recall drill in the last 12 months — run one now to test your response chain', link:"showPanel('recalls')" });
  if (!d.coordinator)                                                      gaps.push({ cat:'Recall readiness',   msg:`No recall coordinator assigned — required by ${isUS?'FDA 21 CFR 7.49':'Mattilsynet guidance'}`, link:"showPanel('settings')" });
  if (d.acks.length > 0 && d.acksProgressed === 0)                       gaps.push({ cat:'Recall readiness',   msg:'Recalls received but none acknowledged — open the Recalls panel and progress your response', link:"showPanel('recalls')" });
  if (d.activeStores.length === 0)                                       gaps.push({ cat:'Store coverage',     msg:'No active stores registered — add stores in the Store Network panel', link:"showPanel('stores')" });

async function loadComplianceData(el) {
  const now = Date.now();
  const days30  = new Date(now - 30 * 86400000).toISOString();
  const days365 = new Date(now - 365 * 86400000).toISOString();
  const isUS = _orgRegion === 'us';

  const [scansRes, storesRes, acksRes, drillsRes, orgRes] = await Promise.all([
    // 365-day lookback + cap: prevents unbounded query on large orgs.
    // Columns include FSMA 204 KDEs (tlc_source, reference_document) for US scoring.
    sb.from('scans')
      .select('lot_number, supplier_name, is_ftl, tlc_source, reference_document, created_at, store_id, store_name')
      .eq('organisation_id', _orgId)
      .gte('created_at', days365)
      .order('created_at', { ascending: false })
      .limit(2000),
    sb.from('stores').select('id, name, active').eq('organisation_id', _orgId),
    sb.from('recall_acknowledgements').select('status, acknowledged_at, created_at, recall_event_id').eq('organisation_id', _orgId),
    sb.from('mock_recall_drills').select('id, started_at, recall_event_id').eq('initiated_by_org', _orgId).gte('started_at', days365).order('started_at', {ascending:false}),
    sb.from('organisations').select('recall_coordinator_name, recall_coordinator_contact, recall_lookback_days').eq('id', _orgId).single(),
  ]);

  const scans   = scansRes.data   || [];
  const stores  = storesRes.data  || [];
  const acks    = acksRes.data    || [];
  const drills  = drillsRes.data  || [];
  const org     = orgRes.data     || {};

  // Enrich drills
  if (drills.length > 0) {
    const evIds = drills.map(d=>d.recall_event_id).filter(Boolean);
    if (evIds.length) {
      const { data: evs } = await sb.from('recall_events').select('id,product_name').in('id', evIds);
      const evMap = {}; (evs||[]).forEach(e=>{evMap[e.id]=e;});
      drills.forEach(d => { if (evMap[d.recall_event_id]) d.product_name = evMap[d.recall_event_id].product_name; });
    }
  }

  const activeStores      = stores.filter(s => s.active);
  const recentScans       = scans.filter(s => s.created_at >= days30);
  const lotScans          = scans.filter(s => s.lot_number).length;
  const supplierScans     = scans.filter(s => s.supplier_name).length;
  const ftlScans          = scans.filter(s => s.is_ftl).length;
  // FSMA 204 KDE fields — only meaningful for US orgs but computed for both
  const tlcSourceScans    = scans.filter(s => s.tlc_source).length;
  const refDocScans       = scans.filter(s => s.reference_document).length;
  // Audit fix #18: separate drill activity from real-recall activity in the
  // compliance score. drillInYear (+35) already credits drill engagement
  // directly. Without this filter, drill acks were also triggering the
  // acks-engagement bonuses (+15 for any acks, +20 for any progressed),
  // giving drill-only retailers up to 100 pts for "we ran our annual drill
  // once." Real-recall handling without a drill could only score 65.
  // Filtering ack-engagement signals to non-drill events makes drill
  // activity only contribute via the dedicated +35 weight, balancing drill
  // and real-recall contributions equally.
  // Compliance-check messages downstream ("recall alert network active",
  // "5-step chain completed", etc.) also use this filtered set so a
  // drill-only retailer doesn't see "X recalls received" implying real ones.
  const drillEventIds     = new Set((drills || []).map(d => d.recall_event_id).filter(Boolean));
  const realAcks          = acks.filter(a => !drillEventIds.has(a.recall_event_id));
  const acksProgressed    = realAcks.filter(a => a.status !== 'notified').length;
  const acksConfirmed     = realAcks.filter(a => a.status === 'confirmed').length;
  const drillInYear       = drills.length > 0;
  const storeIdsRecent    = new Set(recentScans.map(s => s.store_id || s.store_name).filter(Boolean));
  const storesActiveRecent= activeStores.filter(s => storeIdsRecent.has(s.id) || storeIdsRecent.has(s.name)).length;

  // ── Scores ────────────────────────────────────────────────────
  // docScore: lot code (TLC) capture rate — the core record for both frameworks
  const docScore = scans.length === 0 ? 0 : Math.round((lotScans / scans.length) * 100);

  // traceScore: region-aware.
  //   US  (FSMA 204): KDE completeness — TLC source + reference document + supplier name.
  //       These three are the "manually-entered" required KDEs beyond lot number.
  //       Average of three coverage rates so each gap is equally penalised.
  //   EU  (178/2002): One-step-back — supplier name is the primary traceability field.
  const traceScore = scans.length === 0 ? 0 : isUS
    ? Math.round(((tlcSourceScans + refDocScans + supplierScans) / (3 * scans.length)) * 100)
    : Math.round((supplierScans / scans.length) * 100);

  // Coordinator adds to recall readiness score.
  // Reweight after chunk 6C (retailer-only): the +20 that used to be
  // awarded for "manufacturer partners connected" is rolled into the
  // drillInYear weight, since drilling is the meaningful proactive
  // readiness signal for a retailer-only platform.
  const hasCoordinator = !!(org.recall_coordinator_name && org.recall_coordinator_contact);
  let recallScore     = 20;
  // Audit fix #18: realAcks (non-drill) drives the +15 alert-network bonus.
  if (realAcks.length > 0)    recallScore += 15;
  if (acksProgressed > 0)     recallScore += 20;
  if (drillInYear)            recallScore += 35;
  if (hasCoordinator)         recallScore += 10;
  recallScore = Math.min(100, recallScore);
  const coverageScore = activeStores.length === 0 ? 0 : Math.round((storesActiveRecent / activeStores.length) * 100);
  const overallScore  = Math.round((docScore + traceScore + recallScore + coverageScore) / 4);

  _complianceData = {
    scans, stores,
    // Audit fix #18: expose the drill-filtered ack list as `acks` so all
    // downstream consumers (gap detector at line ~4403, compliance-check
    // messages, audit checklist) reflect REAL recall activity, not drills.
    // `allAcks` is also exposed for any future view that wants the unfiltered
    // count (e.g. drill-only metrics). Currently nothing reads allAcks.
    acks: realAcks, allAcks: acks,
    drills, activeStores,
    recentScans, lotScans, supplierScans, ftlScans,
    tlcSourceScans, refDocScans,        // FSMA 204 KDE fields
    acksProgressed, acksConfirmed,
    drillInYear, storesActiveRecent, isUS,
    coordinator: org.recall_coordinator_name ? { name: org.recall_coordinator_name, contact: org.recall_coordinator_contact } : null,
    lookbackDays: org.recall_lookback_days || 365,
    scores: { docScore, traceScore, recallScore, coverageScore, overallScore },
    assessedAt: new Date().toISOString(),
  };
}

        ${pass
          ? `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`
          : `<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="3"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`}
      </div>
      <div style="flex:1;">
        <div style="font-size:12px;font-weight:600;color:${pass?'var(--text)':'var(--muted)'};">${label}</div>
        <div style="font-size:11px;color:${pass?'var(--muted)':'var(--warn)'};margin-top:3px;line-height:1.5;">${detail}</div>
        ${!pass && action ? `<div style="margin-top:6px;font-size:11px;color:var(--info);font-style:italic;">→ ${action}</div>` : ''}
      </div>
    </div>`;
}

function renderComplianceCategory(el, step) {
  const d  = _complianceData;
  const isUS = d.isUS;
  const sc = d.scores;
  const scoreColor = v => v >= 80 ? 'var(--accent)' : v >= 50 ? 'var(--warn)' : 'var(--danger)';

  const categories = [
    {
      n: 1, label: 'Record keeping',
      reg: isUS ? 'FSMA 204 §1.1330 — Key Data Elements at Critical Tracking Events' : 'EU Reg. 178/2002 Art. 17 — Operators must ensure food safety and maintain records',
      score: sc.docScore,
      checks: [
        {
          pass: d.scans.length > 0,
          label: 'Scan records on file',
          detail: d.scans.length > 0 ? `${d.scans.length} product records documented` : 'No scan records found',
          action: 'Open the scanning app and start scanning products as they arrive',
        },
        {
          pass: d.lotScans > 0,
          label: 'Lot codes captured',
          detail: d.lotScans > 0 ? `${d.lotScans} of ${d.scans.length} records have lot codes (${Math.round(d.lotScans/Math.max(d.scans.length,1)*100)}%)` : 'No lot codes on record',
          action: 'Ensure staff are photographing lot codes during the scan flow — use AI OCR if codes are hard to read',
        },
        {
          pass: isUS ? d.ftlScans > 0 : d.lotScans / Math.max(d.scans.length,1) > 0.7,
          label: isUS ? 'Food Traceability List (FTL) products identified' : 'Documentation coverage above 70%',
          detail: isUS ? (d.ftlScans > 0 ? `${d.ftlScans} FTL product records on file` : 'No FTL products marked') : `${Math.round(d.lotScans/Math.max(d.scans.length,1)*100)}% of records have lot codes`,
          action: isUS ? 'Enable FTL mode in the scanning app settings for products on the FDA Food Traceability List' : 'Increase lot code capture rate — target 100%',
        },
        {
          pass: true,
          label: 'Records retrievable within 24 hours',
          detail: 'All Batch\'d records are stored digitally and instantly queryable — this requirement is met by design',
        },
      ],
    },
    {
      n: 2, label: 'Traceability chain',
      reg: isUS ? 'FSMA 204 — Traceability Lot Code source, one step forward / one step back' : 'EU Reg. 178/2002 Art. 18 — One step back, one step forward traceability at all stages',
      score: sc.traceScore,
      checks: [
        {
          pass: d.supplierScans > 0,
          label: isUS ? 'Supplier / previous source documented' : 'Supplier name documented (one step back)',
          detail: d.supplierScans > 0 ? `${d.supplierScans} of ${d.scans.length} records include supplier name (${Math.round(d.supplierScans/Math.max(d.scans.length,1)*100)}%)` : 'No supplier names on record',
          action: 'Ensure staff enter the supplier or delivery company name during the scan flow',
        },
        // US-specific: FSMA 204 KDE — TLC Source
        ...(isUS ? [{
          pass: (d.tlcSourceScans||0) > 0,
          label: 'TLC source documented (FSMA 204 KDE)',
          detail: (d.tlcSourceScans||0) > 0
            ? `${d.tlcSourceScans} of ${d.scans.length} records include TLC source (${Math.round((d.tlcSourceScans||0)/Math.max(d.scans.length,1)*100)}%)`
            : 'No TLC source recorded — required Key Data Element under FSMA 204 §1.1330',
          action: 'Staff should enter the TLC source field when scanning products — this is the document or system that assigned the lot code',
        }] : []),
        // US-specific: FSMA 204 KDE — Reference document
        ...(isUS ? [{
          pass: (d.refDocScans||0) > 0,
          label: 'Reference document recorded (FSMA 204 KDE)',
          detail: (d.refDocScans||0) > 0
            ? `${d.refDocScans} of ${d.scans.length} records include a reference document (${Math.round((d.refDocScans||0)/Math.max(d.scans.length,1)*100)}%)`
            : 'No reference documents on record — required Key Data Element under FSMA 204 §1.1330',
          action: 'Staff should enter the purchase order, invoice, or delivery note number when scanning received goods',
        }] : []),
        // EU-specific: coverage threshold check
        ...(!isUS ? [{
          pass: d.supplierScans / Math.max(d.scans.length, 1) > 0.5,
          label: 'Traceability chain coverage above 50%',
          detail: `${Math.round(d.supplierScans/Math.max(d.scans.length,1)*100)}% of records have supplier data`,
          action: 'Increase supplier name capture — target 100% for all received goods',
        }] : []),
        {
          pass: isUS
            ? (d.tlcSourceScans||0) > 0 && (d.refDocScans||0) > 0 && d.supplierScans > 0
            : d.supplierScans > 0 && d.lotScans > 0,
          label: isUS ? 'Full FSMA 204 KDE chain established' : 'Full one-step-back chain established',
          detail: isUS
            ? ((d.tlcSourceScans||0) > 0 && (d.refDocScans||0) > 0 && d.supplierScans > 0
                ? 'TLC source, reference documents, and supplier names all present on scans'
                : 'Requires TLC source + reference documents + supplier names on scans')
            : (d.supplierScans > 0 && d.lotScans > 0
                ? 'Both supplier names and lot codes are recorded on scans'
                : 'Requires both supplier names and lot codes on scans'),
          action: isUS
            ? 'Ensure staff complete all KDE fields (supplier, TLC source, reference doc) when scanning'
            : 'Ensure supplier names and lot codes are recorded on all scans',
        },
      ],
    },
    {
      n: 3, label: 'Recall readiness',
      reg: isUS ? 'FDA 21 CFR — Class I recalls require RFR notification within 24 hours. Annual drill recommended.' : 'Mattilsynet §16 — Recall obligation and notification procedures. Annual drill best practice.',
      score: sc.recallScore,
      checks: [
        {
          pass: d.drillInYear,
          label: 'Mock recall drill conducted in last 12 months',
          detail: d.drillInYear ? `${d.drills.length} drill${d.drills.length!==1?'s':''} on record — last: ${new Date(d.drills[0].started_at).toLocaleDateString(_dashLocale(),{day:'numeric',month:'short',year:'numeric'})}` : 'No drills conducted in the last 12 months',
          action: 'Run a mock recall drill from the scanning app → Manager Dashboard → Mock Recall Drill',
        },
        {
          pass: d.acks.length > 0,
          label: 'Recall network active — alerts received',
          detail: d.acks.length > 0 ? `${d.acks.length} recall acknowledgement record${d.acks.length!==1?'s':''}` : 'No recall alerts received yet',
          action: null,
        },
        {
          pass: d.acksProgressed > 0,
          label: 'Recall responses documented',
          detail: d.acksProgressed > 0 ? `${d.acksProgressed} recall${d.acksProgressed!==1?'s':''} progressed through the response chain` : d.acks.length > 0 ? 'Recalls received but none acknowledged yet' : 'No recalls to respond to yet',
          action: 'When recalls arrive, use the Recalls panel to document each step of your response',
        },
        {
          pass: d.acksConfirmed > 0 || d.acks.length === 0,
          label: 'Full recall response chain completed',
          detail: d.acksConfirmed > 0 ? `${d.acksConfirmed} full response chain${d.acksConfirmed!==1?'s':''} completed (all 5 steps)` : d.acks.length > 0 ? 'No recalls fully resolved yet' : 'No recalls received — chain not yet exercised',
          action: 'Complete all 5 steps (notified → acknowledged → pulled → disposed → resolved) for each recall',
        },
      ],
    },
    {
      n: 4, label: 'Operational coverage',
      reg: isUS ? 'FSMA 204 — Records required for each Critical Tracking Event at each receiving location' : 'EU Reg. 178/2002 Art. 3 — Traceability applies at all stages of production, processing and distribution',
      score: sc.coverageScore,
      checks: [
        {
          pass: d.activeStores.length > 0,
          label: 'Store network registered',
          detail: d.activeStores.length > 0 ? `${d.activeStores.length} active store${d.activeStores.length!==1?'s':''} in your network` : 'No active stores registered',
          action: 'Add stores in the Stores panel',
        },
        {
          pass: d.recentScans.length > 0,
          label: 'Scanning activity in last 30 days',
          detail: d.recentScans.length > 0 ? `${d.recentScans.length} scans in the last 30 days` : 'No scanning activity in the last 30 days',
          action: 'Ensure store staff are using the scanning app to record products',
        },
        {
          pass: d.activeStores.length > 0 && d.storesActiveRecent / Math.max(d.activeStores.length,1) >= 0.8,
          label: 'At least 80% of stores scanned recently',
          detail: d.activeStores.length > 0 ? `${d.storesActiveRecent} of ${d.activeStores.length} stores scanned in the last 30 days (${Math.round(d.storesActiveRecent/Math.max(d.activeStores.length,1)*100)}%)` : 'No stores registered',
          action: 'Check for dark stores — locations that have stopped scanning. Investigate why.',
        },
        {
          pass: d.activeStores.length > 0 && d.storesActiveRecent === d.activeStores.length,
          label: 'No dark stores detected',
          detail: d.activeStores.length - d.storesActiveRecent > 0 ? `${d.activeStores.length - d.storesActiveRecent} store${d.activeStores.length-d.storesActiveRecent!==1?'s':''} with no recent scanning` : 'All active stores have scanned in the last 30 days',
          action: 'Identify and follow up with stores that have not scanned recently',
        },
      ],
    },
  ];

  const cat   = categories[step - 1];
  const score = cat.score;
  const passing = cat.checks.filter(c => c.pass).length;
  const failing = cat.checks.filter(c => !c.pass).length;

  el.innerHTML = `
    <div style="max-width:640px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;">${cat.label}</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:20px;">Category ${step} of 4</div>
      ${complianceProgressBar(step)}

      <!-- Category score card -->
      <div style="background:var(--surface);border:1px solid ${score>=80?'rgba(var(--accent-rgb),0.25)':score>=50?'rgba(var(--warn-rgb),0.25)':'rgba(var(--danger-rgb),0.25)'};border-radius:12px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:16px;">
        <div style="width:56px;height:56px;border-radius:50%;background:conic-gradient(${scoreColor(score)} 0deg,${scoreColor(score)} ${score*3.6}deg,var(--border) ${score*3.6}deg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
          <div style="width:42px;height:42px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:'Figtree',sans-serif;font-weight:800;font-size:15px;color:${scoreColor(score)};">${score}%</div>
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:${scoreColor(score)};margin-bottom:2px;">${score >= 80 ? 'Good standing' : score >= 50 ? 'Needs attention' : 'Action required'}</div>
          <div style="font-size:11px;color:var(--muted);">${passing} of ${cat.checks.length} checks passing · ${failing} gap${failing!==1?'s':''} identified</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;font-family:'DM Mono',monospace;opacity:0.7;">${cat.reg}</div>
        </div>
      </div>

      <!-- Checks -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:16px;">
        <div style="padding:13px 18px;border-bottom:1px solid var(--border);font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);">Compliance checks</div>
        <div style="padding:0 18px;">
          ${cat.checks.map(c => complianceCheck(c.pass, c.label, c.detail, c.action)).join('')}
        </div>
      </div>

      ${failing > 0 ? `
      <div style="background:rgba(var(--warn-rgb),0.06);border:1px solid rgba(var(--warn-rgb),0.2);border-radius:10px;padding:14px 16px;margin-bottom:16px;">
        <div style="font-size:12px;font-weight:700;color:var(--warn);margin-bottom:8px;">${failing} gap${failing!==1?'s':''} to address</div>
        ${cat.checks.filter(c=>!c.pass&&c.action).map(c=>`
          <div style="display:flex;gap:8px;margin-bottom:6px;font-size:11px;color:var(--muted);line-height:1.5;">
            <span style="color:var(--warn);flex-shrink:0;">→</span>
            <span>${c.action}</span>
          </div>`).join('')}
      </div>` : `
      <div style="background:rgba(var(--accent-rgb),0.06);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:10px;padding:14px 16px;margin-bottom:16px;display:flex;align-items:center;gap:10px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <div style="font-size:12px;color:var(--accent);font-weight:600;">All checks passing for this category</div>
      </div>`}

      <div style="display:flex;justify-content:space-between;align-items:center;">
        <button onclick="${step > 1 ? '_complianceStep='+(step-1)+';renderCompliance()' : '_complianceStep=0;_complianceData=null;renderCompliance()'}" style="font-size:12px;padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:inherit;">← Back</button>
        <button onclick="_complianceStep=${step < 4 ? step+1 : 5};renderCompliance()" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">
          ${step < 4 ? 'Next: '+['','Traceability chain','Recall readiness','Operational coverage','See results'][step+1]+' →' : 'See results →'}
        </button>
      </div>
    </div>`;
}

function renderComplianceResults(el) {
  const d  = _complianceData;
  const sc = d.scores;
  const isUS = d.isUS;
  const scoreColor = v => v >= 80 ? 'var(--accent)' : v >= 50 ? 'var(--warn)' : 'var(--danger)';
  const overall = sc.overallScore;
  const assessedDate = new Date(d.assessedAt).toLocaleDateString(_dashLocale(),{weekday:'long',day:'numeric',month:'long',year:'numeric'});

  const catScores = [
    { label:'Record keeping',    score:sc.docScore,      icon:'📄' },
    { label:'Traceability chain',score:sc.traceScore,    icon:'🔗' },
    { label:'Recall readiness',  score:sc.recallScore,   icon:'🚨' },
    { label:'Operational coverage',score:sc.coverageScore, icon:'🏪' },
  ];

  // Priority actions — worst category first
  const sortedCats = [...catScores].sort((a,b) => a.score - b.score);
  const totalGaps = d.scans.length === 0 ? 4 : [
    d.lotScans/Math.max(d.scans.length,1) < 0.7,
    d.supplierScans === 0,
    !d.drillInYear,
    d.activeStores.length > 0 && d.storesActiveRecent/d.activeStores.length < 0.8,
  ].filter(Boolean).length;

  el.innerHTML = `
    <div style="max-width:640px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;">Assessment complete</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:20px;">${assessedDate}</div>

      <!-- Overall result -->
      <div style="background:${overall>=80?'rgba(var(--accent-rgb),0.07)':overall>=50?'rgba(var(--warn-rgb),0.07)':'rgba(var(--danger-rgb),0.07)'};border:1px solid ${overall>=80?'rgba(var(--accent-rgb),0.25)':overall>=50?'rgba(var(--warn-rgb),0.25)':'rgba(var(--danger-rgb),0.25)'};border-radius:14px;padding:24px;margin-bottom:20px;text-align:center;">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:10px;">${isUS?'FSMA 204 / FDA':'EU 178/2002 / Mattilsynet'} readiness</div>
        <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:56px;line-height:1;color:${scoreColor(overall)};margin-bottom:8px;">${overall}%</div>
        <div style="font-size:14px;font-weight:600;color:${scoreColor(overall)};margin-bottom:16px;">${overall>=80?'Good standing — audit ready':overall>=50?'Developing — gaps need attention':'Early stage — significant gaps identified'}</div>
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
          <button onclick="generateComplianceReport()" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:10px 20px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:6px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Download compliance report
          </button>
          <button onclick="_complianceStep=0;_complianceData=null;renderCompliance()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:10px 18px;font-size:12px;cursor:pointer;font-family:inherit;">Run again</button>
        </div>
      </div>

      <!-- Category breakdown -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;">
        ${catScores.map((c,i) => `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;" onclick="_complianceStep=${i+1};renderCompliance()">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
              <div style="font-size:12px;font-weight:600;color:var(--text);">${c.label}</div>
              <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:${scoreColor(c.score)};">${c.score}%</div>
            </div>
            <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
              <div style="height:100%;width:${c.score}%;background:${scoreColor(c.score)};border-radius:2px;"></div>
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:6px;">${c.score>=80?'Passing':'Click to review gaps'}</div>
          </div>`).join('')}
      </div>

      <!-- Priority actions -->
      ${totalGaps > 0 ? `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;">
        <div style="padding:13px 18px;border-bottom:1px solid var(--border);">
          <div style="font-size:12px;font-weight:700;color:var(--text);">Priority actions</div>
          <div style="font-size:10px;color:var(--muted);margin-top:1px;">Ordered by regulatory impact</div>
        </div>
        <div style="padding:0 18px;">
          ${[
            !d.drillInYear       && { step:3, label:'Run a mock recall drill', detail:'Required annually for recall readiness certification', urgency:'high' },
            d.supplierScans===0  && { step:2, label:'Start recording supplier names on scans', detail:'Required for one step back traceability under EU 178/2002 and FSMA 204', urgency:'med' },
            d.lotScans===0       && { step:1, label:'Capture lot codes on all scans', detail:'Key Data Element required for FSMA 204 compliance', urgency:'med' },
            d.activeStores.length>0 && d.storesActiveRecent<d.activeStores.length && { step:4, label:'Investigate dark stores', detail:`${d.activeStores.length-d.storesActiveRecent} store${d.activeStores.length-d.storesActiveRecent!==1?'s':''} with no recent scanning activity`, urgency:'low' },
          ].filter(Boolean).map(a => `
            <div style="display:flex;align-items:flex-start;gap:12px;padding:13px 0;border-bottom:1px solid rgba(var(--surface-tint-rgb),0.5);">
              <div style="width:7px;height:7px;border-radius:50%;background:${a.urgency==='high'?'var(--danger)':a.urgency==='med'?'var(--warn)':'var(--muted)'};flex-shrink:0;margin-top:5px;"></div>
              <div style="flex:1;">
                <div style="font-size:12px;font-weight:600;color:var(--text);">${a.label}</div>
                <div style="font-size:11px;color:var(--muted);margin-top:2px;line-height:1.5;">${a.detail}</div>
              </div>
              <button onclick="_complianceStep=${a.step};renderCompliance()" style="font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;white-space:nowrap;flex-shrink:0;">Review →</button>
            </div>`).join('')}
        </div>
      </div>` : `
      <div style="background:rgba(var(--accent-rgb),0.06);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:10px;padding:16px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        <div style="font-size:13px;color:var(--accent);font-weight:600;">No priority actions — all key requirements met</div>
      </div>`}

      <!-- Drill history summary -->
      ${d.drills.length > 0 ? `
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;">
        <div style="padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
          <div style="font-size:12px;font-weight:700;color:var(--text);">Drill history</div>
          <button onclick="generateDrillReport()" style="font-size:11px;padding:5px 12px;border-radius:6px;border:1px solid rgba(var(--accent-rgb),0.3);background:none;color:var(--accent);cursor:pointer;">↓ Drill report</button>
        </div>
        <div style="padding:0 18px;">
          ${d.drills.map(dr => `
            <div style="display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid rgba(var(--surface-tint-rgb),0.5);">
              <div>
                <div style="font-size:12px;font-weight:500;color:var(--text);">${dr.product_name||'Mock drill'}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px;">${new Date(dr.started_at).toLocaleDateString(_dashLocale(),{day:'numeric',month:'short',year:'numeric'})}</div>
              </div>
              <button onclick="generateDrillReport('${dr.id}')" style="font-size:10px;padding:4px 10px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;">↓ PDF</button>
            </div>`).join('')}
        </div>
      </div>` : ''}
    </div>`;
}

// ── Report print helper ──────────────────────────────────────
// ── Standard Batch'd attribution footer ──────────────────────
// Returns the brand-attribution block that appears at the bottom
// of every Batch'd-generated document. Used by injectPrintButton
// (covers joint recall report, store audit record, drill
// certificate), by the recall coordination sheet, by the FDA
// 21 CFR 7.46 notification, and by the Reports panel printable.
//
// Design notes:
//   - Logo uses the light-mode accent (#077A55), which prints as
//     a credible dark green on paper. The bright UI accent
//     (#34d399) reads as neon on print and was rejected.
//   - Centered block with a hairline top border so it sits as a
//     clear footer regardless of the doc above it.
//   - Tagline uses small caps (text-transform:uppercase + letter
//     spacing) for a regulatory-document feel.

// ── Shared interactive-doc helpers ────────────────────────────
// All Batch'd generated documents that should be editable + savable
// share three pieces of UI/behavior: a sticky action bar at the top,
// a one-time blue help banner explaining how Save as PDF works in
// browsers, and a runtime <script> that handles placeholder
// focus/blur + the Save as PDF / Save as HTML actions.
//
// IMPORTANT: these helpers are embedded inside backtick template
// literals at call sites (w.document.write(`...${helper()}...`)).
// Any `\n`, `\"`, `\\`, or `${` inside the helper output gets
// evaluated by the OUTER template literal before being written to
// the new tab. To survive that, every JS escape sequence in the
// runtime script must be DOUBLE-escaped here (e.g. \\n produces \n
// in the output, which the runtime JS parser then reads as a
// newline). Forgetting this collision was the v2 escape bug.

function _batchdDocStyles() {
  return `
  /* Sticky action bar at top of doc */
  .doc-actions { position:sticky; top:0; background:#1a201d; color:#fff; padding:11px 18px; display:flex; gap:12px; align-items:center; justify-content:space-between; margin:-24px -24px 14px -24px; z-index:10; border-bottom:2px solid #4682ff; flex-wrap:wrap; }

  .doc-actions .hint strong { color:#fff; }
  .doc-actions button { display:inline-flex; align-items:center; gap:6px; font-family:'Helvetica Neue',Arial,sans-serif; font-size:11.5px; font-weight:600; padding:7px 14px; border-radius:6px; border:1px solid rgba(255,255,255,0.15); background:rgba(255,255,255,0.06); color:#fff; cursor:pointer; transition:background 0.15s; }
  .doc-actions button:hover { background:rgba(var(--info-soft-rgb),0.25); border-color:#7ba9ff; }
  .doc-actions button.primary { background:#4682ff; border-color:#4682ff; }
  .doc-actions button.primary:hover { background:#5a92ff; }
  /* One-time blue help banner */
  .pdf-help-banner { background:#e3eef8; border:1px solid #4682ff; border-radius:6px; padding:11px 14px; margin-bottom:14px; font-size:11.5px; color:#1a4a78; line-height:1.6; display:flex; align-items:flex-start; gap:10px; }
  /* Editable placeholders */
  .ph { display:inline-block; min-width:200px; border-bottom:1.2px solid #1a201d; color:#888; font-style:italic; font-size:11.5px; padding:0 4px; outline:none; cursor:text; }
  .ph-block { background:#f9fafa; border:1px solid #e5e7e8; padding:10px 13px; border-radius:4px; white-space:pre-wrap; font-size:12px; color:#888; font-style:italic; min-height:48px; outline:none; cursor:text; line-height:1.6; }
  .ph:focus, .ph-block:focus { background:#fffbe8 !important; }
  .reason-box[contenteditable]:focus { background:#fffbe8 !important; outline:none; }
  @media print {
    .doc-actions, .pdf-help-banner { display:none !important; }
  }`;
}
