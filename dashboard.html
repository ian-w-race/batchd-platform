function _batchdDocRuntime() {
  // CRITICAL: every \n, \", \\ below is DOUBLE-escaped (\\n, \\", \\\\)
  // so it survives the outer template literal evaluation when this
  // function's return value is embedded into a w.document.write
  // template literal. The single-escaped versions would become literal
  // newlines/quotes/backslashes in the output and break the runtime
  // script's syntax.
  return `<script data-runtime>
(function initPlaceholders() {
  document.querySelectorAll('.ph, .ph-block').forEach(function (el) {
    var hint = el.dataset.placeholder || '';
    function looksLikeHint() { return el.textContent.trim() === hint.trim(); }
    el.addEventListener('focus', function () {
      if (looksLikeHint()) {
        el.textContent = '';
        el.style.color = '#1a201d';
        el.style.fontStyle = 'normal';
      }
    });
    el.addEventListener('blur', function () {
      if (!el.textContent.trim()) {
        el.textContent = hint;
        el.style.color = '#888';
        el.style.fontStyle = 'italic';
      }
    });
  });
})();

var _pdfHintShown = false;
function saveAsPdf() {
  if (!_pdfHintShown) {
    _pdfHintShown = true;
    var msg = "Save as PDF\\n\\nThe browser's print dialog will open next.\\n\\nIMPORTANT: In the dialog, change the \\"Destination\\" dropdown at the top to \\"Save as PDF\\" (instead of a physical printer). Then click Save.\\n\\nIf you just click Print without changing Destination, the form will print on paper instead of saving as a file.\\n\\nContinue?";
    if (!confirm(msg)) return;
  }
  window.print();
}

function saveAsHtml(prefix) {
  document.querySelectorAll('.ph, .ph-block').forEach(function (el) {
    if (!el.textContent.trim()) {
      el.textContent = el.dataset.placeholder || '';
      el.style.color = '#888';
      el.style.fontStyle = 'italic';
    }
  });
  var clone = document.documentElement.cloneNode(true);
  clone.querySelectorAll('.doc-actions, #pdf-help-banner, script[data-runtime]').forEach(function (n) { n.remove(); });
  var html = '<!DOCTYPE html>\\n' + clone.outerHTML;
  var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = (prefix || 'Batchd-Document') + '-' + new Date().toISOString().slice(0,10) + '.html';
  document.body.appendChild(a);
  a.click();
  setTimeout(function () { document.body.removeChild(a); URL.revokeObjectURL(url); }, 200);
}
<\/script>`;
}

function injectPrintButton(html) {
  const printCSS = `
    <style>
      @media print {
        .no-print { display: none !important; }
        body { background: #fff !important; color: #000 !important; }
        * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
      }
      .print-btn-fixed {
        position: fixed; bottom: 24px; right: 24px; z-index: 9999;
        display: flex; align-items: center; gap: 8px;
        background: #34d399; color: var(--accent-on-primary); border: none; border-radius: 10px;
        padding: 12px 22px; font-family: 'Figtree', sans-serif; font-weight: 700;
        font-size: 14px; cursor: pointer; box-shadow: 0 4px 20px rgba(var(--accent-rgb),0.35);
      }
    </style>`;
  const printBtn = `
    <div class="no-print" style="position:fixed;bottom:24px;right:24px;z-index:9999;">
      <button class="print-btn-fixed" onclick="window.print()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="6 9 6 2 18 2 18 9"/>
          <path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/>
          <rect x="6" y="14" width="12" height="8"/>
        </svg>
        Download as PDF
      </button>
    </div>`;
  // Insert print CSS in <head>, then brand footer + floating print
  // button just before </body>. The brand footer sits in document
  // flow (appears at end of last page); the print button is fixed-
  // positioned and hidden when printing via .no-print.
  return html
    .replace('</head>', printCSS + '</head>')
    .replace('</body>', _batchdDocFooter() + printBtn + '</body>');
}

async function generateJointRecallReport(recallEventId, productName) {
  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }

  try {
    // ── Fetch all data in parallel ─────────────────────────────
    const [evRes, distRes, acksRes, orgRes] = await Promise.all([
      sb.from('recall_events').select('*').eq('id', recallEventId).single(),
      sb.from('recall_distributions').select('retailer_org_id, distributed_at, est_affected_units').eq('recall_event_id', recallEventId),
      // Scope to this org's acks only — the joint report is between this
      // retailer and the manufacturer, not a multi-retailer summary. Without
      // this filter, RLS gaps could leak other retailers' store names, ack
      // timestamps, and units pulled into the rendered HTML output.
      sb.from('recall_acknowledgements').select('*, stores(name)').eq('recall_event_id', recallEventId).eq('organisation_id', _orgId).order('created_at'),
      sb.from('organisations').select('id, name, contact_email, recall_coordinator_name, recall_coordinator_contact').eq('id', _orgId).single(),
    ]);

    const ev   = evRes.data || {};
    const acks = acksRes.data || [];
    const org  = orgRes.data || {};
    const dist = distRes.data || [];

    // Fetch manufacturer org
    let mfrOrg = {};
    if (ev.source_org_id) {
      const { data: mfr } = await sb.from('organisations')
        .select('name, contact_email, recall_coordinator_name, recall_coordinator_contact')
        .eq('id', ev.source_org_id).single();
      mfrOrg = mfr || {};
    }

    // Fetch matched scans via scan_recall_matches.
    // Audit fix #6: query by recall_event_id (new column added 2026-05-07)
    // instead of recall_id. The legacy recall_id column is polymorphic —
    // Path A (manual / feed) writes recalls.id, Path B (manufacturer-push)
    // writes recall_events.id. Querying by recall_id with a recall_events.id
    // value would only catch Path B rows AND would over-match if any
    // recalls.id happened to collide with a recall_events.id (UUIDs make
    // that vanishingly unlikely but possible). recall_event_id has a real FK
    // to recall_events and is only populated by Path B, so this is correct
    // and unambiguous.
    const { data: matchRows } = await sb.from('scan_recall_matches')
      .select('scan_id, store_name, scanned_by, placed_at, quantity, match_type')
      .eq('recall_event_id', recallEventId)
      .eq('organisation_id', _orgId);

    const scanIds = (matchRows || []).map(m => m.scan_id).filter(Boolean);
    let scanDetails = [];
    if (scanIds.length > 0) {
      const { data: scans } = await sb.from('scans')
        .select('id, product_name, lot_number, barcode_number, store_name, shelf_location, scanned_by, created_at, removed_from_shelf_at, removed_from_shelf_by, recall_resolved_at')
        .in('id', scanIds);
      scanDetails = scans || [];
    }

    const fmtDt = d => d ? new Date(d).toLocaleString(_dashLocale(), {weekday:'short',day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const fmtD  = d => d ? new Date(d).toLocaleDateString(_dashLocale(), {day:'numeric',month:'long',year:'numeric'}) : '—';
    const confirmed = acks.filter(a => a.status === 'confirmed');
    const allDone   = confirmed.length === acks.length && acks.length > 0;
    const totalUnits = acks.reduce((s, a) => s + (a.units_pulled || 0), 0);
    const isUS = _orgRegion === 'us';
    const refReg = isUS ? 'FDA 21 CFR Part 7 · FSMA 204' : 'EU Regulation 178/2002 · Mattilsynet';
    const docRef = `RECALL-${recallEventId.slice(0,8).toUpperCase()}-${new Date().getFullYear()}`;

    // ── Build timeline ─────────────────────────────────────────
    const timelineRows = [];
    timelineRows.push({ t: ev.published_at || ev.created_at, actor: mfrOrg.name || 'Manufacturer', event: 'Recall event published and distributed to retail partner', type: 'push' });
    if (dist[0]?.distributed_at) timelineRows.push({ t: dist[0].distributed_at, actor: org.name, event: 'Recall received and logged in Batch\'d', type: 'received' });
    acks.forEach(a => {
      if (a.created_at)        timelineRows.push({ t: a.created_at,        actor: a.stores?.name || org.name, event: 'Store notified', type: 'notified' });
      if (a.acknowledged_at)   timelineRows.push({ t: a.acknowledged_at,   actor: a.stores?.name || org.name, event: 'Acknowledgement confirmed', type: 'ack' });
      if (a.pulled_at)         timelineRows.push({ t: a.pulled_at,         actor: a.stores?.name || org.name, event: 'Product confirmed pulled from shelf', type: 'pulled' });
      if (a.disposed_at)       timelineRows.push({ t: a.disposed_at,       actor: a.stores?.name || org.name, event: 'Disposal confirmed', type: 'disposed' });
      if (a.confirmed_at)      timelineRows.push({ t: a.confirmed_at,      actor: a.stores?.name || org.name, event: 'Full recall response resolved', type: 'confirmed' });
    });
    scanDetails.forEach(s => {
      if (s.removed_from_shelf_at) timelineRows.push({ t: s.removed_from_shelf_at, actor: (s.removed_from_shelf_by||'').split('@')[0]||'Staff', event: `Product physically removed — ${s.store_name||'store'} — via Batch\u2019d scanning app`, type: 'app' });
    });
    timelineRows.sort((a, b) => new Date(a.t) - new Date(b.t));

    const typeColor = { push:'#ff5c5c', received:'#38bdf8', notified:'#f5a623', ack:'#f5a623', pulled:'#34d399', disposed:'#34d399', confirmed:'#34d399', app:'#a78bfa' };

    const html = `<!DOCTYPE html>

// ── CSV helper ────────────────────────────────────────────────
function downloadCSV(filename, headers, rows) {
  const escape = v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
  const csv = [headers, ...rows].map(r => r.map(escape).join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename; a.click();
  URL.revokeObjectURL(url);
}

// ── Fetch report data (respects _reportDateRange) ─────────────
async function fetchReportData(key) {
  const since = _reportDateRange === 'all' ? null
    : new Date(Date.now() - parseInt(_reportDateRange) * 86400000).toISOString();

  switch(key) {
    case 'audit': {
      let q = sb.from('scans').select('*').eq('organisation_id', _orgId).order('created_at', {ascending:false}).limit(1000);
      if (since) q = q.gte('created_at', since);
      const { data } = await q;
      return data || [];
    }
    case 'recalls': {
      // Note: .limit() goes on each query inside the array, NOT on Promise.all
      // (Promises don't have a .limit method — calling it throws TypeError and
      // makes the entire recalls report unable to load).
      const [recallsRes, distRes] = await Promise.all([
        sb.from('recalls').select('*').eq('organisation_id', _orgId).order('created_at', {ascending:false}).limit(500),
        sb.from('recall_distributions').select('recall_event_id, est_affected_units, distributed_at').eq('retailer_org_id', _orgId).limit(500),
      ]);
      let pushed = [];
      const distData = distRes.data || [];
      if (distData.length > 0) {
        const ids = [...new Set(distData.map(d => d.recall_event_id))];
        const { data: events } = await sb.from('recall_events').select('*').in('id', ids).order('published_at', {ascending:false});
        pushed = (events || []).map(ev => ({ ...ev, _type:'pushed', _dist: distData.find(d => d.recall_event_id === ev.id) }));
      }
      const pushedKeys2 = new Set(pushed.map(ev => (ev.product_name||'').toLowerCase()+'|'+(ev.lot_number||'').toLowerCase()));
      const internal = (recallsRes.data || []).filter(r => {
        // Round-7 correction: re-introduced legacy push dedup. These columns
        // DO exist on the recalls schema (~7 production rows from the
        // retired manufacturer-push flow). See SCHEMA.md "recalls" section.
        if (r.is_pushed || r.recall_event_id) return false;
        const key = (r.product_name||'').toLowerCase()+'|'+(r.lot_number||'').toLowerCase();
        return !pushedKeys2.has(key);
      }).map(r => ({ ...r, _type:'internal' }));
      return [...pushed, ...internal];
    }
    case 'staff': {
      let q = sb.from('scans').select('scanned_by, created_at, product_name, lot_number, store_name, recall_resolved, removed_from_shelf_at, manager_escalated').eq('organisation_id', _orgId).order('created_at', {ascending:false}).limit(1000);
      if (since) q = q.gte('created_at', since);
      const { data } = await q;
      return data || [];
    }
    case 'stores': {
      const [storesRes, scansRes] = await Promise.all([
        sb.from('stores').select('id, name, store_code, active').eq('organisation_id', _orgId).order('name'),
        sb.from('scans').select('store_name, store_id, lot_number, created_at, recall_resolved, removed_from_shelf_at, manager_escalated').eq('organisation_id', _orgId),
      ]);
      const stores = storesRes.data || [];
      const scans  = scansRes.data  || [];
      const now = Date.now();
      const days7  = now - 7  * 86400000;
      const days30 = now - 30 * 86400000;
      return stores.map(store => {
        const ss = scans.filter(s => s.store_id === store.id || s.store_name === store.name);
        const recent7    = ss.filter(s => new Date(s.created_at) > days7).length;
        const recent30   = ss.filter(s => new Date(s.created_at) > days30).length;
        const resolved   = ss.filter(s => s.recall_resolved).length;
        const escalated  = ss.filter(s => s.manager_escalated).length;
        const lotCoverage = ss.length > 0 ? ss.filter(s => s.lot_number).length / ss.length : 0;
        const freqScore   = recent7 >= 3 ? 40 : recent7 >= 1 ? 20 : 0;
        const lotScore    = Math.round(lotCoverage * 40);
        const baseScore   = ss.length > 0 ? 20 : 0;
        const score       = freqScore + lotScore + baseScore;
        const status      = recent7 >= 3 ? 'active' : recent7 >= 1 ? 'slow' : recent30 >= 1 ? 'slow' : 'dark';
        return { ...store, totalScans: ss.length, recent7, recent30, resolved, escalated, score, status };
      });
    }
    case 'exposure': {
      const distRes = await sb.from('recall_distributions').select('recall_event_id').eq('retailer_org_id', _orgId);
      const ids = [...new Set((distRes.data || []).map(d => d.recall_event_id))];
      if (ids.length === 0) return [];
      const { data } = await sb.from('recall_events').select('*').in('id', ids).eq('is_drill', false).order('published_at', {ascending:false});
      return data || [];
    }
    case 'fsma': {
      let q = sb.from('scans').select('*').eq('organisation_id', _orgId).order('created_at', {ascending:false}).limit(1000);
      if (since) q = q.gte('created_at', since);
      const { data } = await q;
      return data || [];
    }
  }
}

// ── View report on screen ─────────────────────────────────────
async function runReport(key) {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading report…</div>`;
  const data  = await fetchReportData(key);
  const isUS  = _orgRegion === 'us';
  const date  = new Date().toLocaleDateString(_dashLocale(), {day:'numeric',month:'long',year:'numeric'});
  const fmtDate = fmtDash;
const fmtDT   = d => d ? new Date(d).toLocaleString(_dashLocale(),{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'}) : '—';

  // Shared: stat tile
  const statTile = (val, label, color='var(--text)') =>
    `<div style="background:var(--surface2);border-radius:10px;padding:14px 16px;text-align:center;">
      <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:${color};line-height:1;">${val}</div>
      <div style="font-size:10px;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:0.06em;">${label}</div>
    </div>`;

  // ── Audit trail ──────────────────────────────────────────────
  if (key === 'audit') {
    const withLot  = data.filter(s => s.lot_number).length;
    const lotPct   = data.length ? Math.round(withLot / data.length * 100) : 0;
    const resolved = data.filter(s => s.recall_resolved).length;
    const removed  = data.filter(s => s.removed_from_shelf_at && !s.recall_resolved).length;
    const staff    = new Set(data.map(s => s.scanned_by).filter(Boolean)).size;
    const stores   = new Set(data.map(s => s.store_name).filter(Boolean)).size;
    el.innerHTML = reportHeader('Audit trail', `${data.length} records · ${_orgName}`, 'audit') +
      `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;">
        ${statTile(data.length, 'Total scans')}
        ${statTile(lotPct+'%', 'Lot code coverage', lotPct>=80?'var(--accent)':lotPct>=60?'var(--warn)':'var(--danger)')}
        ${statTile(staff, 'Staff members')}
        ${statTile(stores, 'Stores')}
        ${statTile(resolved, 'Recalls resolved', resolved>0?'var(--accent)':'var(--muted)')}
        ${statTile(removed, 'Items removed', removed>0?'var(--warn)':'var(--muted)')}
      </div>
      <div class="panel"><div class="panel-body" style="padding:0;">
        <table class="store-table" style="width:100%;">
          <thead><tr>
            <th>Date & time</th><th>Product</th><th>${isUS?'TLC / Lot':'Partinummer'}</th>
            <th>Store</th><th>Staff</th><th>Supplier</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${data.length === 0 ? `<tr><td colspan="7"><div class="empty">No scans in this date range.</div></td></tr>` :
            data.map(s => `<tr>
              <td style="white-space:nowrap;font-size:11px;color:var(--muted);">${fmtDT(s.created_at)}</td>
              <td><div style="font-size:12px;font-weight:500;color:var(--text);">${s.product_name||'—'}</div></td>
              <td style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${s.lot_number||'—'}${s.barcode_number?'<br><span style="font-size:10px;">'+s.barcode_number+'</span>':''}</td>
              <td style="font-size:11px;color:var(--muted);">${s.store_name||'—'}</td>
              <td style="font-size:11px;color:var(--muted);">${(s.scanned_by||'—').split('@')[0]}</td>
              <td style="font-size:11px;color:var(--muted);">${s.supplier_name||'—'}</td>

                : s.removed_from_shelf_at
                  ? `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(var(--warn-rgb),0.12);color:var(--warn);font-weight:600;">Removed</span>`
                  : `<span style="font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(var(--accent-muted-rgb),0.08);color:var(--muted);">On shelf</span>`}
              </td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div></div>`;
  }

  // ── Recall history ───────────────────────────────────────────
  else if (key === 'recalls') {
    const live     = data.filter(r => r._type==='pushed' && !r.is_drill);
    const drills   = data.filter(r => r.is_drill);
    const internal = data.filter(r => r._type==='internal');
    const resolved = internal.filter(r => !r.active).length;
    el.innerHTML = reportHeader('Recall history', `${data.length} events · ${_orgName}`, 'recalls') +
      `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-bottom:18px;">
        ${statTile(live.length, 'Live recalls', live.length>0?'var(--danger)':'var(--text)')}
        ${statTile(drills.length, 'Drills run', drills.length>0?'var(--accent)':'var(--muted)')}
        ${statTile(internal.length, 'Internal recalls')}
        ${statTile(resolved, 'Resolved', resolved>0?'var(--accent)':'var(--muted)')}
      </div>
      <div class="panel"><div class="panel-body" style="padding:0;">
        <table class="store-table" style="width:100%;">
          <thead><tr>
            <th>Date</th><th>Product</th><th>${isUS?'TLC / Lot':'Partinummer'}</th>
            <th>Source</th><th>Severity</th><th>Reason</th><th>Status</th>
          </tr></thead>
          <tbody>
            ${data.length === 0 ? `<tr><td colspan="7"><div class="empty">No recalls on record.</div></td></tr>` :
            data.map(r => {
              const isPushed = r._type === 'pushed';
              const d = isPushed ? (r.published_at||r.created_at) : r.created_at;
              // Audit fix #26: route through formatSeverity. Previous logic
              // bucketed class_iv as danger because it includes('class_i')
              // returned true. formatSeverity uses an exact-match map.
              const sevColor = formatSeverity(r.severity).color;
              return `<tr>
                <td style="white-space:nowrap;font-size:11px;color:var(--muted);">${fmtDate(d)}</td>
                <td style="font-size:12px;font-weight:600;color:var(--text);">${r.product_name||'—'}
                  ${r.is_drill?`<div style="font-size:10px;color:var(--warn);">DRILL</div>`:''}
                </td>
                <td style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${r.lot_number||'—'}</td>
                <td><span style="font-size:10px;padding:2px 8px;border-radius:10px;${isPushed?'background:rgba(var(--info-light-rgb),0.1);color:var(--info);':'background:rgba(var(--accent-muted-rgb),0.1);color:var(--muted);'}">
                  ${isPushed?'Manufacturer':(r.source||'Manual')}</span></td>
                <td style="font-size:11px;color:${sevColor};">${r.severity?formatSeverity(r.severity).label:'—'}</td>

async function matchCustomersToRecall() {
  const file = document.getElementById('customer-csv-input')?.files?.[0];
  const el   = document.getElementById('customer-match-results');
  if (!file || !el) return;
  el.innerHTML = '<div style="font-size:12px;color:var(--muted);">Parsing CSV…</div>';

  try {
    const text = await file.text();
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) { el.innerHTML = '<div style="color:var(--danger);font-size:12px;">CSV must have a header row and at least one data row.</div>'; return; }

    // Parse header
    const headers = lines[0].split(',').map(h => h.trim().toLowerCase().replace(/[^a-z_]/g,''));
    const nameIdx    = headers.findIndex(h => h.includes('name') || h === 'customer');
    const emailIdx   = headers.findIndex(h => h.includes('email'));
    const storeIdx   = headers.findIndex(h => h.includes('store'));
    const dateIdx    = headers.findIndex(h => h.includes('date') || h.includes('purchase'));

    if (emailIdx === -1 || storeIdx === -1 || dateIdx === -1) {
      el.innerHTML = '<div style="color:var(--danger);font-size:12px;">CSV must have columns for email, store_name, and purchase_date.</div>';
      return;
    }

    // Fetch affected store acknowledgements for the current recall
    const { data: acks } = await sb.from('recall_acknowledgements')
      .select('stores(name), created_at')
      .eq('organisation_id', _orgId)
      .order('created_at', {ascending:true})
      .limit(50);
    const affectedStores = new Set((acks||[]).map(a => (a.stores?.name||'').toLowerCase().trim()));
    const recallDate = acks?.[0]?.created_at ? new Date(acks[0].created_at) : new Date(Date.now() - 30*86400000);

    // Parse and match customers
    const customers = lines.slice(1).map(line => {
      const cols = line.split(',').map(c => c.trim().replace(/^"|"$/g,''));
      return {
        name:  nameIdx  >= 0 ? cols[nameIdx]  : 'Unknown',
        email: emailIdx >= 0 ? cols[emailIdx] : '',
        store: storeIdx >= 0 ? cols[storeIdx] : '',
        date:  dateIdx  >= 0 ? cols[dateIdx]  : '',
      };
    }).filter(c => c.email);

    const matched = customers.filter(c => {
      const storeMatch = affectedStores.size === 0 || affectedStores.has(c.store.toLowerCase().trim());
      const purchaseDate = new Date(c.date);
      const withinWindow = !isNaN(purchaseDate) ? purchaseDate >= new Date(recallDate.getTime() - 30*86400000) : true;
      return storeMatch && withinWindow;
    });

    if (matched.length === 0) {
      el.innerHTML = `<div style="background:rgba(var(--accent-rgb),0.07);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--accent);">No customers matched — either the stores don't overlap or purchase dates are outside the recall window.</div>`;
      return;
    }

    // Build CSV for download
    const csvRows = [['Customer name','Email','Store','Purchase date']];
    matched.forEach(c => csvRows.push([c.name, c.email, c.store, c.date]));
    const csvContent = csvRows.map(r => r.map(v => '"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob   = new Blob(['\uFEFF' + csvContent], {type:'text/csv;charset=utf-8;'});
    const csvUrl = URL.createObjectURL(blob);

    const fmtDate = fmtDash;
el.innerHTML = `
      <div style="background:rgba(var(--danger-rgb),0.06);border:1px solid rgba(var(--danger-rgb),0.2);border-radius:8px;padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;">
        <div style="font-size:12px;color:var(--danger);font-weight:600;">⚠ ${matched.length} customer${matched.length!==1?'s':''} matched · ${customers.length - matched.length} not affected</div>
        <a href="${csvUrl}" download="recall-affected-customers-${new Date().toISOString().split('T')[0]}.csv"
          style="font-size:11px;padding:6px 12px;border-radius:6px;border:1px solid rgba(var(--danger-rgb),0.3);background:none;color:var(--danger);cursor:pointer;text-decoration:none;font-family:'DM Mono',monospace;font-weight:600;">
          ↓ Download matched list
        </a>
      </div>
      <div class="panel" style="margin:0;">
        <div class="panel-body" style="padding:0;">
          <table class="store-table" style="width:100%;">
            <thead><tr><th>Customer</th><th>Email</th><th>Store</th><th>Purchase date</th></tr></thead>
            <tbody>
              ${matched.slice(0,20).map(c => '<tr><td style="font-size:12px;font-weight:500;color:var(--text);">' + (c.name||'—') + '</td><td style="font-size:11px;color:var(--muted);font-family:DM Mono,monospace;">' + c.email + '</td><td style="font-size:11px;color:var(--muted);">' + c.store + '</td><td style="font-size:11px;color:var(--muted);">' + c.date + '</td></tr>').join('')}
              ${matched.length > 20 ? '<tr><td colspan="4" style="text-align:center;font-size:11px;color:var(--muted);padding:10px;">+' + (matched.length - 20) + ' more in downloaded CSV</td></tr>' : ''}
            </tbody>
          </table>
        </div>
      </div>`;

  } catch(e) {
    el.innerHTML = '<div style="color:var(--danger);font-size:12px;">Error parsing CSV: ' + e.message + '</div>';
  }
}

async function downloadReport(key) {
  const btn = event?.target;
  const orig = btn?.textContent;
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  const data = await fetchReportData(key);
  const date = new Date().toISOString().split('T')[0];
  const isUS = _orgRegion === 'us';

  try {
    if (key === 'audit') {
      downloadCSV(`batchd-audit-trail-${date}.csv`,
        ['Date','Time','Product','Lot Number','Batch Number','Barcode','Store','Scanned By','Quantity','Shelf Location','Supplier','Status','Recall Resolved','Recall Resolved By','Recall Resolved At','Removed From Shelf At'],
        data.map(s => [
          s.created_at ? fmtDash(s.created_at) : '',
          s.created_at ? new Date(s.created_at).toLocaleTimeString(_dashLocale()) : '',
          s.product_name, s.lot_number, s.batch_number, s.barcode_number,
          s.store_name, s.scanned_by, s.quantity, s.shelf_location, s.supplier_name,
          s.recall_resolved ? 'Resolved' : s.removed_from_shelf_at ? 'Removed' : 'On shelf',
          s.recall_resolved ? 'Yes' : 'No', s.recall_resolved_by,
          s.recall_resolved_at ? fmtDash(s.recall_resolved_at) : '',
          s.removed_from_shelf_at ? fmtDash(s.removed_from_shelf_at) : '',
        ])
      );
    } else if (key === 'recalls') {
      // Fetch exposure data for the CSV
      const srmForCsv = await sb.from('scan_recall_matches')
        .select('recall_id, quantity, store_name')
        .eq('organisation_id', _orgId);
      const srmData = srmForCsv.data || [];
      const exposureForRecall = id => {
        const rows = srmData.filter(m => m.recall_id === id);
        // removed_at not tracked in scan_recall_matches (app uses scans.removed_from_shelf_at)
        const onShelf = rows.reduce((s,m)=>s+(m.quantity||1),0);
        const pulled  = 0;
        const stores  = [...new Set(rows.map(m=>m.store_name).filter(Boolean))].join('; ');
        return { onShelf, pulled, stores };
      };
      downloadCSV(`batchd-recall-history-${date}.csv`,
        ['Date','Product','Lot Number','Barcode','Source','Severity','Reason','Authority Reference','Status','Is Drill','Units On Shelf','Units Pulled','Stores Exposed'],
        data.map(r => {
          const isPushed = r._type === 'pushed';
          const d = isPushed ? (r.published_at||r.created_at) : r.created_at;
          const exp = exposureForRecall(r.id);
          return [
            d ? fmtDash(d) : '',
            r.product_name, r.lot_number, (r.barcode || r.barcode_number || ''),
            isPushed ? 'Manufacturer push' : (r.source||'Manual'),
            r.severity||'', r.reason||'', r.authority_reference||'',
            isPushed ? 'Active' : (r.active ? 'Active' : 'Resolved'),
            r.is_drill ? 'Yes' : 'No',
            exp.onShelf, exp.pulled, exp.stores,
          ];
        })
      );
    } else if (key === 'staff') {
      downloadCSV(`batchd-staff-activity-${date}.csv`,
        ['Staff Member','Total Scans','Recalls Resolved','Items Removed','Escalations','Last Active'],
        (() => {
          const byStaff = {};
          data.forEach(s => {
            const name = s.scanned_by || 'Unknown';
            if (!byStaff[name]) byStaff[name] = { name, count:0, resolved:0, removed:0, escalated:0, last:'' };
            byStaff[name].count++;
            if (s.recall_resolved) byStaff[name].resolved++;
            if (s.removed_from_shelf_at) byStaff[name].removed++;
            if (s.manager_escalated) byStaff[name].escalated++;
            if (s.created_at > byStaff[name].last) byStaff[name].last = s.created_at;
          });
          return Object.values(byStaff).sort((a,b) => b.count - a.count).map(s => [
            s.name, s.count, s.resolved, s.removed, s.escalated,
            s.last ? fmtDash(s.last) : '',
          ]);
        })()
      );
    } else if (key === 'stores') {
      downloadCSV(`batchd-store-compliance-${date}.csv`,
        ['Store','Store Code','Status','Compliance Score','7-Day Scans','30-Day Scans','Total Scans','Recalls Resolved','Escalations'],
        data.map(s => [s.name, s.store_code||'', s.active?'Active':'Inactive', s.score+'%', s.recent7, s.recent30, s.totalScans, s.resolved, s.escalated])
      );
    } else if (key === 'exposure') {
      downloadCSV(`batchd-exposure-notice-${date}.csv`,
        ['Product','Lot Number','Barcode','Severity','Reason','Description','Authority Reference','Published'],
        data.map(r => [r.product_name, r.lot_number, (r.barcode || r.barcode_number || ''), r.severity||'', r.reason||'', r.description||'', r.authority_reference||'', r.published_at ? fmtDash(r.published_at) : ''])
      );
    } else if (key === 'fsma') {
      downloadCSV(`batchd-${isUS?'fsma204':'eu-traceability'}-${date}.csv`,
        isUS
          ? ['Date','Time','Product Name','Lot Number (TLC)','Batch Number','Barcode','Supplier','Store (CTE Location)','Shelf Location','Quantity','Unit','Reference Document','Is FTL','FTL Category','Scanned By']
          : ['Dato','Tid','Produktnavn','Partinummer','Batchnummer','Strekkode','Leverandør','Butikk','Hylle','Antall','Enhet','Referansedokument','Skannet av'],
        data.map(s => [
          s.created_at ? fmtDash(s.created_at) : '',
          s.created_at ? new Date(s.created_at).toLocaleTimeString(_dashLocale()) : '',
          s.product_name, s.lot_number, s.batch_number, s.barcode_number,
          s.supplier_name, s.store_name, s.shelf_location, s.quantity, '',
          s.reference_document, isUS ? (s.is_ftl ? 'Yes' : 'No') : '', isUS ? (s.ftl_category||'') : '', s.scanned_by,
        ])
      );
    }
  } finally {
    if (btn) { btn.textContent = orig; btn.disabled = false; }
  }
}

async function _loadCorpOnShelf() {
  const el = document.getElementById('lc-onshelf-content');
  if (!el) return;
  try {
    const cutoff = new Date(Date.now() - 180 * 86400000).toISOString();
    const [scansRes, storesRes] = await Promise.all([
      sb.from('scans')
        .select('id,product_name,lot_number,barcode_number,store_name,store_id,quantity,created_at,scanned_by,removed_from_shelf_at,recall_resolved')
        .eq('organisation_id', _orgId)
        .is('removed_from_shelf_at', null)
        .eq('recall_resolved', false)
        .gte('created_at', cutoff)
        .order('created_at', { ascending: false })
        .limit(2000),
      sb.from('stores').select('id,name').eq('organisation_id', _orgId).eq('active', true),
    ]);

    // Server query already filters .is('removed_from_shelf_at', null) and
    // .eq('recall_resolved', false), so no client-side re-filter needed.
    const scans  = scansRes.data || [];
    const stores = storesRes.data || [];

    if (!scans.length) {
      el.innerHTML = `<div style="padding:32px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);font-size:13px;">No products currently on shelf in the last 180 days.</div>`;
      return;
    }

    const totalUnits    = scans.reduce((n,s) => n + (s.quantity||1), 0);
    const totalProducts = new Set(scans.map(s => s.product_name)).size;
    const totalStores   = new Set(scans.map(s => s.store_name)).size;

    // Group by store
    const byStore = {};
    scans.forEach(s => {
      const key = s.store_name || 'Unknown store';
      if (!byStore[key]) byStore[key] = { store: key, scans: [], units: 0, products: new Set() };
      byStore[key].scans.push(s);
      byStore[key].units += (s.quantity || 1);
      byStore[key].products.add(s.product_name || '?');
    });

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--accent);">${scans.length}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;">Records</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--text);">${totalUnits}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;">Units</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--text);">${totalProducts}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;">Products</div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center;box-shadow:var(--shadow-sm);">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--text);">${totalStores}</div>
          <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.07em;margin-top:3px;">Stores</div>
        </div>
      </div>

      ${Object.values(byStore).sort((a,b) => b.units - a.units).map(store => `
        <div style="margin-bottom:12px;border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface);box-shadow:var(--shadow-sm);">
          <div style="padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--surface2);">
            <div>
              <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">${store.store}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">${store.scans.length} records · ${store.units} units · ${store.products.size} products</div>
            </div>
            <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--accent);">${store.units}</div>
          </div>
          <div>
            ${store.scans.slice(0,10).map(s => `
              <div style="padding:9px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
                <div style="flex:1;min-width:0;">
                  <div style="font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.product_name||'—'}</div>
                  <div style="font-size:10px;color:var(--muted);margin-top:1px;font-family:'DM Mono',monospace;">${s.lot_number||'Lot N/A'} · ${fmtDashDT(s.created_at)}</div>
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <div style="font-size:12px;font-weight:700;color:var(--text);">${s.quantity||1}</div>
                  <div style="font-size:10px;color:var(--muted);">${(s.scanned_by||'').split('@')[0]||'—'}</div>
                </div>
              </div>`).join('')}
            ${store.scans.length > 10 ? `<div style="padding:9px 16px;font-size:11px;color:var(--muted);text-align:center;">+${store.scans.length - 10} more · <button onclick="showPanel('traceability')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;font-family:inherit;padding:0;">View all in Traceability →</button></div>` : ''}
          </div>
        </div>`).join('')}`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:12px;">${e.message}</div>`;
  }
}

let _lcDebounce = null;
async function runLotCheck(immediate = false) {
  const input = document.getElementById('lc-input');
  const el    = document.getElementById('lc-result');
  if (!input || !el) return;
  const q = input.value.trim();
  if (q.length < 2) {
    el.innerHTML = '';
    const onshelf = document.getElementById('lc-onshelf');
    if (onshelf) onshelf.style.display = 'block';
    return;
  }

  clearTimeout(_lcDebounce);
  if (!immediate) {
    _lcDebounce = setTimeout(() => runLotCheck(true), 400);
    return;
  }

  el.innerHTML = `<div style="color:var(--muted);font-size:12px;padding:12px 0;">Searching…</div>`;
  // Hide the default on-shelf view while search results show
  const onshelf = document.getElementById('lc-onshelf');
  if (onshelf) onshelf.style.display = 'none';
  const qLow = q.toLowerCase();

  try {
    const cutoff = new Date(Date.now() - 180 * 86400000).toISOString();
    const [scansRes, recallsRes, distRes] = await Promise.all([
      sb.from('scans')
        .select('id,product_name,lot_number,barcode_number,store_name,store_id,quantity,created_at,removed_from_shelf_at,recall_resolved,scanned_by,label_text')
        .eq('organisation_id', _orgId)
        .gte('created_at', cutoff)
        .order('created_at', { ascending: false })
        .limit(1000),
      sb.from('recalls').select('*').eq('active', true).eq('organisation_id', _orgId).limit(200),
      sb.from('recall_distributions')
        .select('recall_event_id, recall_events!inner(id,product_name,lot_number,reason,severity,is_drill)')
        .eq('retailer_org_id', _orgId)
        .eq('recall_events.is_drill', false),
    ]);

    const allScans = scansRes.data || [];
    const recalls  = [
      ...(recallsRes.data || []),
      ...(distRes.data || []).map(d => ({
        id: d.recall_events.id, product_name: d.recall_events.product_name,
        lot_number: d.recall_events.lot_number, description: d.recall_events.reason,
        severity: d.recall_events.severity, source: 'manufacturer_push', active: true,
      })),
    ];

    // Match scans
    const matched = allScans.filter(s => {
      const lot  = (s.lot_number     || '').toLowerCase();
      const brc  = (s.barcode_number || '').toLowerCase();
      const prod = (s.product_name   || '').toLowerCase();
      const lbl  = (s.label_text     || '').toLowerCase();
      return (lot && (lot.includes(qLow) || qLow.includes(lot))) ||
             (brc && (brc.includes(qLow) || qLow.includes(brc))) ||
             (q.length >= 4 && prod.includes(qLow)) ||
             (q.length >= 4 && lbl.includes(qLow));
    });

    // Match recalls
    const synth = { lot_number: q, product_name: q, barcode_number: q, label_text: q };
    const exactR    = recalls.filter(r => recallMatchLevel(synth, r).level === 'exact');
    const possibleR = recalls.filter(r => recallMatchLevel(synth, r).level === 'possible');

    if (!matched.length && !exactR.length && !possibleR.length) {
      el.innerHTML = `
        <div style="padding:32px;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:12px;">
          <div style="font-size:28px;margin-bottom:10px;">🔍</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px;">No records found</div>
          <div style="font-size:12px;color:var(--muted);">No scans or active recalls matched "<strong>${esc(q)}</strong>" in the last 180 days.</div>
        </div>`;
      return;
    }

    let html = '';

    // Recall alerts
    if (exactR.length) {
      html += exactR.map(r => `
        <div style="margin-bottom:12px;padding:14px 16px;background:rgba(var(--danger-rgb),0.07);border:1.5px solid rgba(var(--danger-rgb),0.4);border-radius:12px;box-shadow:var(--shadow-glow-danger);">
          <div style="font-size:10px;font-weight:700;color:var(--danger);letter-spacing:0.08em;margin-bottom:6px;">⚠ ACTIVE RECALL</div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">${esc(r.product_name||'—')}</div>
          ${r.lot_number?`<div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--danger);margin-top:3px;">Lot: ${esc(r.lot_number)}</div>`:''}
          ${r.description?`<div style="font-size:12px;color:var(--muted);margin-top:4px;">${esc(r.description.slice(0,200))}</div>`:''}
          ${r.severity?`<div style="margin-top:8px;">${sevPill(r.severity)}</div>`:''}
          <button onclick="showPanel('recalls')" style="margin-top:10px;font-size:11px;padding:6px 14px;border-radius:7px;border:1px solid rgba(var(--danger-rgb),0.4);background:rgba(var(--danger-rgb),0.08);color:var(--danger);cursor:pointer;font-weight:600;">
            View recall response chain →
          </button>
        </div>`).join('');
    }

    if (possibleR.length) {
      html += possibleR.map(r => `
        <div style="margin-bottom:12px;padding:12px 16px;background:rgba(var(--warn-rgb),0.06);border:1px solid rgba(var(--warn-rgb),0.35);border-radius:12px;">
          <div style="font-size:10px;font-weight:700;color:var(--warn);letter-spacing:0.08em;margin-bottom:6px;">~ POSSIBLE RECALL MATCH</div>
          <div style="font-weight:600;color:var(--text);">${esc(r.product_name||'—')}</div>
          ${r.lot_number?`<div style="font-family:'DM Mono',monospace;font-size:12px;color:var(--warn);margin-top:3px;">Recalled lot: ${esc(r.lot_number)}</div>`:''}
          <div style="font-size:11px;color:var(--warn);margin-top:5px;">Verify the exact lot code against the physical product.</div>
        </div>`).join('');
    }

    // Shelf status
    if (matched.length) {
      const onShelf  = matched.filter(s => !s.removed_from_shelf_at && !s.recall_resolved);
      const removed  = matched.filter(s => s.removed_from_shelf_at || s.recall_resolved);

      // Group by store
      const storeMap = {};
      onShelf.forEach(s => {
        const key = s.store_name || 'Unknown store';
        if (!storeMap[key]) storeMap[key] = { scans: [], units: 0 };
        storeMap[key].scans.push(s);
        storeMap[key].units += (s.quantity || 1);
      });

      const hasOnShelf = onShelf.length > 0;
      const statusColor = exactR.length ? 'var(--danger)' : hasOnShelf ? 'var(--accent)' : 'var(--muted)';
      const statusText  = !hasOnShelf ? 'Not currently on shelf'
                        : exactR.length ? `⚠ ${onShelf.length} scan${onShelf.length!==1?'s':''} on shelf — RECALL ACTIVE`
                        : `${onShelf.length} scan${onShelf.length!==1?'s':''} on shelf`;

      html += `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm);">
          <div style="padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;">
            <div style="width:9px;height:9px;border-radius:50%;background:${statusColor};${exactR.length&&hasOnShelf?'box-shadow:0 0 8px rgba(var(--danger-rgb),0.5);':''}"></div>
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:${statusColor};">${statusText}</div>
          </div>

          ${hasOnShelf ? `
          <div style="padding:14px 18px;">
            <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;">Current shelf location${Object.keys(storeMap).length!==1?'s':''}</div>
            ${Object.entries(storeMap).map(([store, info]) => `
              <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:var(--surface2);border-radius:8px;margin-bottom:8px;">
                <div>
                  <div style="font-weight:600;font-size:13px;color:var(--text);">${esc(store)}</div>
                  <div style="font-size:11px;color:var(--muted);margin-top:2px;">
                    ${info.units} unit${info.units!==1?'s':''} · Last placed ${fmtDashDT(info.scans[0].created_at)}
                    ${info.scans[0].scanned_by ? ` · ${esc(info.scans[0].scanned_by)}` : ''}
                  </div>
                </div>
                <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:${exactR.length?'var(--danger)':'var(--accent)'};">${info.units}</div>
              </div>`).join('')}
          </div>` : ''}

          ${removed.length ? `
          <div style="padding:12px 18px;${hasOnShelf?'border-top:1px solid var(--border);':''}">
            <div style="font-size:11px;color:var(--muted);">
              ${removed.length} record${removed.length!==1?'s':''} previously removed or resolved ·
              <button onclick="showPanel('traceability')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-size:11px;font-family:inherit;padding:0;">View in Traceability →</button>
            </div>
          </div>` : ''}
        </div>`;
    }

    el.innerHTML = html;
    // Save to cache — renderOverview is expensive (10 queries); serve from cache for 2 min
    _overviewCache = { html, renderedAt: Date.now() };

  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);padding:12px;">${e.message}</div>`;
  }
}

function renderTerminology() {
  const el = document.getElementById('main-content');
  const isUS = _orgRegion === 'us';

  const term = (name, def, detail = '', reg = '') => `
    <div style="padding:16px 0;border-bottom:1px solid var(--border);">
      <div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div style="min-width:180px;flex-shrink:0;">
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13px;color:var(--text);">${name}</div>
          ${reg ? `<div style="font-size:10px;font-family:'DM Mono',monospace;color:var(--accent);margin-top:2px;opacity:0.8;">${reg}</div>` : ''}

async function saveRecallSettings() {
  const days  = parseInt(document.getElementById('lookback-days-input')?.value || '365', 10);
  const btn   = document.getElementById('btn-save-recall-sett');
  const msgEl = document.getElementById('recall-sett-msg');
  const setMsg = (txt, ok) => { if (msgEl) { msgEl.textContent=txt; msgEl.style.cssText='display:block;font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;background:'+( ok?'rgba(var(--accent-rgb),0.1)':'rgba(var(--danger-rgb),0.1)')+';border:1px solid '+(ok?'rgba(var(--accent-rgb),0.3)':'rgba(var(--danger-rgb),0.3)')+';color:'+(ok?'var(--accent)':'var(--danger)'); } };
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }
  const userId = (await sb.auth.getUser()).data?.user?.id;
  // Save to user_settings (this user's personal setting)
  const { error } = await sb.from('user_settings').upsert({
    user_id: userId, organisation_id: _orgId,
    recall_lookback_days: days,
  }, { onConflict: 'user_id' });
  // Also save to organisations table as the org-level default (Blocker 2).
  // This value is read by staff and store managers in the scanning app
  // and overrides their personal setting — ensuring compliance decisions
  // are set at org level, not per individual.
  // Both writes are checked: a silent failure here would split state across
  // users (their personal setting saved, but org default not), making the
  // "set for all staff" toast a lie.
  let orgErr = null;
  if (!error) {
    const { error: oErr } = await sb.from('organisations').update({ recall_lookback_days: days }).eq('id', _orgId);
    orgErr = oErr;
  }
  if (error)        { setMsg(error.message, false); }
  else if (orgErr)  { setMsg('Personal setting saved, but org default failed: ' + orgErr.message, false); }
  else              { setMsg(`✓ Lookback window set to ${days} days for all staff`, true); }
  if (btn) { btn.disabled=false; btn.textContent='Save'; }
}

// ── User preferences (Settings → Your preferences panel) ────────
// Three personal settings, all per-user:
//   - theme:     localStorage (per-device); also applied immediately
//   - language:  user_settings.language + localStorage mirror
//   - recall_source ('fda' | 'mattilsynet' | 'both'): user_settings
//
// In-memory state held in window._prefDraft so the three buttons
// (radio-style) can update visually without a full re-render. The
// Save button writes everything in one round trip.

window._prefDraft = window._prefDraft || {};

function _setPrefTheme(val) {
  window._prefDraft.theme = val;
  // Apply theme immediately for instant feedback (matches the topbar
  // toggle behaviour — theme is the one preference that's expected to
  // feel live, not deferred to a Save click).
  document.documentElement.setAttribute('data-theme', val);
  localStorage.setItem('batchd-theme', val);
  if (typeof updateThemeIcon === 'function') updateThemeIcon(val);
  // Visual: highlight the active button, dim the other.
  _highlightPrefBtn('pref-theme-dark',  val === 'dark');
  _highlightPrefBtn('pref-theme-light', val === 'light');
}

function _setPrefLang(val) {
  window._prefDraft.language = val;
  _highlightPrefBtn('pref-lang-en', val === 'en');
  _highlightPrefBtn('pref-lang-no', val === 'no');
}

function _setPrefFeeds(val) {
  window._prefDraft.recallSource = val;
  _highlightPrefBtn('pref-feeds-fda',         val === 'fda');
  _highlightPrefBtn('pref-feeds-mattilsynet', val === 'mattilsynet');
  _highlightPrefBtn('pref-feeds-both',        val === 'both');
}

// Helper: re-style a preference button to active or inactive.
// Matches the inline-style shape the render function produces.
function _highlightPrefBtn(id, isActive) {
  const el = document.getElementById(id);
  if (!el) return;
  el.style.borderColor = isActive ? 'var(--accent)'                : 'var(--border)';
  el.style.background  = isActive ? 'rgba(var(--accent-rgb),0.08)' : 'var(--surface2)';
  el.style.color       = isActive ? 'var(--accent)'                : 'var(--muted)';
}

async function saveUserPreferences() {
  const btn   = document.getElementById('btn-save-prefs');
  const msgEl = document.getElementById('prefs-msg');
  const setMsg = (txt, ok) => {
    if (!msgEl) return;
    msgEl.textContent = txt;
    msgEl.style.cssText = 'display:block;font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;background:' +
      (ok ? 'rgba(var(--accent-rgb),0.1)' : 'rgba(var(--danger-rgb),0.1)') +
      ';border:1px solid ' + (ok ? 'rgba(var(--accent-rgb),0.3)' : 'rgba(var(--danger-rgb),0.3)') +
      ';color:' + (ok ? 'var(--accent)' : 'var(--danger)') + ';';
  };

  if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }

  // Read draft state with sensible fallbacks (in case the user didn't
  // touch a particular control before clicking Save).
  const theme        = window._prefDraft.theme        || localStorage.getItem('batchd-theme')    || 'dark';
  const language     = window._prefDraft.language     || localStorage.getItem('batchd-language') || 'en';
  const recallSource = window._prefDraft.recallSource || 'both';

  // Theme is already applied on click; localStorage already set there.
  // Language: mirror to localStorage for instant client-side use.
  localStorage.setItem('batchd-language', language);

  try {
    const userId = (await sb.auth.getUser()).data?.user?.id;
    if (!userId) throw new Error('Not signed in');

    // Try the full upsert first. If `language` column doesn't exist yet
    // (migration 011 not run), retry without it so recall_source still
    // saves cleanly. Surfaces a friendly warning so the user knows the
    // migration is pending.
    let { error } = await sb.from('user_settings').upsert({
      user_id:        userId,
      organisation_id: _orgId,
      language,
      recall_source:  recallSource,
    }, { onConflict: 'user_id' });

    let languagePending = false;
    if (error && /column .*language.* does not exist/i.test(error.message || '')) {
      languagePending = true;
      const retry = await sb.from('user_settings').upsert({
        user_id:        userId,
        organisation_id: _orgId,
        recall_source:  recallSource,
      }, { onConflict: 'user_id' });
      error = retry.error;
    }

    if (error) {
      setMsg('Could not save: ' + error.message, false);
    } else if (languagePending) {
      setMsg('✓ Theme + recall feeds saved. (Language preference needs migration 011 — recall feeds + theme are live now.)', true);
    } else {
      setMsg('✓ Preferences saved.', true);
    }
  } catch (e) {
    setMsg('Could not save: ' + (e.message || 'unknown error'), false);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Save preferences'; }
  }
}

function detectDashComplaintPatterns(complaints, windowDays = 7) {
  const cutoff = Date.now() - windowDays * 24 * 60 * 60 * 1000;
  const recent = (complaints || []).filter(c =>
    new Date(c.created_at).getTime() > cutoff &&
    !['closed','resolved'].includes(c.status)
  );
  if (recent.length < 2) return [];

  const groups = {};
  recent.forEach(c => {
    const keys = [];
    if (c.barcode) keys.push('barcode:' + c.barcode.trim().toLowerCase());
    if (c.product_name) {
      const word = c.product_name.trim().toLowerCase().split(/\s+/)[0];
      if (word && word.length > 2) keys.push('name:' + word);
    }
    keys.forEach(k => {
      if (!groups[k]) groups[k] = { key: k, complaints: [], productName: c.product_name, barcode: c.barcode, lotNumbers: new Set(), stores: new Set() };
      groups[k].complaints.push(c);
      if (c.lot_number) groups[k].lotNumbers.add(c.lot_number);
      if (c.purchase_store || c.store_name) groups[k].stores.add(c.purchase_store || c.store_name);
    });
  });

  const seen = new Set();
  const patterns = [];
  Object.values(groups)
    .filter(g => g.complaints.length >= 2)
    .sort((a, b) => b.complaints.length - a.complaints.length)
    .forEach(g => {
      const unique = g.complaints.filter(c => !seen.has(c.id));
      if (unique.length < 2) return;
      unique.forEach(c => seen.add(c.id));
      const criticalCount = unique.filter(c => c.triage_level === 'critical').length;
      const seriousCount  = unique.filter(c => c.triage_level === 'serious').length;
      const total = unique.length;
      const multiStore = g.stores.size > 1;
      let level, title, colour, bg;
      if (criticalCount >= 2 || (criticalCount >= 1 && seriousCount >= 1) || multiStore) {
        level = 'systemic'; colour = 'var(--danger)'; bg = 'rgba(var(--danger-rgb),0.07)';
        title = multiStore && total >= 2 ? 'Multi-store pattern' : 'Potential systemic issue';
      } else if (total >= 5 || seriousCount >= 3) {
        level = 'volume'; colour = 'var(--warn)'; bg = 'rgba(var(--warn-rgb),0.07)';
        title = 'Volume alert';
      } else {
        level = 'emerging'; colour = 'var(--warn)'; bg = 'rgba(var(--warn-rgb),0.05)';
        title = 'Emerging pattern';
      }
      const lots = [...g.lotNumbers].slice(0, 3).join(', ');
      const storeList = [...g.stores].slice(0, 3).join(', ');
      patterns.push({ level, title, colour, bg, productName: g.productName, barcode: g.barcode, lots, storeList, multiStore, total, criticalCount, seriousCount, complaints: unique, windowDays });
    });
  return patterns;
}

function dashPatternAlertHTML(pattern, idx) {
  const lotStr = pattern.lots ? ` · Lot: <span style="font-family:'DM Mono',monospace;">${pattern.lots}</span>` : '';
  const storeStr = pattern.storeList ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">Stores: ${pattern.storeList}${pattern.multiStore ? ' <span style="color:var(--danger);font-weight:600;">· multiple stores</span>' : ''}</div>` : '';

    pattern.criticalCount ? `<span style="color:var(--danger);font-weight:700;">${pattern.criticalCount} critical</span>` : '',
    pattern.seriousCount  ? `<span style="color:var(--warn);">${pattern.seriousCount} serious</span>` : '',

  ].filter(Boolean).join(' · ');

  const borderColour = pattern.colour.includes('danger') ? 'rgba(var(--danger-rgb),0.3)' : 'rgba(var(--warn-rgb),0.3)';
  return `
    <div id="dash-pattern-${idx}" style="background:${pattern.bg};border:1px solid ${borderColour};border-radius:12px;padding:16px;position:relative;">

          <div style="font-size:12px;color:var(--muted);">${breakdown}</div>

          <button onclick="createInvestigationFromPattern(${JSON.stringify(pattern.productName||'')},${JSON.stringify(pattern.lots||'')},${pattern.total},${JSON.stringify(pattern.title)},${JSON.stringify((pattern.complaints||[]).map(c=>c.id))})"
            style="background:${pattern.colour==='var(--danger)'?'rgba(var(--danger-rgb),0.1)':'rgba(var(--warn-rgb),0.1)'};border:1px solid ${borderColour};color:${pattern.colour};border-radius:7px;padding:6px 12px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">

        </div>

function dashTriageLevelStyle(level) {
  if (level === 'critical') return { bg: 'rgba(var(--danger-rgb),0.12)',  color: 'var(--danger)', label: 'CRITICAL' };
  if (level === 'serious')  return { bg: 'rgba(var(--warn-rgb),0.12)', color: 'var(--warn)',   label: 'SERIOUS'  };
  if (level === 'monitor')  return { bg: 'rgba(var(--accent-rgb),0.10)', color: 'var(--accent)', label: 'MONITOR'  };
  return                           { bg: 'rgba(var(--info-light-rgb),0.10)', color: 'var(--info)',   label: 'PENDING'  };
}

function dashTriageStatusLabel(status) {
  const map = { new:'New', triaged:'Triaged', follow_up_sent:'Follow-up Sent', investigating:'Investigating', resolved:'Resolved', recall_triggered:'Recall Triggered', closed:'Closed' };
  return map[status] || status;
}

          <select id="dtc-hasproduct" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;">

        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Description <span style="color:var(--danger);">*</span></label>
        <textarea id="dtc-text" rows="5" placeholder="Describe what was reported, in the caller's own words as closely as possible." style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px;color:var(--text);font-size:13px;line-height:1.5;resize:vertical;box-sizing:border-box;font-family:inherit;"></textarea></div>

        <div id="dtc-msg" style="display:none;border-radius:8px;padding:10px 14px;font-size:13px;"></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;">
          <button onclick="_dashTriageView='list';renderDashboardTriage()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;">Cancel</button>
          <button onclick="submitDashPhoneComplaint()" id="dtc-submit" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">Submit and Triage</button>
        </div>
      </div>
    </div>`;

  window.dtcUpdateState = function(countryName) {
    const code = COUNTRY_MAP[countryName];
    const wrap = document.getElementById('dtc-state-wrap');
    const stateEl = document.getElementById('dtc-state');
    const lbl = document.getElementById('dtc-state-label');
    const reg = code ? REGIONS[code] : null;
    if (!reg) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    lbl.textContent = reg.label + (reg.required ? ' *' : ' (optional)');
    stateEl.innerHTML = '<option value="">Select</option>' + reg.opts.map(o => `<option value="${o}">${o}</option>`).join('');
  };
}

async function submitDashPhoneComplaint() {
  const text = document.getElementById('dtc-text').value.trim();
  if (!text) { showDashTriageMsg('Complaint details are required.', 'error'); return; }
  const btn = document.getElementById('dtc-submit');
  btn.disabled = true; btn.innerHTML = '<span style="display:flex;align-items:center;gap:6px;"><div class="spinner" style="width:12px;height:12px;border-width:2px;"></div> Triaging...</span>';
  const dtcHasProduct = document.getElementById('dtc-hasproduct')?.value || '';
  const payload = {
    source: 'phone', receiving_org_id: _orgId, manufacturer_id: null,
    org_name: _orgName, lang: 'en',
    product_name: document.getElementById('dtc-product').value.trim() || null,
    barcode: document.getElementById('dtc-barcode')?.value.trim() || null,
    lot_number: document.getElementById('dtc-lot').value.trim() || null,
    best_before_date: document.getElementById('dtc-bestbefore')?.value || null,
    complaint_text: text,
    customer_name: document.getElementById('dtc-name').value.trim() || null,
    customer_email: document.getElementById('dtc-email').value.trim() || null,
    customer_phone: document.getElementById('dtc-phone').value.trim() || null,
    country: document.getElementById('dtc-country')?.value || null,
    store_name: document.getElementById('dtc-store')?.value.trim() || null,
    purchase_city: document.getElementById('dtc-city')?.value.trim() || null,
    purchase_state: document.getElementById('dtc-state')?.value || null,
    people_affected: document.getElementById('dtc-affected')?.value || null,
    medical_attention: document.getElementById('dtc-medical')?.value || null,
    still_has_product: dtcHasProduct.startsWith('Yes') ? true : dtcHasProduct.startsWith('No') ? false : null,
    storage_method: document.getElementById('dtc-storage')?.value || null,
    submitted_by_label: 'Staff (phone intake)'
  };
  try {
    const res = await fetch('/.netlify/functions/triage-complaint', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Submission failed');
    const s = dashTriageLevelStyle(data.triage_level);
    document.getElementById('main-content').innerHTML = `
      <div style="max-width:600px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;">
          <div style="display:inline-block;background:${s.bg};color:${s.color};font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:6px;letter-spacing:0.05em;margin-bottom:16px;">${s.label}</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">Complaint logged and triaged</div>
          <div style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:16px;">${data.complaint_number}</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;">${data.triage_summary}</div>
          ${payload.customer_email ? `<div style="font-size:12px;color:var(--muted);margin-bottom:20px;">Follow-up email sent to ${payload.customer_email}.</div>` : ''}
          ${data.pattern_alert ? `
            <div style="background:rgba(var(--warn-rgb),0.08);border:1px solid rgba(var(--warn-rgb),0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;text-align:left;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.6" fill="var(--warn)" stroke="none"/></svg>
                <span style="font-size:12px;font-weight:700;color:var(--warn);">PATTERN DETECTED: ${data.pattern_alert.title.toUpperCase()}</span>
              </div>
              <div style="font-size:12px;color:var(--muted);">${data.pattern_alert.count} complaints about this product in the last 7 days. Consider notifying the manufacturer.</div>
            </div>
          ` : ''}
          <div style="display:flex;justify-content:center;gap:10px;">
            <button onclick="_dashTriageView='list';renderDashboardTriage()" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">View All Complaints</button>
            <button onclick="_dashTriageView='new';renderDashboardTriage()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;">Log Another</button>
          </div>
        </div>
      </div>`;
  } catch(e) {
    btn.disabled = false; btn.innerHTML = 'Submit and Triage';
    showDashTriageMsg(e.message, 'error');
  }
}

function showDashTriageMsg(txt, type) {
  const el = document.getElementById('dtc-msg');
  if (!el) return;
  el.textContent = txt; el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(var(--danger-rgb),0.1)' : 'rgba(var(--accent-rgb),0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(var(--danger-rgb),0.3)' : 'rgba(var(--accent-rgb),0.3)'}`;
}

async function renderDashTriageDetail(el) {
  const _errEl = document.getElementById('main-content');
  try {

  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  try {
    // Scope each query to this org. The complaints table has receiving_org_id;
    // its child tables (complaint_messages, complaint_audit_log) inherit org
    // ownership through the parent. The !inner join filters child rows to
    // those whose parent complaint belongs to _orgId — defence in depth on
    // top of RLS so a forged complaint_id from another org returns nothing.
    const [compRes, msgsRes, logRes] = await Promise.all([
      sb.from('complaints').select('*').eq('id', _dashTriageComplaint).eq('receiving_org_id', _orgId).single(),
      sb.from('complaint_messages').select('*, complaints!inner(receiving_org_id)').eq('complaint_id', _dashTriageComplaint).eq('complaints.receiving_org_id', _orgId).order('created_at', {ascending:true}),
      sb.from('complaint_audit_log').select('*, complaints!inner(receiving_org_id)').eq('complaint_id', _dashTriageComplaint).eq('complaints.receiving_org_id', _orgId).order('created_at', {ascending:true}),
    ]);
    const c    = compRes.data;
    if (!c) throw new Error('Complaint not found');
    const msgs = msgsRes.data || [];
    const log  = logRes.data  || [];
    const s    = dashTriageLevelStyle(c.triage_level);

    // Map status to lifecycle step
    const LIFECYCLE = [
      { key: 'received',      label: 'Received',      desc: 'Complaint logged and queued for triage' },
      { key: 'triaged',       label: 'Triaged',        desc: 'AI severity assessment complete' },
      { key: 'investigating', label: 'Investigating',  desc: 'Under investigation by your team' },
      { key: 'action_taken',  label: 'Action taken',   desc: 'Response or corrective action documented' },
      { key: 'resolved',      label: 'Resolved',       desc: 'Complaint fully resolved and closed' },
    ];
    const statusToStep = { 'new':1,'pending':1,'open':2,'triaged':2,'investigating':3,'action_taken':4,'resolved':5,'closed':5 };
    const currentStep = statusToStep[c.status] || 2;
    const isComplete  = currentStep === 5;

    const NEXT_ACTIONS = {
      1: { label:'Run AI triage', desc:'Assess complaint severity and categorise automatically', btn:'Triage now →', fn:`triageComplaintNow('${c.id}')` },
      2: { label:'Begin investigation', desc:'Mark this complaint as under active investigation', btn:'Start investigating →', fn:`updateDashTriageStatus('${c.id}','investigating')` },
      3: { label:'Document action taken', desc:'Record the corrective action, response sent, or decision made', btn:'Log action taken →', fn:`updateDashTriageStatus('${c.id}','action_taken')` },
      4: { label:'Resolve complaint', desc:'Confirm the complaint is fully handled and close the record', btn:'Mark as resolved →', fn:`updateDashTriageStatus('${c.id}','resolved')` },
      5: null,
    };
    const nextAction = NEXT_ACTIONS[currentStep];

    el.innerHTML = `
      <div style="max-width:720px;">

        <!-- Header -->
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;">
          <button onclick="_dashTriageView='list';renderDashboardTriage()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:7px;padding:6px 12px;font-size:12px;cursor:pointer;">← All complaints</button>
          <span style="background:${s.bg};color:${s.color};font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 10px;border-radius:4px;letter-spacing:0.05em;">${s.label}</span>
          <span style="font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);">${c.complaint_number||c.id.slice(0,8)}</span>
        </div>

        <!-- Lifecycle progress -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:14px;">
          <div style="font-size:13px;font-weight:700;color:var(--text);margin-bottom:14px;">${c.product_name||'Product complaint'}</div>
          <div style="display:flex;align-items:flex-start;gap:0;margin-bottom:${nextAction?'14px':'0'};">
            ${LIFECYCLE.map((step, i) => {
              const done    = i+1 < currentStep;
              const current = i+1 === currentStep;
              const pending = i+1 > currentStep;
              const isLast  = i === LIFECYCLE.length - 1;
              const circle  = done
                ? `<div style="width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dim)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`
                : current && isComplete
                  ? `<div style="width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dim)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`
                  : current
                    ? `<div style="width:26px;height:26px;border-radius:50%;background:rgba(var(--warn-rgb),0.15);border:2px solid var(--warn);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-weight:700;color:var(--warn);">${i+1}</div>`
                    : `<div style="width:26px;height:26px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;color:var(--muted);">${i+1}</div>`;
              const label = `<div style="font-size:10px;margin-top:4px;color:${done||isComplete?'var(--accent)':current?'var(--warn)':'var(--muted)'};font-weight:${current?'600':'400'};white-space:nowrap;text-align:center;">${step.label}</div>`;
              const line  = isLast ? '' : `<div style="flex:1;height:1.5px;background:${done?'var(--accent)':'var(--border)'};margin:0 3px;margin-bottom:14px;"></div>`;
              return `<div style="display:flex;flex-direction:column;align-items:center;">${circle}${label}</div>${line}`;
            }).join('')}
          </div>
          ${nextAction && !isComplete ? `
          <div style="background:var(--surface2);border-radius:8px;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--text);">Next: ${nextAction.label}</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">${nextAction.desc}</div>
            </div>
            <button onclick="${nextAction.fn}" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">${nextAction.btn}</button>
          </div>` : isComplete ? `
          <div style="background:rgba(var(--accent-rgb),0.06);border-radius:8px;padding:11px 14px;display:flex;align-items:center;gap:10px;">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            <div style="font-size:12px;color:var(--accent);font-weight:600;">Resolved — complaint closed</div>
          </div>` : ''}
        </div>

        <!-- Detail grid -->
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;">
            <div style="font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.08em;margin-bottom:12px;">COMPLAINT DETAILS</div>
            <div style="display:flex;flex-direction:column;gap:8px;font-size:12px;">

          </div>

        ${msgs.length > 0 ? `

async function updateDashTriageStatus(id, newStatus) {
  try {
    // Both writes destructure { error } so RLS denials don't silently land
    // a fake "status changed" outcome with the audit log out of sync.
    const { error: updErr } = await sb.from('complaints').update({ status: newStatus }).eq('id', id);

    const { error: logErr } = await sb.from('complaint_audit_log').insert({ complaint_id: id, action: 'status_changed_to_' + newStatus, actor_label: 'Staff' });
    if (logErr) throw logErr;
    renderDashTriageDetail(document.getElementById('main-content'));
  } catch(e) { showToast('Error: ' + e.message, 'error', 4000); }
}

async function loadDashboardTriageBadge() {

}

// were removed in the retailer-only pivot. Batch'd no longer hosts the

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    _session = session;
    await initDashboard(session.user);
  }

  // Session expiry — reload cleanly when token expires
  let _sessionReloadFired = false;
  sb.auth.onAuthStateChange((event, session) => {
    if (event === 'TOKEN_REFRESHED') return; // normal refresh — ignore
    if (event === 'SIGNED_OUT') {
      if (_sessionReloadFired) return;
      _sessionReloadFired = true;
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;inset:0;background:rgba(8,15,18,0.95);display:flex;align-items:center;justify-content:center;z-index:9999;';
      overlay.innerHTML = `<div style="text-align:center;color:var(--text);font-family:'DM Mono',monospace;">
        <div style="font-size:28px;margin-bottom:12px;">🔒</div>
        <div style="font-size:14px;margin-bottom:6px;font-weight:600;">Session ended</div>
        <div style="font-size:12px;color:var(--muted);">Redirecting to login…</div>
      </div>`;
      document.body.appendChild(overlay);
      setTimeout(() => location.reload(), 1500);
    }
  });
})();

<script>
// ═══════════════════════════════════════════════════════════════

// Shared engine — identical to manufacturer portal version

// Defined here for the dashboard context:

async function openCSVImport(config) {
  document.getElementById('csv-import-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'csv-import-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(4,12,14,0.92);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">
      <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;">
        <div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            ${config.title}
          </div>
