        <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
      </div>
      <div style="flex:1;overflow-y:auto;padding:22px 26px;" id="csv-import-body">
        <div id="csv-step-upload">
          <div style="background:rgba(var(--accent-rgb),0.06);border:1px solid rgba(var(--accent-rgb),0.2);border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div><div style="font-size:12px;font-weight:600;color:var(--accent);">Start with our template</div><div style="font-size:11px;color:var(--muted);margin-top:2px;">Download a pre-formatted CSV</div></div>
            <button onclick="csvDownloadTemplate()" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">↓ Download template</button>
          </div>
          <div id="csv-dropzone" ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.background='rgba(var(--accent-rgb),0.08)';" ondragleave="this.style.borderColor='var(--border)';this.style.background='var(--surface2)';" ondrop="csvHandleDrop(event)" onclick="document.getElementById('csv-file-input').click()" style="border:2px dashed var(--border);border-radius:12px;background:var(--surface2);padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:28px;margin-bottom:8px;">📄</div>
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">Drop your CSV here</div>

          <div style="margin-top:16px;">

            <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;">After uploading, you'll choose which of your columns maps to each field. Import from any spreadsheet — no renaming needed.</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${config.fields.map(f => `<div style="background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;font-family:'DM Mono',monospace;color:${f.required?'var(--text)':'var(--muted)'};">${f.label}${f.required?' <span style="color:var(--accent)">★</span>':''}</div>`).join('')}

        <div id="csv-step-result" style="display:none;"></div>

function csvDownloadTemplate() {
  const modal = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const headers = config.fields.map(f => f.label).join(',');
  const examples = (config.templateExample||[[]]).map(row => row.map(cell => `"${String(cell).replace(/"/g,'""')}"`).join(',')).join('\n');
  const csv = headers + '\n' + examples;
  const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download=`batched_${config.title.toLowerCase().replace(/\s+/g,'_')}_template.csv`; a.click();
  URL.revokeObjectURL(url);
}

function csvHandleDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('csv-dropzone');
  dz.style.borderColor='var(--border)'; dz.style.background='var(--surface2)';
  const file = e.dataTransfer.files[0];
  if (file) csvHandleFile(file);
}

function csvHandleFile(file) {
  if (!file || !file.name.endsWith('.csv')) { showToast('Please upload a .csv file','error',3000); return; }
  const reader = new FileReader();
  reader.onload = e => csvParseAndPreview(e.target.result, file.name);
  reader.readAsText(file);
}

function csvParseText(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers:[], rows:[] };
  const parseRow = line => {
    const cells=[]; let cur='', inQ=false;
    for (let i=0; i<line.length; i++) {
      const ch=line[i];
      if (ch==='"') { if (inQ && line[i+1]==='"') { cur+='"'; i++; } else inQ=!inQ; }
      else if (ch===',' && !inQ) { cells.push(cur.trim()); cur=''; } else cur+=ch;
    }
    cells.push(cur.trim()); return cells;
  };
  const headers = parseRow(lines[0]).map(h => h.toLowerCase().trim());
  const rows = lines.slice(1).filter(l=>l.trim()).map(l => {
    const cells=parseRow(l); const obj={};
    headers.forEach((h,i) => { obj[h]=(cells[i]||'').trim(); }); return obj;
  });
  return { headers, rows };
}

// ── CSV column mapper ─────────────────────────────────────────

async function csvParseAndPreview(text, filename) {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const { headers, rows } = csvParseText(text);
  modal._csvRows    = rows;
  modal._csvHeaders = headers;

  // Use custom autoMapFn if provided (e.g. consumer notify with alias lists),
  // otherwise fall back to the default label/key prefix matcher
  let autoMap = {};
  if (typeof config.autoMapFn === 'function') {
    autoMap = config.autoMapFn(headers) || {};
  } else {
    config.fields.forEach(f => {
      const fLabel = f.label.toLowerCase().replace(/[^a-z0-9]/g,'');
      const fKey   = f.key.toLowerCase();
      const match  = headers.find(h => {
        const hn = h.toLowerCase().replace(/[^a-z0-9]/g,'');
        return hn === fLabel || hn === fKey || hn.includes(fLabel.slice(0,6)) || fLabel.includes(hn.slice(0,6));
      });
      if (match) autoMap[f.key] = match;
    });
  }

  document.getElementById('csv-step-upload').style.display = 'none';
  document.getElementById('csv-step-preview').style.display = '';

  const optionsHtml = `<option value="">— skip this field —</option>${headers.map(h =>
    `<option value="${h}">${h}</option>`).join('')}`;

  const sel = (key) =>
    `<select id="csv-map-${key}" onchange="csvUpdatePreview()" style="background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-width:180px;cursor:pointer;outline:none;appearance:auto;">${optionsHtml}</select>`;

  document.getElementById('csv-preview-content').innerHTML = `
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      <div style="background:rgba(var(--accent-rgb),0.1);border:1px solid rgba(var(--accent-rgb),0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent);">✓ ${rows.length} rows · ${headers.length} columns</div>
      <div style="font-size:12px;color:var(--muted);">${filename}</div>
    </div>

    <div style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em;">Map your columns</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Match each Batch'd field to a column from your file. Fields marked <span style="color:var(--accent)">★</span> are needed for import — others are optional.</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${config.fields.map(f => `
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;">
            <div style="font-size:13px;color:var(--text);font-weight:500;">
              ${f.label}
              ${f.required ? '<span style="color:var(--accent);margin-left:4px;">★</span>' : '<span style="font-size:10px;color:var(--muted);margin-left:4px;">(optional)</span>'}
            </div>
            <div style="font-size:12px;color:var(--muted);">→</div>
            <div>${sel(f.key)}</div>
          </div>`).join('')}
      </div>
    </div>

    <div id="csv-live-preview">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.07em;">Preview (first 5 rows)</div>
      <div id="csv-preview-table" style="overflow-x:auto;border:1px solid var(--border);border-radius:10px;"></div>
      ${rows.length > 5 ? `<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;">+ ${rows.length - 5} more rows</div>` : ''}
    </div>`;

  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && autoMap[f.key]) el.value = autoMap[f.key];
  });

  csvUpdatePreview();

  document.getElementById('csv-footer-info').textContent = `${rows.length} rows ready`;
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="csvGoBack()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">← Back</button>
    <button onclick="csvRunImport()" id="csv-import-btn" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Import ${rows.length} row${rows.length!==1?'s':''}</button>`;
}

function csvGetCurrentMapping() {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const map    = {};
  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && el.value) map[f.key] = el.value;
  });
  return map;
}

function csvUpdatePreview() {
  const modal    = document.getElementById('csv-import-modal');
  const config   = modal._csvConfig;
  const rows     = modal._csvRows || [];
  const fieldMap = csvGetCurrentMapping();
  const mapped   = config.fields.filter(f => fieldMap[f.key]);
  const tableEl  = document.getElementById('csv-preview-table');
  if (!tableEl) return;

  if (mapped.length === 0) {
    tableEl.innerHTML = `<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted);">Assign at least one column above to see a preview.</div>`;
    return;
  }

  const missingRequired = config.fields.filter(f => f.required && !fieldMap[f.key]);
  const btn = document.getElementById('csv-import-btn');
  if (btn) {
    btn.disabled       = missingRequired.length > 0;
    btn.style.opacity  = missingRequired.length > 0 ? '0.45' : '1';
    btn.style.cursor   = missingRequired.length > 0 ? 'not-allowed' : 'pointer';
  }

  const preview = rows.slice(0, 5);
  tableEl.innerHTML = `<table style="width:100%;border-collapse:collapse;min-width:300px;">
    <thead><tr>
      ${mapped.map(f => `<th style="font-size:10px;color:var(--muted);text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);white-space:nowrap;">
        ${f.label}${f.required?'<span style="color:var(--accent);margin-left:3px;">★</span>':''}
        <div style="font-size:10px;color:rgba(var(--accent-muted-rgb),0.5);font-family:'DM Mono',monospace;margin-top:1px;">← ${fieldMap[f.key]}</div>
      </th>`).join('')}
    </tr></thead>
    <tbody>
      ${preview.map((row,i) => `<tr style="background:${i%2?'rgba(0,0,0,0.1)':'transparent'};">
        ${mapped.map(f => {
          const val = row[fieldMap[f.key]] || '';
          return `<td style="font-size:11px;color:${val?'var(--text)':'rgba(var(--accent-muted-rgb),0.3)'};padding:8px 10px;border-bottom:1px solid rgba(var(--surface-tint-rgb),0.4);font-family:${f.type==='mono'?'DM Mono,monospace':'inherit'};max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${val||'—'}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  ${missingRequired.length > 0 ? `<div style="padding:10px 14px;background:rgba(var(--accent-rgb),0.05);border-top:1px solid var(--border);font-size:11px;color:var(--muted);">Assign required fields to import: <strong style="color:var(--accent);">${missingRequired.map(f=>f.label).join(', ')}</strong></div>` : ''}`;
}

function csvGoBack() {
  document.getElementById('csv-step-preview').style.display = 'none';
  document.getElementById('csv-step-upload').style.display  = '';
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>`;
  document.getElementById('csv-footer-info').textContent = '';
}

async function csvRunImport() {
  const modal    = document.getElementById('csv-import-modal');
  const config   = modal._csvConfig;
  const rows     = modal._csvRows;
  const fieldMap = csvGetCurrentMapping();

  document.getElementById('csv-step-preview').style.display  = 'none';
  document.getElementById('csv-step-progress').style.display = '';
  document.getElementById('csv-footer-btns').innerHTML = '';
  document.getElementById('csv-footer-info').textContent = 'Do not close this window…';

  const mapped = rows.map(row => {
    const obj = {};
    config.fields.forEach(f => { obj[f.key] = fieldMap[f.key] ? (row[fieldMap[f.key]] || '') : ''; });
    return obj;
  }).filter(r => config.fields.filter(f => f.required).every(f => r[f.key]?.trim()));

  document.getElementById('csv-progress-label').textContent = `Importing ${mapped.length} rows…`;

  let inserted = 0, failed = 0, errors = [];
  for (let i = 0; i < mapped.length; i++) {
    document.getElementById('csv-progress-bar').style.width = Math.round((i/mapped.length)*100) + '%';
    document.getElementById('csv-progress-sub').textContent = `${i+1} of ${mapped.length}`;
    try {
      const result = await config.insertRow(mapped[i]);
      if (result.error) { failed++; errors.push(`Row ${i+2}: ${result.error}`); }
      else inserted++;
    } catch(e) { failed++; errors.push(`Row ${i+2}: ${e.message}`); }
  }

  document.getElementById('csv-progress-bar').style.width = '100%';
  document.getElementById('csv-step-progress').style.display = 'none';
  document.getElementById('csv-step-result').style.display   = '';
  document.getElementById('csv-step-result').innerHTML = `
    <div style="text-align:center;padding:16px 0 8px;">
      <div style="font-size:40px;margin-bottom:12px;">${failed===0?'✅':inserted>0?'⚠️':'❌'}</div>
      <div style="font-size:17px;font-weight:700;color:${failed===0?'var(--accent)':inserted>0?'var(--warn)':'var(--danger)'};margin-bottom:6px;">${failed===0?'Import complete':inserted>0?'Partially imported':'Import failed'}</div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">
        ${inserted>0?`<span style="color:var(--accent)">${inserted} row${inserted!==1?'s':''} imported</span>`:''}
        ${failed>0?`${inserted>0?' · ':''}<span style="color:var(--danger)">${failed} failed</span>`:''}
      </div>
      ${errors.length>0?`<div style="background:rgba(var(--danger-rgb),0.08);border:1px solid rgba(var(--danger-rgb),0.2);border-radius:8px;padding:10px 14px;text-align:left;font-size:11px;color:var(--danger);max-height:120px;overflow-y:auto;">
        ${errors.slice(0,10).map(e=>`<div>• ${e}</div>`).join('')}
        ${errors.length>10?`<div style="color:var(--muted);margin-top:4px;">…and ${errors.length-10} more</div>`:''}
      </div>`:''}
    </div>`;

  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Done</button>`;
  document.getElementById('csv-footer-info').textContent = '';
  if (config.onComplete) { try { new Function(config.onComplete)(); } catch(e) {} }
}

// 4. Stores import
function importStores() {
  openCSVImport({
    title: 'Import Stores',
    description: 'Bulk-add your store network from a spreadsheet',
    fields: [
      { key:'name',       label:'Store Name',  required:true,  type:'text' },
      { key:'store_code', label:'Store Code',  required:false, type:'mono' },
      { key:'address',    label:'Address',     required:false, type:'text' },
      { key:'region',     label:'Region',      required:false, type:'text' },
    ],
    templateExample: [
      ['Oslo - Grünerløkka','OSL-GRU-01','Thorvald Meyers gate 56, Oslo','East'],
      ['Bergen - Sentrum','BGR-SEN-01','Strandgaten 18, Bergen','West'],
      ['Trondheim - Midtbyen','TRD-MID-01','Nordre gate 10, Trondheim','Central'],
    ],
    insertRow: async (row) => {
      const { error } = await sb.from('stores').insert({
        organisation_id: _orgId,
        name:       row.name,
        store_code: row.store_code || null,

        active:     true,
      });
      return { error: error?.message };

// 5. Staff bulk invite
function importStaff() {
  openCSVImport({
    title: 'Bulk Invite Staff',
    description: 'Send invitations to multiple team members at once',
    fields: [
      { key:'email', label:'Email Address', required:true,  type:'text' },
      { key:'role',  label:'Role',          required:false, type:'text' },
      { key:'store', label:'Store Name',    required:false, type:'text' },
    ],
    templateExample: [
      ['anna.hansen@company.no','store_manager','Oslo - Grünerløkka'],
      ['kari.berg@company.no','staff','Bergen - Sentrum'],
      ['ole.nilsen@company.no','staff','Bergen - Sentrum'],
    ],
    insertRow: async (row) => {
      // Validate role
      const validRoles = ['staff','store_manager','corp_admin'];
      const role = validRoles.includes(row.role?.toLowerCase()) ? row.role.toLowerCase() : 'staff';

      // Look up store if provided
      let storeId = null;
      if (row.store) {
        const { data: stores } = await sb.from('stores').select('id,name').eq('organisation_id',_orgId);
        const match = (stores||[]).find(s => s.name.toLowerCase() === row.store.toLowerCase() || s.name.toLowerCase().includes(row.store.toLowerCase()));
        if (match) storeId = match.id;
      }

      // Create invitation token
      const token = crypto.randomUUID();
      const expiresAt = new Date(Date.now() + 7*24*60*60*1000).toISOString();

      const { error } = await sb.from('invitations').insert({
        organisation_id: _orgId,
        email: row.email.toLowerCase().trim(),
        role,
        store_id: storeId,
        token,
        expires_at: expiresAt,
        invited_by: _session?.user?.id || null,
      });
      if (error) return { error: error.message };

      // Send invite email
      try {
        await fetch('/.netlify/functions/send-invite', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'staff_invite',
            to: row.email,
            orgName: _orgName,
            role,
            inviteUrl: `https://batchdapp.com/join?token=${token}`,
          }),
        });
      } catch(e) { /* email failure doesn't block the invite record */ }

      return { error: null };
    },
    onComplete: 'renderStaff()',
  });
}
</script>

<script>
// ── Investigations panel (retailer side) ──────────────────────
async function renderDashInvestigations() {
  const _errEl = document.getElementById('main-content');
  try {

  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading investigations…</div>`;
  try {
    const { data: partners } = await sb.from('trading_partners').select('manufacturer_id').eq('retailer_id', _orgId).eq('status','active');
    const mfrIds = (partners||[]).map(p => p.manufacturer_id);

    let invs = [];
    if (mfrIds.length > 0) {
      // Scope the nested investigation_responses join to this org's responses only.
      // Without the .investigation_responses.retailer_org_id filter, the join
      // returns every retailer's response on each shared investigation —
      // exposing competing retailers' findings (issue_found flag, timestamps)
      // for the same investigation.
      const { data } = await sb.from('investigation_requests')
        .select('*, investigation_responses(id, retailer_org_id, issue_found, submitted_at)')
        .eq('investigation_responses.retailer_org_id', _orgId)
        .in('manufacturer_id', mfrIds).order('created_at', {ascending:false});
      invs = data || [];
    }

    const { data: myResponses } = await sb.from('investigation_responses').select('investigation_id').eq('retailer_org_id', _orgId);
    const myResponseIds = new Set((myResponses||[]).map(r => r.investigation_id));

    let orgNames = {};
    if (mfrIds.length > 0) {
      const { data: orgs } = await sb.from('organisations').select('id,name').in('id', mfrIds);
      (orgs||[]).forEach(o => { orgNames[o.id] = o.name; });
    }

    const needsResponse = invs.filter(i => !myResponseIds.has(i.id) && (i.status==='open'||i.status==='in_progress'));
    const responded     = invs.filter(i => myResponseIds.has(i.id));
    const closed        = invs.filter(i => i.status==='closed'||i.status==='resolved');

    const urgColors = { 1:'var(--danger)', 2:'var(--warn)', 3:'var(--muted)' };
    const urgLabels = { 1:'Class I · 24h', 2:'Class II · 72h', 3:'Routine · 7d' };
    const issueLabels = { foreign_object:'Adulteration (foreign object in product)', mold:'Mold / spoilage', mislabeling:'Mislabeling', allergen:'Allergen concern', contamination:'Contamination', discoloration:'Discoloration', pest:'Pest', packaging:'Packaging defect', other:'Other' };
    const fmtDate = fmtDash;
const fmtElapsed = d => { if (!d) return '—'; const ms = Date.now()-new Date(d); if (ms<3600000) return Math.floor(ms/60000)+'m'; if (ms<86400000) return Math.floor(ms/3600000)+'h'; return Math.floor(ms/86400000)+'d'; };

    // Nav badge
    const navBtn = document.getElementById('nav-investigations');
    if (navBtn && needsResponse.length > 0) {
      let b = navBtn.querySelector('.inv-badge');
      if (!b) { b = document.createElement('span'); b.className='inv-badge'; b.style.cssText='margin-left:auto;background:var(--warn);color:#1a0f00;font-size:10px;padding:1px 6px;border-radius:10px;font-weight:700;'; navBtn.appendChild(b); }
      b.textContent = needsResponse.length;
    }

    function invProcessCard(inv) {
      const myResp    = myResponseIds.has(inv.id);
      const isClosed  = inv.status==='closed'||inv.status==='resolved';
      const responses = inv.investigation_responses || [];
      const mfrName   = orgNames[inv.manufacturer_id]||'Manufacturer';

      // Steps: Received → Inspecting → Responded → Resolved
      const stepIdx = myResp ? (isClosed ? 3 : 2) : isClosed ? 3 : 0;
      const STEPS   = ['Received','Inspecting','Responded','Resolved'];

      if (isClosed && myResp) {
        return `
        <div style="border:1px solid rgba(var(--accent-rgb),0.25);border-radius:12px;padding:16px 18px;background:rgba(var(--accent-rgb),0.03);margin-bottom:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
          <div style="width:26px;height:26px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dim)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>
          </div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:var(--text);">${inv.product_name||'Product investigation'}</div>
            <div style="font-size:11px;color:var(--accent);margin-top:2px;">Closed · You responded · From ${mfrName} · ${fmtDate(inv.created_at)}</div>
          </div>
        </div>`;
      }

      return `
      <div style="border:1px solid ${myResp?'var(--border)':inv.urgency_class===1?'rgba(var(--danger-rgb),0.3)':'rgba(var(--warn-rgb),0.25)'};border-radius:12px;padding:16px 18px;background:${myResp?'var(--surface)':inv.urgency_class===1?'rgba(var(--danger-rgb),0.03)':'rgba(var(--warn-rgb),0.03)'};margin-bottom:10px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
          <div style="flex:1;min-width:220px;">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
              <div style="width:7px;height:7px;border-radius:50%;background:${urgColors[inv.urgency_class||2]};flex-shrink:0;"></div>
              <div style="font-size:13px;font-weight:700;color:var(--text);">${inv.product_name||'Product investigation'}</div>
              <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${urgColors[inv.urgency_class||2]}18;color:${urgColors[inv.urgency_class||2]};">${urgLabels[inv.urgency_class||2]}</span>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">
              ${inv.issue_type?issueLabels[inv.issue_type]||inv.issue_type:'Issue investigation'} · ${inv.lot_number?`Lot <span style="font-family:'DM Mono',monospace;color:var(--text);">${inv.lot_number}</span> · `:''}From ${mfrName} · ${fmtElapsed(inv.created_at)} ago
            </div>

            <!-- Step circles -->
            <div style="display:flex;align-items:flex-start;gap:0;margin-bottom:10px;">
              ${STEPS.map((s,i) => {
                const done    = i < stepIdx;
                const current = i === stepIdx;
                const isLast  = i === STEPS.length-1;
                const circle  = done
                  ? `<div style="width:22px;height:22px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0;"><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="var(--accent-dim)" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg></div>`
                  : current && !myResp
                    ? `<div style="width:22px;height:22px;border-radius:50%;background:rgba(var(--warn-rgb),0.15);border:2px solid var(--warn);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:var(--warn);flex-shrink:0;">${i+1}</div>`
                    : `<div style="width:22px;height:22px;border-radius:50%;border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--muted);flex-shrink:0;">${i+1}</div>`;
                const lbl  = `<div style="font-size:10px;margin-top:3px;color:${done?'var(--accent)':current?'var(--warn)':'var(--muted)'};font-weight:${current?'600':'400'};white-space:nowrap;text-align:center;">${s}</div>`;
                const line = isLast ? '' : `<div style="flex:1;height:1.5px;background:${done?'var(--accent)':'var(--border)'};margin:0 2px;margin-bottom:12px;"></div>`;
                return `<div style="display:flex;flex-direction:column;align-items:center;">${circle}${lbl}</div>${line}`;
              }).join('')}
            </div>

            ${!myResp && inv.issue_description ? `<div style="font-size:11px;color:var(--muted);background:var(--surface2);border-radius:6px;padding:8px 10px;line-height:1.5;">${inv.issue_description.slice(0,160)}${inv.issue_description.length>160?'…':''}</div>` : ''}
            ${myResp ? `<div style="font-size:11px;color:var(--accent);">✓ You have submitted a response</div>` : `
            <div style="background:var(--surface2);border-radius:7px;padding:8px 12px;font-size:11px;color:var(--muted);margin-top:8px;">
              <strong style="color:var(--text);">Next:</strong> Inspect stock in your stores and submit your findings to ${mfrName}
            </div>`}
          </div>
          <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end;flex-shrink:0;">
            ${inv.deadline_at ? `<div style="font-size:10px;color:${new Date(inv.deadline_at)<new Date()?'var(--danger)':'var(--warn)'};">Due ${fmtDate(inv.deadline_at)}</div>` : ''}
            ${!myResp ? `<button onclick="openDashInvestResponse('${inv.id}')" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:9px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;">Submit response →</button>` : ''}
            <div style="font-size:10px;color:var(--muted);">${responses.length} response${responses.length!==1?'s':''}</div>
          </div>
        </div>
      </div>`;
    }

    el.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
        <div style="font-size:12px;color:var(--muted);">${invs.length} investigation${invs.length!==1?'s':''} — field inspection requests from your manufacturer partners.</div>
        ${needsResponse.length>0 ? `<div style="background:rgba(var(--warn-rgb),0.1);border:1px solid rgba(var(--warn-rgb),0.3);border-radius:8px;padding:8px 14px;font-size:12px;color:var(--warn);">⏱ ${needsResponse.length} awaiting your response</div>` : ''}
      </div>

      ${invs.length === 0 ? `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:52px 24px;text-align:center;">
          <div style="font-size:32px;margin-bottom:14px;">🔍</div>
          <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:8px;">No investigations yet</div>
          <div style="font-size:13px;color:var(--muted);max-width:380px;margin:0 auto;line-height:1.7;">When a manufacturer suspects a product issue and needs your stores to inspect stock, the request appears here.</div>
        </div>` : `

      ${needsResponse.length > 0 ? `
      <div style="margin-bottom:22px;">
        <div style="font-size:10px;font-weight:600;color:var(--warn);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Awaiting your response</div>
        ${needsResponse.map(inv => invProcessCard(inv)).join('')}
      </div>` : ''}

      ${responded.filter(i=>!closed.includes(i)).length > 0 ? `
      <div style="margin-bottom:22px;">
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Responded — awaiting manufacturer review</div>
        ${responded.filter(i=>!closed.includes(i)).map(inv => invProcessCard(inv)).join('')}
      </div>` : ''}

      ${closed.length > 0 ? `
      <div>
        <div style="font-size:10px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Closed</div>
        ${closed.map(inv => invProcessCard(inv)).join('')}
      </div>` : ''}
      `}`;

  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error: ${e.message}</div>`;
  }

  } catch(_renderErr) {
    console.error('[renderDashInvestigations]', _renderErr);
    if (_errEl) _errEl.innerHTML += `<div style="margin:20px 0;padding:16px;background:rgba(var(--danger-rgb),0.08);border:1px solid rgba(var(--danger-rgb),0.2);border-radius:10px;font-size:12px;color:var(--muted);font-family:'DM Mono',monospace;"><strong style="color:var(--danger);">Error loading Investigations</strong><br>${_renderErr.message}</div>`;
  }
}

// ── Investigation response form ───────────────────────────────
let _dashInvestPhotos = [];

async function openDashInvestResponse(invId) {
  document.getElementById('dash-invest-resp-modal')?.remove();

  const { data: inv } = await sb.from('investigation_requests').select('*').eq('id', invId).single();
  if (!inv) { showToast('Investigation not found', 'error', 3000); return; }

  // Defence in depth: only allow access if the user is either the manufacturer
  // who created the investigation OR a retailer with an active trading
  // partnership with that manufacturer. Without this check, RLS gaps could
  // expose investigation details (potentially manufacturer-private fields) to
  // a user who has no business relationship with the originating manufacturer.
  if (inv.manufacturer_id !== _orgId) {
    const { data: partnership } = await sb.from('trading_partners')
      .select('id')
      .eq('retailer_id', _orgId)
      .eq('manufacturer_id', inv.manufacturer_id)
      .eq('status', 'active')
      .limit(1);
    if (!partnership || !partnership.length) {
      showToast("You don't have access to this investigation.", 'error', 4000);
      return;
    }
  }

  const { data: stores } = await sb.from('stores').select('id,name').eq('organisation_id', _orgId).eq('active', true).order('name');
  _dashInvestPhotos = [];

  const modal = document.createElement('div');
  modal.id = 'dash-invest-resp-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(4,12,14,0.92);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';

  const issueLabels = { foreign_object:'Adulteration (foreign object in product)', mold:'Mold / spoilage', mislabeling:'Mislabeling', allergen:'Allergen concern', contamination:'Contamination', discoloration:'Discoloration', pest:'Pest', packaging:'Packaging defect', other:'Other' };

  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:18px;width:100%;max-width:580px;max-height:90vh;overflow-y:auto;">
      <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;">
        <div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);">Submit investigation response</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${inv.product_name} · ${issueLabels[inv.issue_type]||inv.issue_type}</div>
          ${inv.issue_description ? `<div style="font-size:11px;color:var(--info);margin-top:6px;padding:8px 10px;background:rgba(var(--info-light-rgb),0.06);border-radius:6px;line-height:1.5;">${inv.issue_description}</div>` : ''}
          ${inv.instructions ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5;">📋 <strong>Instructions:</strong> ${inv.instructions}</div>` : ''}
        </div>
        <button onclick="document.getElementById('dash-invest-resp-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
      </div>

      <div style="padding:22px 26px;display:flex;flex-direction:column;gap:14px;">
        <div>
          <label style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:0.07em;color:var(--muted);display:block;margin-bottom:8px;">Did you find the issue? *</label>
          <div style="display:flex;gap:10px;">
            <button id="inv-r-yes" onclick="dashSetInvestFound(true)" style="flex:1;padding:11px;border:2px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:13px;font-family:'Figtree',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s;">✓ Yes, found it</button>
            <button id="inv-r-no"  onclick="dashSetInvestFound(false)" style="flex:1;padding:11px;border:2px solid var(--border);border-radius:9px;background:transparent;color:var(--muted);font-size:13px;font-family:'Figtree',sans-serif;font-weight:600;cursor:pointer;transition:all 0.15s;">✗ Not found</button>
          </div>
          <input type="hidden" id="inv-r-found" value="">
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Store *</label>
          <select id="inv-r-store" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;">
            <option value="">— Select store —</option>
            ${(stores||[]).map(s=>`<option value="${s.id}" data-name="${s.name}">${s.name}</option>`).join('')}
          </select></div>
          <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Units inspected</label>
          <input id="inv-r-units" type="number" min="0" placeholder="e.g. 24" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>
        </div>

        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Units affected (if any found)</label>
        <input id="inv-r-affected" type="number" min="0" value="0" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>

        <div><label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Findings description *</label>
        <textarea id="inv-r-desc" rows="3" placeholder="Describe what you found, where, and current status…" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;resize:vertical;box-sizing:border-box;font-family:inherit;line-height:1.5;"></textarea></div>

        <div>
          <label style="font-size:11px;color:var(--muted);display:block;margin-bottom:5px;">Photos (optional — up to 4)</label>
          <input type="file" id="inv-r-photo-input" accept="image/*" multiple style="display:none;" onchange="dashHandleInvestPhotos(this)">
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:8px;" id="inv-r-photo-previews"></div>
          <button onclick="document.getElementById('inv-r-photo-input').click()" style="background:var(--surface2);border:1px dashed var(--border);border-radius:8px;padding:8px 14px;color:var(--muted);font-size:12px;cursor:pointer;">+ Add photo</button>
        </div>

        <div id="inv-r-msg" style="display:none;font-size:12px;padding:9px 12px;border-radius:8px;"></div>
        <div id="inv-intel-container"></div>

        <div style="display:flex;gap:8px;justify-content:flex-end;padding-top:4px;">
          <button onclick="document.getElementById('dash-invest-resp-modal').remove()" style="background:none;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
          <button onclick="submitDashInvestResponse('${invId}')" id="inv-r-submit" style="background:var(--accent);color:var(--accent-on-primary);border:none;border-radius:8px;padding:9px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Submit response</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(modal);
  // Load intelligence panel for this investigation's product
  if (inv.product_name || inv.lot_number) {
    setTimeout(() => renderIntelligencePanel('inv-intel-container', inv.product_name, inv.lot_number), 150);
  }
}

function dashSetInvestFound(found) {
  document.getElementById('inv-r-found').value = found ? 'yes' : 'no';
  const yes = document.getElementById('inv-r-yes');
  const no  = document.getElementById('inv-r-no');
  if (found) {
    yes.style.borderColor = 'var(--accent)'; yes.style.color = 'var(--accent)'; yes.style.background = 'rgba(var(--accent-rgb),0.08)';
    no.style.borderColor  = 'var(--border)'; no.style.color  = 'var(--muted)';  no.style.background  = 'transparent';
  } else {
    no.style.borderColor  = 'var(--accent)'; no.style.color  = 'var(--accent)'; no.style.background  = 'rgba(var(--accent-rgb),0.08)';
    yes.style.borderColor = 'var(--border)'; yes.style.color = 'var(--muted)';  yes.style.background = 'transparent';
  }
}

function dashHandleInvestPhotos(input) {
  const files = Array.from(input.files).slice(0, 4 - _dashInvestPhotos.length);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = e => {
      _dashInvestPhotos.push(e.target.result.split(',')[1]);
      const prev = document.getElementById('inv-r-photo-previews');
      if (prev) {
        const idx = _dashInvestPhotos.length - 1;
        const div = document.createElement('div');
        div.style.cssText = 'position:relative;width:64px;height:64px;';
        div.innerHTML = `<img src="${e.target.result}" style="width:64px;height:64px;object-fit:cover;border-radius:8px;border:1px solid var(--border);" alt="Product scan photo">
          <button onclick="_dashInvestPhotos.splice(${idx},1);this.parentElement.remove()" style="position:absolute;top:-6px;right:-6px;background:var(--danger);border:none;color:#fff;border-radius:50%;width:18px;height:18px;font-size:11px;cursor:pointer;line-height:1;">✕</button>`;
        prev.appendChild(div);
      }
    };
    reader.readAsDataURL(file);
  });
  input.value = '';
}

async function submitDashInvestResponse(invId) {
  const found    = document.getElementById('inv-r-found').value;
  const storeEl  = document.getElementById('inv-r-store');
  const storeId  = storeEl?.value;
  const storeName = storeEl?.selectedOptions?.[0]?.dataset?.name || storeEl?.selectedOptions?.[0]?.textContent;
  const units    = parseInt(document.getElementById('inv-r-units')?.value) || 0;
  const affected = parseInt(document.getElementById('inv-r-affected')?.value) || 0;
  const desc     = document.getElementById('inv-r-desc')?.value.trim();
  const msg      = document.getElementById('inv-r-msg');
  const btn      = document.getElementById('inv-r-submit');

  const showMsg = (txt, ok) => {
    msg.style.display='block'; msg.style.background=ok?'rgba(var(--accent-rgb),0.1)':'rgba(var(--danger-rgb),0.1)';
    msg.style.color=ok?'var(--accent)':'var(--danger)'; msg.style.border=`1px solid ${ok?'rgba(var(--accent-rgb),0.3)':'rgba(var(--danger-rgb),0.3)'}`;
    msg.textContent=txt;
  };

  if (!found)   { showMsg('Please indicate whether the issue was found.', false); return; }
  if (!storeId) { showMsg('Please select a store.', false); return; }
  if (!desc)    { showMsg('Please describe your findings.', false); return; }

  btn.disabled = true; btn.textContent = 'Submitting…';

  const { data: { user } } = await sb.auth.getUser();

  const { error } = await sb.from('investigation_responses').insert({
    investigation_id: invId,
    retailer_org_id:  _orgId,
    store_id:         storeId,
    store_name:       storeName,
    responder_user_id: user?.id,
    responder_name:   user?.user_metadata?.first_name || user?.email?.split('@')[0] || 'Unknown',
    units_inspected:  units,
    units_affected:   affected,
    issue_found:      found === 'yes',
    issue_description: desc,
    photos:           _dashInvestPhotos.length > 0 ? _dashInvestPhotos : [],
    status: 'submitted',
  });

  if (error) { showMsg('Error: ' + error.message, false); btn.disabled=false; btn.textContent='Submit response'; return; }

  // Mark investigation as in_progress if still open. Errors here aren't fatal
  // for the user (their response is already submitted above), but log to console
  // so the silent-failure pattern doesn't hide a broken status update.
  const { error: invUpdErr } = await sb.from('investigation_requests')
    .update({ status: 'in_progress' })
    .eq('id', invId)
    .eq('status', 'open');
  if (invUpdErr) console.warn('[invest] status update to in_progress failed:', invUpdErr.message);

  document.getElementById('dash-invest-resp-modal').remove();
  showToast('Response submitted successfully', 'ok', 3000);
  renderDashInvestigations();
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// GAP 4: DRILL COMPLIANCE REPORT GENERATOR
// ═══════════════════════════════════════════════════════════════

async function generateDrillReport(drillId) {
  // Show loading
  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.textContent = '…'; btn.disabled = true; }

  try {
    // Fetch all drills or a specific one
    let drillsQuery = sb.from('mock_recall_drills')
      .select('id, started_at, recall_event_id, initiated_by_org')
      .eq('initiated_by_org', _orgId)
      .order('started_at', { ascending: false });
    if (drillId) drillsQuery = drillsQuery.eq('id', drillId);
    else drillsQuery = drillsQuery.gte('started_at', new Date(Date.now() - 365*86400000).toISOString());

    const { data: drills } = await drillsQuery;
    if (!drills?.length) { if (btn) { btn.textContent = origText; btn.disabled = false; } showToast('No drill data found', 'error', 3000); return; }

    // Enrich with recall_event data
    const evIds = drills.map(d => d.recall_event_id).filter(Boolean);
    let evMap = {};
    if (evIds.length) {
      const { data: evs } = await sb.from('recall_events')
        .select('id, product_name, lot_number, reason, severity, published_at, source_org_id')
        .in('id', evIds);
      (evs||[]).forEach(e => { evMap[e.id] = e; });
    }

    // Fetch acks for all drill events
    let ackMap = {};
    if (evIds.length) {
      const { data: acksData } = await sb.from('recall_acknowledgements')
        .select('recall_event_id, store_id, status, acknowledged_at, created_at, stores(name)')
        .in('recall_event_id', evIds)
        .eq('organisation_id', _orgId);
      (acksData||[]).forEach(a => {
        if (!ackMap[a.recall_event_id]) ackMap[a.recall_event_id] = [];
        ackMap[a.recall_event_id].push(a);
      });
    }

    // Org info
    const { data: org } = await sb.from('organisations').select('name, contact_email, region').eq('id', _orgId).single();

    // Build report HTML
    const isUS = _orgRegion === 'us';
    const regRef = isUS ? 'FDA FSMA Section 204 / 21 CFR 117' : 'EU Regulation 178/2002 / Mattilsynet';
    const today = new Date().toLocaleDateString(_dashLocale(), { day:'numeric', month:'long', year:'numeric' });

    const drillSections = drills.map(d => {
      const ev = evMap[d.recall_event_id] || {};
      const acks = ackMap[d.recall_event_id] || [];
      const confirmed = acks.filter(a => a.status === 'confirmed').length;
      const pulled    = acks.filter(a => ['pulled','disposed','confirmed'].includes(a.status)).length;
      const total     = acks.length;
      const pct       = total > 0 ? Math.round((confirmed/total)*100) : 0;
      const drillDate = new Date(d.started_at).toLocaleDateString(_dashLocale(), {day:'numeric',month:'long',year:'numeric'});

      // Response time analysis: hours from row creation (notification) to acknowledgement.
      const responseTimes = acks
        .filter(a => a.acknowledged_at && a.created_at)
        .map(a => (new Date(a.acknowledged_at) - new Date(a.created_at)) / 3600000);
      const avgHours = responseTimes.length
        ? (responseTimes.reduce((s,v) => s+v, 0) / responseTimes.length).toFixed(1)
        : '—';

      return `
        <div style="margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid #ddd;">
          <h3 style="font-size:14px;color:#111;margin:0 0 4px;">Drill: ${ev.product_name || 'Unknown product'}</h3>
          <div style="font-size:11px;color:#666;margin-bottom:14px;">${drillDate} · Lot: ${ev.lot_number || '—'} · ${ev.severity || 'Simulated'} severity · Reason: ${ev.reason || 'Mock drill exercise'}</div>
          <table style="width:100%;border-collapse:collapse;margin-bottom:12px;">
            <thead><tr style="background:#f5f5f5;">
              <th style="text-align:left;padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#555;border-bottom:1px solid #ddd;">Store</th>
              <th style="text-align:left;padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#555;border-bottom:1px solid #ddd;">Status</th>
              <th style="text-align:left;padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;color:#555;border-bottom:1px solid #ddd;">Acknowledged</th>
            </tr></thead>
            <tbody>
              ${total === 0
                ? `<tr><td colspan="3" style="padding:10px;font-size:11px;color:#888;font-style:italic;">No store acknowledgement records for this drill.</td></tr>`
                : acks.map(a => `
                  <tr style="border-bottom:1px solid #eee;">
                    <td style="padding:7px 10px;font-size:11px;">${a.stores?.name || '—'}</td>
                    <td style="padding:7px 10px;font-size:11px;">
                      <span style="padding:2px 8px;border-radius:10px;background:${a.status==='confirmed'?'#d1fae5':a.status==='notified'?'#fef3c7':'#e0f2fe'};color:${a.status==='confirmed'?'#065f46':a.status==='notified'?'#d97706':'#0c4a6e'};font-size:10px;font-weight:600;">${a.status==='confirmed'?'Resolved':(a.status.charAt(0).toUpperCase()+a.status.slice(1))}</span>
                    </td>
                    <td style="padding:7px 10px;font-size:11px;color:#555;">${a.acknowledged_at ? fmtDashDT(a.acknowledged_at) : '—'}</td>
                  </tr>`).join('')}
            </tbody>
          </table>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:10px;">
            ${[
              {label:'Stores notified', val:total},
              {label:'Product pulled', val:pulled},
              {label:'Fully confirmed', val:confirmed},
              {label:'Completion rate', val:pct+'%'},
            ].map(s => `<div style="background:#f9f9f9;border:1px solid #eee;border-radius:6px;padding:10px 12px;text-align:center;">
              <div style="font-size:20px;font-weight:700;color:#111;">${s.val}</div>
              <div style="font-size:10px;color:#666;margin-top:2px;">${s.label}</div>
            </div>`).join('')}
          </div>
          <div style="margin-top:12px;padding:10px 14px;background:#f0fdf4;border-left:3px solid #34d399;font-size:11px;color:var(--accent-on-primary);">
            <strong>Assessment:</strong>
            ${pct === 100
              ? `All ${total} store${total!==1?'s':''} completed the full 5-step drill response chain. Recall procedures are functioning as required.`
              : pct >= 80
                ? `${confirmed} of ${total} stores completed the full response chain. ${total-confirmed} store${total-confirmed!==1?'s':''} did not reach confirmed status — review and follow up with non-compliant locations.`
                : `Only ${confirmed} of ${total} stores completed the full response chain. Recall procedures require improvement. Targeted retraining recommended for underperforming locations.`}
          </div>
        </div>`;
    }).join('');

    const html = `<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Recall Drill Compliance Report — ${org?.name || _orgName}</title>
<style>
  body { font-family: 'Helvetica Neue', Arial, sans-serif; font-size: 12px; color: #111; margin: 0; padding: 32px 48px; max-width: 800px; }
  @media print { body { padding: 20px; } .no-print { display: none; } @page { margin: 20mm; } }
  h1 { font-size: 22px; color: #111; margin: 0 0 4px; }
  h2 { font-size: 15px; color: #333; margin: 24px 0 8px; border-bottom: 2px solid #34d399; padding-bottom: 6px; }
  .header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; padding-bottom: 16px; border-bottom: 2px solid #111; }
  .logo { font-weight: 800; font-size: 18px; color: #34d399; }
  .meta { font-size: 11px; color: #666; text-align: right; line-height: 1.7; }
  .summary-box { background: #f9f9f9; border: 1px solid #ddd; border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .summary-item { text-align: center; }
  .summary-item .val { font-size: 28px; font-weight: 800; color: #111; }
  .summary-item .lbl { font-size: 10px; color: #666; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.05em; }
  .footer { margin-top: 32px; padding-top: 16px; border-top: 1px solid #ddd; font-size: 10px; color: #999; display: flex; justify-content: space-between; }
  .disclaimer { font-size: 10px; color: #888; background: #fafafa; border: 1px solid #eee; border-radius: 6px; padding: 10px 14px; margin-top: 20px; line-height: 1.6; }
</style>
</head>
<body>
  <div class="no-print" style="background:#34d399;color:var(--accent-on-primary);padding:10px 16px;border-radius:8px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">
    <span style="font-weight:700;">Recall Drill Compliance Report — ready to print or save as PDF</span>
    <button onclick="window.print()" style="background:#065f46;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-weight:700;cursor:pointer;">Print / Save PDF</button>
  </div>

  <div class="header">
    <div>
      <div class="logo">Batch'd</div>
      <h1 style="margin-top:6px;">Recall Drill Compliance Report</h1>
      <div style="font-size:12px;color:#555;margin-top:4px;">${org?.name || _orgName} · Generated ${today}</div>
    </div>
    <div class="meta">
      Regulatory reference: ${regRef}<br>
      Organisation: ${org?.name || _orgName}<br>
      Contact: ${org?.contact_email || '—'}<br>
      Report period: Last 12 months<br>
      Drills on record: ${drills.length}
    </div>
  </div>

  <div class="summary-box">
    <div class="summary-item">
      <div class="val">${drills.length}</div>
      <div class="lbl">Drills conducted</div>
    </div>
    <div class="summary-item">
      <div class="val">${Object.values(ackMap).reduce((s,a) => s+a.filter(x=>x.status==='confirmed').length, 0)}</div>
      <div class="lbl">Store completions</div>
    </div>
    <div class="summary-item">
      <div class="val">${drills.length >= 1 ? '<span style="color:var(--accent-on-primary);">✓</span>' : '<span style="color:#dc2626;">✗</span>'}</div>
      <div class="lbl">Annual drill requirement</div>
    </div>
  </div>

  <h2>Executive Summary</h2>
  <p style="line-height:1.7;color:#333;">
    ${org?.name || _orgName} has conducted <strong>${drills.length} mock recall drill${drills.length!==1?'s':''}</strong>
    in the past 12 months. ${drills.length >= 1
      ? `This satisfies the ${isUS?'FDA-recommended':'industry best practice'} requirement for at least one annual recall readiness exercise.`
      : `This does not satisfy the ${isUS?'FDA-recommended':'industry best practice'} requirement for annual recall readiness exercises. A drill should be conducted as soon as possible.`}
    Drills were executed using the Batch'd manufacturer recall push network, distributing simulated recall alerts to connected retail stores and tracking acknowledgement through a 5-step confirmation chain (Notified → Acknowledged → Pulled → Disposed → Confirmed).
  </p>

  <h2>Drill Details</h2>
  ${drillSections}

  <div class="disclaimer">
    <strong>Note:</strong> This report is generated from traceability records maintained in the Batch'd platform. It documents the organisation's recall readiness exercises as required under ${regRef}.
    Notification to regulatory authorities, adherence to retention deadlines, and all legal compliance responsibility remain with ${org?.name || _orgName}.
    This document does not constitute legal advice and should be reviewed by qualified food safety or legal counsel before submission to regulatory bodies.
  </div>

  <div class="footer">
    <span>Batch'd · batchd.no · Confidential — ${org?.name || _orgName} internal use</span>
    <span>Generated ${today} · ${window.location.hostname}</span>
  </div>
</body>
</html>`;

    // Open in new window for print/save
    const win = window.open('', '_blank');
    win.document.write(injectPrintButton(html));
    win.document.close();

  } catch(e) {
    showToast('Error generating report: ' + e.message, 'error', 4000);
    console.error('generateDrillReport error:', e);
  } finally {
    if (btn) { btn.textContent = origText; btn.disabled = false; }
  }
}



// ── Mock recall drill certificate ──────────────────────────────
// Generates a printable certificate of completion for a drill event
async function generateDrillCertificate(recallEventId) {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Generating…'; }

  try {
    // Audit fix (2026-05-07): coordinator info is org-level, not user-level.
    // Previously this queried user_settings.recall_coordinator_*, which is
    // keyed by user_id; .eq('organisation_id', _orgId).limit(1) picked an
    // arbitrary user's coordinator instead of the org's. The org-level
    // coordinator lives on organisations.recall_coordinator_name/contact —
    // matches the loadComplianceData query pattern at line ~4527.
    const [evRes, acksRes, orgRes] = await Promise.all([
      sb.from('recall_events').select('*').eq('id', recallEventId).single(),
      sb.from('recall_acknowledgements')
        .select('id, status, acknowledged_at, created_at, stores(name)')
        .eq('recall_event_id', recallEventId)
        .eq('organisation_id', _orgId),
      sb.from('organisations').select('name, contact_email, region, recall_coordinator_name, recall_coordinator_contact').eq('id', _orgId).single(),
    ]);
    const coordRes = { data: [orgRes.data || {}] };  // shim — keeps downstream coord shape consistent

    const ev     = evRes.data;
    const acks   = acksRes.data  || [];
    const org    = orgRes.data   || {};
    const coord  = coordRes.data?.[0] || {};

    if (!ev) { showToast('Drill event not found', 'error', 3000); return; }

    const confirmed   = acks.filter(a => a.status === 'confirmed').length;
    const total       = acks.length;
    const pct         = total > 0 ? Math.round((confirmed / total) * 100) : 0;
    const passed      = pct >= 80;

    // Response time: from first ack created_at to last confirmed
    const ackTimes   = acks.filter(a => a.acknowledged_at).map(a => new Date(a.acknowledged_at));
    const startTime  = ev.published_at ? new Date(ev.published_at) : null;
    const lastConfirm = ackTimes.length ? new Date(Math.max(...ackTimes)) : null;
    const responseHours = startTime && lastConfirm
      ? ((lastConfirm - startTime) / 3600000).toFixed(1)
      : null;

    const isUS       = (org.region || _orgRegion) === 'us';
    const regRef     = isUS
      ? 'FDA FSMA Section 204 / 21 CFR 117.126'
      : 'EU Regulation 178/2002 Art. 19 / Matloven §16';
    const fmtDate = fmtDash;
const fmtDT      = d => d ? new Date(d).toLocaleString(_dashLocale(), {day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const drillDate  = fmtDate(ev.published_at || ev.created_at);
    const today      = fmtDate(new Date());

    // Unique cert reference
    const certRef = 'BATCHD-DRILL-' + recallEventId.slice(0,8).toUpperCase() + '-' + new Date(ev.published_at||Date.now()).getFullYear();

    const storeRows = acks.map(a => `
      <tr style="border-bottom:1px solid #f0f0f0;">
        <td style="padding:7px 12px;font-size:11px;color:#333;">${a.stores?.name || '—'}</td>
        <td style="padding:7px 12px;">
          <span style="display:inline-block;padding:2px 9px;border-radius:10px;font-size:10px;font-weight:700;
            background:${a.status==='confirmed'?'#d1fae5':a.status==='notified'?'#fef3c7':'#e0f2fe'};
            color:${a.status==='confirmed'?'#065f46':a.status==='notified'?'#d97706':'#0c4a6e'};">
            ${a.status.charAt(0).toUpperCase()+a.status.slice(1)}
          </span>
        </td>
        <td style="padding:7px 12px;font-size:11px;color:#555;">${fmtDT(a.acknowledged_at)}</td>
      </tr>`).join('');

    const html = `<!DOCTYPE html>

// Called after a complaint is saved — checks for patterns
// Also surfaces in the dashboard as a banner
async function checkComplaintPatterns(productName, orgId) {
  if (!productName || !orgId) return null;
  const cutoff = new Date(Date.now() - 30 * 86400000).toISOString();
  try {
    const { data: recent } = await sb.from('complaints')
      .select('id, product_name, triage_level, store_id, created_at, triage_category')
      .eq('receiving_org_id', orgId)
      .gte('created_at', cutoff)
      .ilike('product_name', `%${productName.split(' ')[0]}%`);

    if (!recent || recent.length < 2) return null;

    // Count unique stores
    const stores = new Set(recent.map(c => c.store_id).filter(Boolean));
    const criticalCount = recent.filter(c => c.triage_level === 'critical').length;

    // Pattern threshold: 2+ complaints, 2+ stores OR any critical
    if (stores.size >= 2 || (recent.length >= 2 && criticalCount > 0)) {
      return {
        product_name: productName,
        complaint_count: recent.length,
        store_count: stores.size,
        has_critical: criticalCount > 0,
        complaint_ids: recent.map(c => c.id),
      };
    }
  } catch(e) {
    console.warn('checkComplaintPatterns error:', e);
  }
  return null;
}

// Renders pattern alert banners in the complaint triage panel
async function renderPatternAlerts() {
  const _errEl = document.getElementById('main-content');
  try {

  const el = document.getElementById('pattern-alerts-container');
  if (!el) return;

  const cutoff = new Date(Date.now() - 30 * 86400000).toISOString();
  try {
    const { data: complaints } = await sb.from('complaints')
      .select('product_name, store_id, triage_level, created_at')
      .eq('receiving_org_id', _orgId)
      .gte('created_at', cutoff)
      .not('product_name', 'is', null);

    if (!complaints?.length) { el.innerHTML = ''; return; }

    // Group by first word of product name (rough clustering)
    const groups = {};
    complaints.forEach(c => {
      const key = c.product_name.trim().toLowerCase().split(/\s+/).slice(0,2).join(' ');
      if (!groups[key]) groups[key] = { name: c.product_name, items: [] };
      groups[key].items.push(c);
    });

    const patterns = Object.values(groups).filter(g => {
      const stores = new Set(g.items.map(i => i.store_id).filter(Boolean));
      const hasCritical = g.items.some(i => i.triage_level === 'critical');
      return (g.items.length >= 2 && stores.size >= 2) || (g.items.length >= 2 && hasCritical);
    });

    if (!patterns.length) { el.innerHTML = ''; return; }

    el.innerHTML = patterns.map(p => {
      const stores = new Set(p.items.map(i => i.store_id).filter(Boolean));
      const hasCritical = p.items.some(i => i.triage_level === 'critical');
      return `
        <div style="display:flex;align-items:flex-start;gap:12px;padding:12px 16px;background:${hasCritical?'rgba(var(--danger-rgb),0.08)':'rgba(var(--warn-rgb),0.07)'};border:1px solid ${hasCritical?'rgba(var(--danger-rgb),0.3)':'rgba(var(--warn-rgb),0.25)'};border-radius:10px;margin-bottom:10px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${hasCritical?'var(--danger)':'var(--warn)'};flex-shrink:0;margin-top:4px;animation:blink 1.5s ease-in-out infinite;"></div>
          <div style="flex:1;">
            <div style="font-size:13px;font-weight:700;color:${hasCritical?'var(--danger)':'var(--warn)'};">
              ${hasCritical?'⚠ Pattern alert — critical complaints':'Pattern alert — multiple stores affected'}
            </div>
            <div style="font-size:12px;color:var(--text);margin-top:2px;">
              <strong>${p.name}</strong> — ${p.items.length} complaints across ${stores.size} store${stores.size!==1?'s':''} in the last 30 days
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:4px;">This may warrant a supplier investigation or proactive recall assessment.</div>
          </div>
          <button onclick="openInvestigationFromPattern('${encodeURIComponent(p.name)}')"
            style="background:${hasCritical?'rgba(var(--danger-rgb),0.15)':'rgba(var(--warn-rgb),0.12)'};border:1px solid ${hasCritical?'rgba(var(--danger-rgb),0.4)':'rgba(var(--warn-rgb),0.35)'};color:${hasCritical?'var(--danger)':'var(--warn)'};border-radius:7px;padding:7px 12px;font-size:11px;font-weight:700;cursor:pointer;flex-shrink:0;font-family:inherit;white-space:nowrap;">
            Raise investigation →
          </button>
        </div>`;
    }).join('');
  } catch(e) {
    console.warn('renderPatternAlerts error:', e);
  }

  } catch(_renderErr) {
    console.error('[renderPatternAlerts]', _renderErr);

let _consumerNotifRecallId = null;

async function renderConsumerNotification() {
  const _errEl = document.getElementById('main-content');
  try {

  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading recalls…</div>`;

  try {
    // Load active recalls distributed to this org
    const { data: dists } = await sb.from('recall_distributions')
      .select('recall_event_id, distributed_at')
      .eq('retailer_org_id', _orgId);

    let recallEvents = [];
    if (dists?.length) {
      const evIds = [...new Set(dists.map(d => d.recall_event_id))];
      const { data: evs } = await sb.from('recall_events')
        .select('id, product_name, lot_number, severity, reason, published_at, is_drill')
        .in('id', evIds)
        .eq('is_drill', false)
        .order('published_at', { ascending: false });
      recallEvents = evs || [];
    }

    // Manual recalls: only active ones created by this org (not RASFF/FDA imports)
    // Limit to last 90 days to avoid showing stale/imported data
    const ninetyDaysAgo = new Date(Date.now() - 90 * 86400000).toISOString();
    const { data: manualRecalls } = await sb.from('recalls')
      // is_pushed and recall_event_id removed — neither column exists on the
      // live recalls schema (same hotfix as the line ~2105 SELECT). Manual
      // recalls page deduplication still works via the product+lot key set
      // built below; the dropped fields weren't load-bearing.
      .select('id, product_name, lot_number, active, created_at, source')
      .eq('organisation_id', _orgId)
      .eq('active', true)
      .not('source', 'in', '("fda","rasff","FDA","RASFF")')
      .gte('created_at', ninetyDaysAgo)
      .order('created_at', { ascending: false }).limit(100);

    // Deduplicate: exclude manual recalls that are already represented by a pushed recall_event
    const pushedKeys = new Set(recallEvents.map(e =>
      (e.product_name||'').toLowerCase() + '|' + (e.lot_number||'').toLowerCase()
    ));
    const dedupedManual = (manualRecalls||[]).filter(r => {
      // Round-7 correction: re-introduced legacy push dedup. These columns
      // DO exist on the recalls schema (~7 production rows from the retired
      // manufacturer-push flow). See SCHEMA.md "recalls" section.
      if (r.is_pushed || r.recall_event_id) return false;
      if (r.source === 'fda' || r.source === 'rasff') return false;
      const key = (r.product_name||'').toLowerCase() + '|' + (r.lot_number||'').toLowerCase();

    el.innerHTML = `
