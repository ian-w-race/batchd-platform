async function launchDrill() {
  const product = document.getElementById('drill-product')?.value?.trim();
  const lot     = document.getElementById('drill-lot')?.value?.trim();
  const reason  = document.getElementById('drill-reason')?.value?.trim();
  const msgEl   = document.getElementById('drill-msg');
  const setMsg  = (t, ok) => { if (msgEl) { msgEl.textContent=t; msgEl.style.cssText='display:block;padding:9px 12px;border-radius:6px;margin-bottom:12px;font-size:12px;background:'+(ok?'rgba(var(--accent-rgb),0.1)':'rgba(var(--danger-rgb),0.1)')+';color:'+(ok?'var(--accent)':'var(--danger)'); } };
  if (!product) { setMsg('Product name required', false); return; }

  const btn = document.querySelector('#drill-launcher-modal button[onclick="launchDrill()"]');
  if (btn) { btn.disabled=true; btn.textContent='Launching…'; }

  // Audit fix (#17): minimise the half-published window by inserting in this
  // order — recall_event → mock_recall_drills → distributions → acks. If a
  // step fails after the recall_event is created, attempt to delete the
  // recall_event so we don't leave a real-recall artifact in the wild.
  // (Distributions/acks have FKs to recall_event so a successful event delete
  // cascades; if cascade is configured restrictive, the cleanup deletes nothing
  // and the user sees the error. Either way safer than the previous order.)
  let createdRecallEventId = null;
  try {
    // Create recall_event with is_drill=true
    const { data: ev, error: evErr } = await sb.from('recall_events').insert({
      product_name: product, lot_number: lot||null, reason, is_drill: true,
      severity: document.getElementById('drill-severity')?.value || 'class_ii',
      source_org_id: _orgId,
      published_at: new Date().toISOString(),
    }).select().single();
    if (evErr) throw evErr;
    createdRecallEventId = ev.id;

    // Log in mock_recall_drills FIRST (right after recall_event). If a later
    // step fails, downstream "is this a drill?" detection that reads
    // mock_recall_drills still works correctly.
    const { error: drillErr } = await sb.from('mock_recall_drills').insert({
      recall_event_id: ev.id,
      initiated_by_org: _orgId,
      target_retailer_id: _orgId,
      started_at: new Date().toISOString(),
    });
    if (drillErr) throw drillErr;

    // Distribute to this retailer org
    const { error: distErr } = await sb.from('recall_distributions').insert({
      recall_event_id: ev.id, retailer_org_id: _orgId,
    });
    if (distErr) throw distErr;

    // Create acknowledgement records for all active stores.
    // Errors here are critical: without acks, stores have no rows to act on,
    // and the drill is in a half-published state (recall_event + distribution exist
    // but no actionable per-store records). Surface to the catch so the user knows.
    const { data: stores } = await sb.from('stores').select('id, name').eq('organisation_id', _orgId).eq('active', true);
    if (stores?.length) {
      const acks = stores.map(s => ({
        recall_event_id: ev.id, organisation_id: _orgId,
        store_id: s.id, status: 'notified', created_at: new Date().toISOString(),
      }));
      const { error: acksErr } = await sb.from('recall_acknowledgements').insert(acks);
      if (acksErr) throw acksErr;
    }

    setMsg('✓ Drill launched — ' + (stores?.length||0) + ' store' + ((stores?.length||0)!==1?'s':'') + ' notified', true);
    // Update button to a clear "done" state immediately rather than leaving it
    // disabled with "Launching…" until the timeout. Prevents user confusion if
    // they dismiss the modal before the auto-close fires.
    if (btn) { btn.textContent = '✓ Launched'; }
    setTimeout(() => {
      document.getElementById('drill-launcher-modal')?.remove();
      _recallsTab = 'active';
      renderRecalls();
    }, 1500);
  } catch(e) {
    setMsg('Error: ' + e.message, false);
    // Best-effort rollback: if a step failed after recall_event was created,
    // try to delete the recall_event. This depends on FK cascade behaviour
    // (mock_recall_drills, recall_distributions, recall_acknowledgements all
    // have FKs to recall_events). If the delete itself fails (e.g. cascade is
    // RESTRICT), we leave the partial state and the user knows the operation
    // failed — same outcome as before, just with one more attempt to recover.
    if (createdRecallEventId) {
      try {
        await sb.from('recall_events').delete().eq('id', createdRecallEventId);
      } catch(cleanupErr) {
        console.warn('[launchDrill] cleanup failed after error:', cleanupErr?.message);
      }
    }
    if (btn) { btn.disabled=false; btn.textContent='Launch drill →'; }
  }
}

async function saveManualRecall() {
  const product  = document.getElementById('new-recall-product')?.value?.trim();
  const lot      = document.getElementById('new-recall-lot')?.value?.trim();
  const barcode  = document.getElementById('new-recall-barcode')?.value?.trim();
  const severity = document.getElementById('new-recall-severity')?.value;
  const source   = document.getElementById('new-recall-source')?.value;
  const desc     = document.getElementById('new-recall-description')?.value?.trim();
  const msgEl    = document.getElementById('add-recall-msg');
  const setMsg   = (t, ok) => { if (msgEl) { msgEl.textContent=t; msgEl.style.cssText='display:block;padding:9px 12px;border-radius:6px;margin-bottom:12px;font-size:12px;background:'+(ok?'rgba(var(--accent-rgb),0.1)':'rgba(var(--danger-rgb),0.1)')+';color:'+(ok?'var(--accent)':'var(--danger)'); } };
  if (!product)  { setMsg('Product name is required', false); return; }
  if (!lot)      { setMsg('Lot number is required', false); return; }

  const btn = document.querySelector('button[onclick="saveManualRecall()"]');
  if (btn) { btn.disabled=true; btn.textContent='Saving…'; }

  // Audit fix (#12, #11-severity): capture the new recall id so we can run
  // a retroactive sweep, and persist the severity the form collected.
  // Round-7 correction: recalls.severity does NOT exist on the schema —
  // a previous fix wrote insertPayload.severity which would have caused a
  // 42703 column-does-not-exist error on insert. Fold severity into the
  // description text the same way mgrAddRecall (scanning app) does, so the
  // value is preserved and visible in audit logs without a schema change.
  const descParts = [];
  if (desc)     descParts.push(desc);
  if (severity) descParts.push(`Severity: ${severity}`);
  const insertPayload = {
    product_name: product, lot_number: lot, barcode_number: barcode||null,
    description: descParts.length ? descParts.join(' · ') : null,
    source: source||'manual', active: true,
    organisation_id: _orgId,
  };
  const { data: inserted, error } = await sb.from('recalls')
    .insert(insertPayload)
    .select('id').single();

  if (error) {
    setMsg(error.message, false);
    if (btn) { btn.disabled=false; btn.textContent='Create recall'; }
    return;
  }

  // Audit fix (#12): retroactively match this recall against existing scans
  // in the org. Without this sweep, only future scans would link via the
  // matchScanAgainstRecalls trigger, leaving on-shelf items invisible to the
  // active-recall counter until their next scan event.
  if (inserted?.id) {
    try {
      await sb.rpc('sweep_recall_matches', {
        p_recall_id:       inserted.id,
        p_organisation_id: _orgId,
        p_lookback_days:   180,
      });
    } catch(e) {
      console.warn('[saveManualRecall] sweep failed:', e?.message);
      // Don't block — the recall is created either way; sweep is best-effort.
    }
  }

  // Audit fix (#45): clear the form so a second click can't accidentally
  // duplicate the recall.
  ['new-recall-product','new-recall-lot','new-recall-barcode','new-recall-description'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });

  showToast('Recall created', 'ok', 3000);
  invalidateOverviewCache();
  _recallsTab = 'active';
  renderRecalls();
}


// ═══════════════════════════════════════════════════════════════
// ── Guided Recall Composer (v1 — 2026-05) ─────────────────────
// ═══════════════════════════════════════════════════════════════
// Full-page 4-step flow reached from the dashboard hero "Push a
// Recall" button. Replaces the legacy 6-field form as the front
// door for initiating recalls. The legacy "Add a recall manually"
// tab on the Recalls panel is preserved as the quick-add path
// (e.g. for externally-originated recalls you only need to track).
//
// Architecture:
//   - State lives in module-level _composerState; reset on entry
//   - Each step renders into #main-content via renderRecallComposer
//   - "Back" / "Continue" mutate state.step then re-render
//   - Step 1 triggers an async lookup against scans to surface
//     distribution scope ("23 stores, latest scan 5d ago")
//   - Step 4 generates a print-friendly HTML coordination sheet
//     in a new tab AND inserts the recall (same payload shape as
//     saveManualRecall — strategy fields folded into description)
//
// Schema note: this writes to the existing recalls table only.
// No new columns. Recall strategy data (depth, public warning,
// effectiveness level) is appended to the description text so the
// data is recoverable later when a v2 migration adds proper columns.
// ═══════════════════════════════════════════════════════════════

let _composerState = null;

function openRecallComposer() {
  // Reset state on every entry — no half-finished draft persistence in v1
  _composerState = {
    step: 1,
    product: '', lot: '', barcode: '',
    severity: 'unknown', hazardType: '', reason: '',
    depth: 'retail', publicWarning: false, effectiveness: 'B',
    // Populated by _composerLookupDistribution after Step 1 entry
    scope: null,        // { stores: [{id,name,latest,units}], totalStores, totalUnits, latestScanAt }
    scopeLoading: false,
    scopeError: null,
  };
  showPanel('recall-composer');
}

function renderRecallComposer() {
  if (!_composerState) {
    // Direct deep-link hit without going through openRecallComposer —
    // initialise state with defaults
    _composerState = {
      step: 1, product:'', lot:'', barcode:'',
      severity:'unknown', hazardType:'', reason:'',
      depth:'retail', publicWarning:false, effectiveness:'B',
      scope:null, scopeLoading:false, scopeError:null,
    };
  }
  const el = document.getElementById('main-content');
  if (!el) return;
  const s = _composerState;

  // Stepper header — visible on all steps
  const STEPS = [
    { n:1, label:'Identify' },
    { n:2, label:'Classify' },
    { n:3, label:'Strategy' },
    { n:4, label:'Review' },
  ];
  const stepper = `
    <div style="display:flex;align-items:center;gap:0;margin-bottom:22px;flex-wrap:wrap;">
      ${STEPS.map((st, i) => {
        const done = s.step > st.n, current = s.step === st.n;
        const dotBg = done ? 'var(--accent)' : current ? 'var(--accent)' : 'var(--surface2)';
        const dotColor = (done || current) ? 'var(--accent-on-primary)' : 'var(--muted)';
        const lineColor = done ? 'var(--accent)' : 'var(--border)';
        const labelColor = current ? 'var(--text)' : done ? 'var(--muted)' : 'var(--muted)';
        return `
          <div style="display:flex;align-items:center;gap:8px;">
            <div style="width:26px;height:26px;border-radius:50%;background:${dotBg};color:${dotColor};display:inline-flex;align-items:center;justify-content:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;border:1px solid ${current ? 'var(--accent)' : 'transparent'};">${done ? '✓' : st.n}</div>
            <div style="font-family:'DM Mono',monospace;font-size:11px;color:${labelColor};letter-spacing:0.04em;text-transform:uppercase;font-weight:${current?'700':'500'};">${st.label}</div>
          </div>
          ${i < STEPS.length-1 ? `<div style="flex:1;height:1.5px;background:${lineColor};margin:0 12px;min-width:24px;"></div>` : ''}
        `;
      }).join('')}
    </div>`;

  // Back-to-dashboard + cancel row
  const topRow = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      <button onclick="_composerCancel()"
              style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;letter-spacing:0.02em;">
        ← Cancel and return to dashboard
      </button>
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;">
        Step ${s.step} of 4
      </div>
    </div>`;

  let stepHtml = '';
  if      (s.step === 1) stepHtml = _composerStep1Identify(s);
  else if (s.step === 2) stepHtml = _composerStep2Classify(s);
  else if (s.step === 3) stepHtml = _composerStep3Strategy(s);
  else if (s.step === 4) stepHtml = _composerStep4Review(s);

  el.innerHTML = `
    <div style="max-width:760px;margin:0 auto;">
      ${topRow}
      ${stepper}
      ${stepHtml}
    </div>
  `;
}

function _composerCancel() {
  if (_composerState && (_composerState.product || _composerState.lot)) {
    if (!confirm('Cancel and discard this draft recall?')) return;
  }
  _composerState = null;
  showPanel('overview');
}

async function _composerLookupDistribution() {
  const s = _composerState;
  if (!s) return;
  const lot = (s.lot || '').trim();
  const barcode = (s.barcode || '').trim();
  if (!lot && !barcode) { s.scope = null; _composerRefreshScope(); return; }

  s.scopeLoading = true; s.scopeError = null;
  _composerRefreshScope();

  try {
    // Pull recent scans for this org. Filter client-side via lotsMatch so
    // fuzzy/prefix matches work the same as elsewhere in the dashboard.
    // Limit 1000 is generous for a single-org single-lot scope check.
    let q = sb.from('scans')
      .select('id, store_id, store_name, lot_number, barcode_number, created_at, removed_from_shelf_at')
      .eq('organisation_id', _orgId)
      .order('created_at', { ascending: false })
      .limit(1000);
    const { data, error } = await q;
    if (error) throw error;

    const matched = (data || []).filter(sc => {
      const lotHit = lot     && lotsMatch(sc.lot_number, lot);
      const bcHit  = barcode && sc.barcode_number && sc.barcode_number.trim() === barcode;
      return lotHit || bcHit;
    });
    // Only on-shelf scans count for "distribution scope" — removed scans
    // are no longer in inventory.
    const onShelf = matched.filter(sc => !sc.removed_from_shelf_at);

    // Group by store_id
    const byStore = {};
    let latest = null;
    onShelf.forEach(sc => {
      const sid = sc.store_id || sc.store_name || '__unknown';
      if (!byStore[sid]) byStore[sid] = { id: sid, name: sc.store_name || 'Unknown store', units: 0, latest: null };
      byStore[sid].units += 1;
      if (!byStore[sid].latest || new Date(sc.created_at) > new Date(byStore[sid].latest)) {
        byStore[sid].latest = sc.created_at;
      }
      if (!latest || new Date(sc.created_at) > new Date(latest)) latest = sc.created_at;
    });
    const stores = Object.values(byStore).sort((a,b) => (b.units - a.units));

    s.scope = {
      stores,
      totalStores: stores.length,
      totalUnits: onShelf.length,
      latestScanAt: latest,
    };
  } catch (e) {
    s.scopeError = e.message || 'unknown error';
    s.scope = null;
  } finally {
    s.scopeLoading = false;
    _composerRefreshScope();
  }
}

function _composerRefreshScope() {
  const target = document.getElementById('composer-scope');
  if (target) target.innerHTML = _composerScopeHtml(_composerState);
}

      <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:22px;">
        ${sevOpts.map(o => {

            ? (o.tone === 'danger' ? 'var(--danger)' : o.tone === 'warn' ? 'var(--warn)' : 'var(--accent)')

          return `
            <label style="display:flex;gap:12px;padding:14px 16px;background:${toneBg};border:1.5px solid ${toneBorder};border-radius:10px;cursor:pointer;align-items:flex-start;transition:border-color 0.15s,background 0.15s;">
              <input type="radio" name="composer-sev" value="${o.v}" ${selected?'checked':''}

            </label>`;
        }).join('')}
      </div>

      <div style="margin-bottom:18px;">
        <label style="display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Hazard type</label>
        <div style="display:flex;flex-wrap:wrap;gap:6px;">
          ${hazardOpts.map(o => {
            const sel = s.hazardType === o.v;
            return `<button type="button" onclick="_composerState.hazardType='${o.v}';renderRecallComposer()"
              style="font-family:'DM Mono',monospace;font-size:11px;padding:7px 13px;border-radius:8px;border:1px solid ${sel?'var(--accent)':'var(--border)'};background:${sel?'rgba(var(--accent-alt-rgb),0.1)':'var(--surface2)'};color:${sel?'var(--accent)':'var(--muted)'};cursor:pointer;letter-spacing:0.02em;">${esc(o.label)}</button>`;
          }).join('')}
        </div>
      </div>

      <div>
        <label style="display:block;font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:5px;">Reason / hazard description</label>

// ── Step 3: Strategy ──────────────────────────────────────────
function _composerStep3Strategy(s) {
  const depthOpts = [
    { v:'consumer',  title:'Consumer level',   sub:'Recover product from end consumers via public warning + retail pull. Required when product may have reached households.' },
    { v:'retail',    title:'Retail level',     sub:'Pull from retailer shelves before consumer purchase. Standard for in-store catch.' },
    { v:'wholesale', title:'Wholesale level',  sub:'Recover from distribution centres / wholesalers only — product has not reached retail shelves.' },
  ];
  // FDA-standard effectiveness check levels
  const effOpts = [
    { v:'A', title:'Level A — 100% of consignees', sub:'Class I recalls or where the recall message is critical' },
    { v:'B', title:'Level B — partial sample',     sub:'Default for Class II; Batch\'d audits 10–100% based on risk' },
    { v:'C', title:'Level C — 10% sample',         sub:'Class III / market withdrawals; low-risk verification' },
  ];
  // Auto-suggest public warning ON for Class I
  if (s.severity === 'class_i' && !s.publicWarning && !s._userOverrodePublicWarning) {
    s.publicWarning = true;
  }
  return `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 26px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:var(--text);margin-bottom:6px;">Recall strategy</div>

      <div style="margin-bottom:22px;">
        <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Recall depth</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${depthOpts.map(o => {
            const sel = s.depth === o.v;
            return `
              <label style="display:flex;gap:12px;padding:13px 15px;background:${sel?'rgba(var(--accent-alt-rgb),0.05)':'var(--surface2)'};border:1.5px solid ${sel?'var(--accent)':'var(--border)'};border-radius:10px;cursor:pointer;align-items:flex-start;">
                <input type="radio" name="composer-depth" value="${o.v}" ${sel?'checked':''}
                       onchange="_composerState.depth=this.value;renderRecallComposer()"
                       style="margin-top:3px;accent-color:var(--accent);" />
                <div style="flex:1;">
                  <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);margin-bottom:2px;">${esc(o.title)}</div>
                  <div style="font-size:11.5px;color:var(--muted);line-height:1.55;">${esc(o.sub)}</div>
                </div>
              </label>`;
          }).join('')}
        </div>
      </div>

      <div style="margin-bottom:22px;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;">
        <label style="display:flex;gap:12px;cursor:pointer;align-items:flex-start;">
          <input type="checkbox" ${s.publicWarning?'checked':''}
                 onchange="_composerState.publicWarning=this.checked;_composerState._userOverrodePublicWarning=true;"
                 style="margin-top:3px;accent-color:var(--accent);width:16px;height:16px;" />
          <div style="flex:1;">
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);margin-bottom:2px;">Public warning required</div>
            <div style="font-size:11.5px;color:var(--muted);line-height:1.55;">
              Issue a press release or other public notification (consumer-facing). Required for most Class I recalls where the product may have reached households. ${s.severity === 'class_i' ? '<strong style="color:var(--warn);">Recommended for this Class I recall.</strong>' : ''}
            </div>
          </div>
        </label>
      </div>

      <div>
        <div style="font-family:'DM Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Effectiveness check level</div>
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${effOpts.map(o => {
            const sel = s.effectiveness === o.v;
            return `
              <label style="display:flex;gap:12px;padding:13px 15px;background:${sel?'rgba(var(--accent-alt-rgb),0.05)':'var(--surface2)'};border:1.5px solid ${sel?'var(--accent)':'var(--border)'};border-radius:10px;cursor:pointer;align-items:flex-start;">
                <input type="radio" name="composer-eff" value="${o.v}" ${sel?'checked':''}
                       onchange="_composerState.effectiveness=this.value;renderRecallComposer()"
                       style="margin-top:3px;accent-color:var(--accent);" />
                <div style="flex:1;">
                  <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13.5px;color:var(--text);margin-bottom:2px;">${esc(o.title)}</div>
                  <div style="font-size:11.5px;color:var(--muted);line-height:1.55;">${esc(o.sub)}</div>
                </div>
              </label>`;
          }).join('')}
        </div>
      </div>
    </div>

    ${_composerNavRow(true, true, 'Continue to Review →')}

// ── Step 4: Review & push ─────────────────────────────────────
function _composerStep4Review(s) {
  const sevTitle = ({class_i:'Class I',class_ii:'Class II',class_iii:'Class III',market_withdrawal:'Market withdrawal'})[s.severity] || s.severity;
  const depthTitle = ({consumer:'Consumer level',retail:'Retail level',wholesale:'Wholesale level'})[s.depth] || s.depth;
  const effTitle = ({A:'Level A · 100% sample',B:'Level B · partial sample',C:'Level C · 10% sample'})[s.effectiveness] || s.effectiveness;
  const hazardLabel = ({allergen:'Undeclared allergen',contamination:'Microbial / pathogen contamination',foreign_object:'Adulteration (foreign object in product)',mislabeling:'Mislabeling / wrong product',chemical:'Chemical / heavy metal contamination',spoilage:'Spoilage / off-spec',packaging:'Packaging defect',other:'Other'})[s.hazardType] || s.hazardType;
  const scopeStr = s.scope
    ? (s.scope.totalStores > 0
        ? `${s.scope.totalStores} store${s.scope.totalStores===1?'':'s'} · ${s.scope.totalUnits} on-shelf scan${s.scope.totalUnits===1?'':'s'}`
        : 'No on-shelf matches in scan history')
    : 'Not checked';

  const row = (label, value) => `
    <div style="display:flex;justify-content:space-between;gap:16px;padding:9px 0;border-bottom:1px solid var(--border);">
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;">${esc(label)}</div>
      <div style="font-size:13px;color:var(--text);text-align:right;max-width:60%;line-height:1.5;">${value}</div>
    </div>`;

  return `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px 26px;margin-bottom:14px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:var(--text);margin-bottom:6px;">Review and push</div>
      <div style="font-size:12.5px;color:var(--muted);line-height:1.6;margin-bottom:18px;max-width:60ch;">

// ── Push recall — write to DB, redirect to Recalls panel ──────
async function _composerPushRecall() {
  const s = _composerState;
  if (!s) return;
  const btn = document.getElementById('composer-push-btn');
  if (btn) { btn.disabled = true; btn.style.opacity = '0.6'; btn.style.cursor = 'wait'; btn.innerHTML = 'Pushing…'; }

  // Fold strategy fields into description (same pattern saveManualRecall
  // uses for severity). Schema-stable across the existing recalls table.
  const descParts = [];
  if (s.reason) descParts.push(s.reason);
  if (s.severity)      descParts.push(`Severity: ${s.severity}`);
  if (s.hazardType)    descParts.push(`Hazard: ${s.hazardType}`);
  if (s.depth)         descParts.push(`Depth: ${s.depth}`);
  if (s.publicWarning) descParts.push('Public warning: yes');
  if (s.effectiveness) descParts.push(`Effectiveness: ${s.effectiveness}`);

  const insertPayload = {
    product_name:  s.product,
    lot_number:    s.lot,
    barcode_number: s.barcode || null,
    description:   descParts.join(' · '),
    source:        'manual',
    active:        true,
    organisation_id: _orgId,
  };

  try {
    const { data: inserted, error } = await sb.from('recalls')
      .insert(insertPayload)
      .select('id').single();
    if (error) throw error;

    // Retroactive sweep — same as saveManualRecall. Best-effort.
    if (inserted?.id) {
      try {
        await sb.rpc('sweep_recall_matches', {
          p_recall_id:       inserted.id,
          p_organisation_id: _orgId,
          p_lookback_days:   180,
        });
      } catch (sweepErr) {
        console.warn('[composer push] sweep failed:', sweepErr?.message);
      }
    }

    showToast('Recall pushed', 'ok', 3000);
    invalidateOverviewCache();
    _composerState = null;
    _recallsTab = 'active';
    showPanel('recalls');
  } catch (e) {
    showToast('Could not push recall: ' + (e.message || 'unknown error'), 'error', 5000);
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg> Push recall'; }
  }
}

// ═══════════════════════════════════════════════════════════════
// ── FDA 21 CFR 7.46 Recall Notification draft (v2 — 2026-05) ──
// ═══════════════════════════════════════════════════════════════
// Generates a draft FDA recall-notification document following the
// 21 CFR 7.46 firm-initiated recall framework. Auto-fills the
// sections where Batch'd has data (product ID, lot, distribution,
// hazard description, strategy) and uses clearly-marked
// _________________ placeholders for sections needing manual
// completion by a firm officer (firm contact details, supplier,
// production volume, communications log, etc.).
//
// Reachable from THREE surfaces:
//   1. Composer Step 4 — sibling button next to Coordination sheet
//   2. Live Recall Detail page — hero block next to FSMA 204 export
//   3. Manual recall cards (legacy Recalls panel Active/History) —
//      small "📋 FDA doc" button per card
//
// Output: print-friendly HTML A4 doc opened in a new tab. User
// prints to PDF themselves (same pattern as coordination sheet).
//
// CRITICAL: This is a DRAFT. The footnote on the generated doc
// makes clear that a firm officer must review and complete the
// placeholders before submission. Batch'd cannot warrant
// regulatory compliance of the final submission.

// ── Normalizer: composer state → FDA doc data shape ──────────
function _fdaDataFromComposer() {
  const s = _composerState;
  if (!s) return null;
  return {
    orgName: _orgName || 'Your organisation',
    productName: s.product || '',
    lotNumber: s.lot || '',
    barcode: s.barcode || '',
    severity: s.severity || 'unknown',
    hazardType: s.hazardType || '',
    reason: s.reason || '',
    depth: s.depth || 'retail',
    publicWarning: !!s.publicWarning,
    effectiveness: s.effectiveness || 'B',
    stores: (s.scope?.stores || []).map(st => ({ name: st.name, units: st.units, latest: st.latest })),
    totalStores: s.scope?.totalStores || 0,
    totalUnits: s.scope?.totalUnits || 0,
    initiatedAt: new Date(),
    status: 'Composing (not yet pushed)',
  };
}

// ── Normalizer: recalls row → FDA doc data shape ─────────────
// Used by the manual recall card button on the legacy Recalls
// panel. Re-queries by recall id so the doc reflects current
// state, not a stale closure capture.
async function _fdaDataFromManualRecall(recallId) {
  const { data: r, error } = await sb.from('recalls')
    .select('id, product_name, lot_number, barcode_number, description, source, active, created_at, organisation_id')
    .eq('id', recallId)
    .eq('organisation_id', _orgId)
    .single();
  if (error) throw error;

  // Strategy fields are folded into description text (Severity: X · Depth: Y · ...).
  // Extract them best-effort so the FDA doc renders structured values, not just
  // a wall of free text. Pattern matches what _composerPushRecall writes.
  const desc = r.description || '';
  const grab = (key) => {
    const m = new RegExp(key + ':\\s*([^·]+)', 'i').exec(desc);
    return m ? m[1].trim() : '';
  };
  const reasonOnly = desc.split(' · ').filter(p => !/^(Severity|Hazard|Depth|Public warning|Effectiveness):/i.test(p)).join(' · ');

  // Distribution scope from current scans matching this lot/barcode
  let stores = [], totalStores = 0, totalUnits = 0;
  try {
    const { data: scans } = await sb.from('scans')
      .select('store_id, store_name, lot_number, barcode_number, created_at, removed_from_shelf_at')
      .eq('organisation_id', _orgId)
      .is('removed_from_shelf_at', null)
      .limit(1000);
    const matched = (scans || []).filter(sc => {
      const lotHit = r.lot_number && lotsMatch(sc.lot_number, r.lot_number);
      const bcHit  = r.barcode_number && sc.barcode_number && sc.barcode_number.trim() === r.barcode_number.trim();
      return lotHit || bcHit;
    });
    const byStore = {};
    matched.forEach(sc => {
      const sid = sc.store_id || sc.store_name || '__unknown';
      if (!byStore[sid]) byStore[sid] = { name: sc.store_name || 'Unknown', units: 0, latest: null };
      byStore[sid].units += 1;
      if (!byStore[sid].latest || new Date(sc.created_at) > new Date(byStore[sid].latest)) byStore[sid].latest = sc.created_at;
    });
    stores = Object.values(byStore).sort((a,b) => b.units - a.units);
    totalStores = stores.length;
    totalUnits = matched.length;
  } catch (e) {
    console.warn('[FDA doc] scope query failed:', e?.message);
  }

  return {
    orgName: _orgName || 'Your organisation',
    productName: r.product_name || '',
    lotNumber: r.lot_number || '',
    barcode: r.barcode_number || '',
    severity: grab('Severity') || 'unknown',
    hazardType: grab('Hazard') || '',
    reason: reasonOnly || desc,
    depth: grab('Depth') || 'retail',
    publicWarning: /Public warning:\s*yes/i.test(desc),
    effectiveness: grab('Effectiveness') || 'B',
    stores, totalStores, totalUnits,
    initiatedAt: r.created_at ? new Date(r.created_at) : new Date(),
    status: r.active ? 'Active' : 'Resolved',
  };
}

// ── Normalizer: recall_events row → FDA doc data shape ───────
// Used by the Live Recall Detail page button. Joins ack rows
// for distribution scope (per-store unit counts come from
// units_pulled on recall_acknowledgements rather than scans,
// since this is post-push and the ack chain is the source
// of truth for distribution at this point).
async function _fdaDataFromRecallEvent(recallEventId) {
  const { data: ev, error } = await sb.from('recall_events')
    .select('id, product_name, lot_number, barcode, severity, reason, description, depth, public_warning, effectiveness, published_at, is_drill')
    .eq('id', recallEventId)
    .single();
  if (error) {
    // Migration-not-yet-run fallback — drop columns that may not exist on
    // older schemas (depth/public_warning/effectiveness are speculative; the
    // existing recall_events table doesn't have them yet, so a 42703 here is
    // expected on first deploy. Retry with a minimal column set.)
    if (error.code === '42703') {
      const retry = await sb.from('recall_events')
        .select('id, product_name, lot_number, barcode, severity, reason, description, published_at, is_drill')
        .eq('id', recallEventId)
        .single();
      if (retry.error) throw retry.error;
      Object.assign(ev || {}, retry.data || {});
    } else {
      throw error;
    }
  }

  // Pull ack rows joined with stores for distribution detail
  const { data: acks } = await sb.from('recall_acknowledgements')
    .select('id, status, units_pulled, units_pulled_confirmed_at, confirmed_at, stores(name, region, city, country)')
    .eq('recall_event_id', recallEventId)
    .eq('organisation_id', _orgId);

  const stores = (acks || []).map(a => ({
    name: a.stores?.name || 'Unknown store',
    units: a.units_pulled || 0,
    region: a.stores?.region || '',
    status: a.status,
  }));
  const totalStores = stores.length;
  const totalUnits  = stores.reduce((sum, s) => sum + (s.units || 0), 0);

  // Description on recall_events may hold the same packed format the composer
  // writes when source='manual'. Try to extract; fall back to ev.reason.
  const desc = ev.description || '';
  const grab = (key) => {
    const m = new RegExp(key + ':\\s*([^·]+)', 'i').exec(desc);
    return m ? m[1].trim() : '';
  };

  return {
    orgName: _orgName || 'Your organisation',
    productName: ev.product_name || '',
    lotNumber: ev.lot_number || '',
    barcode: ev.barcode || '',
    severity: ev.severity || grab('Severity') || 'unknown',
    hazardType: grab('Hazard') || '',
    reason: ev.reason || desc,
    depth: ev.depth || grab('Depth') || 'retail',
    publicWarning: ev.public_warning !== undefined ? !!ev.public_warning : /Public warning:\s*yes/i.test(desc),
    effectiveness: ev.effectiveness || grab('Effectiveness') || 'B',
    stores, totalStores, totalUnits,
    initiatedAt: ev.published_at ? new Date(ev.published_at) : new Date(),
    status: ev.is_drill ? 'Drill / not a real recall' : 'Live recall',
  };
}

// Audit fix (#13): mark a manual / feed recall as resolved from the dashboard.
// Previously the dashboard had no way to flip a recall's active=false — only
// the scanning app's mgrToggleRecall could do it. Manual recalls created here
// would accumulate as Active forever from a corp_admin's perspective.
async function resolveManualRecall(recallId, btn) {
  if (!recallId) return;
  if (!confirm('Mark this recall as resolved? It will move to the History tab and stop counting toward active recall metrics.')) return;
  if (btn) { btn.disabled = true; btn.textContent = '…'; }
  try {
    const { data, error } = await sb.from('recalls')
      .update({ active: false })
      .eq('id', recallId)
      .eq('organisation_id', _orgId)  // defence-in-depth alongside RLS
      .select('id');
    if (error) throw error;
    if (!data || !data.length) {
      showToast('Could not resolve — recall not found in your organisation.', 'error', 4000);
      if (btn) { btn.disabled = false; btn.textContent = 'Resolve'; }
      return;
    }
    showToast('Recall resolved', 'ok', 2500);
    invalidateOverviewCache();
    renderRecalls();
  } catch(e) {
    showToast('Could not resolve: ' + e.message, 'error', 4000);
    if (btn) { btn.disabled = false; btn.textContent = 'Resolve'; }
  }
}

async function sendRecallReminder(recallEventId, productName) {
  const btn = event?.target;
  if (btn) { btn.disabled = true; btn.textContent = 'Sending…'; }
  try {
    const res = await fetch('/.netlify/functions/recall-reminder', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ recallEventId, productName, orgId: _orgId }),

    const data = await res.json();
    showToast(data.sent > 0 ? `Reminder sent — ${data.pendingStores} store${data.pendingStores!==1?'s':''} notified` : 'No stores pending', 'ok', 3500);

    showToast('Could not send reminder: ' + e.message, 'error', 4000);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '📧 Remind'; }
  }
}

async function advanceAckStatus(ackId, status, recallEventId) {
  invalidateOverviewCache(); // recall ack changes overview KPIs
  const btn = event?.target;
  const origText = btn?.textContent;
  if (btn) { btn.disabled = true; btn.textContent = '…'; }

  const userId = (await sb.auth.getUser()).data.user?.id;
  const now = new Date().toISOString();

  // Build update with status + per-step timestamp.
  // Audit fix (2026-05-07): previously every transition overwrote
  // acknowledged_at, so the column held the LAST transition's time instead of
  // when the recall was actually acknowledged. The new pulled_at /
  // disposed_at / confirmed_at columns record per-step timestamps so audit
  // reports (Joint Recall Report, Store Audit, Store Timeline) can render the
  // full chain timeline instead of "—" for everything past Acknowledged.
  const update = { status };
  if (status === 'acknowledged') {
    update.acknowledged_at = now;
    update.acknowledged_by = userId;
  } else if (status === 'pulled') {
    update.pulled_at = now;
  } else if (status === 'disposed') {
    update.disposed_at = now;
  } else if (status === 'confirmed') {
    update.confirmed_at = now;
  }

  // ── Units pulled — required before marking as pulled ────────
  // "Pulled" is the step that creates the legal record of removal.
  // We need a quantity — even 0 is valid (product couldn't be found).
  if (status === 'pulled') {
    const unitsInput = document.getElementById(`units-${ackId}`);
    const rawVal = unitsInput ? unitsInput.value.trim() : '';
    const units = rawVal === '' ? NaN : parseInt(rawVal, 10);
    if (isNaN(units) || rawVal === '') {
      if (btn) { btn.disabled = false; btn.textContent = origText; }
      showToast('Please enter units removed (enter 0 if product was not found on shelf)', 'warn', 5000);
      unitsInput?.focus();
      unitsInput?.style && (unitsInput.style.borderColor = 'rgba(var(--danger-rgb),0.6)');
      return;
    }
    update.units_pulled              = units;
    update.units_pulled_confirmed_at = now;
    update.units_pulled_confirmed_by = userId;
  }

  // All ack writes scope by organisation_id and check rows-affected so a
  // forged ackId from another org can't be flipped via this path.
  const { data: updated, error } = await sb.from('recall_acknowledgements')
    .update(update)
    .eq('id', ackId).eq('organisation_id', _orgId).select('id');
  if (btn) { btn.disabled = false; btn.textContent = origText; }
  if (error) {
    showToast('Could not save: ' + error.message, 'error', 4000);
    return;
  }
  if (!updated || !updated.length) {
    showToast('Could not save — acknowledgement not found in your organisation.', 'error', 4000);
    return;
  }
  if (status === 'pulled')         showToast(`${update.units_pulled} unit${update.units_pulled !== 1 ? 's' : ''} recorded — step complete ✓`, 'ok', 3000);
  else if (status === 'confirmed') showToast('Step complete — store resolved ✓', 'ok', 3000);
  renderRecalls();
}

async function saveUnits(ackId) {
  const val = parseInt(document.getElementById('units-' + ackId)?.value || '0');
  const { data: updated, error } = await sb.from('recall_acknowledgements')
    .update({ units_pulled: val })
    .eq('id', ackId)
    .eq('organisation_id', _orgId)
    .select('id');
  if (error)               { showToast('Could not save units: ' + error.message, 'error', 4000); return; }
  if (!updated || !updated.length) { showToast('Could not save — acknowledgement not found in your organisation.', 'error', 4000); return; }
  showToast('Units saved', 'ok', 2000);

async function updateAckStatus(ackId, status) {
  const { data: updated, error } = await sb.from('recall_acknowledgements').update({
    status, acknowledged_at: new Date().toISOString(),
    acknowledged_by: (await sb.auth.getUser()).data.user?.id,
