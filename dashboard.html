          </div>
          <div class="field" style="margin-bottom:4px;"><label>Organisation</label>
            <input type="text" value="${_orgName}" readonly style="opacity:0.7;" />
          </div>
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid var(--border);">
            <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Need to change your password or email? Visit your account settings.</div>
            <a href="https://batchdapp.com" style="font-size:11px;color:var(--accent);text-decoration:none;">batchdapp.com →</a>
          </div>
        </div>
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading settings: ${e.message}</div>`;
  }
}

async function saveOrgSettings() {
  const name   = document.getElementById('org-name-input').value.trim();
  const email  = document.getElementById('org-email-input').value.trim();
  const region = document.getElementById('org-region-input').value;
  const btn    = document.getElementById('btn-save-org');
  const msgEl  = document.getElementById('org-settings-msg');

  if (!name) {
    msgEl.textContent = 'Organisation name is required.';
    msgEl.style.cssText = 'display:block;background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.3);color:var(--danger);font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  const { error } = await sb.from('organisations').update({
    name,
    contact_email: email || null,
    region,
  }).eq('id', _orgId);

  if (error) {
    msgEl.textContent = error.message || 'Could not save settings.';
    msgEl.style.cssText = 'display:block;background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.3);color:var(--danger);font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;';
    btn.disabled = false;
    btn.innerHTML = 'Save changes';
    return;
  }

  _orgName   = name;
  _orgRegion = region;
  document.getElementById('topbar-sub').textContent = _orgName + ' · ' + (_orgRegion === 'us' ? 'United States' : 'Norway / EU');

  msgEl.textContent = '✓ Settings saved.';
  msgEl.style.cssText = 'display:block;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--accent);font-size:11px;padding:9px 12px;border-radius:6px;margin-bottom:12px;';
  btn.disabled = false;
  btn.innerHTML = 'Save changes';
}

// ── Coming soon ────────────────────────────────────────────────
// ── Store manager overview ────────────────────────────────────
async function renderStoreManagerOverview() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  document.getElementById('topbar-title').textContent = _storeName || 'My Store';

  try {
    // Scope all queries to this store
    const storeName = _storeName;
    const today = new Date().toISOString().split('T')[0];

    const [scansRes, acksRes] = await Promise.all([
      sb.from('scans').select('*').eq('organisation_id', _orgId).eq(_storeId ? 'store_id' : 'store_name', _storeId || storeName).order('created_at', { ascending: false }),
      sb.from('recall_acknowledgements').select('*, recall_events(product_name, lot_number, severity, reason, is_drill)').eq('organisation_id', _orgId).eq('store_id', _storeId || '00000000-0000-0000-0000-000000000000'),
    ]);

    const scans      = scansRes.data || [];
    const acks       = acksRes.data  || [];
    const scansToday = scans.filter(s => s.created_at?.startsWith(today)).length;
    const escalated  = scans.filter(s => s.manager_escalated && !s.recall_resolved).length;
    const onShelf    = scans.filter(s => !s.removed_from_shelf_at).length;
    const pendingAcks = acks.filter(a => a.status === 'notified').length;

    // Last 7 days sparkline
    const last7 = Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate()-(6-i));
      return d.toISOString().split('T')[0];
    });
    const scansByDay = last7.map(d => scans.filter(s => s.created_at?.startsWith(d)).length);
    const maxDay = Math.max(...scansByDay, 1);

    // Recent scans
    const recent = scans.slice(0, 8);

    el.innerHTML = `
      ${pendingAcks > 0 ? `
      <div style="background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.25);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px;margin-bottom:20px;">
        <div style="width:8px;height:8px;border-radius:50%;background:var(--danger);animation:blink 1.2s ease-in-out infinite;flex-shrink:0;"></div>
        <div style="font-size:12px;color:var(--danger);flex:1;"><strong>${pendingAcks} recall${pendingAcks!==1?'s':''}</strong> require acknowledgement at ${storeName}.</div>
        <button onclick="showPanel('recalls')" style="font-size:11px;color:var(--danger);border:1px solid rgba(255,92,92,0.4);border-radius:6px;padding:5px 12px;background:none;cursor:pointer;">View →</button>
      </div>` : ''}

      <div class="kpi-grid">
        <div class="kpi-card blue">
          <div class="kpi-label">Scans today</div>
          <div class="kpi-value">${scansToday}</div>
          <div class="kpi-sub">${scans.length} total at ${storeName}</div>
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Products on shelf</div>
          <div class="kpi-value accent">${onShelf}</div>
          <div class="kpi-sub">Currently tracked</div>
        </div>
        <div class="kpi-card ${escalated>0?'amber':'green'}">
          <div class="kpi-label">Escalated items</div>
          <div class="kpi-value ${escalated>0?'warn':''}">${escalated}</div>
          <div class="kpi-sub">Awaiting resolution</div>
        </div>
        <div class="kpi-card ${pendingAcks>0?'red':'green'}">
          <div class="kpi-label">Recall alerts</div>
          <div class="kpi-value ${pendingAcks>0?'danger':'accent'}">${pendingAcks}</div>
          <div class="kpi-sub">${acks.length} total received</div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <div><div class="panel-title">Recent scans</div><div class="panel-sub">${storeName}</div></div>
            <button class="panel-action" onclick="showPanel('traceability')">All scans →</button>
          </div>
          <div class="panel-body">
            ${recent.length === 0
              ? `<div class="empty">No scans yet at ${storeName}.</div>`
              : recent.map(s => `
                <div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(22,61,55,0.5);">
                  <div style="flex:1;min-width:0;">
                    <div style="font-size:12px;color:var(--text);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${s.product_name||'—'}</div>
                    <div style="font-size:10px;color:var(--muted);">Lot: ${s.lot_number||'—'} · ${s.created_at?new Date(s.created_at).toLocaleDateString('en-GB'):''}</div>
                  </div>
                  ${s.recall_resolved?`<span style="font-size:10px;background:rgba(52,211,153,0.1);color:var(--accent);padding:2px 7px;border-radius:8px;">Resolved</span>`
                  :s.removed_from_shelf_at?`<span style="font-size:10px;background:rgba(245,166,35,0.1);color:var(--warn);padding:2px 7px;border-radius:8px;">Removed</span>`
                  :`<span style="font-size:10px;background:rgba(106,175,158,0.1);color:var(--muted);padding:2px 7px;border-radius:8px;">On shelf</span>`}
                </div>`).join('')}
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="panel">
            <div class="panel-header"><div class="panel-title">7-day scan activity</div></div>
            <div class="panel-body">
              <div style="display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:6px;">
                ${scansByDay.map(v => `
                  <div style="flex:1;border-radius:2px;background:var(--accent);opacity:${0.4+0.6*(v/maxDay)};height:${Math.max(4,Math.round(44*(v/maxDay)))}px;"></div>`).join('')}
              </div>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);">
                ${last7.map(d=>`<div>${new Date(d).toLocaleDateString('en-GB',{weekday:'narrow'})}</div>`).join('')}
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header"><div class="panel-title">Recall acknowledgements</div></div>
            <div class="panel-body">
              ${acks.length === 0
                ? `<div style="font-size:11px;color:var(--muted);">No recalls received yet.</div>`
                : acks.slice(0,4).map(a => `
                  <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(22,61,55,0.4);">
                    <div style="width:6px;height:6px;border-radius:50%;flex-shrink:0;background:${a.status==='confirmed'?'var(--accent)':a.status==='notified'?'var(--danger)':'var(--warn)'}"></div>
                    <div style="flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${a.recall_events?.product_name||'—'}</div>
                    <span style="font-size:10px;color:${a.status==='confirmed'?'var(--accent)':a.status==='notified'?'var(--danger)':'var(--warn)'};">${a.status}</span>
                  </div>`).join('')}
              ${acks.length > 4 ? `<div style="font-size:10px;color:var(--muted);padding-top:8px;cursor:pointer;" onclick="showPanel('recalls')">View all ${acks.length} →</div>` : ''}
            </div>
          </div>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error: ${e.message}</div>`;
  }
}

function renderComingSoon(name) {
  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:12px;color:var(--muted);">
      <div style="font-size:32px;opacity:0.3;">🔨</div>
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;color:var(--text);">${name} — coming soon</div>
      <div style="font-size:12px;">This module is in development.</div>
    </div>`;
}

// ── Manufacturer Partners ─────────────────────────────────────
async function renderPartners() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  try {
  const { data: requests } = await sb.from('trading_partners')
    .select('*, organisations!trading_partners_manufacturer_id_fkey(name, contact_email)')
    .eq('retailer_id', _orgId);

  const all       = requests || [];
  const pending   = all.filter(p => p.status === 'pending');
  const confirmed = all.filter(p => p.status === 'active');

  // Update badge
  const badge = document.getElementById('nav-partners-badge');
  if (badge) {
    badge.textContent = pending.length;
    badge.style.display = pending.length > 0 ? 'inline-flex' : 'none';
  }

  el.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">${confirmed.length} manufacturer partner${confirmed.length!==1?'s':''}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">Manufacturers connected to your organisation — confirmed partners can send you recall notifications</div>
    </div>

    ${pending.length > 0 ? `
    <div class="panel" style="margin-bottom:16px;border-color:rgba(245,166,35,0.3);">
      <div class="panel-header" style="background:rgba(245,166,35,0.05);">
        <div>
          <div class="panel-title" style="color:var(--warn);">⚠ ${pending.length} pending connection request${pending.length!==1?'s':''}</div>
          <div class="panel-sub">Review and accept manufacturer connection requests</div>
        </div>
      </div>
      <div class="panel-body" style="padding:0 18px;">
        ${pending.map(p => `
          <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(22,61,55,0.5);">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="width:36px;height:36px;border-radius:8px;background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--warn);">
                ${(p.organisations?.name||'?')[0].toUpperCase()}
              </div>
              <div>
                <div style="font-size:12px;font-weight:600;color:var(--text);">${p.organisations?.name||'Unknown manufacturer'}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px;">${p.organisations?.contact_email||'No email on file'} · Requested ${new Date(p.created_at).toLocaleDateString('en-GB')}</div>
              </div>
            </div>
            <div style="display:flex;gap:8px;">
              <button onclick="rejectPartner('${p.id}')" style="font-family:'DM Mono',monospace;font-size:11px;padding:7px 12px;border-radius:6px;border:1px solid rgba(255,92,92,0.3);background:rgba(255,92,92,0.08);color:var(--danger);cursor:pointer;">
                Decline
              </button>
              <button onclick="acceptPartner('${p.id}')" style="font-family:'DM Mono',monospace;font-size:11px;padding:7px 14px;border-radius:6px;border:none;background:var(--accent);color:#080f12;font-weight:700;cursor:pointer;">
                Accept →
              </button>
            </div>
          </div>`).join('')}
      </div>
    </div>` : ''}

    <div class="panel">
      <div class="panel-header">
        <div><div class="panel-title">Connected manufacturers</div><div class="panel-sub">You'll automatically receive recall alerts from these partners</div></div>
      </div>
      <div class="panel-body" ${confirmed.length > 0 ? 'style="padding:0 18px;"' : ''}>
        ${confirmed.length === 0
          ? `<div class="empty">No confirmed manufacturer partners yet.<br>When a manufacturer sends you a connection request, it will appear above.</div>`
          : confirmed.map(p => `
            <div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(22,61,55,0.5);">
              <div style="width:36px;height:36px;border-radius:8px;background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--accent);">
                ${(p.organisations?.name||'?')[0].toUpperCase()}
              </div>
              <div style="flex:1;">
                <div style="font-size:12px;font-weight:600;color:var(--text);">${p.organisations?.name||'—'}</div>
                <div style="font-size:10px;color:var(--muted);margin-top:2px;">${p.organisations?.contact_email||'No email on file'} · Connected ${new Date(p.created_at).toLocaleDateString('en-GB')}</div>
              </div>
              <span class="status-pill s-confirmed">Active</span>
            </div>`).join('')}
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading partners: ${e.message}</div>`;
  }
}

async function acceptPartner(id) {
  const { error } = await sb.from('trading_partners').update({ status: 'active' }).eq('id', id);
  if (error) { alert('Could not accept request: ' + error.message); return; }
  renderPartners();
}

async function rejectPartner(id) {
  if (!confirm('Decline this connection request?')) return;
  const { error } = await sb.from('trading_partners').update({ status: 'rejected' }).eq('id', id);
  if (error) { alert('Could not decline request: ' + error.message); return; }
  renderPartners();
}

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    _session = session;
    await initDashboard(session.user);
  }
})();
</script>
