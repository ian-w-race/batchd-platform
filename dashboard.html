// ── Geocoding utility ─────────────────────────────────────────
// Geocode a structured address via Nominatim (OpenStreetMap's free service).
// Returns { lat, lng, source } on success, null on failure / no results / network err.
//
// Two-pass strategy: structured query first (most accurate when it matches),
// then freeform query as a fallback. Real-world addresses often fail the
// structured query because of small mismatches (e.g. "MN" vs "Minnesota",
// "Northfield" with state ambiguity, postal codes with extended ZIP+4 format)
// — the freeform query is much more forgiving and typically resolves these.
//
// Nominatim usage policy (https://operations.osmfoundation.org/policies/nominatim/):
//   - 1 request per second per IP, max
//   - Identify the application via Referer or User-Agent (browser sets Referer auto)
//   - Cache results — we cache by storing lat/long in the stores row
//
// We don't block store save on geocoding failure: the store is still useful
// without coords (it just won't appear on the map). Re-saving an existing
// store will retry the lookup.
async function _geocodeAddress(addr) {
  // Pass 1: structured query (most accurate match)
  const structured = await _geocodeNominatim({
    format:        'jsonv2',
    limit:         '1',
    addressdetails: '0',
    street:        addr.street     || '',
    city:          addr.city       || '',
    state:         addr.region     || '',
    postalcode:    addr.postalCode || '',
    country:       addr.country    || ''
  });
  if (structured) return { ...structured, source: 'nominatim_structured' };

  // Pass 2: freeform fallback. Wait 250ms to respect Nominatim's 1 req/sec
  // policy when our first call already counted toward the limit.
  await new Promise(r => setTimeout(r, 250));
  const q = [addr.street, addr.city, addr.region, addr.postalCode, addr.country]
    .map(s => (s || '').trim()).filter(Boolean).join(', ');
  if (!q) return null;
  const freeform = await _geocodeNominatim({
    format: 'jsonv2',
    limit:  '1',
    q
  });
  if (freeform) return { ...freeform, source: 'nominatim_freeform' };

  return null;
}

// Low-level Nominatim caller. Returns { lat, lng } or null.
async function _geocodeNominatim(params) {
  try {
    const url = `https://nominatim.openstreetmap.org/search?${new URLSearchParams(params).toString()}`;
    const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
    if (!res.ok) return null;
    const data = await res.json();
    if (!Array.isArray(data) || data.length === 0) return null;
    const hit = data[0];
    const lat = parseFloat(hit.lat);
    const lng = parseFloat(hit.lon);
    if (!isFinite(lat) || !isFinite(lng)) return null;
    return { lat, lng };
  } catch (e) {
    console.warn('[geocode] request failed', e);
    return null;
  }
}

// ── Live store map (Command Center pivot, Step 2) ─────────────
// Renders a Leaflet map with recall-focused markers for every active
// store with coordinates. Three states (priority: most urgent wins):
//   active recall > recently resolved > none
//
// The map answers ONE question: where are recall hotspots, and where
// did we recently close one out? Operational concerns (dark stores,
// SLA breaches) are surfaced elsewhere — not here.
//
// This function is reusable — called from renderCommandCenter (the
// home view) and could be called from a future per-recall detail page
// to focus on a single recall's affected stores.

const _MAP_STATUS_COLORS = {
  active:   'var(--danger)',  // has at least one active recall match still on shelf
  resolved: 'var(--accent)',  // recently resolved (chain reached step 5 within last 7 days)
  none:     '#7a8985'         // neutral gray — no semantic token match; intentional muted dot
};

const _MAP_STATUS_LABELS = {
  active:   'Active recall',
  resolved: 'Resolved · last 7 days',
  none:     'No active recalls'
};

// Window for the "recently resolved" green state. Tuneable.
const _MAP_RESOLVED_WINDOW_MS = 7 * 24 * 3600_000;

// Severity badge helper — converts the recall_events.severity field
// (variants: 'class_i', 'Class I', 'I', '1', etc.) into a { txt, bg,
// border, fg } token bundle. Used by the Command Center right rail AND
// the Live Recall Detail page header. Returns null for empty severity.
function _severityLabel(sev) {
  if (!sev) return null;
  const s = String(sev).toLowerCase();
  if (s.includes('iii') || s === '3' || s === 'class_iii') return { txt: 'Class III', bg: 'rgba(var(--info-rgb),0.12)',  border: 'rgba(var(--info-rgb),0.4)',  fg: '#7ba9ff' };
  if (s.includes('ii')  || s === '2' || s === 'class_ii')  return { txt: 'Class II',  bg: 'rgba(var(--warn-rgb),0.12)',  border: 'rgba(var(--warn-rgb),0.4)',  fg: '#f5a623' };
  if (s.includes('i')   || s === '1' || s === 'class_i')   return { txt: 'Class I',   bg: 'rgba(var(--danger-rgb),0.12)',   border: 'rgba(var(--danger-rgb),0.4)',   fg: '#ff5c5c' };
  return { txt: String(sev), bg: 'var(--surface2)', border: 'var(--border)', fg: 'var(--muted)' };
}

// Ordered 5-stage chain. The DB enum stays 'confirmed' for the final
// step (see project_resolved_rename.md); the UI label is "Resolved"
// platform-wide. RSLV is the short form for the counter strip + recall
// cards. The `step` field surfaces the procedural sequence (1-5) so
// staff see the stages must be completed in order.
const _RECALL_STAGE_ORDER = [
  { key: 'notified',     label: 'NOTIF', step: 1 },
  { key: 'acknowledged', label: 'ACK',   step: 2 },
  { key: 'pulled',       label: 'PULL',  step: 3 },
  { key: 'disposed',     label: 'DISP',  step: 4 },
  { key: 'confirmed',    label: 'RSLV',  step: 5 }
];

// Stage palette for the Live Recall Detail map (Step 4). Each marker
// is colored by the store's current ack stage — red urgent (still
// notified) gradates through orange/yellow/light-green to green
// (resolved). Used as the `colors` override passed into renderStoreMap.
const _RECALL_DETAIL_STAGE_COLORS = {
  notified:     'var(--danger)', // has not acknowledged
  acknowledged: 'var(--warn)',   // in progress
  pulled:       '#f9d56e',       // yellow — intermediate gradient stop, no semantic token match
  disposed:     '#8be9c4',       // light green — intermediate gradient stop
  confirmed:    'var(--accent)'  // resolved (UI label; DB enum stays 'confirmed')
};
const _RECALL_DETAIL_STAGE_LABELS = {
  notified:     'Step 1 · Notified',
  acknowledged: 'Step 2 · Acknowledged',
  pulled:       'Step 3 · Pulled',
  disposed:     'Step 4 · Disposed',
  confirmed:    'Step 5 · Resolved'
};

// Window for time-based quick-stat tiles ("median ack time over last X days").
const _STATS_LOOKBACK_MS      = 30 * 24 * 3600_000;

// Window for "is this store scanning recently" (network coverage tile).
const _COVERAGE_WINDOW_MS     = 72 *      3600_000;

// Median helper. Returns null for empty input. Works for any numeric array.
function _median(arr) {
  if (!arr || arr.length === 0) return null;
  const sorted = arr.slice().sort((a, b) => a - b);
  const mid = Math.floor(sorted.length / 2);
  return sorted.length % 2 ? sorted[mid] : (sorted[mid - 1] + sorted[mid]) / 2;
}

// Format a duration in ms as a short human string. Returns "—" for null
// or non-finite. Distinct from _fmtElapsed which is ALWAYS measured from
// "now" — this one takes a delta directly.
function _fmtDuration(ms) {
  if (ms == null || !isFinite(ms) || ms < 0) return '—';
  if (ms < 60_000) return '< 1m';
  const totalMin = Math.floor(ms / 60_000);
  const totalHr  = Math.floor(totalMin / 60);
  const totalDay = Math.floor(totalHr / 24);
  if (totalDay >= 1) return `${totalDay}d ${totalHr % 24}h`;
  if (totalHr  >= 1) return `${totalHr}h ${totalMin % 60}m`;
  return `${totalMin}m`;
}

// Small relative-time helper for marker popups. Returns "12m ago",
// "3h ago", "2d ago", etc.
function _mapFmtAgo(iso) {
  if (!iso) return '—';
  const t  = new Date(iso).getTime();
  if (!isFinite(t)) return '—';
  const ms = Date.now() - t;
  if (ms < 0)            return 'just now';
  if (ms < 60_000)       return `${Math.max(1, Math.floor(ms / 1000))}s ago`;
  if (ms < 3_600_000)    return `${Math.floor(ms / 60_000)}m ago`;
  if (ms < 86_400_000)   return `${Math.floor(ms / 3_600_000)}h ago`;
  return `${Math.floor(ms / 86_400_000)}d ago`;
}

// Elapsed-time helper for recall cards. Returns "30m", "2h 18m",
// "2d 3h" — readable, short, no "ago" suffix.
function _fmtElapsed(iso) {
  if (!iso) return '—';
  const t  = new Date(iso).getTime();
  if (!isFinite(t)) return '—';
  const ms = Date.now() - t;
  if (ms < 60_000)  return '< 1m';
  const totalMin = Math.floor(ms / 60_000);
  const totalHr  = Math.floor(totalMin / 60);
  const totalDay = Math.floor(totalHr / 24);
  if (totalDay >= 1) return `${totalDay}d ${totalHr % 24}h`;
  if (totalHr  >= 1) return `${totalHr}h ${totalMin % 60}m`;
  return `${totalMin}m`;
}

// Mounts the map. `stores` should already have `_status` set per store
// (any string — keys must match the keys in `options.colors`).
// Returns a controller object: { map, setFilter(status), markersByStatus }
//
// Options:
//   height        — CSS height, defaults '600px'
//   colors        — { statusKey: hexColor } palette; defaults _MAP_STATUS_COLORS
//   labels        — { statusKey: humanLabel } for legend; defaults _MAP_STATUS_LABELS
//   legendNote    — small footer text under the legend (pass null/'' to hide)
//   popupBuilder  — optional function(store) → HTML string; default builds
//                   the Command Center popup (name, address, status, counts)
//
// Used from:
//   - renderCommandCenter (Command Center home, default palette: active/resolved/none)
//   - renderRecallDetail   (Live Recall Detail, stage palette: notified→…→confirmed)
function renderStoreMap(container, stores, options) {
  options = options || {};
  const colors       = options.colors || _MAP_STATUS_COLORS;
  const labels       = options.labels || _MAP_STATUS_LABELS;
  const legendNote   = options.legendNote !== undefined
    ? options.legendNote
    : "Mock drills track separately and don't<br>affect map markers.";
  const popupBuilder = typeof options.popupBuilder === 'function' ? options.popupBuilder : null;
  const fallbackColor = '#7a8985';

  if (typeof L === 'undefined') {
    container.innerHTML = '<div style="padding:20px;color:var(--danger);font-size:12px;">Map library failed to load. Check network/CDN access.</div>';
    return null;
  }

  // Fresh container — Leaflet would otherwise complain "Map container is already initialized."
  container.innerHTML = '';
  container.style.height = options.height || '600px';
  container.style.position = 'relative';
  container.style.borderRadius = '12px';
  container.style.overflow = 'hidden';
  container.style.border = '1px solid var(--border)';
  container.style.background = '#0a1814';

  const map = L.map(container, {
    zoomControl: true,
    attributionControl: true,
    scrollWheelZoom: true
  });

  // CARTO Dark Matter — same tiles as the Claude Design mockup.
  // Free for our scale; attribution required (Leaflet shows it bottom-right by default).
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // Markers — also indexed by status so setFilter() can fade them in groups.
  // markersByStatus is built dynamically from the colors keys so the same
  // function works for any palette (3-state CC, 5-state recall detail, etc.)
  const markers = [];
  const markersByStatus = {};
  Object.keys(colors).forEach(k => { markersByStatus[k] = []; });
  (stores || []).forEach(s => {
    if (s.latitude == null || s.longitude == null) return;
    const status = s._status || Object.keys(colors)[0] || 'none';
    const color  = colors[status] || fallbackColor;

    const marker = L.circleMarker([s.latitude, s.longitude], {
      radius:      9,
      fillColor:   color,
      color:       '#0a1814',
      weight:      2,
      opacity:     1,
      fillOpacity: 0.92
    }).addTo(map);
    marker._batchdStatus = status;
    if (!markersByStatus[status]) markersByStatus[status] = [];
    markersByStatus[status].push(marker);

    // Popup uses light styles (Leaflet popup is white by default).
    // Default popup builder (Command Center variant). If the caller
    // provided `options.popupBuilder`, use that instead — lets the
    // recall detail page render a stage-aware popup.
    let popupHtml;
    if (popupBuilder) {
      popupHtml = popupBuilder(s);
    } else {
      const activeLine = s._activeRecallCount > 0
        ? `<div style="font-size:10px;color:#a52a2a;margin-top:6px;font-family:'DM Mono',monospace;">${s._activeRecallCount} active recall${s._activeRecallCount === 1 ? '' : 's'}</div>`
        : '';
      const resolvedLine = s._recentResolvedCount > 0
        ? `<div style="font-size:10px;color:#0f7a55;margin-top:4px;font-family:'DM Mono',monospace;">${s._recentResolvedCount} resolved in last 7 days</div>`
        : '';

      popupHtml = `
        <div style="font-family:'Figtree',sans-serif;font-size:12px;line-height:1.5;min-width:200px;">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#1a201d;">${esc(s.name || 'Unnamed store')}</div>
          <div style="color:#5a6661;font-size:11px;margin-bottom:6px;">${esc(s.address || '')}</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:11px;">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};"></span>
            <span style="color:#1a201d;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;font-size:10px;">${esc(labels[status] || status)}</span>
          </div>
          ${activeLine}
          ${resolvedLine}
        </div>`;
    }
    marker.bindPopup(popupHtml, { closeButton: true, autoClose: true, maxWidth: 280 });

    markers.push(marker);
  });

  // Auto-fit to markers, or default to a reasonable region view if none.
  if (markers.length > 0) {
    const group = L.featureGroup(markers);
    try {
      map.fitBounds(group.getBounds().pad(0.18), { maxZoom: 11 });
    } catch (_) {
      map.setView([markers[0].getLatLng().lat, markers[0].getLatLng().lng], 7);
    }
  } else {
    // Default to continental US if no markers — replaced once stores load.
    map.setView([39.8283, -98.5795], 4);
  }

  // Legend (bottom-left). Includes the "mock drills not shown" footnote
  // per Ian's confirmation that mock drills track separately.
  const legend = L.control({ position: 'bottomleft' });
  legend.onAdd = function () {
    const div = L.DomUtil.create('div', 'batchd-map-legend');
    div.style.cssText = 'background:rgba(17,25,24,0.92);border:1px solid rgba(var(--accent-rgb),0.18);border-radius:10px;padding:10px 14px;font-family:Figtree,sans-serif;font-size:11px;color:#f0f3f1;min-width:170px;line-height:1.5;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);';
    const legendItems = Object.keys(labels).map(k => `
      <div style="display:flex;align-items:center;gap:8px;"><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:${colors[k] || fallbackColor};flex-shrink:0;"></span>${labels[k]}</div>
    `).join('');
    const noteHtml = legendNote
      ? `<div style="font-size:9.5px;color:#9aa6a1;margin-top:6px;border-top:1px solid rgba(var(--accent-rgb),0.14);padding-top:6px;letter-spacing:0.02em;">${legendNote}</div>`
      : '';
    div.innerHTML = `<div style="display:flex;flex-direction:column;gap:6px;">${legendItems}${noteHtml}</div>`;
    return div;
  };
  legend.addTo(map);

  // setFilter — fade non-matching markers without removing them, so the
  // map keeps its full geographic context. Pass 'all' to clear the filter.
  const FADE = { opacity: 0.18, fillOpacity: 0.06 };
  const FULL = { opacity: 1,    fillOpacity: 0.92 };
  function setFilter(filterValue) {
    const f = filterValue || 'all';
    Object.keys(markersByStatus).forEach(status => {
      const visible = (f === 'all') || (status === f);
      const styleApply = visible ? FULL : FADE;
      markersByStatus[status].forEach(m => m.setStyle(styleApply));
    });
  }

  return { map, setFilter, markersByStatus };
}

// renderCommandCenter — the new Dashboard home view (Step 7 of the
// Command Center pivot, 2026-05). Replaces the legacy renderOverview
// in the panels mapping. Layout:
//   1. Push-a-Recall hero (primary CTA)
//   2. 4 quick-stat tiles (active count, median ack, median resolve,
//      72h network coverage)
//   3. 2-column main: filter pills + map | Active Recalls right rail
//
// Store managers continue routing to renderStoreManagerOverview() —
// they don't push recalls and the new corp-focused layout isn't right
// for them.
//
// The legacy overview is preserved as _renderOverviewLegacy in case we
// need to revert; flipping one line in the `fns` mapping inside
// showPanel() restores it.
async function renderCommandCenter() {
  if (_userRole === 'store_manager') { return renderStoreManagerOverview(); }
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);padding:4px 0;"><div class="spinner"></div> Loading dashboard…</div>`;
  try {
    const now           = Date.now();
    const since7d       = new Date(now - _MAP_RESOLVED_WINDOW_MS).toISOString();
    const sinceCoverage = new Date(now - _COVERAGE_WINDOW_MS).toISOString();

    // Parallel fetch. The ack query is broadened (vs the earlier resolved-
    // only query) because Step 4 also needs all in-flight acks for the
    // right-rail "Active Recalls" panel. We post-filter in JS for both:
    //   - resolved-7d → drives green dots on the map
    //   - in-flight   → drives the right-rail cards
    //   - 30-day windowed aggregates → drives quick-stat tiles
    // Embedded recall_events relation pulls product/severity/drill flag.
    // 'confirmed' is the canonical DB enum value for the final chain step;
    // the UI label is "Resolved" platform-wide as of 2026-05.
    //
    // The recentScansRes query is only the store_id field (no created_at)
    // because all we need is "did this store scan at all in the last 72h"
    // for the coverage tile. We query within the time window so we don't
    // pull every scan in history.
    const [storesRes, srmRes, ackRes, recentScansRes] = await Promise.all([
      sb.from('stores').select('*').eq('organisation_id', _orgId),
      sb.from('scan_recall_matches').select('store_id, scan_id, recall_id, recall_event_id').eq('organisation_id', _orgId),
      sb.from('recall_acknowledgements')
        .select('id, store_id, recall_event_id, status, acknowledged_at, pulled_at, disposed_at, confirmed_at, created_at, recall_events(id, product_name, lot_number, severity, reason, is_drill, published_at)')
        .eq('organisation_id', _orgId)
        .order('created_at', { ascending: false })
        .limit(500),
      sb.from('scans').select('store_id').eq('organisation_id', _orgId).gte('created_at', sinceCoverage).limit(5000)
    ]);

    const stores      = (storesRes.data || []).filter(s => s.active && s.latitude != null && s.longitude != null);
    const allStores   = (storesRes.data || []).filter(s => s.active);
    const offMapCount = allStores.length - stores.length;

    // Active recalls per store: count of scan_recall_matches rows whose
    // matched scan is still on shelf. We have to fetch the scans referenced
    // by the matches to check on-shelf status.
    const matchScanIds = Array.from(new Set((srmRes.data || []).map(m => m.scan_id).filter(Boolean)));
    const onShelfScanIds = new Set();
    if (matchScanIds.length > 0) {
      // Chunk in case there are many — Supabase URL limits ~2000 chars.
      const CHUNK = 200;
      for (let i = 0; i < matchScanIds.length; i += CHUNK) {
        const chunk = matchScanIds.slice(i, i + CHUNK);
        const { data: scs } = await sb.from('scans').select('id, removed_from_shelf_at').in('id', chunk);
        (scs || []).forEach(s => { if (s.removed_from_shelf_at == null) onShelfScanIds.add(s.id); });
      }
    }

    // store_id → active recall count
    const activeRecallByStore = {};
    (srmRes.data || []).forEach(m => {
      if (!m.store_id || !onShelfScanIds.has(m.scan_id)) return;
      activeRecallByStore[m.store_id] = (activeRecallByStore[m.store_id] || 0) + 1;
    });

    // store_id → recently-resolved count (status='confirmed' AND
    // confirmed_at >= since7d AND NOT a mock drill — drills are
    // tracked separately and don't affect map markers).
    const recentlyResolvedByStore = {};
    (ackRes.data || []).forEach(a => {
      if (!a.store_id) return;
      if (a.status !== 'confirmed') return;
      if (!a.confirmed_at) return;
      if (new Date(a.confirmed_at).getTime() < new Date(since7d).getTime()) return;
      if (a.recall_events?.is_drill) return;
      recentlyResolvedByStore[a.store_id] = (recentlyResolvedByStore[a.store_id] || 0) + 1;
    });

    // Compute final status per store. Priority: active > resolved > none.
    // A store with both an active recall AND a recent resolution shows
    // active (red wins) — the urgent case takes precedence.
    stores.forEach(s => {
      const hasActive   = (activeRecallByStore[s.id]      || 0) > 0;
      const hasResolved = (recentlyResolvedByStore[s.id]  || 0) > 0;
      if (hasActive)        s._status = 'active';
      else if (hasResolved) s._status = 'resolved';
      else                  s._status = 'none';
      s._activeRecallCount   = activeRecallByStore[s.id]     || 0;
      s._recentResolvedCount = recentlyResolvedByStore[s.id] || 0;
    });

    // Counts for the header
    const counts = { active: 0, resolved: 0, none: 0 };
    stores.forEach(s => { counts[s._status] = (counts[s._status] || 0) + 1; });

    // ── Right-rail Active Recalls data ───────────────────────────
    // Group acks by recall_event. An event is "in flight" when it has
    // at least one ack and not all of those acks are status='confirmed'
    // (i.e. at least one store hasn't reached the Resolved step yet).
    // Mock drills are mixed in but visually distinct (DRILL badge,
    // dashed border) — and are explicitly NOT shown on the map.
    const acksByEvent = {};
    (ackRes.data || []).forEach(a => {
      if (!a.recall_event_id) return;
      (acksByEvent[a.recall_event_id] = acksByEvent[a.recall_event_id] || []).push(a);
    });

    const activeRecalls = Object.keys(acksByEvent).map(eid => {
      const evAcks = acksByEvent[eid];
      const ev     = evAcks[0]?.recall_events || {};
      const total  = evAcks.length;
      // 5-stage progress counts. Once a store reaches a later stage, all
      // earlier stages count as completed (so 'pulled' implies 'acknowledged').
      const stageCounts = {
        notified:     total,
        acknowledged: evAcks.filter(a => ['acknowledged','pulled','disposed','confirmed'].includes(a.status)).length,
        pulled:       evAcks.filter(a => ['pulled','disposed','confirmed'].includes(a.status)).length,
        disposed:     evAcks.filter(a => ['disposed','confirmed'].includes(a.status)).length,
        confirmed:    evAcks.filter(a => a.status === 'confirmed').length
      };
      const allConfirmed = stageCounts.confirmed === total;
      const earliestAt = evAcks.reduce((min, a) => {
        const t = a.created_at ? new Date(a.created_at).getTime() : null;
        return (t && (!min || t < min)) ? t : min;
      }, null);
      const startedAt = ev.published_at || (earliestAt ? new Date(earliestAt).toISOString() : null);
      return {
        id: eid,
        ev,
        total,
        stageCounts,
        allConfirmed,
        startedAt,
        affectedStoreIds: evAcks.map(a => a.store_id).filter(Boolean),
        isDrill: !!ev.is_drill
      };
    })
    // In flight only — drop fully-resolved events
    .filter(r => !r.allConfirmed && r.total > 0)
    // Newest first
    .sort((a, b) => new Date(b.startedAt || 0) - new Date(a.startedAt || 0));

    const activeRealCount  = activeRecalls.filter(r => !r.isDrill).length;
    const activeDrillCount = activeRecalls.filter(r =>  r.isDrill).length;

    // ── Quick-stat tiles (Step 5) ────────────────────────────────
    // 30-day window for time-based aggregates. Drills are excluded — they
    // exercise the chain but don't represent real recall response speed.
    const sinceLookbackMs = now - _STATS_LOOKBACK_MS;
    const lookbackAcks = (ackRes.data || []).filter(a => {
      if (a.recall_events?.is_drill) return false;
      const t = a.created_at ? new Date(a.created_at).getTime() : 0;
      return t >= sinceLookbackMs;
    });

    const ackDurations = lookbackAcks
      .filter(a => a.acknowledged_at && a.created_at)
      .map(a => new Date(a.acknowledged_at).getTime() - new Date(a.created_at).getTime())
      .filter(ms => ms >= 0);

    const resolveDurations = lookbackAcks
      .filter(a => a.confirmed_at && a.created_at)
      .map(a => new Date(a.confirmed_at).getTime() - new Date(a.created_at).getTime())
      .filter(ms => ms >= 0);

    const medianAckMs     = _median(ackDurations);
    const medianResolveMs = _median(resolveDurations);

    // 72h coverage tile — % of active stores that scanned in last 72h.
    const activeStoresAll = (storesRes.data || []).filter(s => s.active);
    const scanningStoreIds = new Set((recentScansRes.data || []).map(r => r.store_id).filter(Boolean));
    const scanningStoreCount = activeStoresAll.filter(s => scanningStoreIds.has(s.id)).length;
    const coveragePct = activeStoresAll.length > 0
      ? Math.round((scanningStoreCount / activeStoresAll.length) * 100)
      : null;

    const quickStats = [
      {
        label: 'Active recalls',
        value: String(activeRealCount),
        detail: activeDrillCount > 0
          ? `${activeDrillCount} drill${activeDrillCount === 1 ? '' : 's'} also in flight`
          : 'In flight right now'
      },
      {
        label: 'Median time to acknowledge',
        value: medianAckMs != null ? _fmtDuration(medianAckMs) : '—',
        detail: ackDurations.length > 0
          ? `${ackDurations.length} acknowledgement${ackDurations.length === 1 ? '' : 's'} · last 30 days`
          : 'No data in last 30 days'
      },
      {
        label: 'Median resolve time',
        value: medianResolveMs != null ? _fmtDuration(medianResolveMs) : '—',
        detail: resolveDurations.length > 0
          ? `Notified → Resolved · last 30 days`
          : 'No data in last 30 days'
      },
      {
        label: 'Network coverage',
        value: coveragePct != null ? `${coveragePct}%` : '—',
        detail: activeStoresAll.length > 0
          ? `${scanningStoreCount} of ${activeStoresAll.length} stores scanning · last 72h`
          : 'No active stores yet'
      }
    ];

    // Filter pills — pure filter controls (text + count only). The map's
    // bottom-left legend is the single source of color meaning. Don't add
    // colored dots to these pills — that would duplicate the legend.
    const pills = [
      { key: 'all',      label: 'All',           count: stores.length },
      { key: 'active',   label: 'Active',        count: counts.active   },
      { key: 'resolved', label: 'Resolved · 7d', count: counts.resolved },
      { key: 'none',     label: 'No recalls',    count: counts.none     }
    ];

    // ── Recall card builder ──────────────────────────────────────
    // Uses module-level _severityLabel and _RECALL_STAGE_ORDER (see top
    // of the renderStoreMap block) so the same helpers power the right
    // rail here and the Live Recall Detail page.
    const _renderRecallCard = r => {
      const sev = _severityLabel(r.ev.severity);
      const lots = (r.ev.lot_number || '').trim();
      const title = (r.ev.product_name || 'Unnamed product') + (r.ev.reason ? ` — ${r.ev.reason}` : '');
      const elapsed = _fmtElapsed(r.startedAt);
      const cardBorder = r.isDrill ? '1.5px dashed var(--border-hard)' : '1px solid var(--border)';

      const drillBadge = r.isDrill
        ? `<span style="display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:5px;background:rgba(var(--warn-rgb),0.14);border:1px solid rgba(var(--warn-rgb),0.4);color:#f5a623;">DRILL</span>` : '';

      const sevBadge = sev
        ? `<span style="display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.06em;padding:3px 8px;border-radius:5px;background:${sev.bg};border:1px solid ${sev.border};color:${sev.fg};">${esc(sev.txt)}${r.isDrill?' (sim.)':''}</span>` : '';

      const stagesHtml = _RECALL_STAGE_ORDER.map(st => {
        const count = r.stageCounts[st.key] || 0;
        const pct = r.total > 0 ? Math.round((count / r.total) * 100) : 0;
        return `
          <div style="display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0;">
            <div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
              <div style="width:${pct}%;height:100%;background:var(--accent);transition:width 0.25s;"></div>
            </div>
            <div style="font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.05em;text-align:center;line-height:1.4;white-space:nowrap;">
              <div style="font-weight:700;color:var(--text);">${st.step} · ${st.label}</div>
              <div>${count}/${r.total}</div>
            </div>
          </div>`;
      }).join('');

      return `
        <div class="batchd-recall-card" data-event-id="${esc(r.id)}"
             style="background:var(--surface);border:${cardBorder};border-radius:12px;padding:14px;cursor:pointer;transition:border-color 0.15s,transform 0.15s;"
             onmouseenter="this.style.borderColor='var(--accent-dim)'"
             onmouseleave="this.style.borderColor='${r.isDrill ? 'var(--border-hard)' : 'var(--border)'}'">
          <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:8px;">
            <div style="display:flex;flex-wrap:wrap;gap:5px;">
              ${drillBadge}
              ${sevBadge}
            </div>
            <div style="text-align:right;flex-shrink:0;">
              <div style="font-family:'DM Mono',monospace;font-size:11px;font-weight:700;color:var(--text);line-height:1;">${elapsed}</div>
              <div style="font-family:'DM Mono',monospace;font-size:8.5px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase;margin-top:2px;">elapsed</div>
            </div>
          </div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:13px;color:var(--text);margin-bottom:4px;line-height:1.4;">${esc(title)}</div>
          ${lots ? `<div style="font-family:'DM Mono',monospace;font-size:10.5px;color:var(--muted);margin-bottom:12px;line-height:1.4;">Lots ${esc(lots)}</div>` : '<div style="margin-bottom:12px;"></div>'}
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;">
            ${stagesHtml}
          </div>
        </div>`;
    };

    // Right-rail card list — empty state vs cards
    const cardsHtml = activeRecalls.length === 0
      ? `<div style="padding:18px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.6;text-align:center;">
           <div style="font-weight:600;color:var(--text);margin-bottom:4px;">No active recalls in flight</div>
           <div>When a recall is pushed and stores start working through the response chain, in-flight cards appear here.</div>
         </div>`
      : activeRecalls.map(_renderRecallCard).join('<div style="height:10px;"></div>');

    el.innerHTML = `
      <!-- Push a Recall hero — primary CTA for the dashboard. Click
           opens the guided recall composer (renderRecallComposer, a
           full-page 4-step flow). The legacy "Add a recall manually" tab
           in Recalls is preserved as the power-user quick-add path. The
           secondary "Run a drill" button opens the existing drill launcher
           modal so the safe-practice path is one click away too. -->
      <div style="display:flex;align-items:center;justify-content:space-between;gap:18px;flex-wrap:wrap;padding:18px 22px;margin-bottom:14px;background:linear-gradient(135deg, rgba(var(--accent-alt-rgb),0.08), rgba(var(--accent-alt-rgb),0.015) 60%);border:1px solid var(--accent-dim);border-radius:14px;">
        <div style="flex:1 1 320px;min-width:0;">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:18px;color:var(--text);margin-bottom:4px;">Push a Recall</div>
          <div style="font-size:12.5px;color:var(--muted);line-height:1.55;max-width:62ch;">
            Notify every affected store in your network instantly. Each store works through the 5-step chain — Notified → Acknowledged → Pulled → Disposed → Resolved — with a timestamped audit trail Batch'd will hand to a regulator on request.
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap;">
          <button onclick="showDrillLauncher()"
                  style="font-family:'DM Mono',monospace;font-size:11px;padding:10px 16px;border-radius:9px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;letter-spacing:0.02em;transition:border-color 0.15s,color 0.15s;"
                  onmouseenter="this.style.borderColor='var(--warn)';this.style.color='var(--warn)'"
                  onmouseleave="this.style.borderColor='var(--border)';this.style.color='var(--muted)'">
            Or run a drill
          </button>
          <button onclick="openRecallComposer()"
                  style="display:inline-flex;align-items:center;gap:8px;font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;padding:11px 22px;border-radius:10px;border:none;background:var(--accent);color:var(--accent-on-primary);cursor:pointer;box-shadow:0 4px 14px rgba(var(--accent-alt-rgb),0.22);transition:transform 0.15s,box-shadow 0.15s;"
                  onmouseenter="this.style.transform='translateY(-1px)';this.style.boxShadow='0 6px 18px rgba(var(--accent-alt-rgb),0.32)'"
                  onmouseleave="this.style.transform='none';this.style.boxShadow='0 4px 14px rgba(var(--accent-alt-rgb),0.22)'">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
            Push a Recall
            <span style="margin-left:2px;">→</span>
          </button>
        </div>
      </div>

      <!-- Quick stats — 4 tiles. auto-fit collapses to 2 cols at narrow widths. -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:14px;">
        ${quickStats.map(t => `
          <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:12px 14px;">
            <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:6px;">${esc(t.label)}</div>
            <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;color:var(--text);line-height:1.1;">${esc(t.value)}</div>
            <div style="font-size:10.5px;color:var(--muted);margin-top:5px;line-height:1.4;">${esc(t.detail)}</div>
          </div>`).join('')}
      </div>

      <!-- 2-column grid: map + filter pills on left, Active Recalls rail on right.
           At narrow widths the rail wraps below the map (flex-wrap). -->
      <div style="display:flex;gap:14px;align-items:flex-start;flex-wrap:wrap;">

        <!-- Left column: filter pills float on top-right of the map.
             The wrapper provides positioning context; pills are absolutely
             positioned at z-index 1000 so they sit above markers and tiles
             but below Leaflet popups (which are anchored to markers and
             render in different screen regions anyway). -->
        <div style="flex:1 1 480px;min-width:0;">
          <div style="position:relative;">
            <div id="map-test-container"></div>
            <div id="map-filter-pills" style="position:absolute;top:12px;right:12px;z-index:1000;display:inline-flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:4px;box-shadow:0 4px 14px rgba(0,0,0,0.35);">
              ${pills.map(p => `
                <button data-filter="${p.key}"
                        class="map-filter-pill ${p.key === 'all' ? 'active' : ''}"
                        style="display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;padding:6px 10px;border-radius:7px;border:none;background:none;color:var(--muted);cursor:pointer;transition:background 0.15s,color 0.15s;letter-spacing:0.02em;">
                  <span>${p.label}</span>
                  <span style="opacity:0.55;font-weight:600;">${p.count}</span>
                </button>`).join('')}
            </div>
          </div>
          ${stores.length === 0 ? `
            <div style="margin-top:14px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;font-size:12px;color:var(--muted);line-height:1.6;">
              <strong style="color:var(--text);">No stores on the map yet.</strong>
              ${offMapCount > 0
                ? `${offMapCount} active store${offMapCount===1?' has':'s have'} an address but no coordinates. Go to <strong style="color:var(--text);">Store Network</strong>, edit each store, and verify the address — Batch'd will look up the location automatically.`
                : 'Add an active store with a complete address from <strong style="color:var(--text);">Store Network</strong> to see it here.'}
            </div>` : ''}
        </div>

        <!-- Right column: Active Recalls rail -->
        <aside style="flex:0 0 380px;max-width:100%;display:flex;flex-direction:column;gap:10px;">
          <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:2px;">
            <div>
              <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">Active Recalls</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">${activeRecalls.length} in flight${activeDrillCount > 0 ? ` · ${activeDrillCount} drill${activeDrillCount===1?'':'s'}` : ''}</div>
            </div>
          </div>
          <div id="active-recalls-list">
            ${cardsHtml}
          </div>
          ${activeRecalls.length > 0 ? `
            <div style="margin-top:4px;font-size:10px;color:var(--muted);line-height:1.5;font-family:'DM Mono',monospace;letter-spacing:0.02em;">
              Mock drills appear in this list with a DRILL badge and dashed border. They do not appear on the map.
            </div>` : ''}
        </aside>
      </div>

      `;

    const ctrl = renderStoreMap(document.getElementById('map-test-container'), stores, { height: '620px' });

    // Helper to switch a filter pill's visual active state.
    const _activatePill = (filterKey) => {
      document.querySelectorAll('#map-filter-pills .map-filter-pill').forEach(b => {
        const isActive = b.dataset.filter === filterKey;
        b.classList.toggle('active', isActive);
        b.style.background = isActive ? 'var(--surface2)' : 'none';
        b.style.color      = isActive ? 'var(--text)'    : 'var(--muted)';
      });
    };

    // Wire pill clicks
    document.querySelectorAll('#map-filter-pills .map-filter-pill').forEach(btn => {
      btn.addEventListener('click', () => {
        _activatePill(btn.dataset.filter);
        ctrl.setFilter(btn.dataset.filter);
      });
    });
    // Apply initial active style to the "All" pill
    _activatePill('all');

    // Wire recall card clicks → navigate to the Live Recall Detail page.
    // Drills navigate too — the detail page renders them with a DRILL
    // badge and the same ack-chain view, since drills exercise the same
    // workflow. Just no map markers for drill participants (they're not
    // really "affected stores" in the recall-response sense).
    document.querySelectorAll('.batchd-recall-card').forEach(card => {
      card.addEventListener('click', () => {
        const eventId = card.dataset.eventId;
        if (!eventId) return;
        _currentRecallDetailId = eventId;
        showPanel('recall-detail');
      });
    });
  } catch (e) {
    console.error('[renderCommandCenter]', e);
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading dashboard: ${esc(e.message)}</div>`;
  }
}

// ── FSMA 204 — 24-hour records production ────────────────────
// 21 CFR 1.1455: when the FDA invokes the records request, retailers
// have 24 hours to produce "an electronic sortable spreadsheet" of the
// Receiving KDEs for the affected lot. This function builds exactly
// that, scoped to a single recall.
//
// Matching strategy: pull every scan whose lot_number OR raw_capture
// contains any of the recall's lot codes (substring match — same
// approach as the recall-match path elsewhere). Deduplicate by id.
//
// Output: a single CSV with cover-block metadata (org, recall id,
// product, lots, generated-at) followed by per-scan rows. UTF-8 BOM
// included so Excel opens it cleanly. Filename embeds the recall id
// shortform + date.
//
// Drills are flagged in the cover block ("MOCK DRILL — TEST EXPORT")
// so an exported drill record can't accidentally be sent to a regulator
// as a real submission.
async function produceFsma204Records(recallEventId) {
  const btn = document.getElementById('btn-produce-fsma204');
  const setBusy = (busy) => {
    if (!btn) return;
    btn.disabled = busy;
    btn.style.opacity = busy ? '0.6' : '1';
    btn.style.cursor  = busy ? 'wait' : 'pointer';
  };

  setBusy(true);

  try {
    // 1. Refetch the recall event so we always export against current state
    const { data: ev, error: evErr } = await sb.from('recall_events')
      .select('id, product_name, lot_number, severity, reason, is_drill, published_at, source_org_id, created_at')
      .eq('id', recallEventId)
      .single();
    if (evErr || !ev) throw new Error('Could not load recall details');

    const lotsRaw = (ev.lot_number || '').trim();
    if (!lotsRaw) {
      showToast('This recall has no lot number on file — cannot produce records.', 'warn', 4500);
      return;
    }

    // 2. Split the lot field — handles multi-lot recalls like
    //    "L24-2851, L24-2852, L24-2855" or "DRILL-2026-04-26 / DRILL-2026-04-27"
    const lots = lotsRaw.split(/[,;|/]+/).map(s => s.trim()).filter(Boolean);
    if (lots.length === 0) lots.push(lotsRaw);

    // 3. Match scans against each lot via raw_capture or lot_number substring.
    //    Multiple parallel queries — one per lot — then dedupe.
    const lotQueries = lots.map(lot =>
      sb.from('scans')
        .select('id, lot_number, raw_capture, product_name, barcode_number, store_name, store_id, supplier_name, scanned_by, created_at, quantity, removed_from_shelf_at, removed_from_shelf_by, recall_resolved, recall_resolved_at, expiry_date')
        .eq('organisation_id', _orgId)
        .or(`raw_capture.ilike.%${lot}%,lot_number.ilike.%${lot}%`)
    );
    const results = await Promise.all(lotQueries);

    const seen = new Set();
    const scans = [];
    results.forEach(({ data, error }) => {
      if (error) { console.warn('[FSMA 204] lot query failed:', error.message); return; }
      (data || []).forEach(s => {
        if (!seen.has(s.id)) { seen.add(s.id); scans.push(s); }
      });
    });

    if (scans.length === 0) {
      showToast("No scans on file match this recall's lot codes.", 'warn', 4500);
      return;
    }

    // 4. Hydrate store info (address, region, country) for the rows
    const storeIds = [...new Set(scans.map(s => s.store_id).filter(Boolean))];
    const storesById = {};
    if (storeIds.length > 0) {
      const { data: storeRows } = await sb.from('stores')
        .select('id, name, store_code, street_address, city, region, postal_code, country, address, phone')
        .in('id', storeIds);
      (storeRows || []).forEach(s => { storesById[s.id] = s; });
    }

    // 5. Build CSV
    const escape = v => `"${String(v == null ? '' : v).replace(/"/g, '""')}"`;
    const generatedAt = new Date();
    const recallLots = lots.join(' / ');
    const orgName = _orgName || 'Organisation';

    const coverBlock = [
      ['# FSMA 204 — 24-Hour Records Production'],
      ['# 21 CFR 1.1455 — Electronic Sortable Spreadsheet of Receiving KDEs'],
      [],
      ['Organisation',         orgName],
      ['Recall ID',            ev.id],
      ['Recall Product',       ev.product_name || ''],
      ['Recall Lot Code(s)',   recallLots],
      ['Recall Reason',        ev.reason || ''],
      ['Recall Severity',      ev.severity || ''],
      ['Recall Published',     ev.published_at ? new Date(ev.published_at).toISOString() : ''],
      ['Generated At',         generatedAt.toISOString()],
      ['Total Records',        String(scans.length)],
    ];

    if (ev.is_drill) {
      coverBlock.unshift([]);
      coverBlock.unshift(['# MOCK DRILL — TEST EXPORT — NOT FOR REGULATORY SUBMISSION']);
    }

    const dataHeaders = [
      'Traceability Lot Code',
      'Product Name',
      'Barcode',
      'Best-by / Expiry',
      'Store Name',
      'Store Code',
      'Street Address',
      'City',
      'Region',
      'Postal Code',
      'Country',
      'Date Received (placed on shelf)',
      'Quantity',
      'Staff Member',
      'Supplier / Source',
      'Status',
      'Date Removed'
    ];

    const dataRows = scans
      // Stable order: oldest first, matches an inspector's expected timeline
      .sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0))
      .map(s => {
        const store = storesById[s.store_id] || {};
        const status = s.removed_from_shelf_at ? 'Removed from shelf' : 'On shelf';
        return [
          s.lot_number || s.raw_capture || '',
          s.product_name || '',
          s.barcode_number || '',
          s.expiry_date || '',
          store.name || s.store_name || '',
          store.store_code || '',
          store.street_address || store.address || '',
          store.city || '',
          store.region || '',
          store.postal_code || '',
          store.country || '',
          s.created_at ? new Date(s.created_at).toISOString() : '',
          s.quantity != null ? String(s.quantity) : '',
          s.scanned_by || '',
          s.supplier_name || '',
          status,
          s.removed_from_shelf_at ? new Date(s.removed_from_shelf_at).toISOString() : ''
        ];
      });

    const csvLines = [
      ...coverBlock.map(row => row.map(escape).join(',')),
      [],   // blank separator
      dataHeaders.map(escape).join(','),
      ...dataRows.map(row => row.map(escape).join(','))
    ].map(l => Array.isArray(l) ? l : l).join('\n').replace(/\n+/g, '\n');

    // BOM so Excel auto-detects UTF-8 (important for Norwegian chars)
    const blob = new Blob(['﻿' + csvLines], { type: 'text/csv;charset=utf-8;' });

    const dateStr = generatedAt.toISOString().slice(0, 10);
    const shortId = ev.id.slice(0, 8);
    const drillTag = ev.is_drill ? 'DRILL-' : '';
    const filename = `FSMA-204-records_${drillTag}${shortId}_${dateStr}.csv`;

    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);

    showToast(`Exported ${scans.length} record${scans.length === 1 ? '' : 's'} — ${filename}`, 'ok', 5000);

  } catch (e) {
    console.error('[FSMA 204] export failed:', e);
    showToast('Could not produce FSMA 204 records: ' + (e.message || 'unknown error'), 'error', 5000);
  } finally {
    setBusy(false);
  }
}

// ── Live Recall action handlers (Step 7) ─────────────────────
// Two buttons in the recall detail header. Each stamps audit-trail
// timestamps on the relevant rows; outbound notification delivery
// (email/SMS/push) is intentionally a separate piece — these handlers
// record the recordable action, the delivery layer wires up later.

// Send reminders → for every store that hasn't yet reached Resolved
// (status !== 'confirmed'), stamps escalation_2h_sent_at with the
// current time. The event ticker renders these as yellow "SLA reminder
// sent" rows. One cadence, one click — no more escalation/reminder split.
// Eventually this should fire automatically on a schedule; the manual
// button becomes the override.
//
// Note: the column name (escalation_2h_sent_at) is legacy — it just
// stores "when the last reminder went out." We're not renaming it
// because nothing else cares about the column name.
async function sendRecallReminders(recallEventId) {
  try {
    const { data: acks, error } = await sb.from('recall_acknowledgements')
      .select('id, status')
      .eq('recall_event_id', recallEventId)
      .eq('organisation_id', _orgId);
    if (error) throw error;

    const targets = (acks || []).filter(a => a.status !== 'confirmed');
    if (targets.length === 0) {
      showToast('All stores have already reached Resolved — no reminders needed.', 'info', 3500);
      return;
    }

    if (!confirm(`Send reminders to ${targets.length} store${targets.length === 1 ? '' : 's'} that haven\'t reached Resolved?`)) return;

    const now = new Date().toISOString();
    const { error: upErr } = await sb.from('recall_acknowledgements')
      .update({ escalation_2h_sent_at: now })
      .in('id', targets.map(a => a.id))
      .eq('organisation_id', _orgId);
    if (upErr) throw upErr;

    showToast(`Reminder sent to ${targets.length} store${targets.length === 1 ? '' : 's'}.`, 'ok', 3000);
    setTimeout(() => renderRecallDetail(), 500);
  } catch (e) {
    showToast('Could not send reminders: ' + (e.message || 'unknown error'), 'error', 4500);
  }
}

// Mark complete → administratively close the recall, even if some stores
// haven't independently reached 'confirmed'. Requires migration 008
// (closed_at, closed_by, closed_note on recall_events). Shows a clear
// message if the migration hasn't been run.
async function markRecallComplete(recallEventId) {
  const note = prompt(
    'Mark this recall as administratively complete?\n\n' +
    'Optional: record a reason (e.g., "store deactivated", "product line discontinued"). Leave blank to skip.\n\n' +
    'This locks the audit trail. You can still view the recall but can\'t re-open it.'
  );
  if (note === null) return; // user canceled

  try {
    const { error } = await sb.from('recall_events')
      .update({
        closed_at:   new Date().toISOString(),
        closed_by:   _userId || null,
        closed_note: note || null
      })
      .eq('id', recallEventId);

    if (error) {
      // Migration 008 not yet applied — surface specific guidance
      const msg = (error.message || '').toLowerCase();
      if (error.code === '42703' || msg.includes('closed_at') || msg.includes('closed_by') || msg.includes('closed_note')) {
        showToast(
          'Mark Complete needs migration 008. Run migrations/008_recall_events_closure.sql in Supabase SQL Editor, then try again.',
          'warn',
          6500
        );
        return;
      }
      throw error;
    }

    showToast('Recall closed. Audit trail locked.', 'ok', 3000);
    setTimeout(() => renderRecallDetail(), 500);
  } catch (e) {
    showToast('Could not mark complete: ' + (e.message || 'unknown error'), 'error', 4500);
  }
}

// ── Live Recall Detail page ──────────────────────────────────
// Step 1 of the Live Recall pivot (2026-05). Per-recall operational
// view: header + recall info + 5-stage counters + map of affected
// stores + per-store ack list + live event ticker + FSMA 204 records
// production button.
//
// Reached via:
//   - Clicking a recall card on the Command Center right rail
//   - Deep link ?panel=recall-detail&id=<recall_event_id>
//
// _currentRecallDetailId must be set BEFORE this function runs.
// handleDeepLink sets it from the URL; the Command Center click
// handler sets it directly. If null, we render an error state with a
// link back to the dashboard.
//
// This step ships the data fetch + placeholder layout. Steps 2-7
// fill in the actual sections (header card, counter strip, map,
// stores list, event ticker, FSMA 204 records export, action buttons).
async function renderRecallDetail() {
  const el = document.getElementById('main-content');
  const recallEventId = _currentRecallDetailId;

  // Update the topbar title — overridden per-recall after data loads
  const topbar = document.getElementById('topbar-title');
  if (topbar) topbar.textContent = 'Live Recall';

  if (!recallEventId) {
    el.innerHTML = `
      <div style="max-width:520px;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;">
        <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px;">No recall selected</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:14px;">This page needs a recall id. Open a recall from the Active Recalls panel on the dashboard.</div>
        <button onclick="showPanel('overview')" style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;">← Back to Dashboard</button>
      </div>`;
    return;
  }

  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);padding:4px 0;"><div class="spinner"></div> Loading recall…</div>`;

  try {
    // Parallel fetch: the event itself, all acks for it (with embedded
    // store name/coords for the map and list), and any scan_recall_matches
    // (used in Step 2 to count what's still on shelf for the FSMA 204
    // records export).
    const [evRes, acksRes, srmRes] = await Promise.all([
      sb.from('recall_events')
        .select('id, product_name, lot_number, severity, reason, is_drill, published_at, source_org_id, created_at, closed_at, closed_by, closed_note')
        .eq('id', recallEventId)
        .single(),
      sb.from('recall_acknowledgements')
        .select('id, store_id, status, acknowledged_at, pulled_at, disposed_at, confirmed_at, created_at, units_pulled, units_pulled_confirmed_at, escalation_2h_sent_at, disposal_method, notes, acknowledged_by, stores(id, name, store_code, address, latitude, longitude, region, country, city)')
        .eq('recall_event_id', recallEventId)
        .eq('organisation_id', _orgId)
        .order('created_at', { ascending: true }),
      sb.from('scan_recall_matches')
        .select('id, scan_id, recall_id, recall_event_id, store_id, lot_number, product_name, quantity, removed_at')
        .or(`recall_event_id.eq.${recallEventId},recall_id.eq.${recallEventId}`)
        .eq('organisation_id', _orgId)
    ]);

    // Migration 008 adds closed_at/closed_by/closed_note to recall_events
    // for the "Mark complete" action. If the migration hasn't been run
    // yet, the SELECT above fails with 42703 (undefined_column). Detect
    // that and silently retry without the closure columns so the page
    // keeps working — Mark complete will surface its own message when
    // the user clicks it.
    let ev = evRes.data;
    if (evRes.error) {
      const msg = (evRes.error.message || '').toLowerCase();
      const isMissingClosure = evRes.error.code === '42703' || msg.includes('closed_at') || msg.includes('closed_by') || msg.includes('closed_note');
      if (isMissingClosure) {
        const retry = await sb.from('recall_events')
          .select('id, product_name, lot_number, severity, reason, is_drill, published_at, source_org_id, created_at')
          .eq('id', recallEventId)
          .single();
        if (retry.error) throw retry.error;
        ev = retry.data;
      } else {
        throw evRes.error;
      }
    }
    const acks = acksRes.data || [];
    const srm  = srmRes.data  || [];

    if (!ev) {
      el.innerHTML = `
        <div style="max-width:520px;padding:24px;background:var(--surface);border:1px solid var(--border);border-radius:12px;">
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);margin-bottom:6px;">Recall not found</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.55;margin-bottom:14px;">This recall doesn't exist or your org doesn't have access to it.</div>
          <button onclick="showPanel('overview')" style="font-family:'DM Mono',monospace;font-size:11px;padding:8px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);cursor:pointer;">← Back to Dashboard</button>
        </div>`;
      return;
    }

    // Update the topbar title to reflect the actual recall
    if (topbar) {
      topbar.textContent = ev.is_drill
        ? `Mock drill — ${ev.product_name || 'recall'}`
        : `Live recall — ${ev.product_name || 'recall'}`;
    }

    // Stage counts — same formula the right rail uses
    const total = acks.length;
    const stageCounts = {
      notified:     total,
      acknowledged: acks.filter(a => ['acknowledged','pulled','disposed','confirmed'].includes(a.status)).length,
      pulled:       acks.filter(a => ['pulled','disposed','confirmed'].includes(a.status)).length,
      disposed:     acks.filter(a => ['disposed','confirmed'].includes(a.status)).length,
      confirmed:    acks.filter(a => a.status === 'confirmed').length
    };
    const allResolved = total > 0 && stageCounts.confirmed === total;
    // Administrative closure (migration 008). isClosed wins over
    // allResolved for badge wording — "CLOSED" reads more accurately
    // when the coordinator force-closed before all stores resolved.
    const isClosed   = !!ev.closed_at;
    const isLocked   = isClosed || allResolved; // either way, audit trail locked

    // ── Per-stage sub-info for the 5-tile counter strip (Step 3) ────
    // Each tile shows count/total + a small sub-info line. Sub-info is
    // median time between stages for stages that have data, "first:
    // storename · time" for RESOLVED, and "dispatched X ago" for NOTIFIED.

    // Median (in ms) of (a[toKey] - a[fromKey]) across acks that have both timestamps.
    const _medianStageDuration = (fromKey, toKey) => {
      const durations = acks
        .filter(a => a[fromKey] && a[toKey])
        .map(a => new Date(a[toKey]).getTime() - new Date(a[fromKey]).getTime())
        .filter(ms => ms >= 0);
      return _median(durations);
    };

    // NOTIFIED — earliest dispatch timestamp across all acks.
    let notifiedSub = '—';
    if (acks.length > 0) {
      const earliest = acks.reduce((min, a) => {
        const t = a.created_at ? new Date(a.created_at).getTime() : Infinity;
        return t < min ? t : min;
      }, Infinity);
      if (isFinite(earliest)) notifiedSub = 'dispatched ' + _fmtElapsed(new Date(earliest).toISOString());
    }

    const ackMedianMs      = _medianStageDuration('created_at',      'acknowledged_at');
    const pulledMedianMs   = _medianStageDuration('acknowledged_at', 'pulled_at');
    const disposedMedianMs = _medianStageDuration('pulled_at',       'disposed_at');

    const ackSub      = ackMedianMs      != null ? 'median ' + _fmtDuration(ackMedianMs)      : 'no acks yet';
    const pulledSub   = pulledMedianMs   != null ? 'median ' + _fmtDuration(pulledMedianMs)   : 'no pulls yet';
    const disposedSub = disposedMedianMs != null ? 'median ' + _fmtDuration(disposedMedianMs) : 'no disposals yet';

    // RESOLVED — first store to reach confirmed.
    let resolvedSub = 'not resolved yet';
    const resolvedAcks = acks.filter(a => a.confirmed_at);
    if (resolvedAcks.length > 0) {
      const first = resolvedAcks.reduce((earliest, a) => {
        if (!earliest) return a;
        return new Date(a.confirmed_at).getTime() < new Date(earliest.confirmed_at).getTime() ? a : earliest;
      }, null);
      if (first) {
        const storeName = first.stores?.name || 'first store';
        resolvedSub = esc(storeName) + ' · ' + _fmtElapsed(first.confirmed_at);
      }
    }

    // Tile definitions for the strip render
    const counterTiles = [
      { label: 'STEP 1 · NOTIFIED',     count: stageCounts.notified,     sub: notifiedSub },
      { label: 'STEP 2 · ACKNOWLEDGED', count: stageCounts.acknowledged, sub: ackSub      },
      { label: 'STEP 3 · PULLED',       count: stageCounts.pulled,       sub: pulledSub   },
      { label: 'STEP 4 · DISPOSED',     count: stageCounts.disposed,     sub: disposedSub },
      { label: 'STEP 5 · RESOLVED',     count: stageCounts.confirmed,    sub: resolvedSub }
    ];

    // ── Affected-stores list for the map (Step 4) ─────────────────
    // Each ack row has an embedded `stores` relation with coords. We
    // tag each store with its current ack stage so renderStoreMap
    // colors the marker by stage. Stage timestamps are stashed on the
    // store object for the popup builder.
    const mapStores = (acks || []).filter(a => a.stores).map(a => ({
      ...a.stores,
      _status:        a.status || 'notified',
      _ackedAt:       a.acknowledged_at,
      _pulledAt:      a.pulled_at,
      _disposedAt:    a.disposed_at,
      _confirmedAt:   a.confirmed_at,
      _notifiedAt:    a.created_at,
      _unitsPulled:   a.units_pulled,
      _disposalMethod: a.disposal_method
    }));
    const storesOnMap     = mapStores.filter(s => s.latitude != null && s.longitude != null);
    const storesOffMap    = mapStores.filter(s => s.latitude == null || s.longitude == null);

    // ── Stores ack list (Step 5) — sorted by urgency ──────────────
    // Stage rank: notified first (most urgent — hasn't acted) through
    // confirmed last (done). Within a stage, oldest stage-timestamp
    // first so the longest-stuck stores rise to the top.
    const _stageRank = { notified: 0, acknowledged: 1, pulled: 2, disposed: 3, confirmed: 4 };
    const _stageEnteredAt = (s) => {
      // Timestamp when the store entered its current stage
      const map = {
        notified:     s._notifiedAt,
        acknowledged: s._ackedAt,
        pulled:       s._pulledAt,
        disposed:     s._disposedAt,
        confirmed:    s._confirmedAt
      };
      const ts = map[s._status];
      return ts ? new Date(ts).getTime() : 0;
    };
    const sortedStores = mapStores.slice().sort((a, b) => {
      const rA = _stageRank[a._status] != null ? _stageRank[a._status] : 99;
      const rB = _stageRank[b._status] != null ? _stageRank[b._status] : 99;
      if (rA !== rB) return rA - rB;
      // Same stage: oldest stage-entered-at first
      return _stageEnteredAt(a) - _stageEnteredAt(b);
    });

    // Stage badge backgrounds — alpha-tinted versions of the marker colors
    const _RECALL_DETAIL_STAGE_BG = {
      notified:     'rgba(var(--danger-rgb),0.12)',
      acknowledged: 'rgba(var(--warn-rgb),0.12)',
      pulled:       'rgba(249,213,110,0.14)',
      disposed:     'rgba(139,233,196,0.14)',
      confirmed:    'rgba(var(--accent-alt-rgb),0.12)'
    };

    // Build one row of the stores ack list.
    const _renderStoreAckRow = (s) => {
      const stage      = s._status || 'notified';
      const stageColor = _RECALL_DETAIL_STAGE_COLORS[stage] || '#7a8985';
      const stageBg    = _RECALL_DETAIL_STAGE_BG[stage]     || 'var(--surface2)';
      const stageLabel = _RECALL_DETAIL_STAGE_LABELS[stage] || stage;
      const enteredAtMs = _stageEnteredAt(s);
      const relTime    = enteredAtMs > 0 ? _fmtElapsed(new Date(enteredAtMs).toISOString()) : null;
      const absTime    = enteredAtMs > 0 ? new Date(enteredAtMs).toLocaleString(_dashLocale()) : '';
      const hasCoords  = s.latitude != null && s.longitude != null;

      const subParts = [];
      if (s.store_code) subParts.push(esc(s.store_code));
      if (s.city)       subParts.push(esc(s.city));
      if (relTime)      subParts.push('<span title="' + esc(absTime) + '">entered ' + esc(stageLabel.toLowerCase()) + ' · ' + esc(relTime) + '</span>');
      const subLine = subParts.join(' · ');

      return `
        <div class="batchd-store-ack-row" data-store-id="${esc(s.id || '')}"
             style="display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:10px;margin-bottom:6px;cursor:${hasCoords ? 'pointer' : 'default'};transition:background 0.15s,border-color 0.15s;"
             ${hasCoords ? `onmouseenter="this.style.background='var(--surface2)';this.style.borderColor='var(--accent-dim, rgba(var(--accent-alt-rgb),0.4))'" onmouseleave="this.style.background='var(--surface)';this.style.borderColor='var(--border)'"` : ''}>
          <span style="width:10px;height:10px;border-radius:50%;background:${stageColor};flex-shrink:0;"></span>
          <div style="flex:1;min-width:0;">
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:3px;">
              <span style="font-family:'Figtree',sans-serif;font-weight:600;font-size:13px;color:var(--text);">${esc(s.name || 'Unnamed store')}</span>
              <span style="font-family:'DM Mono',monospace;font-size:10px;font-weight:700;letter-spacing:0.05em;padding:2px 7px;border-radius:5px;background:${stageBg};color:${stageColor};">${esc(stageLabel.toUpperCase())}</span>
            </div>
            <div style="font-family:'DM Mono',monospace;font-size:10.5px;color:var(--muted);line-height:1.5;">
              ${subLine || '—'}
            </div>
          </div>
          ${hasCoords
            ? `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:0.04em;flex-shrink:0;">↗ Map</span>`
            : `<span style="font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);opacity:0.6;flex-shrink:0;" title="No coordinates — verify address in Store Network">no coords</span>`}
        </div>`;
    };

    const storesAckListHtml = sortedStores.length > 0 ? `
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:flex-end;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px;">
          <div>
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">Stores · response progress</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${sortedStores.length} affected · sorted most-urgent first</div>
          </div>
        </div>
        <div id="recall-detail-stores-list">
          ${sortedStores.map(_renderStoreAckRow).join('')}
        </div>
      </div>` : '';

    // ── Live event ticker (Step 6) ────────────────────────────────
    // Chronological feed of step transitions, recall publication, and
    // reminders sent. Sourced from timestamps already on the
    // recall_acknowledgements rows + the recall_event itself. Newest-first.
    //
    // Format: time label (left, mono) + event description (right).
    // Today's events show "HH:MM"; older show "DD Mon HH:MM". Hover the
    // time to see the full absolute timestamp via the title attr.
    const _eventTimeLabel = (iso) => {
      if (!iso) return '—';
      const t = new Date(iso);
      if (!isFinite(t.getTime())) return '—';
      const sameDay = t.toDateString() === new Date().toDateString();
      return sameDay
        ? t.toLocaleTimeString(_dashLocale(), { hour: '2-digit', minute: '2-digit', hour12: false })
        : t.toLocaleString(_dashLocale(), { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit', hour12: false });
    };
    const _eventAbsTime = (iso) => iso ? new Date(iso).toLocaleString(_dashLocale()) : '';

    const events = [];

    // Recall publication itself — the bottommost event in the feed
    if (ev.published_at) {
      events.push({
        t: ev.published_at,
        html: ev.is_drill
          ? `<span style="color:#f5a623;font-weight:600;">Mock drill launched</span> — ${esc(ev.product_name || 'recall')}`
          : `<strong style="color:var(--text);">Recall pushed</strong> to ${total} store${total === 1 ? '' : 's'} — ${esc(ev.product_name || '')}`,
        color: 'var(--text)'
      });
    }

    // Per-ack timeline events
    (acks || []).forEach(a => {
      const storeName = a.stores?.name || a.stores?.store_code || 'Store';

      if (a.created_at) {
        events.push({
          t: a.created_at,
          html: `<strong style="color:var(--text);">${esc(storeName)}</strong> notified`,
          color: 'var(--muted)'
        });
      }
      if (a.acknowledged_at) {
        events.push({
          t: a.acknowledged_at,
          html: `<strong style="color:var(--text);">${esc(storeName)}</strong> acknowledged`,
          color: 'var(--text)'
        });
      }
      if (a.pulled_at) {
        const units = (a.units_pulled != null && a.units_pulled > 0)
          ? ` · <span style="font-family:'DM Mono',monospace;color:var(--text);">${a.units_pulled} unit${a.units_pulled === 1 ? '' : 's'}</span>`
          : '';
        events.push({
          t: a.pulled_at,
          html: `<strong style="color:var(--text);">${esc(storeName)}</strong> pulled from shelf${units}`,
          color: 'var(--text)'
        });
      }
      if (a.disposed_at) {
        const method = a.disposal_method
          ? ` · <span style="color:var(--muted);">${esc(a.disposal_method)}</span>`
          : '';
        events.push({
          t: a.disposed_at,
          html: `<strong style="color:var(--text);">${esc(storeName)}</strong> disposed${method}`,
          color: 'var(--text)'
        });
      }
      if (a.confirmed_at) {
        events.push({
          t: a.confirmed_at,
          html: `<strong style="color:var(--text);">${esc(storeName)}</strong> <span style="color:var(--accent);font-weight:600;">resolved</span>`,
          color: 'var(--accent)'
        });
      }
      // Reminder events — populated by the Send-reminders button on
      // this page, and (eventually) by an automated cron. Only the 2h
      // column is used now; the 24h column was for an old reminder/
      // escalation split that no longer exists.
      if (a.escalation_2h_sent_at) {
        events.push({
          t: a.escalation_2h_sent_at,
          html: `<span style="color:var(--warn);font-weight:600;">Reminder sent</span> · <strong style="color:var(--text);">${esc(storeName)}</strong>`,
          color: 'var(--warn)'
        });
      }
    });

    // Newest first
    events.sort((a, b) => new Date(b.t).getTime() - new Date(a.t).getTime());

    // Cap at 50 — older events still accessible by scrolling within the
    // ticker container, but we don't want to render thousands of rows
    // for very long-lived recalls. (50 is a soft cap; bump if needed.)
    const TICKER_LIMIT = 50;
    const tickerEvents = events.slice(0, TICKER_LIMIT);
    const tickerOverflow = events.length - tickerEvents.length;

    const _renderEventRow = (e) => `
      <div style="display:flex;gap:14px;padding:10px 14px;border-bottom:1px solid var(--border);align-items:flex-start;">
        <div title="${esc(_eventAbsTime(e.t))}" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:90px;flex-shrink:0;letter-spacing:0.02em;line-height:1.6;">
          ${esc(_eventTimeLabel(e.t))}
        </div>
        <div style="flex:1;font-size:12px;color:${e.color};line-height:1.6;">
          ${e.html}
        </div>
      </div>`;

    const eventTickerHtml = `
      <div style="margin-bottom:14px;">
        <div style="display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;margin-bottom:10px;">
          <div>
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">Event ticker</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">
              ${events.length} event${events.length === 1 ? '' : 's'} · newest first
              ${tickerOverflow > 0 ? ` · showing latest ${TICKER_LIMIT}` : ''}
            </div>
          </div>
          ${!allResolved ? `
            <div style="display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:10px;color:var(--danger);letter-spacing:0.06em;font-weight:700;">
              <span style="width:6px;height:6px;border-radius:50%;background:var(--danger);animation:pulse 1.8s infinite;"></span>LIVE
            </div>` : ''}
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;max-height:420px;overflow-y:auto;">
          ${tickerEvents.length === 0
            ? '<div style="padding:14px 16px;font-size:11px;color:var(--muted);">No events yet.</div>'
            : tickerEvents.map(_renderEventRow).join('')}
        </div>
      </div>`;

    // Custom popup builder for the recall detail map. Shows store
    // name + address + current stage badge + relative time since
    // entering that stage. Inherits the light-theme popup styling
    // Leaflet uses by default.
    const _recallDetailPopup = (s) => {
      const stage      = s._status || 'notified';
      const stageLabel = _RECALL_DETAIL_STAGE_LABELS[stage] || stage;
      const stageColor = _RECALL_DETAIL_STAGE_COLORS[stage] || '#7a8985';
      // Most recent stage timestamp — newest stage advances forward
      const stageTs = s._confirmedAt || s._disposedAt || s._pulledAt || s._ackedAt || s._notifiedAt || null;
      const stageTsLine = stageTs
        ? `<div style="font-size:10px;color:#5a6661;margin-top:6px;font-family:'DM Mono',monospace;">${esc(stageLabel.toLowerCase())} · ${_fmtElapsed(stageTs)}</div>`
        : '';
      const unitsLine = (s._unitsPulled != null && s._unitsPulled > 0)
        ? `<div style="font-size:10px;color:#5a6661;margin-top:4px;font-family:'DM Mono',monospace;">${s._unitsPulled} unit${s._unitsPulled === 1 ? '' : 's'} pulled</div>`
        : '';
      const disposalLine = s._disposalMethod
        ? `<div style="font-size:10px;color:#5a6661;margin-top:4px;font-family:'DM Mono',monospace;">Disposal: ${esc(s._disposalMethod)}</div>`
        : '';
      return `
        <div style="font-family:'Figtree',sans-serif;font-size:12px;line-height:1.5;min-width:210px;">
          <div style="font-weight:700;font-size:13px;margin-bottom:4px;color:#1a201d;">${esc(s.name || 'Unnamed store')}</div>
          <div style="color:#5a6661;font-size:11px;margin-bottom:6px;">${esc(s.address || '')}</div>
          <div style="display:flex;align-items:center;gap:6px;font-size:11px;">
            <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${stageColor};"></span>
            <span style="color:#1a201d;font-weight:700;text-transform:uppercase;letter-spacing:0.05em;font-size:10px;">${esc(stageLabel)}</span>
          </div>
          ${stageTsLine}
          ${unitsLine}
          ${disposalLine}
        </div>`;
    };

    // Severity badge (Class I / II / III with colored token from
    // _severityLabel). Falls back to "—" if no severity on file.
    const sev = _severityLabel(ev.severity);
    const sevBadge = sev
      ? `<span style="display:inline-flex;align-items:center;font-family:'DM Mono',monospace;font-size:11px;font-weight:700;letter-spacing:0.05em;padding:4px 10px;border-radius:6px;background:${sev.bg};border:1px solid ${sev.border};color:${sev.fg};">${esc(sev.txt)}${ev.is_drill ? ' (sim.)' : ''}</span>`
      : '<span style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);">—</span>';

    // LIVE / COMPLETED / CLOSED badge. Pulses for active recalls; muted
    // when naturally completed; warn-amber when administratively closed.
    let badgeText, badgeBg, badgeBorder, badgeColor, badgeDot, badgePulse;
    if (isClosed) {
      badgeText   = 'CLOSED';
      badgeBg     = 'rgba(var(--warn-rgb),0.10)';
      badgeBorder = 'rgba(var(--warn-rgb),0.35)';
      badgeColor  = 'var(--warn)';
      badgeDot    = 'var(--warn)';
      badgePulse  = '';
    } else if (allResolved) {
      badgeText   = 'COMPLETED';
      badgeBg     = 'var(--surface2)';
      badgeBorder = 'var(--border)';
      badgeColor  = 'var(--muted)';
      badgeDot    = 'var(--muted)';
      badgePulse  = '';
    } else {
      badgeText   = 'LIVE';
      badgeBg     = 'rgba(var(--danger-rgb),0.1)';
      badgeBorder = 'rgba(var(--danger-rgb),0.35)';
      badgeColor  = 'var(--danger)';
      badgeDot    = 'var(--danger)';
      badgePulse  = 'animation:pulse 1.8s infinite;';
