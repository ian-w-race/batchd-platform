<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch'd — Corporate Dashboard</title>
  <meta name="theme-color" content="#34d399" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #080f12;
      --surface:  #0d1e1c;
      --surface2: #13302b;
      --border:   #163d37;
      --accent:   #34d399;
      --accent-dim:#059669;
      --text:     #edfdf8;
      --muted:    #6aaf9e;
      --danger:   #ff5c5c;
      --warn:     #f5a623;
      --info:     #38bdf8;
      --radius:   12px;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 70% 40% at 15% 0%, rgba(52,211,153,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 50% 30% at 85% 100%, rgba(5,150,105,0.07) 0%, transparent 55%);
    }

    /* ── Layout ── */
    .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: fixed; top: 0; left: 0; bottom: 0;
      z-index: 100;
    }
    .sidebar-logo {
      padding: 20px 18px 16px;
      display: flex; align-items: center; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .logo-icon {
      width: 32px; height: 32px; background: var(--accent); border-radius: 8px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-icon svg { color: #080f12; }
    .logo-text { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }

    .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 10px 8px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 10px;
      padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: all 0.15s;
      text-decoration: none; border: none; background: none; width: 100%; text-align: left;
    }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(52,211,153,0.1); color: var(--accent); }
    .nav-item svg { flex-shrink: 0; opacity: 0.7; }
    .nav-item.active svg { opacity: 1; }
    .nav-badge {
      margin-left: auto; background: var(--danger); color: white;
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 10px;
    }

    .sidebar-footer {
      padding: 12px 10px;
      border-top: 1px solid var(--border);
    }
    .user-chip {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px; border-radius: 8px;
      background: var(--surface2);
    }
    .user-avatar {
      width: 28px; height: 28px; border-radius: 50%;
      background: var(--accent-dim); display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0;
    }
    .user-info { min-width: 0; flex: 1; }
    .user-name { font-size: 11px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 9px; color: var(--muted); letter-spacing: 0.05em; }
    .sign-out-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; transition: color 0.15s; }
    .sign-out-btn:hover { color: var(--danger); }

    /* ── Main content ── */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }

    .topbar {
      padding: 16px 28px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,15,18,0.8); backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 50;
    }
    .topbar-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .topbar-actions { display: flex; align-items: center; gap: 10px; }
    .topbar-time { font-size: 11px; color: var(--muted); }

    .content { padding: 24px 28px; flex: 1; }

    /* ── Alert banner ── */
    .alert-banner {
      background: rgba(255,92,92,0.08);
      border: 1px solid rgba(255,92,92,0.25);
      border-radius: var(--radius);
      padding: 12px 16px;
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 20px;
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%,100% { border-color: rgba(255,92,92,0.25); }
      50%      { border-color: rgba(255,92,92,0.5); }
    }
    .alert-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--danger); flex-shrink: 0; animation: blink 1.2s ease-in-out infinite; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .alert-text { font-size: 12px; color: var(--danger); flex: 1; }
    .alert-text strong { color: #ff8080; }
    .alert-action { font-size: 11px; color: var(--danger); border: 1px solid rgba(255,92,92,0.4); border-radius: 6px; padding: 4px 10px; cursor: pointer; background: none; white-space: nowrap; transition: all 0.15s; }
    .alert-action:hover { background: rgba(255,92,92,0.1); }

    /* ── KPI grid ── */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      position: relative; overflow: hidden;
      transition: border-color 0.15s;
    }
    .kpi-card:hover { border-color: var(--muted); }
    .kpi-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .kpi-card.green::before  { background: var(--accent); }
    .kpi-card.red::before    { background: var(--danger); }
    .kpi-card.amber::before  { background: var(--warn); }
    .kpi-card.blue::before   { background: var(--info); }
    .kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 28px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .kpi-value.danger { color: var(--danger); }
    .kpi-value.warn   { color: var(--warn); }
    .kpi-value.accent { color: var(--accent); }
    .kpi-sub { font-size: 10px; color: var(--muted); }
    .kpi-trend { position: absolute; top: 16px; right: 16px; font-size: 10px; padding: 2px 7px; border-radius: 10px; }
    .kpi-trend.up   { background: rgba(52,211,153,0.12); color: var(--accent); }
    .kpi-trend.down { background: rgba(255,92,92,0.12); color: var(--danger); }
    .kpi-trend.flat { background: rgba(106,175,158,0.1); color: var(--muted); }

    /* ── Two-col layout ── */
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
    .three-col { display: grid; grid-template-columns: 2fr 1fr; gap: 14px; margin-bottom: 20px; }

    /* ── Panel ── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .panel-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
    .panel-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .panel-body { padding: 16px 18px; }
    .panel-action { font-size: 11px; color: var(--muted); border: 1px solid var(--border); border-radius: 6px; padding: 5px 12px; cursor: pointer; background: none; transition: all 0.15s; }
    .panel-action:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Recall list ── */
    .recall-item {
      display: flex; align-items: flex-start; gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }
    .recall-item:last-child { border-bottom: none; padding-bottom: 0; }
    .recall-severity {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .sev-i   { background: var(--danger); box-shadow: 0 0 6px rgba(255,92,92,0.5); }
    .sev-ii  { background: var(--warn); }
    .sev-iii { background: var(--muted); }
    .recall-info { flex: 1; min-width: 0; }
    .recall-name { font-size: 12px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .recall-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
    .recall-status { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .status-active   { background: rgba(255,92,92,0.12); color: var(--danger); }
    .status-resolved { background: rgba(52,211,153,0.1); color: var(--accent); }
    .status-pending  { background: rgba(245,166,35,0.12); color: var(--warn); }

    /* ── Store table ── */
    .store-table { width: 100%; border-collapse: collapse; }
    .store-table th {
      font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--muted); text-align: left; padding: 0 0 10px;
      border-bottom: 1px solid var(--border);
    }
    .store-table td { padding: 10px 0; border-bottom: 1px solid rgba(22,61,55,0.5); font-size: 11px; vertical-align: middle; }
    .store-table tr:last-child td { border-bottom: none; }
    .store-name { color: var(--text); font-weight: 500; }
    .score-bar-wrap { display: flex; align-items: center; gap: 8px; }
    .score-bar { height: 4px; border-radius: 2px; background: var(--border); flex: 1; overflow: hidden; }
    .score-fill { height: 100%; border-radius: 2px; transition: width 0.5s; }
    .score-fill.green  { background: var(--accent); }
    .score-fill.amber  { background: var(--warn); }
    .score-fill.red    { background: var(--danger); }
    .score-val { font-size: 10px; color: var(--muted); width: 28px; text-align: right; flex-shrink: 0; }
    .scan-spark { display: flex; align-items: flex-end; gap: 2px; height: 20px; }
    .spark-bar { width: 4px; border-radius: 1px; background: var(--accent); opacity: 0.6; }

    /* ── Compliance radar ── */
    .compliance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .comp-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .comp-label { font-size: 10px; color: var(--muted); margin-bottom: 6px; }
    .comp-value { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 18px; margin-bottom: 4px; }
    .comp-bar { height: 3px; border-radius: 2px; background: var(--border); overflow: hidden; }
    .comp-fill { height: 100%; border-radius: 2px; }

    /* ── Activity feed ── */
    .activity-item {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid rgba(22,61,55,0.5);
      font-size: 11px;
    }
    .activity-item:last-child { border-bottom: none; }
    .activity-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; }
    .activity-dot.warn { background: var(--warn); }
    .activity-dot.muted { background: var(--border); }
    .activity-text { color: var(--muted); line-height: 1.5; }
    .activity-text strong { color: var(--text); font-weight: 500; }
    .activity-time { margin-left: auto; font-size: 10px; color: var(--muted); flex-shrink: 0; padding-left: 8px; }

    /* ── FSMA readiness ── */
    .fsma-score {
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; padding: 16px 0;
    }
    .fsma-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      background: conic-gradient(var(--accent) 0deg, var(--accent) calc(var(--pct) * 3.6deg), var(--border) calc(var(--pct) * 3.6deg));
      display: flex; align-items: center; justify-content: center;
      position: relative; margin-bottom: 10px;
    }
    .fsma-ring::before {
      content: '';
      position: absolute; width: 76px; height: 76px;
      border-radius: 50%; background: var(--surface);
    }
    .fsma-ring-val {
      position: relative; z-index: 1;
      font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 22px; color: var(--accent);
    }
    .fsma-label { font-size: 11px; color: var(--muted); text-align: center; }

    /* ── Buttons ── */
    .btn-primary {
      background: var(--accent); color: #080f12; border: none; border-radius: 8px;
      padding: 9px 16px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px;
    }
    .btn-primary:hover { background: #6ee7b7; }
    .btn-ghost {
      background: none; border: 1px solid var(--border); color: var(--muted);
      border-radius: 8px; padding: 7px 14px; font-family: 'DM Mono', monospace;
      font-size: 11px; cursor: pointer; transition: all 0.15s;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Loading ── */
    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Empty state ── */
    .empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 12px; }
    .empty svg { opacity: 0.3; margin-bottom: 8px; }

    /* ── Auth gate ── */
    .auth-gate {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 36px; width: 100%; max-width: 380px;
    }
    .auth-logo { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; }
    .auth-title { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 22px; margin-bottom: 4px; }
    .auth-sub { font-size: 12px; color: var(--muted); margin-bottom: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); }
    .auth-btn {
      width: 100%; background: var(--accent); color: #080f12; border: none; border-radius: 8px;
      padding: 12px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .auth-btn:hover { background: #6ee7b7; }
    .auth-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .auth-msg { font-size: 11px; padding: 9px 12px; border-radius: 6px; margin-bottom: 12px; }
    .auth-msg.error { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: var(--danger); }
    .auth-link { text-align: center; margin-top: 14px; font-size: 11px; color: var(--muted); }
    .auth-link a { color: var(--accent); text-decoration: none; }

    @media (max-width: 1100px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .two-col, .three-col { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      .sidebar { transform: translateX(-100%); }
      .main { margin-left: 0; }
      .kpi-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<!-- ── Auth gate ── -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <span style="font-family:'Figtree',sans-serif;font-weight:800;font-size:18px;color:var(--accent);">Batch'd</span>
    </div>
    <div class="auth-title">Corporate Dashboard</div>
    <div class="auth-sub">Sign in to access your organisation's food safety command centre.</div>
    <div id="auth-msg" style="display:none;" class="auth-msg error"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@company.com" autocomplete="email" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <div class="field"><label>Password</label><input id="auth-pw" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <button class="auth-btn" id="auth-btn" onclick="doAuth()">Sign in →</button>
    <div class="auth-link">Don't have an account? <a href="https://batchdapp.com">Sign up at batchdapp.com</a></div>
  </div>
</div>

<!-- ── App shell ── -->
<div class="app" id="app-shell" style="display:none;">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div><div class="logo-text">Batch'd</div><div class="logo-sub">Corporate</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" onclick="showPanel('overview')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <div class="nav-section">Operations</div>
      <button class="nav-item" onclick="showPanel('recalls')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Recalls
        <span class="nav-badge" id="nav-recall-badge" style="display:none;">0</span>
      </button>
      <button class="nav-item" onclick="showPanel('stores')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        Stores
      </button>
      <button class="nav-item" onclick="showPanel('traceability')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        Traceability
      </button>
      <button class="nav-item" onclick="showPanel('staff')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Staff
      </button>
      <div class="nav-section">Compliance</div>
      <button class="nav-item" onclick="showPanel('compliance')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Compliance

function updateClock() {

// ── Auth ───────────────────────────────────────────────────────
async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const msg   = document.getElementById('auth-msg');
  const btn   = document.getElementById('auth-btn');
  msg.style.display = 'none';
  if (!email || !pw) { showAuthMsg('Please enter your email and password.'); return; }
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Signing in…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    _session = data.session;
    await initDashboard(data.user);
  } catch(e) {
    showAuthMsg(e.message || 'Incorrect email or password.');
    btn.disabled = false; btn.innerHTML = 'Sign in →';
  }
}

function showAuthMsg(txt) {
  const el = document.getElementById('auth-msg');
  el.textContent = txt; el.style.display = 'block';
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

// ── Init ───────────────────────────────────────────────────────
async function initDashboard(user) {
  // Get org membership
  const { data: member } = await sb.from('organisation_members')
    .select('organisation_id, role')
    .eq('user_id', user.id)
    .single();

  if (!member) {
    showAuthMsg('No organisation found for this account. Please sign up at batchdapp.com first.');
    document.getElementById('auth-btn').disabled = false;
    document.getElementById('auth-btn').innerHTML = 'Sign in →';
    return;
  }

  // Route by role — manufacturers and staff don't belong here
  if (member.role === 'mfr_admin' || member.role === 'mfr_qa') {
    window.location.replace('/manufacturer.html');
    return;
  }
  if (member.role === 'staff') {
    window.location.replace('https://batchd-app.netlify.app');
    return;
  }

  _orgId = member.organisation_id;

  const { data: org } = await sb.from('organisations')
    .select('name, region')
    .eq('id', _orgId)
    .single();

  _orgName   = org?.name || 'My Organisation';
  _orgRegion = org?.region || 'no';

  // Show app
  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';

  // Set user info
  const firstName = user.user_metadata?.first_name || user.email?.split('@')[0] || 'User';
  const lastName  = user.user_metadata?.last_name  || '';
  document.getElementById('user-name').textContent  = firstName + (lastName ? ' ' + lastName : '');
  document.getElementById('user-role').textContent  = member.role.replace('_', ' ');
  document.getElementById('user-avatar').textContent = firstName[0].toUpperCase();
  document.getElementById('topbar-sub').textContent  = _orgName + ' · ' + (_orgRegion === 'us' ? 'United States' : 'Norway / EU');

  showPanel('overview');
}

// ── Panel router ──────────────────────────────────────────────
function showPanel(name) {
  _activePanel = name;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const panels = { overview:'Dashboard', recalls:'Recalls', stores:'Stores', traceability:'Traceability', staff:'Staff', compliance:'Compliance', reports:'Reports', settings:'Settings' };
  document.getElementById('topbar-title').textContent = panels[name] || name;
  document.querySelectorAll('.nav-item').forEach(el => {
    if (el.getAttribute('onclick')?.includes(`'${name}'`)) el.classList.add('active');
  });
  const fns = { overview: renderOverview, recalls: renderRecalls, stores: renderStores, traceability: renderTraceability, staff: renderStaff, compliance: renderCompliance, reports: renderReports, settings: renderSettings };
  (fns[name] || renderComingSoon)(name);
}

  const el = document.getElementById('main-content');

    const activeStores   = stores.filter(s => s.active).length;

    // Scan activity last 7 days for sparklines
    const last7 = Array.from({length:7}, (_,i) => {
      const d = new Date(); d.setDate(d.getDate() - (6-i));
      return d.toISOString().split('T')[0];
    });
    const scansByDay = last7.map(d => scans.filter(s => s.created_at?.startsWith(d)).length);
    const maxDay = Math.max(...scansByDay, 1);

    // Compliance score (simple calculation from resolved recalls and scan coverage)
    const resolvedRate = recalls.length > 0
      ? Math.round((recalls.filter(r => !r.active).length / recalls.length) * 100) : 100;

    // Store compliance scores (based on recent scan activity)
    const storeScores = stores.slice(0,6).map(store => {
      const storeScans = scans.filter(s => s.store_name === store.name);
      const recentScans = storeScans.filter(s => {
        const d = new Date(s.created_at);
        return (Date.now() - d) < 7 * 24 * 60 * 60 * 1000;
      }).length;
      const score = Math.min(100, 60 + recentScans * 4);
      return { ...store, score, recentScans };
    });

    el.innerHTML = `
      ${activeRecalls > 0 ? `
      <div class="alert-banner">
        <div class="alert-dot"></div>
        <div class="alert-text"><strong>${activeRecalls} active recall${activeRecalls>1?'s':''}</strong> require immediate attention across your store network.</div>
        <button class="alert-action" onclick="showPanel('recalls')">View recalls →</button>
      </div>` : ''}

      <div class="kpi-grid">

          <div class="kpi-label">Active recalls</div>
          <div class="kpi-value ${activeRecalls>0?'danger':'accent'}">${activeRecalls}</div>

        </div>
        <div class="kpi-card blue">
          <div class="kpi-label">Total scans</div>
          <div class="kpi-value">${totalScans.toLocaleString()}</div>
          <div class="kpi-sub">${scansToday} today across all stores</div>
          <span class="kpi-trend up">↑ Active</span>
        </div>
        <div class="kpi-card amber">
          <div class="kpi-label">Escalated items</div>
          <div class="kpi-value ${escalated>0?'warn':''}">${escalated}</div>
          <div class="kpi-sub">Awaiting manager resolution</div>
          ${escalated>0 ? '<span class="kpi-trend down">Needs review</span>' : '<span class="kpi-trend flat">None pending</span>'}
        </div>
        <div class="kpi-card green">
          <div class="kpi-label">Active stores</div>
          <div class="kpi-value accent">${activeStores}</div>
          <div class="kpi-sub">${stores.length} total locations</div>
          <span class="kpi-trend flat">→ Stable</span>
        </div>
      </div>

      <div class="three-col">
        <div class="panel">
          <div class="panel-header">
            <div><div class="panel-title">Store compliance scores</div><div class="panel-sub">Based on scan activity over 7 days</div></div>

            `<table class="store-table">
              <thead><tr><th>Store</th><th>Compliance</th><th>7-day scans</th></tr></thead>
              <tbody>${storeScores.map(s => `
                <tr>
                  <td><div class="store-name">${s.name}</div></td>
                  <td>
                    <div class="score-bar-wrap">
                      <div class="score-bar"><div class="score-fill ${s.score>=80?'green':s.score>=60?'amber':'red'}" style="width:${s.score}%"></div></div>
                      <div class="score-val">${s.score}%</div>
                    </div>
                  </td>
                  <td style="color:var(--muted)">${s.recentScans}</td>

              </tbody>

          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:14px;">
          <div class="panel">
            <div class="panel-header">
              <div><div class="panel-title">${_orgRegion==='us'?'FSMA 204':'EU 178/2002'} readiness</div></div>
            </div>
            <div class="panel-body">
              <div class="fsma-score">
                <div class="fsma-ring" style="--pct:${resolvedRate}">
                  <div class="fsma-ring-val">${resolvedRate}%</div>
                </div>
                <div class="fsma-label">${resolvedRate>=80?'Good standing':'Needs improvement'}</div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-header"><div class="panel-title">Scan activity</div><div style="font-size:10px;color:var(--muted)">Last 7 days</div></div>
            <div class="panel-body">
              <div style="display:flex;align-items:flex-end;gap:4px;height:48px;margin-bottom:6px;">
                ${scansByDay.map((v,i) => `
                  <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">
                    <div style="width:100%;border-radius:2px;background:var(--accent);opacity:${0.4+0.6*(v/maxDay)};height:${Math.max(4, Math.round(44*(v/maxDay)))}px;"></div>

              </div>
              <div style="display:flex;justify-content:space-between;font-size:9px;color:var(--muted);">

              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="two-col">
        <div class="panel">
          <div class="panel-header">
            <div><div class="panel-title">Active recalls</div><div class="panel-sub">Requires immediate action</div></div>

                <div class="recall-item">
                  <div class="recall-severity sev-i"></div>
                  <div class="recall-info">

                    <div class="recall-meta">Lot: ${r.lot_number||'—'} · ${r.source||'Manual'} · ${new Date(r.created_at||Date.now()).toLocaleDateString('en-GB')}</div>
                  </div>
                  <span class="recall-status status-active">Active</span>
                </div>`).join('')}
          </div>
        </div>

        <div class="panel">
          <div class="panel-header"><div class="panel-title">Compliance checklist</div><div class="panel-sub">Key requirements status</div></div>
          <div class="panel-body">
            <div class="compliance-grid">
              ${[
                { label:'Recall response plan', val: recalls.length>0?100:20, color:'var(--accent)' },
                { label:'Store scan coverage', val: Math.min(100, activeStores>0?70+scansToday*3:10), color:'var(--accent)' },
                { label:'Escalation handling', val: escalated===0?100:Math.max(20,100-escalated*15), color: escalated>0?'var(--warn)':'var(--accent)' },

                </div>`).join('')}
            </div>
          </div>
        </div>
      </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading dashboard: ${e.message}</div>`;

async function renderRecalls() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading recalls…</div>`;

  const [recallsRes, pushedRes, acksRes] = await Promise.all([
    sb.from('recalls').select('*').eq('organisation_id', _orgId).order('created_at', {ascending:false}),
    sb.from('recall_distributions')
      .select('*, recall_event_id, retailer_org_id, est_affected_units, distributed_at, recall_events!inner(id, product_name, lot_number, barcode, severity, reason, description, authority_reference, is_drill, published_at, source_org_id)')
      .eq('retailer_org_id', _orgId)
      .order('distributed_at', {ascending:false}),
    sb.from('recall_acknowledgements')
      .select('*, stores(name)')
      .eq('organisation_id', _orgId)
      .order('created_at', {ascending:false}),

  const pushed   = pushedRes.data   || [];

  const badge    = document.getElementById('nav-recall-badge');
  const activePushed = pushed.filter(p => !p.recall_events?.is_drill).length;
  const active   = recalls.filter(r=>r.active).length + activePushed;
  const unacknowledged = acks.filter(a => a.status === 'notified').length;
  if (active > 0) { badge.textContent = active; badge.style.display = 'inline'; }

  const stepOrder = ['notified','acknowledged','pulled','disposed','confirmed'];
  const stepLabels = { notified:'Notified', acknowledged:'Acknowledged', pulled:'Pulled from shelf', disposed:'Disposed', confirmed:'Confirmed ✓' };
  const stepColors = { notified:'var(--muted)', acknowledged:'var(--info)', pulled:'var(--warn)', disposed:'var(--accent)', confirmed:'var(--accent)' };

  el.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
      <div>
        <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">${active} active recall${active!==1?'s':''}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px;">${recalls.length + pushed.length} total · ${unacknowledged} store${unacknowledged!==1?'s':''} awaiting acknowledgement</div>
      </div>
      ${unacknowledged > 0 ? `
      <div style="display:flex;align-items:center;gap:6px;background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.25);border-radius:8px;padding:8px 12px;">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--danger);animation:blink 1.2s ease-in-out infinite;"></div>
        <span style="font-size:11px;color:var(--danger);">${unacknowledged} store${unacknowledged!==1?'s':''} require action</span>
      </div>` : ''}
    </div>

    ${pushed.length > 0 ? `
    <div style="margin-bottom:20px;">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;">Manufacturer recall alerts</div>
      ${pushed.map(p => {
        const ev = p.recall_events;
        const isDrill = ev?.is_drill;
        const mfrName = ev?.organisations?.name || _orgName;
        const evAcks = acks.filter(a => a.recall_event_id === p.recall_event_id);
        const allConfirmed = evAcks.length > 0 && evAcks.every(a => a.status === 'confirmed');
        const anyPending = evAcks.some(a => a.status === 'notified');
        const sevNum = ev?.severity?.split('_')[1] || 'ii';

        return `
        <div style="margin-bottom:14px;border:1px solid ${isDrill?'rgba(245,166,35,0.3)':anyPending?'rgba(255,92,92,0.3)':'var(--border)'};border-radius:12px;overflow:hidden;">

          <!-- Recall header -->
          <div style="padding:16px 18px;background:${isDrill?'rgba(245,166,35,0.04)':anyPending?'rgba(255,92,92,0.04)':'var(--surface)'};display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div style="display:flex;align-items:flex-start;gap:12px;">
              <div style="width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;background:${isDrill?'var(--warn)':sevNum==='i'?'var(--danger)':sevNum==='ii'?'var(--warn)':'var(--muted)'};${sevNum==='i'&&!isDrill?'box-shadow:0 0 8px rgba(255,92,92,0.6);':''}"></div>
              <div>
                <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:4px;">
                  <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:14px;color:var(--text);">${ev?.product_name||'—'}</div>
                  ${isDrill?`<span style="font-size:10px;background:rgba(245,166,35,0.12);color:var(--warn);padding:2px 8px;border-radius:10px;font-weight:600;">MOCK DRILL</span>`:''}
                  ${!isDrill&&anyPending?`<span style="font-size:10px;background:rgba(255,92,92,0.12);color:var(--danger);padding:2px 8px;border-radius:10px;font-weight:600;">ACTION REQUIRED</span>`:''}
                  ${allConfirmed?`<span style="font-size:10px;background:rgba(52,211,153,0.12);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600;">✓ COMPLETE</span>`:''}
                </div>
                <div style="font-size:11px;color:var(--muted);line-height:1.6;">
                  From <strong style="color:var(--text);">${mfrName}</strong>
                  ${ev?.lot_number?` · Lot: <strong style="color:var(--text);">${ev.lot_number}</strong>`:''}
                  ${ev?.barcode?` · Barcode: <strong style="color:var(--text);">${ev.barcode}</strong>`:''}
                  <br>${ev?.severity?.replace('_',' ')} · ${ev?.reason}
                  ${ev?.authority_reference?` · Ref: <strong style="color:var(--text);">${ev.authority_reference}</strong>`:''}
                </div>
              </div>

async function advanceAckStatus(ackId, status, recallEventId) {
  const btn = event.target;
  const origText = btn.textContent;
  btn.disabled = true; btn.textContent = '…';
  const { error } = await sb.from('recall_acknowledgements').update({
    status,
    acknowledged_at: new Date().toISOString(),
    acknowledged_by: (await sb.auth.getUser()).data.user?.id,
  }).eq('id', ackId);
  if (error) { btn.disabled = false; btn.textContent = origText; return; }
  renderRecalls();
}

async function saveUnits(ackId) {
  const val = parseInt(document.getElementById('units-' + ackId)?.value || '0');
  await sb.from('recall_acknowledgements').update({ units_pulled: val }).eq('id', ackId);
  renderRecalls();
}

async function updateAckStatus(ackId, status) {
  await sb.from('recall_acknowledgements').update({
    status,
    acknowledged_at: new Date().toISOString(),
    acknowledged_by: (await sb.auth.getUser()).data.user?.id,
  }).eq('id', ackId);
  renderRecalls();
}

function openInviteForm() {
  document.getElementById('invite-form').style.display = 'block';
  document.getElementById('inv-email').focus();
}

function closeInviteForm() {
  document.getElementById('invite-form').style.display = 'none';
  document.getElementById('inv-email').value = '';
  document.getElementById('invite-msg').style.display = 'none';
}

function onInvRoleChange() {
  const role = document.getElementById('inv-role').value;
  const storeWrap = document.getElementById('inv-store-wrap');
  storeWrap.style.display = role === 'corp_admin' ? 'none' : 'block';
}

async function sendInvitation() {
  const email    = document.getElementById('inv-email').value.trim();
  const role     = document.getElementById('inv-role').value;
  const storeId  = document.getElementById('inv-store')?.value || null;
  const msgEl    = document.getElementById('invite-msg');
  const btn      = document.getElementById('btn-send-invite');

  msgEl.style.display = 'none';

  if (!email || !email.includes('@')) {
    showInvMsg('Please enter a valid email address.', 'error'); return;
  }
  if (role !== 'corp_admin' && !storeId) {
    showInvMsg('Please select a store for this team member.', 'error'); return;
  }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Sending…';

  try {
    // Create invitation record in DB
    const { data: inv, error } = await sb.rpc('send_invitation', {
      p_organisation_id: _orgId,
      p_email: email,
      p_role: role,
      p_store_id: storeId || null,
    });
    if (error) throw error;

    // Send email via Netlify function
    const inviteUrl = `https://batchdapp.com/join?token=${inv.token}`;
    const roleLabel = role.replace(/_/g, ' ');

    const emailRes = await fetch('/.netlify/functions/send-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        to: email,
        orgName: inv.org_name,
        inviterEmail: inv.inviter_email,
        role: roleLabel,
        inviteUrl,
      }),
    });

    if (!emailRes.ok) throw new Error('Email failed to send');

    showInvMsg(`Invitation sent to ${email} ✓`, 'success');
    btn.disabled = false;
    btn.innerHTML = 'Send invitation email →';
    document.getElementById('inv-email').value = '';
    // Refresh staff panel after 1.5s
    setTimeout(() => renderStaff(), 1500);

  } catch(e) {
    showInvMsg('Error: ' + (e.message || 'Could not send invitation.'), 'error');
    btn.disabled = false;
    btn.innerHTML = 'Send invitation email →';
  }
}

function showInvMsg(txt, type) {
  const el = document.getElementById('invite-msg');
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.border = type === 'error' ? '1px solid rgba(255,92,92,0.3)' : '1px solid rgba(52,211,153,0.3)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
}

        <div style="font-size:11px;color:var(--muted);margin-top:4px;">To update organisation settings, contact support or visit batchdapp.com.</div>
      </div>
    </div>`;
}

// ── Coming soon ────────────────────────────────────────────────
function renderComingSoon(name) {
  document.getElementById('main-content').innerHTML = `
    <div style="display:flex;align-items:center;justify-content:center;height:300px;flex-direction:column;gap:12px;color:var(--muted);">
      <div style="font-size:32px;opacity:0.3;">🔨</div>
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;color:var(--text);">${name} — coming soon</div>
      <div style="font-size:12px;">This module is in development.</div>
    </div>`;
}

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    _session = session;
    await initDashboard(session.user);
  }
})();
</script>
</body>
</html>
