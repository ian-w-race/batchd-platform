# netlify.toml
# Batch'd platform configuration

[build]
  publish = "."

[functions]
  directory = "netlify/functions"

# Recall data is refreshed every 6 hours automatically
# No user action needed — stores always have fresh recall data on login
[[plugins]]
  package = "@netlify/plugin-nextjs"

[functions."recall-fetch-scheduled"]
  schedule = "0 */6 * * *"
