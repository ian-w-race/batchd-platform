[[redirects]]
  from = "/join"
  to = "/join.html"
  status = 200

[[redirects]]
  from = "/manufacturer"
  to = "/manufacturer.html"
  status = 200

# ── Scheduled functions ─────────────────────────────────────
# recall-escalation runs every 30 minutes and sends 2h/24h escalation
# emails to stores that haven't acknowledged recalls.
# Netlify scheduled functions require a Pro plan or higher.
[functions.recall-escalation]
  schedule = "*/30 * * * *"
