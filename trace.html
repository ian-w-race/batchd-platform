<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Product Traceability — Batch'd</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#080f12;--surface:#0d1e1c;--surface2:#13302b;--border:#163d37;
    --accent:#34d399;--text:#edfdf8;--muted:#6aaf9e;
    --danger:#ff5c5c;--warn:#f5a623;--info:#38bdf8;--radius:12px;
  }
  body{background:var(--bg);color:var(--text);font-family:'Figtree',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:16px;width:100%;max-width:480px;overflow:hidden;margin-top:16px;}
  .card-header{padding:24px;background:linear-gradient(135deg,var(--surface2),var(--surface));}
  .card-body{padding:20px 24px;}
  .label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px;}
  .value{font-size:14px;font-weight:600;color:var(--text);}
  .mono{font-family:'DM Mono',monospace;font-size:13px;}
  .row{display:flex;flex-direction:column;gap:3px;padding:12px 0;border-bottom:1px solid var(--border);}
  .row:last-child{border-bottom:none;}
  .badge{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:20px;font-family:'DM Mono',monospace;}
  .badge-safe{background:rgba(52,211,153,0.12);color:var(--accent);border:1px solid rgba(52,211,153,0.3);}
  .badge-recall{background:rgba(255,92,92,0.12);color:var(--danger);border:1px solid rgba(255,92,92,0.3);}
  .badge-unknown{background:rgba(106,175,158,0.12);color:var(--muted);border:1px solid var(--border);}
  .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .logo{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
  .logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;}
  .not-found{padding:48px 24px;text-align:center;}
  a{color:var(--accent);text-decoration:none;}a:hover{text-decoration:underline;}
  .recall-alert{background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.3);border-radius:10px;padding:16px;margin-top:16px;}
  .verified-banner{background:rgba(52,211,153,0.07);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:14px 16px;margin-top:16px;display:flex;align-items:center;gap:12px;}
</style>
</head>
<body>

<div style="width:100%;max-width:480px;">
  <!-- Batch'd logo -->
  <div class="logo">
    <div class="logo-icon">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#065f46" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
    </div>
    <div>
      <div style="font-size:15px;font-weight:800;color:var(--text);">Batch'd</div>
      <div style="font-size:10px;color:var(--muted);margin-top:-2px;">Food Traceability</div>
    </div>
  </div>
</div>

<div id="root" style="width:100%;max-width:480px;margin-top:8px;">
  <div style="display:flex;justify-content:center;align-items:center;padding:60px 0;"><div class="spinner"></div></div>
</div>

<div style="font-size:11px;color:var(--muted);text-align:center;margin-top:24px;max-width:380px;line-height:1.6;">
  Traceability powered by <a href="https://batchdapp.com" target="_blank">Batch'd</a>.
  This page shows verified product safety information from the Batch'd food traceability network.
</div>

<script>
const params = new URLSearchParams(window.location.search);
const lotParam     = params.get('lot')      || params.get('l') || '';
const barcodeParam = params.get('barcode')  || params.get('b') || '';
const root = document.getElementById('root');

async function loadTrace() {
  if (!lotParam && !barcodeParam) {
    root.innerHTML = `
      <div class="card">
        <div class="not-found">
          <div style="font-size:32px;margin-bottom:12px;">🔍</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">No product specified</div>
          <div style="font-size:12px;color:var(--muted);">Scan the QR code on the product packaging to view traceability information.</div>
        </div>
      </div>`;
    return;
  }

  try {
    const qs = new URLSearchParams();
    if (lotParam)     qs.set('lot', lotParam);
    if (barcodeParam) qs.set('barcode', barcodeParam);

    const resp = await fetch('/.netlify/functions/trace?' + qs.toString());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    renderTrace(data);
  } catch(e) {
    root.innerHTML = `
      <div class="card">
        <div class="not-found">
          <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">Could not load traceability data</div>
          <div style="font-size:12px;color:var(--muted);">${e.message}</div>
        </div>
      </div>`;
  }
}

function renderTrace(data) {
  if (!data || data.error === 'not_found') {
    root.innerHTML = `
      <div class="card">
        <div class="not-found">
          <div style="font-size:32px;margin-bottom:12px;">📦</div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">Product not found</div>
          <div style="font-size:12px;color:var(--muted);">This lot code is not currently registered in the Batch'd traceability network.</div>
        </div>
      </div>`;
    return;
  }

  const hasActiveRecall = data.active_recall;
  const statusBadge = hasActiveRecall
    ? '<span class="badge badge-recall">⚠ ACTIVE RECALL</span>'
    : data.found
      ? '<span class="badge badge-safe">✓ No Active Recall</span>'
      : '<span class="badge badge-unknown">Unknown</span>';

  const fmtDate = d => d ? new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—';

  root.innerHTML = `
    <div class="card">
      <div class="card-header">
        <div class="label">Product Traceability Record</div>
        <div style="font-size:20px;font-weight:800;color:var(--text);margin:6px 0 8px;">${data.product_name || 'Unknown Product'}</div>
        <div>${statusBadge}</div>
      </div>

      <div class="card-body">
        ${hasActiveRecall ? `
        <div class="recall-alert">
          <div style="font-size:13px;font-weight:700;color:var(--danger);margin-bottom:6px;">⚠ Active Recall Notice</div>
          <div style="font-size:12px;color:var(--text);line-height:1.6;">${data.recall_reason || 'This product lot is subject to an active recall. Do not consume. Return to place of purchase.'}</div>
          ${data.recall_authority ? `<div style="font-size:11px;color:var(--muted);margin-top:8px;">Authority: ${data.recall_authority}</div>` : ''}
        </div>` : ''}

        ${!hasActiveRecall && data.found ? `
        <div class="verified-banner">
          <div style="width:36px;height:36px;background:rgba(52,211,153,0.15);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
          </div>
          <div>
            <div style="font-size:12px;font-weight:600;color:var(--accent);">Verified — no active recall</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">This product is registered in the Batch'd traceability network and has no active recall at this time.</div>
          </div>
        </div>` : ''}

        <div style="margin-top:16px;">
          ${data.lot_number ? `<div class="row"><div class="label">Lot / Batch Number</div><div class="value mono">${data.lot_number}</div></div>` : ''}
          ${data.barcode ? `<div class="row"><div class="label">Barcode / EAN</div><div class="value mono">${data.barcode}</div></div>` : ''}
          ${data.manufacturer_name ? `<div class="row"><div class="label">Manufacturer</div><div class="value">${data.manufacturer_name}</div></div>` : ''}
          ${data.shipped_at ? `<div class="row"><div class="label">Shipped to retailers</div><div class="value">${fmtDate(data.shipped_at)}</div></div>` : ''}
          <div class="row"><div class="label">Traceability status</div><div class="value">${data.found ? 'Registered in Batch\'d network' : 'Partial record'}</div></div>
          <div class="row"><div class="label">Record verified</div><div class="value">${fmtDate(new Date())}</div></div>
        </div>

        <div style="margin-top:16px;font-size:11px;color:var(--muted);line-height:1.6;padding-top:12px;border-top:1px solid var(--border);">
          This traceability record is maintained by the manufacturer through the Batch'd food safety platform.
          ${hasActiveRecall ? ' <strong style="color:var(--danger);">If you have consumed this product and feel unwell, seek medical advice.</strong>' : ''}
        </div>
      </div>
    </div>`;
}

loadTrace();
</script>
</body>
</html>
