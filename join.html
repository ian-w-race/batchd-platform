<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch'd — Accept Invitation</title>
  <meta name="theme-color" content="#34d399" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080f12; --surface: #0d1e1c; --surface2: #13302b;
      --border: #163d37; --accent: #34d399; --accent-dim: #059669;
      --text: #edfdf8; --muted: #6aaf9e; --danger: #ff5c5c; --warn: #f5a623;
      --radius: 12px;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; display: flex; flex-direction: column; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 80% 50% at 20% -10%, rgba(52,211,153,0.12) 0%, transparent 60%),
                  radial-gradient(ellipse 60% 40% at 80% 110%, rgba(5,150,105,0.10) 0%, transparent 55%);
    }
    .page { flex: 1; display: flex; align-items: center; justify-content: center; padding: 24px 20px; position: relative; z-index: 1; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 440px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
    .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    .logo-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { color: #080f12; }
    .logo-text { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 20px; color: var(--accent); }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; }

    .title { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 26px; margin-bottom: 6px; line-height: 1.2; }
    .sub { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 24px; }

    .invite-badge {
      background: linear-gradient(135deg, rgba(52,211,153,0.06) 0%, rgba(5,150,105,0.04) 100%);
      border: 1px solid rgba(52,211,153,0.2);
      border-radius: 12px;
      padding: 16px 18px;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
    }
    .invite-badge::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-dim));
    }
    .invite-org { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); margin-bottom: 6px; }
    .invite-meta { display: flex; flex-wrap: wrap; gap: 8px; }
    .invite-chip { font-size: 10px; padding: 3px 10px; border-radius: 20px; background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.2); color: var(--accent); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; }
    .invite-chip.store { background: rgba(56,189,248,0.08); border-color: rgba(56,189,248,0.2); color: #38bdf8; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
    .field input {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 11px 14px; font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s;
    }
    .field input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(52,211,153,0.08); }
    .field input:disabled { opacity: 0.5; cursor: not-allowed; }

    .pw-strength { display: flex; gap: 3px; margin-top: 8px; align-items: center; }
    .pw-bars { display: flex; gap: 3px; flex: 1; }
    .pw-bar { height: 3px; flex: 1; border-radius: 2px; background: var(--border); transition: background 0.25s; }
    .pw-bar.weak { background: var(--danger); }
    .pw-bar.fair { background: var(--warn); }
    .pw-bar.strong { background: var(--accent); }
    .pw-label { font-size: 10px; color: var(--muted); margin-left: 8px; min-width: 44px; text-align: right; transition: color 0.2s; }
    .pw-label.weak { color: var(--danger); }
    .pw-label.fair { color: var(--warn); }
    .pw-label.strong { color: var(--accent); }

    .btn {
      width: 100%; background: var(--accent); color: #080f12; border: none; border-radius: 10px;
      padding: 13px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 8px;
      margin-top: 4px;
    }
    .btn:hover { background: #6ee7b7; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg { font-size: 11px; padding: 11px 13px; border-radius: 8px; margin-bottom: 16px; line-height: 1.5; }
    .msg.error { background: rgba(255,92,92,0.08); border: 1px solid rgba(255,92,92,0.25); color: var(--danger); }
    .msg.success { background: rgba(52,211,153,0.08); border: 1px solid rgba(52,211,153,0.25); color: var(--accent); }

    .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: var(--border); }
    .divider-text { font-size: 10px; color: var(--muted); letter-spacing: 0.06em; text-transform: uppercase; }

    .spinner { width: 16px; height: 16px; border: 2px solid rgba(8,15,18,0.3); border-top-color: #080f12; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
    .spinner-muted { border-color: var(--border); border-top-color: var(--accent); }
    @keyframes spin { to { transform: rotate(360deg); } }

    .success-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(52,211,153,0.1); border: 1.5px solid rgba(52,211,153,0.3); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }

    footer { text-align: center; padding: 20px; font-size: 11px; color: var(--muted); position: relative; z-index: 1; }
    footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>
<div class="page">
  <div class="card" id="card">
    <div class="logo">
      <div class="logo-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div>
        <div class="logo-text">Batch'd</div>
        <div class="logo-sub">Food Traceability</div>
      </div>
    </div>
    <div id="card-content">
      <div style="display:flex;align-items:center;gap:12px;color:var(--muted);">
        <div class="spinner spinner-muted"></div>
        <span style="font-size:12px;">Loading your invitation…</span>
      </div>
    </div>
  </div>
</div>
<footer>© 2026 Batch'd · <a href="https://batchdapp.com">batchdapp.com</a></footer>

<script>
const SUPABASE_URL = 'https://lurxucdmrugikdlvvebc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1cnh1Y2RtcnVnaWtkbHZ2ZWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTU5NTQsImV4cCI6MjA4OTgzMTk1NH0.ewNhBbF8nUzpF9Ve822D9t8VLwB_hjk27KuFFEXct0A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let _invitation = null;

const ROLE_LABELS = {
  staff:         'Store Staff',
  store_manager: 'Store Manager',
  corp_admin:    'Corporate Admin',
  mfr_admin:     'Manufacturer Admin',
  mfr_qa:        'Manufacturer QA',
};

const ROLE_DESTINATIONS = {
  staff:         'https://batchd-app.netlify.app',
  store_manager: 'https://batchd-app.netlify.app',  // managers use scanning app
  corp_admin:    'https://app.batchdapp.com/dashboard.html',
  mfr_admin:     'https://app.batchdapp.com/manufacturer.html',
  mfr_qa:        'https://app.batchdapp.com/manufacturer.html',
};

async function init() {
  const params = new URLSearchParams(window.location.search);
  const token  = params.get('token');

  if (!token) {
    showError('No invitation token found.', 'Please use the link from your invitation email.');
    return;
  }

  const { data: inv, error } = await sb.from('invitations')
    .select('*, stores(name)')
    .eq('token', token)
    .maybeSingle();

  if (error || !inv) {
    showError('Invitation not found', 'This link may have expired or already been used. Please ask your administrator to send a new invitation.');
    return;
  }
  if (inv.accepted) {
    showError('Already accepted', 'This invitation has already been used. If you need access, ask your administrator to send a new invite.');
    return;
  }
  if (inv.expires_at && new Date(inv.expires_at) < new Date()) {
    showError('Invitation expired', 'This invitation link has expired. Please ask your administrator to send a new one.');
    return;
  }

  // Fetch org name separately — avoids RLS join issue with anon key
  let orgName = 'your organisation';
  const { data: orgData } = await sb.from('organisations')
    .select('name').eq('id', inv.organisation_id).maybeSingle();
  if (orgData?.name) orgName = orgData.name;
  inv._orgName = orgName;

  _invitation = inv;
  showForm(inv);
}

function showForm(inv) {
  const orgName   = inv._orgName || 'your organisation';
  const storeName = inv.stores?.name || null;
  const roleLabel = ROLE_LABELS[inv.role] || inv.role.replace(/_/g, ' ');

  document.getElementById('card-content').innerHTML = `
    <div class="title">You're invited</div>
    <div class="sub">Set up your Batch'd account to join <strong style="color:var(--text);">${orgName}</strong>.</div>

    <div class="invite-badge">
      <div class="invite-org">${orgName}</div>
      <div class="invite-meta">
        <span class="invite-chip">${roleLabel}</span>
        ${storeName ? `<span class="invite-chip store">📍 ${storeName}</span>` : ''}
      </div>
    </div>

    <div id="msg" style="display:none;" class="msg"></div>

    <div class="field">
      <label>Email address</label>
      <input id="f-email" type="email" value="${inv.email}" disabled />
    </div>
    <div class="field">
      <label>Your full name</label>
      <input id="f-name" type="text" placeholder="e.g. Anna Larsen" autocomplete="name" />
    </div>
    <div class="field">
      <label>Create a password</label>
      <input id="f-pw" type="password" placeholder="Min. 8 characters" oninput="checkPw(this.value)" autocomplete="new-password" onkeydown="if(event.key==='Enter')acceptInvitation()" />
      <div class="pw-strength">
        <div class="pw-bars">
          <div class="pw-bar" id="pw1"></div>
          <div class="pw-bar" id="pw2"></div>
          <div class="pw-bar" id="pw3"></div>
          <div class="pw-bar" id="pw4"></div>
        </div>
        <span class="pw-label" id="pw-label"></span>
      </div>
    </div>

    <button class="btn" onclick="acceptInvitation()" id="btn-accept">
      Join ${orgName} →
    </button>

    <div style="text-align:center;margin-top:16px;font-size:11px;color:var(--muted);">
      Already have an account? <a href="https://batchdapp.com" style="color:var(--accent);">Sign in</a>
    </div>
  `;
  setTimeout(() => document.getElementById('f-name').focus(), 50);
}

function checkPw(pw) {
  const bars  = [1,2,3,4].map(i => document.getElementById('pw'+i));
  const label = document.getElementById('pw-label');
  bars.forEach(b => { if(b) b.className = 'pw-bar'; });
  if (label) { label.textContent = ''; label.className = 'pw-label'; }
  if (!pw) return;

  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw) && /[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;

  const cls   = score <= 1 ? 'weak' : score <= 2 ? 'fair' : 'strong';
  const names = { weak: 'Weak', fair: 'Fair', strong: 'Strong' };
  for (let i = 0; i < score; i++) { if(bars[i]) bars[i].classList.add(cls); }
  if (label) { label.textContent = names[cls]; label.className = 'pw-label ' + cls; }
}

async function acceptInvitation() {
  const name = document.getElementById('f-name').value.trim();
  const pw   = document.getElementById('f-pw').value;
  const btn  = document.getElementById('btn-accept');

  if (!name) { showMsg('Please enter your full name.', 'error'); return; }
  if (pw.length < 8) { showMsg('Password must be at least 8 characters.', 'error'); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Setting up your account…';

  try {
    const nameParts = name.trim().split(' ');
    const firstName = nameParts[0];
    const lastName  = nameParts.slice(1).join(' ');

    // Sign up — creates the auth account
    const { data: signUpData, error: signUpErr } = await sb.auth.signUp({
      email: _invitation.email,
      password: pw,
      options: {
        data: { full_name: name, first_name: firstName, last_name: lastName },
        emailRedirectTo: null,  // no confirmation email needed — invite is the verification
      }
    });

    const alreadyExists = signUpErr?.message?.toLowerCase().includes('already registered')
                       || signUpErr?.message?.toLowerCase().includes('already been registered');
    if (signUpErr && !alreadyExists) throw signUpErr;

    // Sign in immediately — if email confirmation is blocking this,
    // show a clear message pointing to Supabase settings rather than a cryptic error
    const { data: signInData, error: signInErr } = await sb.auth.signInWithPassword({
      email: _invitation.email,
      password: pw,
    });

    if (signInErr) {
      if (signInErr.message?.toLowerCase().includes('email not confirmed')) {
        throw new Error('Email confirmation is required in your Supabase settings. Go to Authentication → Settings and disable "Enable email confirmations", then try again.');
      }
      if (signInErr.message?.toLowerCase().includes('invalid login') && alreadyExists) {
        throw new Error('This email already has an account with a different password. Please use your existing password, or contact your administrator.');
      }
      throw signInErr;
    }

    const userId = signInData.user.id;

    // Mark invitation accepted — do this regardless of whether account was new or existing
    await sb.from('invitations').update({ accepted: true, user_id: userId }).eq('id', _invitation.id);

    // Add to organisation (idempotent — ignore duplicate key errors)
    const { error: memberErr } = await sb.from('organisation_members').insert({
      organisation_id: _invitation.organisation_id,
      user_id:         userId,
      role:            _invitation.role,
      store_id:        _invitation.store_id || null,
      joined_at:       new Date().toISOString(),
    });
    if (memberErr && !memberErr.message.includes('duplicate')) throw memberErr;

    // Show success then auto-redirect with session tokens
    const orgName   = _invitation._orgName || 'your organisation';
    const roleLabel = ROLE_LABELS[_invitation.role] || _invitation.role.replace(/_/g,' ');
    const dest      = ROLE_DESTINATIONS[_invitation.role] || 'https://batchd-app.netlify.app';
    const isScanning = dest.includes('batchd-app.netlify.app');
    const destLabel = isScanning ? 'Opening scanning app…' : 'Opening dashboard…';

    document.getElementById('card-content').innerHTML = `
      <div style="text-align:center;padding:12px 0 20px;">
        <div class="success-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
        </div>
        <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:24px;margin-bottom:8px;">Welcome to Batch'd!</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.8;margin-bottom:20px;">
          You've joined <strong style="color:var(--text);">${orgName}</strong><br>
          as a <strong style="color:var(--accent);">${roleLabel}</strong>.
        </div>
        <div style="font-size:12px;color:var(--muted);display:flex;align-items:center;justify-content:center;gap:8px;">
          <div class="spinner spinner-muted"></div>
          ${destLabel}
        </div>
      </div>`;

    // Redirect after brief success pause — pass session tokens in hash
    // so the destination app can pick up the session without re-login.
    // Supabase reads #access_token=...&refresh_token=...&type=signup from the URL hash.
    setTimeout(() => {
      const session = signInData.session;
      if (isScanning && session) {
        const hash = 'access_token=' + session.access_token + '&refresh_token=' + session.refresh_token + '&type=signup';
        window.location.href = dest + '#' + hash;
      } else {
        window.location.href = dest;
      }
    }, 1500);


  } catch(e) {
    const orgName = _invitation?._orgName || 'your organisation';
    showMsg(e.message || 'Could not complete setup. Please try again.', 'error');
    btn.disabled = false;
    btn.innerHTML = `Join ${orgName} →`;
  }
}

function showError(title, detail) {
  document.getElementById('card-content').innerHTML = `
    <div style="text-align:center;padding:10px 0 8px;">
      <div style="width:56px;height:56px;border-radius:50%;background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2);display:flex;align-items:center;justify-content:center;margin:0 auto 18px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--danger)" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      </div>
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:17px;margin-bottom:8px;color:var(--text);">${title}</div>
      <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:24px;">${detail}</div>
      <a href="https://batchdapp.com" class="btn" style="text-decoration:none;display:inline-flex;">Go to batchdapp.com →</a>
    </div>`;
}

function showMsg(txt, type) {
  const el = document.getElementById('msg');
  if (!el) return;
  el.textContent = txt;
  el.className   = 'msg ' + type;
  el.style.display = 'block';
}

init();
</script>
</body>
</html>
