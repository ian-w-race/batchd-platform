<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Manufacturer portal — Retired | Batch'd</title>
  <meta name="robots" content="noindex, nofollow" />
  <style>
    :root {
      --bg: #080f12;
      --surface: #0d1e1c;
      --border: #163d37;
      --text: #edfdf8;
      --muted: #6aaf9e;
      --accent: #34d399;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, system-ui, sans-serif;
      line-height: 1.55;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      min-height: 100dvh;
    }
    .card {
      max-width: 460px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 36px 28px;
      text-align: center;
    }
    .brand {
      color: var(--accent);
      font-weight: 800;
      font-size: 20px;
      letter-spacing: 0.02em;
      margin-bottom: 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 14px;
    }
    p {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 14px;
    }
    p:last-of-type { margin-bottom: 24px; }
    a {
      display: inline-block;
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
      font-size: 14px;
      padding: 10px 18px;
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    a:hover {
      border-color: var(--accent);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Batch'd</div>
    <h1>This portal has been retired</h1>
    <p>Batch'd has streamlined to a retailer-only platform. The manufacturer portal is no longer in service.</p>
    <p><a href="https://batchd.no">Visit batchd.no</a></p>
  </div>
</body>
</html>
