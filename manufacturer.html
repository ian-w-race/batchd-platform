<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch'd — Manufacturer Portal</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#34d399" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #040c0e; --surface: #091918; --surface2: #0e2622;
      --border: #12352f; --accent: #34d399; --accent-dim: #059669;
      --text: #edfdf8; --muted: #6aaf9e; --danger: #ff5c5c;
      --warn: #f5a623; --info: #38bdf8; --radius: 12px;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 70% 40% at 15% 0%, rgba(52,211,153,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 30% at 85% 100%, rgba(5,150,105,0.07) 0%, transparent 55%); }

    .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* Sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar-logo { height: 54px; box-sizing: border-box; padding: 0 18px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { color: #080f12; }
    .logo-text { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); line-height: 1; }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; line-height: 1; }
    .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 10px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: all 0.15s; text-decoration: none; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(52,211,153,0.1); color: var(--accent); }
    .sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: var(--surface2); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .user-info { min-width: 0; flex: 1; }
    .user-name { font-size: 11px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 9px; color: var(--muted); }
    .sign-out-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; transition: color 0.15s; }
    .sign-out-btn:hover { color: var(--danger); }

    /* Main */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { height: 54px; box-sizing: border-box; padding: 0 24px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; background: var(--bg); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 99; }
      background: rgba(8,15,18,0.8); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .content { padding: 24px 28px; flex: 1; }

    /* Cards & panels */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
    .panel-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .panel-body { padding: 18px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi-card.green::before { background: var(--accent); }
    .kpi-card.red::before   { background: var(--danger); }
    .kpi-card.amber::before { background: var(--warn); }
    .kpi-card.blue::before  { background: var(--info); }
    .kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 28px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .kpi-sub { font-size: 10px; color: var(--muted); }

    /* Form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Severity selector */
    .sev-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .sev-btn { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer;
      background: var(--surface2); text-align: left; transition: all 0.15s; }
    .sev-btn:hover { border-color: var(--muted); }
    .sev-btn.active-i   { border-color: var(--danger); background: rgba(255,92,92,0.08); }
    .sev-btn.active-ii  { border-color: var(--warn);   background: rgba(245,166,35,0.08); }
    .sev-btn.active-iii { border-color: var(--muted);  background: rgba(106,175,158,0.08); }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }
    .sev-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sev-desc { font-size: 9px; color: var(--muted); line-height: 1.4; }

    /* Drill toggle */
    .drill-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px; }
    .toggle-track { position: relative; width: 36px; height: 20px; background: var(--border); border-radius: 10px;
      transition: background 0.2s; flex-shrink: 0; cursor: pointer; }
    .toggle-track.on { background: var(--warn); }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
      background: white; transition: transform 0.2s; }
    .toggle-track.on .toggle-knob { transform: translateX(16px); }
    .drill-label { font-size: 12px; color: var(--text); flex: 1; }
    .drill-sub { font-size: 10px; color: var(--muted); }

    /* Buttons */
    .btn-primary { background: var(--accent); color: #080f12; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: #6ee7b7; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: var(--danger); color: white; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-danger:hover { background: #ff8080; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
      padding: 9px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Recall event list */
    .recall-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .recall-item:last-child { border-bottom: none; }
    .sev-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .sev-i   { background: var(--danger); box-shadow: 0 0 6px rgba(255,92,92,0.5); }
    .sev-ii  { background: var(--warn); }
    .sev-iii { background: var(--muted); }
    .recall-info { flex: 1; min-width: 0; }
    .recall-name { font-size: 12px; color: var(--text); font-weight: 500; }
    .recall-meta { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .recall-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .badge-drill { background: rgba(245,166,35,0.12); color: var(--warn); }
    .badge-live  { background: rgba(255,92,92,0.12); color: var(--danger); }
    .badge-ack   { background: rgba(52,211,153,0.1); color: var(--accent); }

    /* Ack table */
    .ack-table { width: 100%; border-collapse: collapse; }
    .ack-table th { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0 10px; border-bottom: 1px solid var(--border); }
    .ack-table td { padding: 9px 0; border-bottom: 1px solid rgba(22,61,55,0.5); font-size: 11px; vertical-align: middle; }
    .ack-table tr:last-child td { border-bottom: none; }
    .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .s-notified    { background: rgba(106,175,158,0.1); color: var(--muted); }
    .s-acknowledged{ background: rgba(56,189,248,0.1); color: var(--info); }
    .s-pulled      { background: rgba(245,166,35,0.12); color: var(--warn); }
    .s-disposed    { background: rgba(52,211,153,0.1); color: var(--accent); }
    .s-confirmed   { background: rgba(52,211,153,0.15); color: var(--accent); font-weight: 700; }

    /* Msg */
    .msg { font-size: 11px; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
    .msg.error   { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: var(--danger); }
    .msg.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--accent); }
    .msg.warn    { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--warn); }

    /* Auth gate */
    .auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; width: 100%; max-width: 380px; }

    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<!-- Auth gate -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="113" fill="#34D399"/><rect x="172" y="75" width="167" height="167" rx="24" fill="#055A46"/><rect x="75" y="270" width="167" height="167" rx="24" fill="#055A46"/><rect x="270" y="270" width="167" height="167" rx="24" fill="#055A46"/></svg></div>
      <span style="font-family:'Figtree',sans-serif;font-weight:800;font-size:18px;color:var(--accent);">Batch'd</span>
    </div>
    <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;margin-bottom:4px;">Manufacturer Portal</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:24px;">Sign in to access your manufacturer dashboard.</div>
    <div id="auth-msg" style="display:none;" class="msg error"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@manufacturer.com" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <div class="field"><label>Password</label><input id="auth-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <button onclick="doAuth()" id="auth-btn" style="width:100%;background:var(--accent);color:#080f12;border:none;border-radius:8px;padding:12px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">Sign in →</button>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--muted);">New? <a href="https://batchdapp.com" style="color:var(--accent);">Sign up at batchdapp.com</a></div>
  </div>
</div>

<!-- App shell -->
<div class="app" id="app-shell" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="512" height="512" rx="113" fill="#34D399"/><rect x="172" y="75" width="167" height="167" rx="24" fill="#055A46"/><rect x="75" y="270" width="167" height="167" rx="24" fill="#055A46"/><rect x="270" y="270" width="167" height="167" rx="24" fill="#055A46"/></svg></div>
      <div style="display:flex;flex-direction:column;justify-content:center;"><div class="logo-text">Batch'd</div><div class="logo-sub">Manufacturer</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" onclick="showPanel('overview')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <div class="nav-section">Complaints</div>
      <button class="nav-item" onclick="showPanel('triage')" id="nav-triage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.5" fill="currentColor" stroke="currentColor" stroke-width="1"/></svg>
        Triage
        <span id="triage-badge" style="display:none;margin-left:auto;background:var(--danger);color:#fff;font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:10px;"></span>
      </button>
      <button class="nav-item" onclick="showPanel('widget')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M9 9h6M9 12h4"/><circle cx="16" cy="16" r="2" fill="currentColor" stroke="none"/></svg>
        Widget Setup
      </button>
      <button class="nav-item" onclick="showPanel('investigations')" id="nav-investigations">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/><path d="M11 8v6M8 11h6"/></svg>
        Investigations
        <span id="invest-badge" style="display:none;margin-left:auto;background:var(--warn);color:#1a0f00;font-size:10px;font-family:'DM Mono',monospace;padding:1px 6px;border-radius:10px;font-weight:700;"></span>
      </button>
      <div class="nav-section">Recalls</div>
      <button class="nav-item" onclick="showPanel('compliance')" id="nav-compliance">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Compliance
      </button>
      <button class="nav-item" onclick="showPanel('push')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Push Recall
      </button>
      <button class="nav-item" onclick="showPanel('history')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Recall History
      </button>
      <button class="nav-item" onclick="showPanel('acknowledgements')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Acknowledgements
      </button>
      <div class="nav-section">Products</div>
      <button class="nav-item" onclick="showPanel('products')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Products
      </button>
      <button class="nav-item" onclick="showPanel('lots')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg>
        Lot Codes
      </button>
      <div class="nav-section">Logistics</div>
      <button class="nav-item" onclick="showPanel('shipments')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="3" width="15" height="13" rx="1"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
        Shipments
      </button>
      <button class="nav-item" onclick="showPanel('suppliers')" id="nav-suppliers">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M2 20c0-4 4-7 10-7s10 3 10 7"/><path d="M17 13l2 2 4-4" stroke-width="2.5"/></svg>
        Supplier Risk
      </button>
      <button class="nav-item" onclick="showPanel('patterns')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12h20M12 2v20M4.93 4.93l14.14 14.14M19.07 4.93L4.93 19.07"/></svg>
        Pattern Library
      </button>
      <div class="nav-section">Partners</div>
      <button class="nav-item" onclick="showPanel('partners')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Trading Partners
      </button>

let _impactTimer;
function scheduleImpactPreview() {
  clearTimeout(_impactTimer);
  _impactTimer = setTimeout(calculateImpactPreview, 600);

async function calculateImpactPreview() {
  const lot     = document.getElementById('p-lot')?.value.trim();
  const barcode = document.getElementById('p-barcode')?.value.trim();
  const preview = document.getElementById('impact-preview');
  if (!preview) return;
  if (!lot && !barcode) { preview.style.display = 'none'; return; }

  preview.style.display = 'block';
  preview.innerHTML = `<div style="display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;"><div class="spinner"></div> Calculating shelf impact…</div>`;

  // Query shipments — use separate queries to avoid .or() interpolation issues with spaces/special chars
  const shipmentSelect = 'id, lot_number, barcode, quantity, unit, shipped_at, stores(name), organisations!shipments_retailer_id_fkey(name)';
  let hits = [];
  if (lot) {
    const { data } = await sb.from('shipments').select(shipmentSelect).eq('manufacturer_id', _orgId).eq('lot_number', lot);
    hits = [...hits, ...(data||[])];
  }
  if (barcode) {
    const { data } = await sb.from('shipments').select(shipmentSelect).eq('manufacturer_id', _orgId).eq('barcode', barcode);
    // Deduplicate by id
    const existingIds = new Set(hits.map(h=>h.id));
    hits = [...hits, ...(data||[]).filter(h=>!existingIds.has(h.id))];
  }

  if (hits.length === 0) {
    preview.innerHTML = `
      <div style="padding:12px 14px;background:rgba(106,175,158,0.06);border:1px solid var(--border);border-radius:8px;">
        <div style="font-size:11px;color:var(--muted);">No shipment records found for this lot/barcode — shelf impact unknown. Recall will still be pushed to all trading partners.</div>
      </div>`;
    return;
  }

  // Group by store
  const byStore = {};
  hits.forEach(h => {
    const key = h.stores?.name || 'Unknown store';
    if (!byStore[key]) byStore[key] = { retailer: h.organisations?.name || '—', qty: 0, unit: h.unit, latest: h.shipped_at };
    byStore[key].qty += h.quantity;
    if (h.shipped_at > byStore[key].latest) byStore[key].latest = h.shipped_at;
  });

  const storeCount  = Object.keys(byStore).length;
  const totalQty    = hits.reduce((s, h) => s + h.quantity, 0);
  const unit        = hits[0]?.unit || 'units';

  // Store breakdown HTML
  const breakdown = Object.entries(byStore).map(([store, d]) => `
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(22,61,55,0.4);">
      <div>
        <div style="font-size:11px;color:var(--text);font-weight:500;">${store}</div>
        <div style="font-size:10px;color:var(--muted);">${d.retailer} · shipped ${new Date(d.latest).toLocaleDateString('en-GB')}</div>
      </div>
      <div style="font-size:11px;font-weight:600;color:var(--warn);">${d.qty} ${d.unit}</div>
    </div>`).join('');

  preview.innerHTML = `
    <div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.3);border-radius:8px;overflow:hidden;">
      <div style="padding:12px 14px;border-bottom:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:8px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          <span style="font-size:12px;font-weight:700;color:var(--warn);">Shelf impact: ${totalQty} ${unit} across ${storeCount} store${storeCount!==1?'s':''}</span>
        </div>
        <span style="font-size:10px;color:var(--muted);">Based on shipment records</span>
      </div>
      <div style="padding:4px 14px 8px;">${breakdown}</div>
    </div>`;
}

function selectSev(sev) {
  _selectedSeverity = sev;
  // Update button styles without re-rendering the whole form
  document.querySelectorAll('.sev-btn').forEach(btn => {
    btn.className = 'sev-btn';
  });
  const sevMap = { class_i: 'active-i', class_ii: 'active-ii', class_iii: 'active-iii' };

  }
}

async function pushRecall() {
  const product     = document.getElementById('p-product')?.value.trim();
  const lot         = document.getElementById('p-lot')?.value.trim();
  const barcode     = document.getElementById('p-barcode')?.value.trim();
  const reason      = document.getElementById('p-reason')?.value.trim();
  const description = document.getElementById('p-description')?.value.trim();
  const authority   = document.getElementById('p-authority')?.value.trim();
  const btn         = document.getElementById('btn-push');
  const msg         = document.getElementById('push-msg');

  msg.style.display = 'none';

  if (!product) { showPushMsg('Product name is required.', 'error'); return; }
  if (!reason)  { showPushMsg('Reason for recall is required.', 'error'); return; }
  if (!lot && !barcode) { showPushMsg('Please enter at least a lot number or barcode so retailers can identify the product.', 'warn'); return; }

  // ── Duplicate guard ────────────────────────────────────────────
  // Check for an existing recall_event with the same product + lot from this org
  // in the last 7 days. Prevents the multi-push bug that created 5 duplicate recalls.
  {
    const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    let dupQuery = sb.from('recall_events')
      .select('id, product_name, lot_number, created_at, is_drill')
      .eq('source_org_id', _orgId)
      .eq('product_name', product)
      .gte('created_at', since)
      .order('created_at', { ascending: false });
    if (lot) dupQuery = dupQuery.eq('lot_number', lot);
    const { data: dupes } = await dupQuery;

    if (dupes && dupes.length > 0) {
      const last = dupes[0];
      const lastDate = new Date(last.created_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
      const isDupe = confirm(
        `⚠ Duplicate detected\n\nA recall for "${last.product_name}"${last.lot_number ? ' / lot ' + last.lot_number : ''} was already pushed on ${lastDate}.\n\nPushing again will create a duplicate alert for all retailers.\n\nClick OK only if this is intentional (e.g. a correction or different affected market).`
      );
      if (!isDupe) return;
    }
  }
  // ── End duplicate guard ────────────────────────────────────────

  if (!confirm(`${_isDrill ? '[DRILL] ' : ''}Push recall for "${product}" to all affected retail partners?\n\nThis will send immediate email alerts.`)) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Pushing recall…';

  try {
    // Call Supabase function to create recall event and distributions
    const { data: result, error } = await sb.rpc('push_recall', {
      p_product_name:  product,
      p_lot_number:    lot    || null,
      p_barcode:       barcode || null,
      p_severity:      _selectedSeverity,
      p_reason:        reason,
      p_description:   description || null,
      p_authority_ref: authority   || null,
      p_is_drill:      _isDrill,
    });
    if (error) throw error;

    // Get retailer admin emails to notify
    // Get retailer emails using the secure database function
    const { data: emailData } = await sb.rpc('get_retailer_emails', {
      p_recall_event_id: result.recall_event_id
    });
    const retailerEmails = emailData || [];

    // Send email notifications via Netlify function (server handles email lookup)
    const emailRes = await fetch('https://www.batchdapp.com/.netlify/functions/push-recall-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recallEventId:    result.recall_event_id,
        productName:      product,
        lotNumber:        lot || null,
        barcode:          barcode || null,
        severity:         _selectedSeverity,
        reason,
        manufacturerName: _orgName,
        affectedStores:   result.stores_notified,
        isDrill:          _isDrill,
      }),
    });
    const emailResult = emailRes.ok ? await emailRes.json() : { sent: 0 };
    const emailsSent = emailResult.sent || 0;

    // Gather shelf impact for success screen
    let impactSummary = '';
    if (lot || barcode) {
      let impactQuery = sb.from('shipments')
        .select('quantity, unit, stores(name), organisations!shipments_retailer_id_fkey(name)')
        .eq('manufacturer_id', _orgId);
      if (lot && barcode) impactQuery = impactQuery.or(`lot_number.eq.${lot},barcode.eq.${barcode}`);
      else if (lot) impactQuery = impactQuery.eq('lot_number', lot);
      else impactQuery = impactQuery.eq('barcode', barcode);
      const { data: impactData } = await impactQuery;
      if (impactData?.length > 0) {
        const totalQty   = impactData.reduce((s, h) => s + h.quantity, 0);
        const unit       = impactData[0]?.unit || 'units';
        const storeNames = [...new Set(impactData.map(h => h.stores?.name).filter(Boolean))];
        impactSummary = `<div style="margin-top:10px;padding:10px 14px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.25);border-radius:8px;font-size:11px;color:var(--warn);text-align:left;">
          <strong>Shelf impact:</strong> ${totalQty} ${unit} across ${storeNames.length} store${storeNames.length!==1?'s':''}<br>
          <span style="color:var(--muted);">${storeNames.join(' · ')}</span>
        </div>`;
      }
    }

    // Show success — clear draft since recall was pushed successfully
    _pushDraft = { product: '', lot: '', barcode: '', reason: '', description: '', authority: '' };
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="max-width:500px;">
        <div style="background:${_isDrill?'rgba(245,166,35,0.08)':'rgba(255,92,92,0.08)'};border:1px solid ${_isDrill?'rgba(245,166,35,0.3)':'rgba(255,92,92,0.3)'};border-radius:12px;padding:28px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">${_isDrill ? '⚠' : '🚨'}</div>
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;margin-bottom:8px;">${_isDrill ? 'Drill dispatched' : 'Recall pushed'}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:20px;">
            <strong style="color:var(--text);">${result.retailers_notified}</strong> retailer${result.retailers_notified!==1?'s':''} notified<br>
            <strong style="color:var(--text);">${result.stores_notified}</strong> store${result.stores_notified!==1?'s':''} have acknowledgement records created<br>
            ${emailsSent > 0 ? `Email alerts sent to <strong style="color:var(--text);">${emailsSent}</strong> contact${emailsSent!==1?'s':''}` : 'No retailer email contacts found — check trading partners'}
          </div>
          ${impactSummary}
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn-ghost" onclick="showPanel('acknowledgements')">View acknowledgements →</button>
            <button class="btn-ghost" onclick="showPanel('push')">Push another recall</button>
          </div>
        </div>
      </div>`;

  } catch(e) {
    showPushMsg('Error: ' + (e.message || 'Could not push recall.'), 'error');
    btn.disabled = false;
    btn.innerHTML = _isDrill ? '⚠ Send mock drill →' : '🚨 Push recall →';
  }
}

function showPushMsg(txt, type) {
  const el = document.getElementById('push-msg');
  if (!el) return;
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
}

function openPartnerRequest() {
  document.getElementById('partner-request-form').style.display = 'block';
  document.getElementById('partner-req-msg').style.display = 'none';
  document.getElementById('partner-search-results').innerHTML = '';
  document.getElementById('partner-search-input').value = '';
  setTimeout(() => document.getElementById('partner-search-input').focus(), 50);
}

function closePartnerRequest() {
  document.getElementById('partner-request-form').style.display = 'none';
}

let _searchTimeout;
function searchRetailers() {
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(async () => {
    const query = document.getElementById('partner-search-input').value.trim();
    const resultsEl = document.getElementById('partner-search-results');
    if (query.length < 2) { resultsEl.innerHTML = ''; return; }

    resultsEl.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11px;"><div class="spinner"></div> Searching…</div>`;

    // Get existing partner retailer IDs to exclude
    const { data: existing } = await sb.from('trading_partners').select('retailer_id').eq('manufacturer_id', _orgId);
    const existingIds = (existing || []).map(p => p.retailer_id);

    const { data: orgs } = await sb.from('organisations')
      .select('id, name, contact_email, type')
      .ilike('name', `%${query}%`)
      .eq('type', 'retailer');

    const available = (orgs || []).filter(o => !existingIds.includes(o.id));

    if (available.length === 0) {
      resultsEl.innerHTML = `<div style="font-size:11px;color:var(--muted);padding:8px 0;">No retailer organisations found matching "${query}"</div>`;
      return;
    }

    resultsEl.innerHTML = available.map(o => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);">${o.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${o.contact_email||'No email on file'}</div>
        </div>
        <button class="btn-primary" style="font-size:11px;padding:7px 12px;" onclick="sendPartnerRequest('${o.id}', '${o.name.replace(/'/g,"\\'")}')">
          Send request
        </button>
      </div>`).join('');
  }, 300);
}

async function sendPartnerRequest(retailerId, retailerName) {
  const msgEl = document.getElementById('partner-req-msg');
  msgEl.style.display = 'none';

  const { data: { session } } = await sb.auth.getSession();

  const { error } = await sb.from('trading_partners').insert({
    manufacturer_id: _orgId,
    retailer_id: retailerId,
    status: 'pending',
    invited_by: session.user.id,
  });

  if (error) {
    msgEl.textContent = error.message || 'Could not send request.';
    msgEl.style.display = 'block';
    msgEl.style.background = 'rgba(255,92,92,0.1)';
    msgEl.style.border = '1px solid rgba(255,92,92,0.3)';
    msgEl.style.color = 'var(--danger)';
    return;
  }

  closePartnerRequest();
  renderPartners();
}

function openShipmentForm() {
  document.getElementById('shipment-form').style.display = 'block';
  document.getElementById('shipment-msg').style.display = 'none';
  document.getElementById('s-date').value = new Date().toISOString().split('T')[0];
}

function closeShipmentForm() {
  document.getElementById('shipment-form').style.display = 'none';
}

async function loadStoresForPartner() {
  const retailerId = document.getElementById('s-partner').value;
  const storeEl    = document.getElementById('s-store');
  storeEl.innerHTML = '<option value="">— Loading… —</option>';
  storeEl.disabled = true;
  if (!retailerId) { storeEl.innerHTML = '<option value="">— Select retailer first —</option>'; return; }

  const { data: stores } = await sb.from('stores')
    .select('id, name')
    .eq('organisation_id', retailerId)
    .order('name');

  if (!stores || stores.length === 0) {
    storeEl.innerHTML = '<option value="">— No stores found —</option>';
    return;
  }
  storeEl.innerHTML = '<option value="">— Select store —</option>' +
    stores.map(s => `<option value="${s.id}">${s.name}</option>`).join('');
  storeEl.disabled = false;
}

async function loadLotsForProduct() {
  const productId = document.getElementById('s-product').value;
  const lotEl     = document.getElementById('s-lot');
  lotEl.innerHTML = '<option value="">— Loading… —</option>';
  lotEl.disabled  = true;
  if (!productId) { lotEl.innerHTML = '<option value="">— Select product first —</option>'; return; }

  const { data: lots } = await sb.from('product_lots')
    .select('id, lot_number, production_date, expiry_date')
    .eq('product_id', productId)
    .eq('manufacturer_id', _orgId)
    .order('lot_number');

  if (!lots || lots.length === 0) {
    lotEl.innerHTML = '<option value="">— No lots registered —</option>';
    return;
  }
  lotEl.innerHTML = '<option value="">— Select lot —</option>' +
    lots.map(l => `<option value="${l.lot_number}">${l.lot_number}${l.expiry_date ? ' (exp ' + new Date(l.expiry_date).toLocaleDateString('en-GB') + ')' : ''}</option>`).join('');
  lotEl.disabled = false;
}

async function saveShipment() {
  const retailerId = document.getElementById('s-partner').value;
  const storeId    = document.getElementById('s-store').value;
  const productId  = document.getElementById('s-product').value;
  const lotNumber  = document.getElementById('s-lot').value;
  const qty        = document.getElementById('s-qty').value;
  const unit       = document.getElementById('s-unit').value;
  const date       = document.getElementById('s-date').value;
  const ref        = document.getElementById('s-ref').value.trim();
  const notes      = document.getElementById('s-notes').value.trim();
  const btn        = document.getElementById('btn-save-shipment');

  if (!retailerId) { showShipmentMsg('Please select a retailer partner.', 'error'); return; }
  if (!storeId)    { showShipmentMsg('Please select a store.', 'error'); return; }
  if (!productId)  { showShipmentMsg('Please select a product.', 'error'); return; }
  if (!lotNumber)  { showShipmentMsg('Please select a lot code.', 'error'); return; }
  if (!qty || qty < 1) { showShipmentMsg('Please enter a valid quantity.', 'error'); return; }
  if (!date)       { showShipmentMsg('Please enter a shipped date.', 'error'); return; }

  // Get barcode from product
  const { data: product } = await sb.from('products').select('barcode').eq('id', productId).single();

  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  const { error } = await sb.from('shipments').insert({
    manufacturer_id:    _orgId,
    retailer_id:        retailerId,
    store_id:           storeId,
    product_id:         productId,
    lot_number:         lotNumber,
    barcode:            product?.barcode || null,
    quantity:           parseInt(qty),
    unit:               unit,
    shipped_at:         new Date(date).toISOString(),
    reference_document: ref || null,
    notes:              notes || null,
  });

  if (error) {
    showShipmentMsg(error.message || 'Could not log shipment.', 'error');
    btn.disabled = false; btn.innerHTML = 'Log shipment';
    return;
  }

  closeShipmentForm();
  renderShipments();
}

function showShipmentMsg(txt, type) {
  const el = document.getElementById('shipment-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.border     = type === 'error' ? '1px solid rgba(255,92,92,0.3)' : '1px solid rgba(52,211,153,0.3)';
  el.style.color      = type === 'error' ? 'var(--danger)' : 'var(--accent)';
}

// ── Complaint Triage ───────────────────────────────────────────
let _triageView = 'list'; // 'list' | 'new' | 'detail'
let _triageComplaint = null;
let _triageFilter = 'all';

async function renderTriage() {
  const el = document.getElementById('main-content');
  if (_triageView === 'new') { renderTriageForm(el); return; }
  if (_triageView === 'detail' && _triageComplaint) { await renderTriageDetail(el); return; }
  await renderTriageList(el);
}


// ── Complaint Pattern Detection ────────────────────────────────

function detectComplaintPatterns(complaints, windowDays = 7) {
  const cutoff = Date.now() - windowDays * 24 * 60 * 60 * 1000;
  const recent = (complaints || []).filter(c =>
    new Date(c.created_at).getTime() > cutoff &&
    !['closed','resolved'].includes(c.status)
  );

  if (recent.length < 2) return [];

  // Group by product key: barcode (exact) or product name (first word, lowercased)
  const groups = {};
  recent.forEach(c => {
    const keys = [];
    if (c.barcode) keys.push('barcode:' + c.barcode.trim().toLowerCase());
    if (c.product_name) {
      const word = c.product_name.trim().toLowerCase().split(/\s+/)[0];
      if (word && word.length > 2) keys.push('name:' + word);
    }
    keys.forEach(k => {
      if (!groups[k]) groups[k] = { key: k, complaints: [], productName: c.product_name, barcode: c.barcode, lotNumbers: new Set() };
      groups[k].complaints.push(c);
      if (c.lot_number) groups[k].lotNumbers.add(c.lot_number);
    });
  });

  // Deduplicate: if same complaint appears under multiple keys, keep the most specific (barcode)
  const seen = new Set();
  const patterns = [];

  Object.values(groups)
    .filter(g => g.complaints.length >= 2)
    .sort((a, b) => b.complaints.length - a.complaints.length)
    .forEach(g => {
      // Deduplicate complaints across groups
      const unique = g.complaints.filter(c => !seen.has(c.id));
      if (unique.length < 2) return;
      unique.forEach(c => seen.add(c.id));

      const criticalCount = unique.filter(c => c.triage_level === 'critical').length;
      const seriousCount  = unique.filter(c => c.triage_level === 'serious').length;
      const total = unique.length;

      // Determine alert level
      let level, title, colour, bg;
      if (criticalCount >= 2 || (criticalCount >= 1 && seriousCount >= 1)) {
        level = 'systemic'; colour = 'var(--danger)'; bg = 'rgba(255,92,92,0.08)';
        title = 'Potential systemic issue';
      } else if (total >= 5 || seriousCount >= 3) {
        level = 'volume'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.08)';
        title = 'Volume alert';
      } else {
        level = 'emerging'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.06)';
        title = 'Emerging pattern';
      }

      const lots = [...g.lotNumbers].slice(0, 3).join(', ');
      const categories = [...new Set(unique.map(c => c.triage_category).filter(Boolean))];

      patterns.push({ level, title, colour, bg, productName: g.productName, barcode: g.barcode, lots, total, criticalCount, seriousCount, categories, complaints: unique, windowDays });
    });

  return patterns;
}

function patternAlertHTML(pattern, idx) {
  const lotStr = pattern.lots ? ` · Lot${pattern.lots.includes(',') ? 's' : ''}: <span style="font-family:'DM Mono',monospace;">${pattern.lots}</span>` : '';
  const catStr = pattern.categories.length ? ` · ${pattern.categories.join(', ')}` : '';
  const breakdown = [
    pattern.criticalCount ? `<span style="color:var(--danger);font-weight:700;">${pattern.criticalCount} critical</span>` : '',
    pattern.seriousCount  ? `<span style="color:var(--warn);">${pattern.seriousCount} serious</span>` : '',
    (pattern.total - pattern.criticalCount - pattern.seriousCount) > 0 ? `<span style="color:var(--muted);">${pattern.total - pattern.criticalCount - pattern.seriousCount} monitor</span>` : ''
  ].filter(Boolean).join(' · ');

  return `
    <div id="pattern-alert-${idx}" style="background:${pattern.bg};border:1px solid ${pattern.colour.replace('var(', 'rgba(').replace('--danger)', '255,92,92,0.35)').replace('--warn)', '245,166,35,0.35)')};border-radius:12px;padding:16px;position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div style="flex:1;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;">
            <span style="font-size:10px;font-weight:700;font-family:'DM Mono',monospace;letter-spacing:0.07em;color:${pattern.colour};text-transform:uppercase;">${pattern.title}</span>
            <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${pattern.total} complaints · ${pattern.windowDays}d window</span>
          </div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${pattern.productName || 'Unknown product'}${lotStr}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;">${breakdown}${catStr}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          ${pattern.level !== 'emerging' ? `
            <button onclick="pushFromTriage(${JSON.stringify(pattern.productName||'')},${JSON.stringify(pattern.lots||'')},${JSON.stringify(pattern.barcode||'')},${JSON.stringify(pattern.categories[0]||'')},${JSON.stringify(pattern.title+': '+pattern.total+' complaints in '+pattern.windowDays+' days')})"
              style="background:var(--danger);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">
              Push Recall
            </button>` : ''}
          <button onclick="document.getElementById('pattern-alert-${idx}').style.display='none'"
            style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;" title="Dismiss">×</button>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">
        ${pattern.complaints.slice(0, 4).map(c => `
          <span onclick="_triageView='detail';_triageComplaint='${c.id}';renderTriage()"
            style="font-size:11px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--border);"
            title="${c.triage_summary || ''}">
            ${c.complaint_number || c.id.slice(0,8)}
          </span>`).join('')}
        ${pattern.complaints.length > 4 ? `<span style="font-size:11px;color:var(--muted);padding:2px 4px;">+${pattern.complaints.length-4} more</span>` : ''}
      </div>
    </div>`;
}

async function renderTriageList(el) {
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading complaints…</div>`;
  try {
    let query = sb.from('complaints')
      .select('*')
      .eq('manufacturer_id', _orgId)
      .order('created_at', { ascending: false })
      .limit(100);

    const { data: complaints, error } = await query;
    if (error) throw error;

    // Update badge
    const critical = (complaints || []).filter(c => c.triage_level === 'critical' && c.status !== 'closed' && c.status !== 'resolved');
    const badge = document.getElementById('triage-badge');
    if (badge) { badge.textContent = critical.length; badge.style.display = critical.length ? 'inline' : 'none'; }

    const filterCounts = {
      all: (complaints||[]).length,
      critical: (complaints||[]).filter(c=>c.triage_level==='critical').length,
      serious: (complaints||[]).filter(c=>c.triage_level==='serious').length,
      monitor: (complaints||[]).filter(c=>c.triage_level==='monitor').length,
      pending: (complaints||[]).filter(c=>c.triage_level==='pending').length,
    };

    const filtered = _triageFilter === 'all' ? (complaints||[]) : (complaints||[]).filter(c => c.triage_level === _triageFilter);

    // Detect patterns
    const patterns = detectComplaintPatterns(complaints || []);

    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Complaint Triage</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">All complaints received about your products, triaged automatically by Batch'd AI.</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="triageShowNew()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">+ Log Phone Complaint</button>
        </div>
      </div>

      ${patterns.length > 0 ? `
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.7" fill="var(--warn)" stroke="none"/></svg>
            <span style="font-size:11px;font-weight:700;color:var(--warn);letter-spacing:0.06em;text-transform:uppercase;">Pattern${patterns.length > 1 ? 's' : ''} Detected</span>
          </div>
          ${patterns.map((p, i) => patternAlertHTML(p, i)).join('')}
        </div>
      ` : ''}

      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;">
        ${[
          { key:'all',      label:'All',      dot:null,               activeColor:'var(--accent)', activeBg:'rgba(52,211,153,0.1)' },
          { key:'critical', label:'Critical', dot:'var(--danger)',    activeColor:'var(--danger)', activeBg:'rgba(255,92,92,0.1)' },
          { key:'serious',  label:'Serious',  dot:'var(--warn)',      activeColor:'var(--warn)',   activeBg:'rgba(245,166,35,0.1)' },
          { key:'monitor',  label:'Monitor',  dot:'var(--accent)',    activeColor:'var(--accent)', activeBg:'rgba(52,211,153,0.1)' },
          { key:'pending',  label:'Pending',  dot:'var(--info)',      activeColor:'var(--info)',   activeBg:'rgba(56,189,248,0.1)' }
        ].map(f => `
          <button onclick="_triageFilter='${f.key}';renderTriageList(document.getElementById('main-content'))"
            style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid ${_triageFilter===f.key?f.activeColor:'var(--border)'};background:${_triageFilter===f.key?f.activeBg:'transparent'};color:${_triageFilter===f.key?f.activeColor:'var(--muted)'};font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;">
            ${f.dot ? `<span style="width:7px;height:7px;border-radius:50%;background:${f.dot};flex-shrink:0;display:inline-block;"></span>` : ''}
            ${f.label} <span style="opacity:0.6;">(${filterCounts[f.key]||0})</span>
          </button>`).join('')}
      </div>

      ${filtered.length === 0 ? `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:48px;text-align:center;">
          <div style="font-size:28px;margin-bottom:12px;">📋</div>
          <div style="color:var(--text);font-weight:600;margin-bottom:6px;">No complaints yet</div>
          <div style="color:var(--muted);font-size:13px;">Complaints submitted via your triage widget or logged by staff will appear here.</div>
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${filtered.map(c => triageCardHTML(c)).join('')}
        </div>
      `}
    `;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);padding:20px;">Error loading complaints: ${e.message}</div>`;
  }
}

function triageLevelStyle(level) {
  if (level === 'critical') return { bg: 'rgba(255,92,92,0.12)',   color: 'var(--danger)', label: 'CRITICAL' };
  if (level === 'serious')  return { bg: 'rgba(245,166,35,0.12)',  color: 'var(--warn)',   label: 'SERIOUS'  };
  if (level === 'monitor')  return { bg: 'rgba(52,211,153,0.10)',  color: 'var(--accent)', label: 'MONITOR'  };
  return                           { bg: 'rgba(56,189,248,0.10)',  color: 'var(--info)',   label: 'PENDING'  };
}

function triageStatusLabel(status) {
  const map = { new:'New', triaged:'Triaged', follow_up_sent:'Follow-up Sent', investigating:'Investigating', resolved:'Resolved', recall_triggered:'Recall Triggered', closed:'Closed' };
  return map[status] || status;
}

function triageCardHTML(c) {
  const s = triageLevelStyle(c.triage_level);
  const date = new Date(c.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  return `
    <div onclick="triageOpenDetail('${c.id}')" style="background:var(--surface);border:1px solid ${c.triage_level==='critical'?'rgba(255,92,92,0.3)':'var(--border)'};border-radius:12px;padding:16px;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${c.triage_level==='critical'?'rgba(255,92,92,0.3)':'var(--border)'}'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="background:${s.bg};color:${s.color};font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;letter-spacing:0.05em;">${s.label}</span>
          <span style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);">${c.complaint_number || c.id.slice(0,8)}</span>
          ${c.triage_category ? `<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:4px;">${c.triage_category}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--muted);">${triageStatusLabel(c.status)}</span>
          <span style="font-size:11px;color:var(--muted);">${date}</span>
        </div>
      </div>
      <div style="margin-top:10px;">
        <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">${c.product_name || 'Product not specified'}</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${c.triage_summary || c.complaint_text}</div>
      </div>
      ${c.keywords_detected?.length ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">${c.keywords_detected.slice(0,5).map(k=>`<span style="font-size:10px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);padding:2px 6px;border-radius:3px;">${k}</span>`).join('')}</div>` : ''}
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">
        ${c.customer_name ? `From: ${c.customer_name}` : 'Anonymous'} ${c.source ? '· via ' + c.source : ''} ${c.lot_number ? '· Lot: ' + c.lot_number : ''}
      </div>
    </div>
  `;
}

async function submitPhoneComplaint() {
  const text = document.getElementById('tc-text').value.trim();
  if (!text) { showTriageMsg('Complaint details are required.', 'error'); return; }

  const btn = document.getElementById('tc-submit');
  btn.disabled = true; btn.innerHTML = '<span style="display:flex;align-items:center;gap:6px;"><div class="spinner" style="width:12px;height:12px;border-width:2px;"></div> Triaging…</span>';

  const hasProductVal = document.querySelector('input[name="tc-has-product"]:checked')?.value;

  const payload = {
    source: 'phone',
    receiving_org_id: null,
    manufacturer_id: _orgId,
    org_name: _orgName,
    product_name: document.getElementById('tc-product').value.trim() || null,
    lot_number: document.getElementById('tc-lot').value.trim() || null,
    complaint_text: text,
    customer_name: document.getElementById('tc-name').value.trim() || null,
    customer_email: document.getElementById('tc-email').value.trim() || null,
    customer_phone: document.getElementById('tc-phone').value.trim() || null,
    purchase_store: document.getElementById('tc-store').value.trim() || null,
    incident_date: document.getElementById('tc-date').value || null,
    still_has_product: hasProductVal === 'true' ? true : hasProductVal === 'false' ? false : null,
    submitted_by_user_id: _session?.user?.id || null,
    submitted_by_label: 'Staff (phone intake)'
  };

  try {
    const res = await fetch('/.netlify/functions/triage-complaint', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Submission failed');

    // Show result
    const s = triageLevelStyle(data.triage_level);
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="max-width:600px;">
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:32px;text-align:center;">
          <div style="display:inline-block;background:${s.bg};color:${s.color};font-size:11px;font-weight:700;font-family:'DM Mono',monospace;padding:4px 12px;border-radius:6px;letter-spacing:0.05em;margin-bottom:16px;">${s.label}</div>
          <div style="font-size:16px;font-weight:600;color:var(--text);margin-bottom:8px;">Complaint logged and triaged</div>
          <div style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);margin-bottom:16px;">${data.complaint_number}</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;">${data.triage_summary}</div>
          ${data.recall_flag ? `
            <div style="background:rgba(255,92,92,0.1);border:1px solid rgba(255,92,92,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;text-align:left;">
              <div style="font-size:12px;font-weight:700;color:var(--danger);margin-bottom:4px;">RECALL FLAG</div>
              <div style="font-size:12px;color:var(--muted);">${data.recall_flag_reason}</div>
              <button onclick="pushFromTriage(${JSON.stringify(payload.product_name||'')},${JSON.stringify(payload.lot_number||'')},${JSON.stringify(payload.barcode||'')},${JSON.stringify(data.triage_category||'')},${JSON.stringify(data.triage_summary||'')})" style="margin-top:10px;background:var(--danger);color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;">Push a Recall Now</button>
            </div>
          ` : ''}
          ${data.pattern_alert ? `
            <div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:8px;padding:12px 16px;margin-bottom:20px;text-align:left;">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:4px;">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.6" fill="var(--warn)" stroke="none"/></svg>
                <span style="font-size:12px;font-weight:700;color:var(--warn);">PATTERN DETECTED: ${data.pattern_alert.title.toUpperCase()}</span>
              </div>
              <div style="font-size:12px;color:var(--muted);">${data.pattern_alert.count} complaints about this product in the last 7 days. Review the Triage panel for details.</div>
              ${data.pattern_alert.level !== 'emerging' ? `<button onclick="pushFromTriage(${JSON.stringify(payload.product_name||'')},${JSON.stringify(payload.lot_number||'')},${JSON.stringify(payload.barcode||'')},${JSON.stringify(data.triage_category||'')},${JSON.stringify('Pattern detected: '+data.pattern_alert.count+' complaints in 7 days')})" style="margin-top:10px;background:var(--warn);color:#1a0f00;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:600;cursor:pointer;">Push a Recall Now</button>` : ''}
            </div>
          ` : ''}
          ${payload.customer_email ? `<div style="font-size:12px;color:var(--muted);margin-bottom:20px;">Follow-up email sent automatically to ${payload.customer_email}.</div>` : ''}
          <div style="display:flex;justify-content:center;gap:10px;">
            <button onclick="launchInvestigationFromComplaint(_triageComplaint)" style="background:var(--warn);color:#1a0f00;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              Launch Investigation
            </button>
            <button onclick="_triageView='list';renderTriage()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;">View All Complaints</button>
            <button onclick="triageShowNew()" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;">Log Another</button>
          </div>
        </div>
      </div>
    `;
  } catch(e) {
    btn.disabled = false; btn.innerHTML = 'Submit and Triage';
    showTriageMsg(e.message, 'error');
  }
}

function showTriageMsg(txt, type) {
  const el = document.getElementById('tc-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(255,92,92,0.3)' : 'rgba(52,211,153,0.3)'}`;
}

  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading complaint…</div>`;

async function updateTriageStatus(id, newStatus) {
  try {
    await sb.from('complaints').update({ status: newStatus }).eq('id', id);
    await sb.from('complaint_audit_log').insert({
      complaint_id: id,
      action: 'status_changed_to_' + newStatus,
      actor_id: _session?.user?.id || null,
      actor_label: 'Staff'
    });
    renderTriageDetail(document.getElementById('main-content'));
  } catch(e) {
    alert('Error updating status: ' + e.message);
  }
}

function pushFromTriage(productName, lotNumber, barcode, triageCategory, triageSummary) {
  const reasonMap = {
    'Foreign Body': 'Foreign body contamination',
    'Adulteration': 'Potential adulteration',
    'Illness/Injury': 'Consumer illness reports',
    'Allergic Reaction': 'Undeclared allergen',
    'Spoilage': 'Product spoilage',
    'Mislabeling': 'Mislabeling'
  };
  const reason = reasonMap[triageCategory] || triageCategory || '';
  _pushDraft.product = productName || '';
  _pushDraft.lot = lotNumber || '';
  _pushDraft.barcode = barcode || '';
  _pushDraft.reason = reason;
  _pushDraft.description = triageSummary ? 'Triggered by complaint triage. ' + triageSummary : '';
  _pushDraft.authority = '';
  _selectedSeverity = 'class_i';
  showPanel('push');
}

// Load triage badge count on init
async function loadTriageBadge() {
  try {
    const { data } = await sb.from('complaints')
      .select('id')
      .eq('manufacturer_id', _orgId)
      .eq('triage_level', 'critical')
      .not('status', 'in', '("closed","resolved")');
    const badge = document.getElementById('triage-badge');
    if (badge && data?.length) { badge.textContent = data.length; badge.style.display = 'inline'; }
  } catch(e) {}
}

function copyToClipboard(elementId, btn) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const text = el.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.style.background = 'rgba(52,211,153,0.2)';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'rgba(52,211,153,0.4)';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = btn.getAttribute('data-original') || 'Copy'; }, 2000);
  });
}

async function renderPatterns() {

async function deleteMfrPattern(id, btn) {
  if (!confirm('Delete this learned pattern? The scanning app will re-learn it from future scans.')) return;
  btn.disabled = true; btn.textContent = '…';
  const { error } = await sb.from('code_patterns').delete().eq('id', id);
  if (error) { btn.disabled = false; btn.textContent = 'Delete'; alert('Error: ' + error.message); return; }
  renderPatterns();
}

function openProductForm() {
  _editingProductId = null;
  document.getElementById('product-form-label').textContent = 'Add new product';
  ['p-name','p-barcode','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-category').value = '';
  document.getElementById('p-ftl').value = 'false';
  document.getElementById('product-msg').style.display = 'none';
  document.getElementById('product-form').style.display = 'block';
  setTimeout(() => document.getElementById('p-name').focus(), 50);
}

async function editProduct(id) {
  const { data: p } = await sb.from('products').select('*').eq('id', id).single();
  if (!p) return;
  _editingProductId = id;
  document.getElementById('product-form-label').textContent = 'Edit product';
  document.getElementById('p-name').value    = p.name || '';
  document.getElementById('p-barcode').value = p.barcode || '';
  document.getElementById('p-desc').value    = p.description || '';
  document.getElementById('p-category').value = p.category || '';
  document.getElementById('p-ftl').value      = p.is_ftl ? 'true' : 'false';
  document.getElementById('product-msg').style.display = 'none';
  document.getElementById('product-form').style.display = 'block';
  document.getElementById('p-name').focus();
}

function closeProductForm() {
  _editingProductId = null;
  document.getElementById('product-form').style.display = 'none';
}

async function saveProduct() {
  const name     = document.getElementById('p-name').value.trim();
  const barcode  = document.getElementById('p-barcode').value.trim();
  const desc     = document.getElementById('p-desc').value.trim();
  const category = document.getElementById('p-category').value;
  const isFtl    = document.getElementById('p-ftl').value === 'true';
  const btn      = document.getElementById('btn-save-product');
  const msg      = document.getElementById('product-msg');

  msg.style.display = 'none';
  if (!name) { showProductMsg('Product name is required.', 'error'); return; }

  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  try {
    const payload = { name, barcode: barcode||null, description: desc||null, category: category||null, is_ftl: isFtl, manufacturer_id: _orgId };
    let error;
    if (_editingProductId) {
      ({ error } = await sb.from('products').update(payload).eq('id', _editingProductId));
    } else {
      ({ error } = await sb.from('products').insert(payload));
    }
    if (error) throw error;
    closeProductForm();
    renderProducts();
  } catch(e) {
    showProductMsg(e.message || 'Could not save product.', 'error');
    btn.disabled = false; btn.innerHTML = 'Save product';
  }
}

function showProductMsg(txt, type) {
  const el = document.getElementById('product-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type==='error'?'rgba(255,92,92,0.1)':'rgba(52,211,153,0.1)';
  el.style.border = type==='error'?'1px solid rgba(255,92,92,0.3)':'1px solid rgba(52,211,153,0.3)';
  el.style.color = type==='error'?'var(--danger)':'var(--accent)';
}
