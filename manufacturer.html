<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch'd — Manufacturer Portal</title>
  <meta name="theme-color" content="#34d399" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080f12; --surface: #0d1e1c; --surface2: #13302b;
      --border: #163d37; --accent: #34d399; --accent-dim: #059669;
      --text: #edfdf8; --muted: #6aaf9e; --danger: #ff5c5c;
      --warn: #f5a623; --info: #38bdf8; --radius: 12px;
    }
    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 70% 40% at 15% 0%, rgba(52,211,153,0.08) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 30% at 85% 100%, rgba(5,150,105,0.07) 0%, transparent 55%); }

    .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* Sidebar */
    .sidebar { width: 220px; flex-shrink: 0; background: var(--surface); border-right: 1px solid var(--border);
      display: flex; flex-direction: column; position: fixed; top: 0; left: 0; bottom: 0; z-index: 100; }
    .sidebar-logo { padding: 20px 18px 16px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
    .logo-icon { width: 32px; height: 32px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo-icon svg { color: #080f12; }
    .logo-text { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 17px; color: var(--accent); }
    .logo-sub { font-size: 9px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 1px; }
    .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
    .nav-section { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); padding: 10px 8px 4px; }
    .nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 10px; border-radius: 8px; cursor: pointer;
      font-size: 12px; color: var(--muted); transition: all 0.15s; text-decoration: none; border: none; background: none; width: 100%; text-align: left; }
    .nav-item:hover { background: var(--surface2); color: var(--text); }
    .nav-item.active { background: rgba(52,211,153,0.1); color: var(--accent); }
    .sidebar-footer { padding: 12px 10px; border-top: 1px solid var(--border); }
    .user-chip { display: flex; align-items: center; gap: 8px; padding: 8px 10px; border-radius: 8px; background: var(--surface2); }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--text); flex-shrink: 0; }
    .user-info { min-width: 0; flex: 1; }
    .user-name { font-size: 11px; color: var(--text); font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .user-role { font-size: 9px; color: var(--muted); }
    .sign-out-btn { background: none; border: none; cursor: pointer; color: var(--muted); padding: 2px; transition: color 0.15s; }
    .sign-out-btn:hover { color: var(--danger); }

    /* Main */
    .main { margin-left: 220px; flex: 1; display: flex; flex-direction: column; min-height: 100vh; }
    .topbar { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
      background: rgba(8,15,18,0.8); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 50; }
    .topbar-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 16px; color: var(--text); }
    .topbar-sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .content { padding: 24px 28px; flex: 1; }

    /* Cards & panels */
    .panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
    .panel-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .panel-body { padding: 18px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi-card.green::before { background: var(--accent); }
    .kpi-card.red::before   { background: var(--danger); }
    .kpi-card.amber::before { background: var(--warn); }
    .kpi-card.blue::before  { background: var(--info); }
    .kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 28px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .kpi-sub { font-size: 10px; color: var(--muted); }

    /* Form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Severity selector */
    .sev-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .sev-btn { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer;
      background: var(--surface2); text-align: left; transition: all 0.15s; }
    .sev-btn:hover { border-color: var(--muted); }
    .sev-btn.active-i   { border-color: var(--danger); background: rgba(255,92,92,0.08); }
    .sev-btn.active-ii  { border-color: var(--warn);   background: rgba(245,166,35,0.08); }
    .sev-btn.active-iii { border-color: var(--muted);  background: rgba(106,175,158,0.08); }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }
    .sev-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sev-desc { font-size: 9px; color: var(--muted); line-height: 1.4; }

    /* Drill toggle */
    .drill-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 14px; }
    .toggle-track { position: relative; width: 36px; height: 20px; background: var(--border); border-radius: 10px;
      transition: background 0.2s; flex-shrink: 0; cursor: pointer; }
    .toggle-track.on { background: var(--warn); }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
      background: white; transition: transform 0.2s; }
    .toggle-track.on .toggle-knob { transform: translateX(16px); }
    .drill-label { font-size: 12px; color: var(--text); flex: 1; }
    .drill-sub { font-size: 10px; color: var(--muted); }

    /* Buttons */
    .btn-primary { background: var(--accent); color: #080f12; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: #6ee7b7; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: var(--danger); color: white; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-danger:hover { background: #ff8080; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 8px;
      padding: 9px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Recall event list */
    .recall-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .recall-item:last-child { border-bottom: none; }
    .sev-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .sev-i   { background: var(--danger); box-shadow: 0 0 6px rgba(255,92,92,0.5); }
    .sev-ii  { background: var(--warn); }
    .sev-iii { background: var(--muted); }
    .recall-info { flex: 1; min-width: 0; }
    .recall-name { font-size: 12px; color: var(--text); font-weight: 500; }
    .recall-meta { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .recall-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .badge-drill { background: rgba(245,166,35,0.12); color: var(--warn); }
    .badge-live  { background: rgba(255,92,92,0.12); color: var(--danger); }
    .badge-ack   { background: rgba(52,211,153,0.1); color: var(--accent); }

    /* Ack table */
    .ack-table { width: 100%; border-collapse: collapse; }
    .ack-table th { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0 10px; border-bottom: 1px solid var(--border); }
    .ack-table td { padding: 9px 0; border-bottom: 1px solid rgba(22,61,55,0.5); font-size: 11px; vertical-align: middle; }
    .ack-table tr:last-child td { border-bottom: none; }
    .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .s-notified    { background: rgba(106,175,158,0.1); color: var(--muted); }
    .s-acknowledged{ background: rgba(56,189,248,0.1); color: var(--info); }
    .s-pulled      { background: rgba(245,166,35,0.12); color: var(--warn); }
    .s-disposed    { background: rgba(52,211,153,0.1); color: var(--accent); }
    .s-confirmed   { background: rgba(52,211,153,0.15); color: var(--accent); font-weight: 700; }

    /* Msg */
    .msg { font-size: 11px; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
    .msg.error   { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: var(--danger); }
    .msg.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--accent); }
    .msg.warn    { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--warn); }

    /* Auth gate */
    .auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 36px; width: 100%; max-width: 380px; }

    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 12px; }
  </style>
</head>
<body>

<!-- Auth gate -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <span style="font-family:'Figtree',sans-serif;font-weight:800;font-size:18px;color:var(--accent);">Batch'd</span>
    </div>
    <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;margin-bottom:4px;">Manufacturer Portal</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:24px;">Sign in to access your manufacturer dashboard.</div>
    <div id="auth-msg" style="display:none;" class="msg error"></div>
    <div class="field"><label>Email</label><input id="auth-email" type="email" placeholder="you@manufacturer.com" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <div class="field"><label>Password</label><input id="auth-pw" type="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')doAuth()" /></div>
    <button onclick="doAuth()" id="auth-btn" style="width:100%;background:var(--accent);color:#080f12;border:none;border-radius:8px;padding:12px;font-family:'DM Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;">Sign in →</button>
    <div style="text-align:center;margin-top:14px;font-size:11px;color:var(--muted);">New? <a href="https://batchdapp.com" style="color:var(--accent);">Sign up at batchdapp.com</a></div>
  </div>
</div>

<!-- App shell -->
<div class="app" id="app-shell" style="display:none;">
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
      <div><div class="logo-text">Batch'd</div><div class="logo-sub">Manufacturer</div></div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section">Overview</div>
      <button class="nav-item active" onclick="showPanel('overview')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </button>
      <div class="nav-section">Recalls</div>
      <button class="nav-item" onclick="showPanel('push')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        Push Recall
      </button>
      <button class="nav-item" onclick="showPanel('history')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        Recall History
      </button>
      <button class="nav-item" onclick="showPanel('acknowledgements')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
        Acknowledgements
      </button>
      <div class="nav-section">Partners</div>
      <button class="nav-item" onclick="showPanel('partners')">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Trading Partners
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="user-chip">
        <div class="user-avatar" id="user-avatar">M</div>
        <div class="user-info">
          <div class="user-name" id="user-name">Loading…</div>
          <div class="user-role">mfr_admin</div>
        </div>
        <button class="sign-out-btn" onclick="signOut()" title="Sign out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <div class="topbar-title" id="topbar-title">Dashboard</div>
        <div class="topbar-sub" id="topbar-sub">Manufacturer portal</div>
      </div>
    </div>
    <div class="content" id="main-content">
      <div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>
    </div>
  </main>
</div>

<script>
const SUPABASE_URL = 'https://lurxucdmrugikdlvvebc.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx1cnh1Y2RtcnVnaWtkbHZ2ZWJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyNTU5NTQsImV4cCI6MjA4OTgzMTk1NH0.ewNhBbF8nUzpF9Ve822D9t8VLwB_hjk27KuFFEXct0A';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let _session = null, _orgId = null, _orgName = '';
let _selectedSeverity = 'class_ii';
let _isDrill = false;

// ── Auth ───────────────────────────────────────────────────────
async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const msg   = document.getElementById('auth-msg');
  const btn   = document.getElementById('auth-btn');
  msg.style.display = 'none';
  if (!email || !pw) { showAuthMsg('Please enter your email and password.'); return; }
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Signing in…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    await initPortal(data.user);
  } catch(e) {
    showAuthMsg(e.message || 'Incorrect email or password.');
    btn.disabled = false; btn.innerHTML = 'Sign in →';
  }
}

function showAuthMsg(txt) {
  const el = document.getElementById('auth-msg');
  el.textContent = txt; el.style.display = 'block';
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

async function initPortal(user) {
  const { data: member } = await sb.from('organisation_members')
    .select('organisation_id, role')
    .eq('user_id', user.id)
    .maybeSingle();

  if (!member) { showAuthMsg('No organisation found. Please sign up at batchdapp.com.'); return; }
  _orgId = member.organisation_id;

  const { data: org } = await sb.from('organisations').select('name').eq('id', _orgId).single();
  _orgName = org?.name || 'My Organisation';

  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';

  const firstName = user.user_metadata?.first_name || user.email?.split('@')[0] || 'User';
  document.getElementById('user-name').textContent = firstName;
  document.getElementById('user-avatar').textContent = firstName[0].toUpperCase();
  document.getElementById('topbar-sub').textContent = _orgName + ' · Manufacturer';

  showPanel('overview');
}

// ── Panel router ───────────────────────────────────────────────
function showPanel(name) {
  const titles = { overview:'Dashboard', push:'Push a Recall', history:'Recall History', acknowledgements:'Acknowledgements', partners:'Trading Partners' };
  document.getElementById('topbar-title').textContent = titles[name] || name;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${name}'`));
  });
  const fns = { overview: renderOverview, push: renderPush, history: renderHistory, acknowledgements: renderAcknowledgements, partners: renderPartners };
  (fns[name] || (() => {}))();
}

// ── Overview ───────────────────────────────────────────────────
async function renderOverview() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;

  const [eventsRes, acksRes] = await Promise.all([
    sb.from('recall_events').select('*').eq('source_org_id', _orgId).order('created_at', { ascending: false }),
    sb.from('recall_acknowledgements').select('status, recall_event_id').in('recall_event_id',
      (await sb.from('recall_events').select('id').eq('source_org_id', _orgId)).data?.map(e => e.id) || []
    ),
  ]);

  const events = eventsRes.data || [];
  const acks   = acksRes.data  || [];
  const liveRecalls = events.filter(e => !e.is_drill).length;
  const drills      = events.filter(e => e.is_drill).length;
  const confirmed   = acks.filter(a => a.status === 'confirmed').length;
  const pending     = acks.filter(a => a.status === 'notified').length;

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card red">
        <div class="kpi-label">Live recalls issued</div>
        <div class="kpi-value" style="color:${liveRecalls>0?'var(--danger)':'var(--text)'}">${liveRecalls}</div>
        <div class="kpi-sub">${events.length} total recall events</div>
      </div>
      <div class="kpi-card amber">
        <div class="kpi-label">Mock drills run</div>
        <div class="kpi-value">${drills}</div>
        <div class="kpi-sub">Recall preparedness tests</div>
      </div>
      <div class="kpi-card green">
        <div class="kpi-label">Stores confirmed</div>
        <div class="kpi-value" style="color:var(--accent)">${confirmed}</div>
        <div class="kpi-sub">Full disposal confirmed</div>
      </div>
      <div class="kpi-card blue">
        <div class="kpi-label">Awaiting response</div>
        <div class="kpi-value">${pending}</div>
        <div class="kpi-sub">Stores yet to acknowledge</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header">
        <div><div class="panel-title">Recent recall events</div></div>
        <button class="btn-danger" onclick="showPanel('push')" style="font-size:11px;padding:7px 14px;">
          + Push new recall
        </button>
      </div>
      <div class="panel-body">
        ${events.length === 0
          ? `<div class="empty">No recalls issued yet.<br>Use "Push Recall" to notify your retail partners.</div>`
          : events.slice(0,8).map(e => `
            <div class="recall-item">
              <div class="sev-indicator sev-${e.severity?.split('_')[1] || 'ii'}"></div>
              <div class="recall-info">
                <div class="recall-name">${e.product_name}</div>
                <div class="recall-meta">
                  ${e.lot_number ? `Lot: ${e.lot_number} · ` : ''}
                  ${e.severity?.replace('_',' ').replace('class','Class')} · 
                  ${e.reason} · 
                  ${new Date(e.created_at).toLocaleDateString('en-GB')}
                </div>
              </div>
              <span class="recall-badge ${e.is_drill?'badge-drill':'badge-live'}">${e.is_drill?'Drill':'Live'}</span>
            </div>`).join('')}
      </div>
    </div>`;
}

// ── Push recall form ───────────────────────────────────────────
function renderPush() {
  const el = document.getElementById('main-content');
  el.innerHTML = `
    <div style="max-width:640px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;">Push a recall to retailers</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:20px;">This will instantly notify all retailer partners who have this product in their scan history.</div>

      <div class="panel">
        <div class="panel-header"><div class="panel-title">Recall details</div></div>
        <div class="panel-body">
          <div id="push-msg" style="display:none;" class="msg"></div>

          <!-- Drill toggle -->
          <div class="drill-toggle" id="drill-toggle" onclick="toggleDrill()">
            <div class="toggle-track" id="drill-track"><div class="toggle-knob"></div></div>
            <div>
              <div class="drill-label">Mock recall drill</div>
              <div class="drill-sub">Retailers will be notified this is a test — no real action required</div>
            </div>
          </div>

          <div class="field">
            <label>Product name *</label>
            <input id="p-product" type="text" placeholder="e.g. Tine Helmelk 1L" />
          </div>

          <div class="field-row">
            <div class="field">
              <label>Lot / batch number</label>
              <input id="p-lot" type="text" placeholder="e.g. L2024-03-15A" />
            </div>
            <div class="field">
              <label>Barcode (EAN/UPC)</label>
              <input id="p-barcode" type="text" placeholder="e.g. 7038010013882" />
            </div>
          </div>

          <div class="field">
            <label>Severity *</label>
            <div class="sev-grid">
              <div class="sev-btn ${_selectedSeverity==='class_i'?'active-i':''}" onclick="selectSev('class_i')">
                <div class="sev-dot" style="background:var(--danger)"></div>
                <div class="sev-name" style="color:var(--danger)">Class I</div>
                <div class="sev-desc">Serious health hazard · risk of death</div>
              </div>
              <div class="sev-btn ${_selectedSeverity==='class_ii'?'active-ii':''}" onclick="selectSev('class_ii')">
                <div class="sev-dot" style="background:var(--warn)"></div>
                <div class="sev-name" style="color:var(--warn)">Class II</div>
                <div class="sev-desc">Potential adverse health effect · low probability of serious harm</div>
              </div>
              <div class="sev-btn ${_selectedSeverity==='class_iii'?'active-iii':''}" onclick="selectSev('class_iii')">
                <div class="sev-dot" style="background:var(--muted)"></div>
                <div class="sev-name">Class III</div>
                <div class="sev-desc">Unlikely to cause harm · labelling or minor issue</div>
              </div>
            </div>
          </div>

          <div class="field">
            <label>Reason for recall *</label>
            <input id="p-reason" type="text" placeholder="e.g. Undeclared allergen — milk" />
          </div>

          <div class="field">
            <label>Description / additional details</label>
            <textarea id="p-description" rows="3" placeholder="Include any additional context for retailers — affected date ranges, affected markets, recommended customer action, etc."></textarea>
          </div>

          <div class="field">
            <label>Authority reference <span style="color:var(--muted);font-size:10px;">optional</span></label>
            <input id="p-authority" type="text" placeholder="e.g. RASFF 2026.1234 or FDA recall #123" />
          </div>

          <div style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:11px;color:var(--muted);line-height:1.6;">
            <strong style="color:var(--text);">What happens when you push:</strong><br>
            1. All retailer partners with matching products in their scan history are identified<br>
            2. A recall distribution is created for each affected retailer<br>
            3. Each affected store gets a notification record<br>
            4. Branded email alerts are sent to each retailer's corporate admin<br>
            5. Retailers acknowledge per-store in their dashboard
          </div>

          <button class="btn-danger" onclick="pushRecall()" id="btn-push" style="width:100%;justify-content:center;padding:13px;">
            🚨 Push recall to all affected retailers →
          </button>
        </div>
      </div>
    </div>`;
}

function selectSev(sev) {
  _selectedSeverity = sev;
  renderPush();
  // Restore field values
  document.getElementById('p-product').focus();
}

function toggleDrill() {
  _isDrill = !_isDrill;
  const track = document.getElementById('drill-track');
  track.classList.toggle('on', _isDrill);
  const btn = document.getElementById('btn-push');
  if (btn) {
    btn.textContent = _isDrill
      ? '⚠ Send mock drill to all retail partners →'
      : '🚨 Push recall to all affected retailers →';
    btn.className = _isDrill ? 'btn-primary' : 'btn-danger';
    btn.style.width = '100%'; btn.style.justifyContent = 'center'; btn.style.padding = '13px';
  }
}

async function pushRecall() {
  const product     = document.getElementById('p-product')?.value.trim();
  const lot         = document.getElementById('p-lot')?.value.trim();
  const barcode     = document.getElementById('p-barcode')?.value.trim();
  const reason      = document.getElementById('p-reason')?.value.trim();
  const description = document.getElementById('p-description')?.value.trim();
  const authority   = document.getElementById('p-authority')?.value.trim();
  const btn         = document.getElementById('btn-push');
  const msg         = document.getElementById('push-msg');

  msg.style.display = 'none';

  if (!product) { showPushMsg('Product name is required.', 'error'); return; }
  if (!reason)  { showPushMsg('Reason for recall is required.', 'error'); return; }
  if (!lot && !barcode) { showPushMsg('Please enter at least a lot number or barcode so retailers can identify the product.', 'warn'); return; }

  if (!confirm(`${_isDrill ? '[DRILL] ' : ''}Push recall for "${product}" to all affected retail partners?\n\nThis will send immediate email alerts.`)) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Pushing recall…';

  try {
    // Call Supabase function to create recall event and distributions
    const { data: result, error } = await sb.rpc('push_recall', {
      p_product_name:  product,
      p_lot_number:    lot    || null,
      p_barcode:       barcode || null,
      p_severity:      _selectedSeverity,
      p_reason:        reason,
      p_description:   description || null,
      p_authority_ref: authority   || null,
      p_is_drill:      _isDrill,
    });
    if (error) throw error;

    // Get retailer admin emails to notify
    // Get retailer emails using the secure database function
    const { data: emailData } = await sb.rpc('get_retailer_emails', {
      p_recall_event_id: result.recall_event_id
    });
    const retailerEmails = emailData || [];

    // Send email notifications via Netlify function
    if (retailerEmails?.length > 0) {
      await fetch('https://www.batchdapp.com/.netlify/functions/push-recall-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          retailerEmails,
          productName:      product,
          lotNumber:        lot || null,
          barcode:          barcode || null,
          severity:         _selectedSeverity,
          reason,
          manufacturerName: _orgName,
          affectedUnits:    result.stores_notified,
          isDrill:          _isDrill,
          recallEventId:    result.recall_event_id,
        }),
      });
    }

    // Show success
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="max-width:500px;">
        <div style="background:${_isDrill?'rgba(245,166,35,0.08)':'rgba(255,92,92,0.08)'};border:1px solid ${_isDrill?'rgba(245,166,35,0.3)':'rgba(255,92,92,0.3)'};border-radius:12px;padding:28px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">${_isDrill ? '⚠' : '🚨'}</div>
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;margin-bottom:8px;">${_isDrill ? 'Drill dispatched' : 'Recall pushed'}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:20px;">
            <strong style="color:var(--text);">${result.retailers_notified}</strong> retailer${result.retailers_notified!==1?'s':''} notified<br>
            <strong style="color:var(--text);">${result.stores_notified}</strong> store${result.stores_notified!==1?'s':''} have acknowledgement records created<br>
            ${retailerEmails.length > 0 ? `Email alerts sent to <strong style="color:var(--text);">${retailerEmails.length}</strong> contact${retailerEmails.length!==1?'s':''}` : 'No retailer email contacts found — check trading partners'}
          </div>
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn-ghost" onclick="showPanel('acknowledgements')">View acknowledgements →</button>
            <button class="btn-ghost" onclick="showPanel('push')">Push another recall</button>
          </div>
        </div>
      </div>`;

  } catch(e) {
    showPushMsg('Error: ' + (e.message || 'Could not push recall.'), 'error');
    btn.disabled = false;
    btn.innerHTML = _isDrill ? '⚠ Send mock drill →' : '🚨 Push recall →';
  }
}

function showPushMsg(txt, type) {
  const el = document.getElementById('push-msg');
  if (!el) return;
  el.textContent = txt; el.className = 'msg ' + type; el.style.display = 'block';
}

// ── Recall history ─────────────────────────────────────────────
async function renderHistory() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  const { data: events } = await sb.from('recall_events').select('*').eq('source_org_id', _orgId).order('created_at', { ascending: false });
  const list = events || [];
  el.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">${list.length} recall event${list.length!==1?'s':''}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">All recalls and drills issued by ${_orgName}</div>
    </div>
    <div class="panel">
      <div class="panel-body">
        ${list.length === 0 ? `<div class="empty">No recalls issued yet.</div>` :
        list.map(e => `
          <div class="recall-item">
            <div class="sev-indicator sev-${e.severity?.split('_')[1] || 'ii'}"></div>
            <div class="recall-info">
              <div class="recall-name">${e.product_name}</div>
              <div class="recall-meta">
                ${e.severity?.replace('_',' ')} · ${e.reason}<br>
                ${e.lot_number?`Lot: ${e.lot_number} · `:''}${e.barcode?`Barcode: ${e.barcode} · `:''}
                ${new Date(e.created_at).toLocaleDateString('en-GB', {day:'numeric',month:'short',year:'numeric'})}
              </div>
            </div>
            <span class="recall-badge ${e.is_drill?'badge-drill':'badge-live'}">${e.is_drill?'Drill':'Live'}</span>
          </div>`).join('')}
      </div>
    </div>`;
}

// ── Acknowledgements ───────────────────────────────────────────
async function renderAcknowledgements() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;

  const { data: events } = await sb.from('recall_events').select('id, product_name, is_drill, created_at').eq('source_org_id', _orgId).order('created_at', { ascending: false });
  const eventIds = (events || []).map(e => e.id);

  if (eventIds.length === 0) {
    el.innerHTML = `<div class="empty">No recalls pushed yet.</div>`; return;
  }

  const { data: acks } = await sb.from('recall_acknowledgements')
    .select('*, organisations(name)')
    .in('recall_event_id', eventIds)
    .order('created_at', { ascending: false });

  const list = acks || [];
  const eventMap = Object.fromEntries((events||[]).map(e => [e.id, e]));

  el.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">Retailer acknowledgements</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${list.length} store-level acknowledgement records</div>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0;">
        <table class="ack-table" style="padding:0 18px;">
          <thead><tr style="padding:0 18px;">
            <th style="padding:12px 18px;">Recall</th>
            <th style="padding:12px 18px;">Retailer</th>
            <th style="padding:12px 18px;">Status</th>
            <th style="padding:12px 18px;">Units pulled</th>
            <th style="padding:12px 18px;">Updated</th>
          </tr></thead>
          <tbody>
            ${list.length === 0 ? `<tr><td colspan="5"><div class="empty">No acknowledgements yet.</div></td></tr>` :
            list.map(a => {
              const ev = eventMap[a.recall_event_id];
              return `<tr>
                <td style="padding:9px 18px;">
                  <div style="font-size:11px;color:var(--text);">${ev?.product_name||'—'}</div>
                  ${ev?.is_drill ? `<span class="recall-badge badge-drill" style="margin-top:2px;display:inline-block;">Drill</span>` : ''}
                </td>
                <td style="padding:9px 18px;color:var(--muted)">${a.organisations?.name||'—'}</td>
                <td style="padding:9px 18px;">
                  <span class="status-pill s-${a.status}">${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span>
                </td>
                <td style="padding:9px 18px;color:var(--muted)">${a.units_pulled ?? '—'}</td>
                <td style="padding:9px 18px;color:var(--muted)">${a.acknowledged_at ? new Date(a.acknowledged_at).toLocaleDateString('en-GB') : '—'}</td>
              </tr>`;}).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
}

// ── Trading partners ───────────────────────────────────────────
async function renderPartners() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  const { data: partners } = await sb.from('trading_partners')
    .select('*, organisations!trading_partners_retailer_id_fkey(name, contact_email)')
    .eq('manufacturer_id', _orgId);
  const list = partners || [];
  el.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">${list.length} trading partner${list.length!==1?'s':''}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">Retail organisations connected to ${_orgName}</div>
    </div>
    <div class="panel">
      <div class="panel-body">
        ${list.length === 0
          ? `<div class="empty">No trading partners yet.<br>Partners are automatically created when retailers scan your products.</div>`
          : list.map(p => `
            <div class="recall-item">
              <div class="sev-indicator" style="background:var(--accent)"></div>
              <div class="recall-info">
                <div class="recall-name">${p.organisations?.name||'—'}</div>
                <div class="recall-meta">${p.organisations?.contact_email||'—'} · Status: ${p.status}</div>
              </div>
              <span class="recall-badge badge-ack">${p.status}</span>
            </div>`).join('')}
      </div>
    </div>`;
}

// ── Boot ───────────────────────────────────────────────────────
(async () => {
  const { data: { session } } = await sb.auth.getSession();
  if (session) await initPortal(session.user);
})();
</script>
