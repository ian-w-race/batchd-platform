function renderMfrObStep(idx) {
  const steps = window._mfrObSteps;
  const step  = steps[idx];
  const el    = document.getElementById('mfr-ob-content');
  const ctr   = document.getElementById('mfr-step-counter');
  const prev  = document.getElementById('mfr-btn-prev');
  const next  = document.getElementById('mfr-btn-next');
  if (!el || !step) return;
  el.innerHTML = (MFR_OB_STEPS[step.id] || (() => ''))();
  if (ctr) ctr.textContent = `Step ${idx + 1} of ${steps.length}`;
  steps.forEach((s, i) => {
    const dot = document.getElementById('mfr-step-dot-' + i);
    if (!dot) return;
    const isActive = i === idx;
    const isDone   = i < idx;
    dot.style.background  = isDone ? 'var(--accent)' : isActive ? 'rgba(52,211,153,0.2)' : 'transparent';
    dot.style.borderColor = isDone || isActive ? 'var(--accent)' : 'var(--border)';
    dot.style.color       = isDone ? '#065f46' : isActive ? 'var(--accent)' : 'var(--muted)';
    dot.textContent       = isDone ? '✓' : String(i + 1);
  });
  if (prev) prev.style.display = idx === 0 ? 'none' : '';
  if (next) next.textContent = idx === steps.length - 1 ? 'Go to dashboard' : 'Continue →';
}

function goToMfrStep(idx)  { window._mfrObStep = idx; renderMfrObStep(idx); }
function nextMfrStep() {
  const idx = window._mfrObStep, steps = window._mfrObSteps;
  if (idx >= steps.length - 1) { dismissMfrOnboarding(); return; }
  window._mfrObStep = idx + 1; renderMfrObStep(idx + 1);
}
function prevMfrStep() {
  const idx = window._mfrObStep;
  if (idx <= 0) return;
  window._mfrObStep = idx - 1; renderMfrObStep(idx - 1);
}
function dismissMfrOnboarding() {
  localStorage.setItem('batched_mfr_onboarded_' + _orgId, '1');
  document.getElementById('mfr-onboarding-overlay')?.remove();
}

async function obSaveProduct() {
  const name    = document.getElementById('ob-prod-name')?.value.trim();
  const barcode = document.getElementById('ob-prod-barcode')?.value.trim();
  const cat     = document.getElementById('ob-prod-cat')?.value;
  const msg     = document.getElementById('ob-prod-msg');
  const saved   = document.getElementById('ob-prod-saved');
  const showMsg = (txt, ok) => { msg.style.display='block'; msg.style.background=ok?'rgba(52,211,153,0.1)':'rgba(255,92,92,0.1)'; msg.style.color=ok?'var(--accent)':'var(--danger)'; msg.style.border=`1px solid ${ok?'rgba(52,211,153,0.3)':'rgba(255,92,92,0.3)'}`; msg.textContent=txt; };
  if (!name) { showMsg('Product name required.', false); return; }
  const { data, error } = await sb.from('products').insert({ name, barcode, category: cat||null, manufacturer_id: _orgId }).select('id').single();
  if (error) { showMsg('Error: ' + error.message, false); return; }
  window._mfrObProductId = data.id;
  msg.style.display = 'none';
  if (saved) { saved.style.display='block'; saved.textContent = `✓ "${name}" registered successfully!`; }
}

async function obSaveLot() {
  const lotNumber = document.getElementById('ob-lot-number')?.value.trim();
  const prodDate  = document.getElementById('ob-lot-date')?.value;
  const msg       = document.getElementById('ob-lot-msg');
  const saved     = document.getElementById('ob-lot-saved');
  const showMsg   = (txt, ok) => { msg.style.display='block'; msg.style.background=ok?'rgba(52,211,153,0.1)':'rgba(255,92,92,0.1)'; msg.style.color=ok?'var(--accent)':'var(--danger)'; msg.style.border=`1px solid ${ok?'rgba(52,211,153,0.3)':'rgba(255,92,92,0.3)'}`; msg.textContent=txt; };
  if (!lotNumber) { showMsg('Lot number required.', false); return; }
  const { error } = await sb.from('product_lots').insert({ lot_number: lotNumber, manufacturer_id: _orgId, product_id: window._mfrObProductId||null, production_date: prodDate||null });
  if (error) { showMsg('Error: ' + error.message, false); return; }
  msg.style.display = 'none';
  if (saved) { saved.style.display='block'; saved.textContent = `✓ Lot code ${lotNumber} registered!`; }
}

async function obSearchRetailers() {
  const q   = document.getElementById('ob-ret-search')?.value.trim();
  const res = document.getElementById('ob-ret-results');
  if (!res || q.length < 2) { if (res) res.innerHTML = ''; return; }
  const { data } = await sb.from('organisations').select('id,name').ilike('name','%'+q+'%').eq('type','retailer').neq('id',_orgId).limit(5);
  res.innerHTML = (data||[]).length === 0 ? `<div style="font-size:12px;color:var(--muted);">No retailers found.</div>` :
    (data||[]).map(org => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--bg);border:1px solid var(--glass-border);border-radius:8px;margin-bottom:6px;">
        <div style="font-size:13px;color:var(--text);">${org.name}</div>
        <button onclick="obConnectRetailer('${org.id}','${org.name.replace(/'/g,"\\'")}',this)"
          style="background:var(--accent);color:#065f46;border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">Connect</button>
      </div>`).join('');
}

async function obConnectRetailer(retailerId, retailerName, btn) {
  btn.disabled = true; btn.textContent = '✓ Sent';
  btn.style.cssText = 'background:var(--surface);border:1px solid rgba(52,211,153,0.3);color:var(--accent);border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;font-family:inherit;cursor:default;';
  await sb.from('trading_partners').upsert({ manufacturer_id: _orgId, retailer_id: retailerId, status: 'pending' }, { onConflict: 'manufacturer_id,retailer_id' });
  showToast('Connection request sent to ' + retailerName, 'ok', 2500);
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// UNIVERSAL CSV IMPORT ENGINE
// ═══════════════════════════════════════════════════════════════

/*
  openCSVImport(config) — universal import modal

  config = {
    title:       string            // "Import Shipments"
    description: string            // subtitle
    templateHeaders: string[]      // CSV column headers for template download
    templateExample: string[][]    // 2–3 example rows
    fields: [                      // schema for parsing
      { key, label, required, type, match }
      // match: optional lookup function async(value) => id|null
    ],
    validate: async(rows) => { rows: cleanRows, errors: string[] }
    insert:   async(rows) => { inserted, failed, errors }
  }
*/

async function openCSVImport(config) {
  document.getElementById('csv-import-modal')?.remove();

  const modal = document.createElement('div');
  modal.id = 'csv-import-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(4,12,14,0.92);z-index:9500;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(4px);';

  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:20px;width:100%;max-width:680px;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;">

      <!-- Header -->
      <div style="padding:22px 26px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-shrink:0;">
        <div>
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:15px;color:var(--text);display:flex;align-items:center;gap:8px;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            ${config.title}
          </div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px;">${config.description}</div>
        </div>
        <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px;flex-shrink:0;">✕</button>
      </div>

      <!-- Body -->
      <div style="flex:1;overflow-y:auto;padding:22px 26px;" id="csv-import-body">
        <!-- Step 1: Drop zone + template download -->
        <div id="csv-step-upload">
          <!-- Template download -->
          <div style="background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:13px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">
            <div>
              <div style="font-size:12px;font-weight:600;color:var(--accent);">Start with our template</div>
              <div style="font-size:11px;color:var(--muted);margin-top:2px;">Download a pre-formatted CSV with the correct column headings</div>
            </div>
            <button onclick="csvDownloadTemplate()" style="background:var(--accent);color:#065f46;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;flex-shrink:0;">
              ↓ Download template
            </button>
          </div>

          <!-- Drop zone -->
          <div id="csv-dropzone"
            ondragover="event.preventDefault();this.style.borderColor='var(--accent)';this.style.background='rgba(52,211,153,0.08)';"
            ondragleave="this.style.borderColor='var(--border)';this.style.background='var(--surface2)';"
            ondrop="csvHandleDrop(event)"
            onclick="document.getElementById('csv-file-input').click()"
            style="border:2px dashed var(--border);border-radius:12px;background:var(--surface2);padding:36px 20px;text-align:center;cursor:pointer;transition:all 0.2s;">
            <div style="font-size:28px;margin-bottom:8px;">📄</div>
            <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:4px;">Drop your CSV here</div>
            <div style="font-size:12px;color:var(--muted);">or click to browse — .csv files only</div>
          </div>
          <input type="file" id="csv-file-input" accept=".csv" style="display:none;" onchange="csvHandleFile(this.files[0])">

          <!-- Available fields guide -->
          <div style="margin-top:16px;">
            <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.07em;">Available fields</div>
            <div style="font-size:11px;color:var(--muted);margin-bottom:10px;line-height:1.5;">After uploading, you'll choose which of your columns maps to each field. You can import from any spreadsheet — no column renaming needed.</div>
            <div style="display:flex;flex-wrap:wrap;gap:6px;">
              ${config.fields.map(f => `
                <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:6px;padding:4px 10px;font-size:11px;font-family:'DM Mono',monospace;color:${f.required ? 'var(--text)' : 'var(--muted)'};">
                  ${f.label}${f.required ? ' <span style="color:var(--accent)">★</span>' : ''}
                </div>`).join('')}
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:8px;"><span style="color:var(--accent)">★</span> needed for import · all others optional</div>
          </div>
        </div>

        <!-- Step 2: Preview (hidden initially) -->
        <div id="csv-step-preview" style="display:none;">
          <div id="csv-preview-content"></div>
        </div>

        <!-- Step 3: Progress (hidden initially) -->
        <div id="csv-step-progress" style="display:none;">
          <div style="text-align:center;padding:20px 0;">
            <div class="spinner" style="margin:0 auto 16px;"></div>
            <div style="font-size:14px;font-weight:600;color:var(--text);" id="csv-progress-label">Importing…</div>
            <div style="background:var(--surface2);border-radius:8px;height:6px;margin:12px 0;overflow:hidden;">
              <div id="csv-progress-bar" style="height:100%;background:var(--accent);border-radius:8px;width:0%;transition:width 0.2s;"></div>
            </div>
            <div style="font-size:12px;color:var(--muted);" id="csv-progress-sub"></div>
          </div>
        </div>

        <!-- Step 4: Result (hidden initially) -->
        <div id="csv-step-result" style="display:none;"></div>
      </div>

      <!-- Footer -->
      <div style="padding:14px 26px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;" id="csv-footer">
        <div style="font-size:11px;color:var(--muted);" id="csv-footer-info"></div>
        <div style="display:flex;gap:8px;" id="csv-footer-btns">
          <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
        </div>
      </div>
    </div>`;

  document.body.appendChild(modal);

  // Store config on modal for access by handlers
  modal._csvConfig = config;
}

// ── Template download ─────────────────────────────────────────
function csvDownloadTemplate() {
  const modal = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const headers = config.fields.map(f => f.label).join(',');
  const examples = (config.templateExample || [[]]).map(row =>
    row.map(cell => `"${String(cell).replace(/"/g, '""')}"`).join(',')
  ).join('\n');
  const csv = headers + '\n' + examples;
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const slug = config.title.toLowerCase().replace(/\s+/g, '_');
  a.href = url; a.download = `batched_${slug}_template.csv`; a.click();
  URL.revokeObjectURL(url);
}

// ── File handling ─────────────────────────────────────────────
function csvHandleDrop(e) {
  e.preventDefault();
  const dz = document.getElementById('csv-dropzone');
  dz.style.borderColor = 'var(--border)';
  dz.style.background = 'var(--surface2)';
  const file = e.dataTransfer.files[0];
  if (file) csvHandleFile(file);
}

function csvHandleFile(file) {
  if (!file || !file.name.endsWith('.csv')) {
    showToast('Please upload a .csv file', 'error', 3000);
    return;
  }
  const reader = new FileReader();
  reader.onload = e => csvParseAndPreview(e.target.result, file.name);
  reader.readAsText(file);
}

// ── Parser ────────────────────────────────────────────────────
function csvParseText(text) {
  const lines = text.trim().split(/\r?\n/);
  if (lines.length < 2) return { headers: [], rows: [] };

  const parseRow = line => {
    const cells = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (ch === ',' && !inQ) {
        cells.push(cur.trim()); cur = '';
      } else cur += ch;
    }
    cells.push(cur.trim());
    return cells;
  };

  const headers = parseRow(lines[0]).map(h => h.toLowerCase().trim());
  const rows = lines.slice(1).filter(l => l.trim()).map(l => {
    const cells = parseRow(l);
    const obj = {};
    headers.forEach((h, i) => { obj[h] = (cells[i] || '').trim(); });
    return obj;
  });
  return { headers, rows };
}

// ── Preview ───────────────────────────────────────────────────
// ── CSV column mapper ─────────────────────────────────────────

async function csvParseAndPreview(text, filename) {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const { headers, rows } = csvParseText(text);
  modal._csvRows    = rows;
  modal._csvHeaders = headers;

  // Auto-detect best column match for each field (suggestion only)
  const autoMap = {};
  config.fields.forEach(f => {
    const fLabel = f.label.toLowerCase().replace(/[^a-z0-9]/g,'');
    const fKey   = f.key.toLowerCase();
    const match  = headers.find(h => {
      const hn = h.toLowerCase().replace(/[^a-z0-9]/g,'');
      return hn === fLabel || hn === fKey || hn.includes(fLabel.slice(0,6)) || fLabel.includes(hn.slice(0,6));
    });
    if (match) autoMap[f.key] = match;
  });

  document.getElementById('csv-step-upload').style.display = 'none';
  document.getElementById('csv-step-preview').style.display = '';

  const optionsHtml = `<option value="">— skip this field —</option>${headers.map(h =>
    `<option value="${h}">${h}</option>`).join('')}`;

  const sel = (key) => {
    const suggested = autoMap[key] || '';
    return `<select id="csv-map-${key}" onchange="csvUpdatePreview()" style="background:var(--bg);border:1px solid var(--glass-border);border-radius:7px;padding:6px 10px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-width:180px;cursor:pointer;outline:none;appearance:auto;">
      ${optionsHtml}
    </select>`;
  };

  document.getElementById('csv-preview-content').innerHTML = `
    <!-- File info -->
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap;">
      <div style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);border-radius:8px;padding:6px 12px;font-size:12px;color:var(--accent);">✓ ${rows.length} rows · ${headers.length} columns</div>
      <div style="font-size:12px;color:var(--muted);">${filename}</div>
    </div>

    <!-- Column mapper -->
    <div style="background:var(--surface2);border:1px solid var(--glass-border);border-radius:12px;padding:16px;margin-bottom:18px;">
      <div style="font-size:11px;font-weight:700;color:var(--text);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em;">Map your columns</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:14px;">Match each Batch'd field to a column from your file. Fields marked <span style="color:var(--accent)">★</span> are needed for import — others are optional.</div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${config.fields.map(f => `
          <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;">
            <div style="font-size:13px;color:var(--text);font-weight:500;">
              ${f.label}
              ${f.required ? '<span style="color:var(--accent);margin-left:4px;">★</span>' : '<span style="font-size:10px;color:var(--muted);margin-left:4px;">(optional)</span>'}
            </div>
            <div style="font-size:12px;color:var(--muted);">→</div>
            <div>${sel(f.key)}</div>
          </div>`).join('')}
      </div>
    </div>

    <!-- Live preview table -->
    <div id="csv-live-preview">
      <div style="font-size:11px;font-weight:600;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.07em;">Preview (first 5 rows)</div>
      <div id="csv-preview-table" style="overflow-x:auto;border:1px solid var(--glass-border);border-radius:10px;"></div>
      ${rows.length > 5 ? `<div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0;">+ ${rows.length - 5} more rows</div>` : ''}
    </div>`;

  // Set auto-suggested values
  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && autoMap[f.key]) el.value = autoMap[f.key];
  });

  csvUpdatePreview();

  document.getElementById('csv-footer-info').textContent = `${rows.length} rows ready`;
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="csvGoBack()" style="background:none;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">← Back</button>
    <button onclick="csvRunImport()" id="csv-import-btn" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Import ${rows.length} row${rows.length!==1?'s':''}</button>`;
}

function csvGetCurrentMapping() {
  const modal  = document.getElementById('csv-import-modal');
  const config = modal._csvConfig;
  const map    = {};
  config.fields.forEach(f => {
    const el = document.getElementById('csv-map-' + f.key);
    if (el && el.value) map[f.key] = el.value;
  });
  return map;
}

function csvUpdatePreview() {
  const modal   = document.getElementById('csv-import-modal');
  const config  = modal._csvConfig;
  const rows    = modal._csvRows || [];
  const fieldMap = csvGetCurrentMapping();
  const mapped  = config.fields.filter(f => fieldMap[f.key]);
  const preview = rows.slice(0, 5);
  const tableEl = document.getElementById('csv-preview-table');
  if (!tableEl) return;

  if (mapped.length === 0) {
    tableEl.innerHTML = `<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted);">Assign at least one column above to see a preview.</div>`;
    return;
  }

  // Check required fields
  const missingRequired = config.fields.filter(f => f.required && !fieldMap[f.key]);
  const btn = document.getElementById('csv-import-btn');
  if (btn) {
    if (missingRequired.length > 0) {
      btn.disabled = true;
      btn.style.opacity = '0.45';
      btn.style.cursor  = 'not-allowed';
      btn.title = 'Assign required fields (★) to continue';
    } else {
      btn.disabled = false;
      btn.style.opacity = '1';
      btn.style.cursor  = 'pointer';
      btn.title = '';
    }
  }

  tableEl.innerHTML = `<table style="width:100%;border-collapse:collapse;min-width:300px;">
    <thead><tr>
      ${mapped.map(f => `<th style="font-size:10px;color:var(--muted);text-align:left;padding:9px 10px;border-bottom:1px solid var(--border);background:rgba(0,0,0,0.2);white-space:nowrap;">
        ${f.label}${f.required?'<span style="color:var(--accent);margin-left:3px;">★</span>':''}
        <div style="font-size:9px;color:rgba(106,175,158,0.5);font-family:'DM Mono',monospace;margin-top:1px;">← ${fieldMap[f.key]}</div>
      </th>`).join('')}
    </tr></thead>
    <tbody>
      ${preview.map((row, i) => `<tr style="background:${i%2?'rgba(0,0,0,0.1)':'transparent'};">
        ${mapped.map(f => {
          const val = row[fieldMap[f.key]] || '';
          return `<td style="font-size:11px;color:${val?'var(--text)':'rgba(106,175,158,0.3)'};padding:8px 10px;border-bottom:1px solid rgba(22,61,55,0.4);font-family:${f.type==='mono'?'DM Mono,monospace':'inherit'};max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${val||'—'}</td>`;
        }).join('')}
      </tr>`).join('')}
    </tbody>
  </table>
  ${missingRequired.length > 0 ? `<div style="padding:10px 14px;background:rgba(52,211,153,0.05);border-top:1px solid var(--border);font-size:11px;color:var(--muted);">Assign these required fields to import: <strong style="color:var(--accent);">${missingRequired.map(f=>f.label).join(', ')}</strong></div>` : ''}`;
}

function csvGoBack() {
  document.getElementById('csv-step-preview').style.display = 'none';
  document.getElementById('csv-step-upload').style.display  = '';
  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:none;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:8px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>`;
  document.getElementById('csv-footer-info').textContent = '';
}

// ── Import runner ─────────────────────────────────────────────
async function csvRunImport() {
  const modal    = document.getElementById('csv-import-modal');
  const config   = modal._csvConfig;
  const rows     = modal._csvRows;
  const fieldMap = csvGetCurrentMapping();

  document.getElementById('csv-step-preview').style.display  = 'none';
  document.getElementById('csv-step-progress').style.display = '';
  document.getElementById('csv-footer-btns').innerHTML = '';
  document.getElementById('csv-footer-info').textContent = 'Do not close this window…';

  const mapped = rows.map(row => {
    const obj = {};
    config.fields.forEach(f => { obj[f.key] = fieldMap[f.key] ? (row[fieldMap[f.key]] || '') : ''; });
    return obj;
  }).filter(r => config.fields.filter(f => f.required).every(f => r[f.key]?.trim()));

  document.getElementById('csv-progress-label').textContent = `Importing ${mapped.length} rows…`;

  let inserted = 0, failed = 0, errors = [];
  for (let i = 0; i < mapped.length; i++) {
    document.getElementById('csv-progress-bar').style.width = Math.round((i / mapped.length) * 100) + '%';
    document.getElementById('csv-progress-sub').textContent = `${i + 1} of ${mapped.length}`;
    try {
      const result = await config.insertRow(mapped[i]);
      if (result.error) { failed++; errors.push(`Row ${i+2}: ${result.error}`); }
      else inserted++;
    } catch(e) { failed++; errors.push(`Row ${i+2}: ${e.message}`); }
  }

  document.getElementById('csv-progress-bar').style.width = '100%';
  document.getElementById('csv-step-progress').style.display = 'none';
  document.getElementById('csv-step-result').style.display   = '';
  document.getElementById('csv-step-result').innerHTML = `
    <div style="text-align:center;padding:16px 0 8px;">
      <div style="font-size:40px;margin-bottom:12px;">${failed===0?'✅':inserted>0?'⚠️':'❌'}</div>
      <div style="font-size:17px;font-weight:700;color:${failed===0?'var(--accent)':inserted>0?'var(--warn)':'var(--danger)'};margin-bottom:6px;">
        ${failed===0?'Import complete':inserted>0?'Partially imported':'Import failed'}
      </div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">
        ${inserted>0?`<span style="color:var(--accent)">${inserted} row${inserted!==1?'s':''} imported</span>`:''}
        ${failed>0?`${inserted>0?' · ':''}<span style="color:var(--danger)">${failed} failed</span>`:''}
      </div>
      ${errors.length>0?`<div style="background:rgba(255,92,92,0.08);border:1px solid rgba(255,92,92,0.2);border-radius:8px;padding:10px 14px;text-align:left;font-size:11px;color:var(--danger);max-height:120px;overflow-y:auto;">
        ${errors.slice(0,10).map(e=>`<div>• ${e}</div>`).join('')}
        ${errors.length>10?`<div style="color:var(--muted);margin-top:4px;">…and ${errors.length-10} more</div>`:''}
      </div>`:''}
    </div>`;

  document.getElementById('csv-footer-btns').innerHTML = `
    <button onclick="document.getElementById('csv-import-modal').remove()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Done</button>`;
  document.getElementById('csv-footer-info').textContent = '';
  if (config.onComplete) { try { new Function(config.onComplete)(); } catch(e) {} }
}

// ── 1. Shipments import ───────────────────────────────────────
async function importShipments() {
  // Pre-load lookup data
  const [partnersRes, productsRes] = await Promise.all([
    sb.from('trading_partners')
      .select('organisations!trading_partners_retailer_id_fkey(id,name)')
      .eq('manufacturer_id', _orgId).eq('status','active'),
    sb.from('products').select('id,name').eq('manufacturer_id',_orgId),
  ]);
  const partners = (partnersRes.data||[]).map(p => p.organisations).filter(Boolean);
  const products = productsRes.data || [];

  // Cache stores per partner org
  const storeCache = {};
  const getStores = async (orgId) => {
    if (!storeCache[orgId]) {
      const { data } = await sb.from('stores').select('id,name').eq('organisation_id',orgId);
      storeCache[orgId] = data || [];
    }
    return storeCache[orgId];
  };

  openCSVImport({
    title: 'Import Shipments',
    description: 'Bulk-upload your shipment records from a spreadsheet or ERP export',
    fields: [
      { key:'product_name',  label:'Product Name',    required:true,  type:'text' },
      { key:'lot_number',    label:'Lot Number',      required:true,  type:'mono' },
      { key:'retailer_name', label:'Retailer Name',   required:true,  type:'text' },
      { key:'store_name',    label:'Store Name',      required:false, type:'text' },
      { key:'quantity',      label:'Quantity',        required:true,  type:'text' },
      { key:'unit',          label:'Unit',            required:false, type:'text' },
      { key:'shipped_date',  label:'Shipped Date',    required:true,  type:'text' },
      { key:'reference',     label:'Reference / PO',  required:false, type:'text' },
    ],
    templateExample: [
      ['Organic Olive Oil 500ml','L2026-04-01A','Batch Admin','Oslo - Grünerløkka','48','cases','2026-04-01','PO-2026-0042'],
      ['Organic Olive Oil 500ml','L2026-04-01A','Batch Admin','Bergen - Sentrum','24','cases','2026-04-01','PO-2026-0043'],
    ],
    insertRow: async (row) => {
      // Match product by name (fuzzy)
      const product = products.find(p =>
        p.name.toLowerCase() === row.product_name.toLowerCase() ||
        p.name.toLowerCase().includes(row.product_name.toLowerCase()) ||
        row.product_name.toLowerCase().includes(p.name.toLowerCase().split(' ')[0])
      );

      // Match retailer by name
      const partner = partners.find(p =>
        p.name.toLowerCase() === row.retailer_name.toLowerCase() ||
        p.name.toLowerCase().includes(row.retailer_name.toLowerCase()) ||
        row.retailer_name.toLowerCase().includes(p.name.toLowerCase().split(' ')[0])
      );
      if (!partner) return { error: `Retailer "${row.retailer_name}" not found in trading partners` };

      // Match store if provided
      let storeId = null;
      if (row.store_name) {
        const stores = await getStores(partner.id);
        const store = stores.find(s =>
          s.name.toLowerCase() === row.store_name.toLowerCase() ||
          s.name.toLowerCase().includes(row.store_name.toLowerCase())
        );
        if (store) storeId = store.id;
      }

      // Parse date
      const shippedAt = row.shipped_date ? new Date(row.shipped_date).toISOString() : new Date().toISOString();

      const { error } = await sb.from('shipments').insert({
        manufacturer_id: _orgId,
        retailer_id:     partner.id,
        store_id:        storeId,
        product_id:      product?.id || null,
        product_name:    row.product_name,
        lot_number:      row.lot_number,
        quantity:        parseFloat(row.quantity) || 0,
        unit:            row.unit || 'units',
        shipped_at:      shippedAt,
        reference_document: row.reference || null,
      });
      return { error: error?.message };
    },
    onComplete: 'renderShipments()',
  });
}

// ── 2. Lot codes import ───────────────────────────────────────
async function importLotCodes() {
  const { data: products } = await sb.from('products').select('id,name').eq('manufacturer_id',_orgId);
  const productList = products || [];

  openCSVImport({
    title: 'Import Lot Codes',
    description: 'Bulk-register lot codes from your production records',
    fields: [
      { key:'product_name',    label:'Product Name',     required:true,  type:'text' },
      { key:'lot_number',      label:'Lot Number',       required:true,  type:'mono' },
      { key:'production_date', label:'Production Date',  required:false, type:'text' },
      { key:'expiry_date',     label:'Expiry Date',      required:false, type:'text' },
      { key:'notes',           label:'Notes',            required:false, type:'text' },
    ],
    templateExample: [
      ['Organic Olive Oil 500ml','L2026-04-01A','2026-04-01','2027-04-01','Spring batch'],
      ['Organic Olive Oil 500ml','L2026-04-01B','2026-04-01','2027-04-01',''],
    ],
    insertRow: async (row) => {
      const product = productList.find(p =>
        p.name.toLowerCase() === row.product_name.toLowerCase() ||
        p.name.toLowerCase().includes(row.product_name.toLowerCase())
      );
      const { error } = await sb.from('product_lots').insert({
        manufacturer_id: _orgId,
        product_id:      product?.id || null,
        lot_number:      row.lot_number,
        production_date: row.production_date ? new Date(row.production_date).toISOString().split('T')[0] : null,
        expiry_date:     row.expiry_date ? new Date(row.expiry_date).toISOString().split('T')[0] : null,
        notes:           row.notes || null,
      });
      return { error: error?.message };
    },
    onComplete: 'renderLots()',
  });
}

// ── 3. Products import ────────────────────────────────────────
function importProducts() {
  openCSVImport({
    title: 'Import Products',
    description: 'Bulk-register your product catalogue from an ERP or spreadsheet export',
    fields: [
      { key:'name',     label:'Product Name', required:true,  type:'text' },
      { key:'barcode',  label:'Barcode / EAN', required:false, type:'mono' },
      { key:'category', label:'Category',      required:false, type:'text' },
      { key:'is_ftl',   label:'On FTL (yes/no)', required:false, type:'text' },
    ],
    templateExample: [
      ['Organic Olive Oil 500ml','7038010013882','Oils & Condiments','no'],
      ['Free Range Chicken 1kg','7036015620114','Meat & Poultry','yes'],
    ],
    insertRow: async (row) => {
      const { error } = await sb.from('products').insert({
        manufacturer_id: _orgId,
        name:    row.name,
        barcode: row.barcode || null,
        category: row.category || null,
        is_ftl:  row.is_ftl?.toLowerCase() === 'yes' || row.is_ftl === 'true',
      });
      return { error: error?.message };
    },
    onComplete: 'renderProducts()',
  });
}

// ── Help tooltip system ──────────────────────────────────────────────────────
(function() {
  var tip = null, hideTimer = null;
  function getTip() {
    if (!tip) { tip = document.createElement('div'); tip.id = 'batchd-help-tip'; document.body.appendChild(tip); }
    return tip;
  }
  window.showHelp = function(el, title, body) {
    clearTimeout(hideTimer);
    var t = getTip();
    t.innerHTML = (title ? '<div class="help-tip-title">' + title + '</div>' : '') + body;
    t.style.display = 'block';
    var r = el.getBoundingClientRect(), tw = 280, th = t.offsetHeight || 120;
    var left = r.left, top = r.bottom + 8;
    if (left + tw > window.innerWidth - 12) left = window.innerWidth - tw - 12;
    if (top + th > window.innerHeight - 12) top = r.top - th - 8;
    if (top < 8) top = 8;
    t.style.left = left + 'px'; t.style.top = top + 'px';
  };
  window.hideHelp = function() {
    hideTimer = setTimeout(function() { var t = getTip(); t.style.display = 'none'; }, 120);
  };
  document.addEventListener('click', function(e) {
    if (!e.target.classList.contains('help-icon')) {
      var t = document.getElementById('batchd-help-tip');
      if (t) t.style.display = 'none';
    }
  });
})();

// ── Toast notification ───────────────────────────────────────
(function() {
  if (!document.getElementById('mfr-toast')) {
    const div = document.createElement('div');
    div.id = 'mfr-toast';
    div.style.cssText = [
      'position:fixed', 'bottom:24px', 'right:24px', 'z-index:99999',
      'font-family:\'DM Mono\',monospace', 'font-size:12px',
      'padding:10px 18px', 'border-radius:10px', 'max-width:360px',
      'box-shadow:0 4px 24px rgba(0,0,0,0.4)', 'opacity:0',
      'transform:translateY(8px)', 'transition:opacity 0.2s,transform 0.2s',
      'pointer-events:none', 'display:none',
    ].join(';');
    document.body.appendChild(div);
  }
})();

let _mfrToastTimer = null;
function showToast(msg, type, duration) {
  duration = duration || 3000;
  const el = document.getElementById('mfr-toast');
  if (!el) return;
  if (_mfrToastTimer) { clearTimeout(_mfrToastTimer); _mfrToastTimer = null; }
  const styles = {
    ok:    { bg: 'rgba(52,211,153,0.95)',  color: '#065f46',  border: 'rgba(52,211,153,0.6)' },
    error: { bg: 'rgba(255,92,92,0.95)',   color: '#fff',     border: 'rgba(255,92,92,0.6)' },
    warn:  { bg: 'rgba(245,166,35,0.95)',  color: '#1a0f00',  border: 'rgba(245,166,35,0.6)' },
    info:  { bg: 'rgba(56,189,248,0.95)',  color: '#0c2a3a',  border: 'rgba(56,189,248,0.6)' },
  };
  const s = styles[type] || styles.info;
  el.textContent = msg;
  el.style.background = s.bg;
  el.style.color = s.color;
  el.style.border = '1px solid ' + s.border;
  el.style.display = 'block';
  requestAnimationFrame(() => { el.style.opacity = '1'; el.style.transform = 'translateY(0)'; });
  _mfrToastTimer = setTimeout(() => {
    el.style.opacity = '0'; el.style.transform = 'translateY(8px)';
    setTimeout(() => { el.style.display = 'none'; }, 220);
    _mfrToastTimer = null;
  }, duration);
}
