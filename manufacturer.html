<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Batch'd — Manufacturer Portal</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="theme-color" content="#34d399" />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;600;700;800;900&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    /* ── Theme: dark (default) ── */
    :root {
      --bg:          #040c0e;
      --surface:     rgba(9,25,24,0.55);
      --surface2:    rgba(14,38,34,0.5);
      --border:      rgba(52,211,153,0.1);
      --border-hard: #163d37;
      --accent:      #34d399;
      --accent-dim:  #059669;
      --text:        #edfdf8;
      --muted:       #6aaf9e;
      --danger:      #ff5c5c;
      --warn:        #f5a623;
      --info:        #38bdf8;
      --radius:      12px;
      --blur-sm:     blur(8px);
      --blur-md:     blur(14px);
      --blur-lg:     blur(22px);
      --sidebar-bg:  rgba(4,12,14,0.7);
      --topbar-bg:   rgba(4,12,14,0.55);
      --glass-border:rgba(52,211,153,0.1);
      --glow-a:      rgba(52,211,153,0.12);
      --glow-b:      rgba(5,150,105,0.09);
      --input-bg:    rgba(14,38,34,0.6);
      --auth-bg:     rgba(9,25,24,0.75);
    }
    /* ── Theme: light ── */
    [data-theme="light"] {
      --bg:          #f2f5f4;
      --surface:     #ffffff;
      --surface2:    #f7f9f8;
      --border:      #d0dbd7;
      --border-hard: #a8bdb7;
      --accent:      #077a55;
      --accent-dim:  #055e40;
      --text:        #111b18;
      --muted:       #4a6560;
      --danger:      #c0151a;
      --warn:        #8a4d05;
      --info:        #0369a1;
      --sidebar-bg:  #ffffff;
      --topbar-bg:   rgba(255,255,255,0.98);
      --glass-border:#d0dbd7;
      --glow-a:      rgba(7,122,85,0.04);
      --glow-b:      rgba(5,150,105,0.02);
      --input-bg:    #ffffff;
      --auth-bg:     #ffffff;
    }

    /* ── Help icon + tooltip system ── */
    .help-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 15px; height: 15px;
      border-radius: 50%;
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.35);
      color: var(--accent);
      font-size: 9px;
      font-weight: 800;
      cursor: pointer;
      flex-shrink: 0;
      vertical-align: middle;
      margin-left: 5px;
      font-family: 'Figtree', sans-serif;
      letter-spacing: 0;
      line-height: 1;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
      top: -1px;
    }
    .help-icon:hover { background: rgba(52,211,153,0.2); border-color: rgba(52,211,153,0.6); }
    [data-theme="light"] .help-icon { background: rgba(7,122,85,0.08); border-color: rgba(7,122,85,0.35); color: var(--accent); }
    [data-theme="light"] .help-icon:hover { background: rgba(7,122,85,0.16); border-color: rgba(7,122,85,0.6); }
    #batchd-help-tip {
      position: fixed;
      z-index: 99999;
      max-width: 280px;
      background: var(--surface);
      border: 1px solid var(--border-hard, var(--border));
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 12px;
      font-family: 'Figtree', sans-serif;
      color: var(--text);
      line-height: 1.55;
      box-shadow: 0 8px 28px rgba(0,0,0,0.18);
      pointer-events: none;
      display: none;
      backdrop-filter: blur(8px);
    }
    #batchd-help-tip .help-tip-title {
      font-weight: 700;
      font-size: 11px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 5px;
    }

    /* ── Light mode: harden elements that use rgba dark borders inline ── */
    [data-theme="light"] .kpi-card { background: #ffffff; border-color: rgba(5,150,105,0.2); }
    [data-theme="light"] .panel-title { color: var(--text); }
    [data-theme="light"] .panel-sub { color: var(--muted); }
    [data-theme="light"] .card { background: #ffffff; }
    [data-theme="light"] input, [data-theme="light"] select, [data-theme="light"] textarea { 
      background: #ffffff !important; 
      color: var(--text) !important; 
      border-color: rgba(5,150,105,0.35) !important; 
    }
    [data-theme="light"] input::placeholder, [data-theme="light"] textarea::placeholder { color: rgba(6,26,20,0.4); }
    [data-theme="light"] .sidebar-user { border-top-color: rgba(5,150,105,0.2); }
    [data-theme="light"] .user-email { color: var(--muted); }
    [data-theme="light"] .user-role { color: var(--accent); }
    [data-theme="light"] .spinner { border-color: rgba(5,150,105,0.2); border-top-color: var(--accent); }
    [data-theme="light"] .auth-card { background: #ffffff; box-shadow: 0 4px 24px rgba(6,26,20,0.08); }
    [data-theme="light"] .topbar { background: rgba(255,255,255,0.98); border-bottom-color: rgba(5,150,105,0.18); }
    [data-theme="light"] .sidebar { border-right-color: rgba(5,150,105,0.18); }
    [data-theme="light"] .kpi-val { color: var(--text); }
    [data-theme="light"] .kpi-label { color: var(--muted); }
    [data-theme="light"] .nav-badge { background: var(--danger); color: #fff; }
    [data-theme="light"] .spinner { border-color: rgba(5,150,105,0.2); border-top-color: var(--accent); }
    [data-theme="light"] table thead th { background: rgba(7,122,85,0.06); color: var(--muted); }
    [data-theme="light"] table td { border-color: rgba(5,150,105,0.12); }
    [data-theme="light"] .results-card { background: #ffffff; }

    html, body { min-height: 100vh; background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; overflow-x: hidden; transition: background 0.3s, color 0.3s; }
    body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background: radial-gradient(ellipse 70% 40% at 15% 0%, var(--glow-a) 0%, transparent 60%),
                  radial-gradient(ellipse 50% 30% at 85% 100%, var(--glow-b) 0%, transparent 55%); }

    .app { display: flex; min-height: 100vh; position: relative; z-index: 1; }

    /* ── Sidebar ── */
    .sidebar { width:220px; flex-shrink:0; background: var(--sidebar-bg);
      backdrop-filter: var(--blur-lg);
      -webkit-backdrop-filter: var(--blur-lg);
      border-right: 1px solid var(--glass-border); display:flex; flex-direction:column;
      position:fixed; top:0; left:0; bottom:0; z-index:100; }
    .sidebar-logo { height:56px; padding:0 18px; display:flex; align-items:center; gap:11px;
      border-bottom:1px solid var(--glass-border); flex-shrink:0; }
    .logo-icon { width:36px; height:36px; border-radius:9px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .logo-text { font-family:'Figtree',sans-serif; font-weight:800; font-size:18px; color:var(--accent); line-height:1; letter-spacing:-0.02em; }
    .logo-sub { font-size:9px; color:var(--muted); letter-spacing:0.07em; text-transform:uppercase; margin-top:3px; line-height:1; font-family:'DM Mono',monospace; }
    .sidebar-nav { flex:1; padding:8px 10px 10px; display:flex; flex-direction:column; gap:1px; overflow-y:auto; overflow-x:hidden; min-height:0; }
    .nav-section { font-size:9.5px; font-weight:600; letter-spacing:0.09em; text-transform:uppercase;
      color:rgba(106,175,158,0.45); padding:13px 8px 4px; display:flex; align-items:center; gap:6px; font-family:'DM Mono',monospace; }
    .nav-section::before { content:''; width:3px; height:3px; border-radius:50%; background:rgba(52,211,153,0.3); flex-shrink:0; }
    .nav-item { display:flex; align-items:center; gap:9px; padding:8px 10px; border-radius:8px; cursor:pointer;
      font-size:13px; font-family:'Figtree',sans-serif; font-weight:500; color:var(--muted);
      transition:all 0.15s ease; text-decoration:none; border:none; background:none; width:100%; text-align:left; }
    .nav-item svg { flex-shrink:0; opacity:0.55; transition:opacity 0.15s; }
    .nav-item:hover { background:rgba(52,211,153,0.06); color:var(--text); }
    .nav-item:hover svg { opacity:0.9; }
    .nav-item.active { background:rgba(52,211,153,0.1); color:var(--accent); box-shadow:inset 3px 0 0 var(--accent); padding-left:13px; }
    .nav-item.active svg { opacity:1; color:var(--accent); }
    .nav-item-cta { background:rgba(255,92,92,0.07) !important; color:#ff8a8a !important;
      border:1px solid rgba(255,92,92,0.15) !important; margin:3px 0 !important; font-weight:600 !important; }
    .nav-item-cta svg { opacity:1 !important; color:#ff8a8a !important; }
    .nav-item-cta:hover { background:rgba(255,92,92,0.14) !important; border-color:rgba(255,92,92,0.3) !important; }
    .nav-item-cta.active { box-shadow:inset 3px 0 0 var(--danger) !important; color:var(--danger) !important; }
    .sidebar-footer { padding:10px 10px 12px; border-top:1px solid var(--glass-border); flex-shrink:0; }
    .user-chip { display:flex; align-items:center; gap:9px; padding:9px 10px; border-radius:9px;
      background:rgba(255,255,255,0.03); border:1px solid var(--glass-border); transition:background 0.15s; }
    .user-chip:hover { background:rgba(255,255,255,0.05); }
    .user-avatar { width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--accent-dim),#065f46);
      display:flex; align-items:center; justify-content:center; font-size:12px; font-weight:700; color:#fff;
      flex-shrink:0; font-family:'Figtree',sans-serif; }
    .user-info { min-width:0; flex:1; }
    .user-name { font-size:12px; font-weight:600; color:var(--text); font-family:'Figtree',sans-serif;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .user-role { font-size:9px; color:var(--muted); font-family:'DM Mono',monospace; }
    .sign-out-btn { background:none; border:none; cursor:pointer; color:var(--muted); padding:5px;
      border-radius:6px; transition:all 0.15s; display:flex; align-items:center; flex-shrink:0; }
    .sign-out-btn:hover { color:var(--danger); background:rgba(255,92,92,0.1); }
    /* ── Main ── */
    .main { margin-left:220px; flex:1; display:flex; flex-direction:column; min-height:100vh; }
    .topbar { height:56px; padding:0 28px; border-bottom:1px solid var(--glass-border); display:flex;
      align-items:center; justify-content:space-between;
      background:var(--topbar-bg); backdrop-filter:var(--blur-lg); -webkit-backdrop-filter:var(--blur-lg);
      position:sticky; top:0; z-index:99; transition:background 0.3s, border-color 0.3s; }
    .topbar-title { font-family:'Figtree',sans-serif; font-weight:700; font-size:17px; color:var(--text); }
    .topbar-sub { font-size:11px; color:var(--muted); margin-top:2px; font-family:'DM Mono',monospace; }
    .content { padding:28px 32px; flex:1; }
        /* Cards & panels */
    .panel { background: var(--surface);
      backdrop-filter: var(--blur-sm);
      -webkit-backdrop-filter: var(--blur-sm); border: 1px solid var(--glass-border); border-radius: var(--radius); overflow: hidden; }
    .panel-header { padding: 14px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-family: 'Figtree', sans-serif; font-weight: 700; font-size: 13px; color: var(--text); }
    .panel-sub { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .panel-body { padding: 18px; }
    .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

    /* KPI */
    .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 20px; }
    .kpi-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 16px 18px; position: relative; overflow: hidden; }
    .kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
    .kpi-card.green::before { background: var(--accent); }
    .kpi-card.red::before   { background: var(--danger); }
    .kpi-card.amber::before { background: var(--warn); }
    .kpi-card.blue::before  { background: var(--info); }
    .kpi-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    .kpi-value { font-family: 'Figtree', sans-serif; font-weight: 800; font-size: 28px; color: var(--text); line-height: 1; margin-bottom: 4px; }
    .kpi-sub { font-size: 10px; color: var(--muted); }

    /* Form fields */
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    .field input, .field select, .field textarea {
      width: 100%; background: var(--surface2); border: 1px solid var(--glass-border);
      border-radius: 8px; padding: 10px 12px; font-family: 'DM Mono', monospace;
      font-size: 13px; color: var(--text); outline: none; transition: border-color 0.15s; resize: vertical;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
    .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* Severity selector */
    .sev-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .sev-btn { border: 1.5px solid var(--border); border-radius: 8px; padding: 10px 12px; cursor: pointer;
      background: var(--surface2); text-align: left; transition: all 0.15s; }
    .sev-btn:hover { border-color: var(--muted); }
    .sev-btn.active-i   { border-color: var(--danger); background: rgba(255,92,92,0.08); }
    .sev-btn.active-ii  { border-color: var(--warn);   background: rgba(245,166,35,0.08); }
    .sev-btn.active-iii { border-color: var(--muted);  background: rgba(106,175,158,0.08); }
    .sev-dot { width: 8px; height: 8px; border-radius: 50%; margin-bottom: 6px; }
    .sev-name { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
    .sev-desc { font-size: 9px; color: var(--muted); line-height: 1.4; }

    /* Drill toggle */
    .drill-toggle { display: flex; align-items: center; gap: 12px; padding: 12px 14px;
      background: var(--surface2); border: 1px solid var(--glass-border); border-radius: 8px; margin-bottom: 14px; }
    .toggle-track { position: relative; width: 36px; height: 20px; background: var(--border); border-radius: 10px;
      transition: background 0.2s; flex-shrink: 0; cursor: pointer; }
    .toggle-track.on { background: var(--warn); }
    .toggle-knob { position: absolute; top: 2px; left: 2px; width: 16px; height: 16px; border-radius: 50%;
      background: white; transition: transform 0.2s; }
    .toggle-track.on .toggle-knob { transform: translateX(16px); }
    .drill-label { font-size: 12px; color: var(--text); flex: 1; }
    .drill-sub { font-size: 10px; color: var(--muted); }

    /* Buttons */
    .btn-primary { background: var(--accent); color: #080f12; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-primary:hover { background: #6ee7b7; }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-danger { background: var(--danger); color: white; border: none; border-radius: 8px;
      padding: 11px 18px; font-family: 'DM Mono', monospace; font-size: 12px; font-weight: 700;
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
    .btn-danger:hover { background: #ff8080; }
    .btn-danger:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: none; border: 1px solid var(--glass-border); color: var(--muted); border-radius: 8px;
      padding: 9px 14px; font-family: 'DM Mono', monospace; font-size: 11px; cursor: pointer; transition: all 0.15s; }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* Recall event list */
    .recall-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .recall-item:last-child { border-bottom: none; }
    .sev-indicator { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .sev-i   { background: var(--danger); box-shadow: 0 0 6px rgba(255,92,92,0.5); }
    .sev-ii  { background: var(--warn); }
    .sev-iii { background: var(--muted); }
    .recall-info { flex: 1; min-width: 0; }
    .recall-name { font-size: 12px; color: var(--text); font-weight: 500; }
    .recall-meta { font-size: 10px; color: var(--muted); margin-top: 2px; line-height: 1.5; }
    .recall-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; white-space: nowrap; flex-shrink: 0; }
    .badge-drill { background: rgba(245,166,35,0.12); color: var(--warn); }
    .badge-live  { background: rgba(255,92,92,0.12); color: var(--danger); }
    .badge-ack   { background: rgba(52,211,153,0.1); color: var(--accent); }

    /* Ack table */
    .ack-table { width: 100%; border-collapse: collapse; }
    .ack-table th { font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); text-align: left; padding: 0 0 10px; border-bottom: 1px solid var(--border); }
    .ack-table td { padding: 9px 0; border-bottom: 1px solid rgba(22,61,55,0.5); font-size: 11px; vertical-align: middle; }
    .ack-table tr:last-child td { border-bottom: none; }
    .status-pill { font-size: 10px; padding: 2px 8px; border-radius: 10px; }
    .s-notified    { background: rgba(106,175,158,0.1); color: var(--muted); }
    .s-acknowledged{ background: rgba(56,189,248,0.1); color: var(--info); }
    .s-pulled      { background: rgba(245,166,35,0.12); color: var(--warn); }
    .s-disposed    { background: rgba(52,211,153,0.1); color: var(--accent); }
    .s-confirmed   { background: rgba(52,211,153,0.15); color: var(--accent); font-weight: 700; }

    /* Msg */
    .msg { font-size: 11px; padding: 10px 12px; border-radius: 8px; margin-bottom: 14px; }
    .msg.error   { background: rgba(255,92,92,0.1); border: 1px solid rgba(255,92,92,0.3); color: var(--danger); }
    .msg.success { background: rgba(52,211,153,0.1); border: 1px solid rgba(52,211,153,0.3); color: var(--accent); }
    .msg.warn    { background: rgba(245,166,35,0.1); border: 1px solid rgba(245,166,35,0.3); color: var(--warn); }

    /* Auth gate */
    .auth-gate { position: fixed; inset: 0; background: var(--bg); z-index: 200; display: flex; align-items: center; justify-content: center; }
    .auth-card { background: var(--surface); border: 1px solid var(--glass-border); border-radius: var(--radius); padding: 36px; width: 100%; max-width: 380px; }

    .spinner { width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .empty { text-align: center; padding: 28px 16px; color: var(--muted); font-size: 12px; }

    .theme-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--glass-border);background:var(--surface2);color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0;}
    .theme-toggle:hover{border-color:var(--accent);color:var(--accent);}
    html,body,.sidebar,.panel,.kpi-card,.auth-card,.field input,.field select{transition:background 0.25s,border-color 0.25s,color 0.2s;}
    body::before{transition:background 0.4s;}
    [data-theme="light"] .nav-section{color:rgba(6,78,59,0.4);}
    [data-theme="light"] .nav-item{color:var(--muted);}
    [data-theme="light"] .nav-item:hover{background:rgba(5,150,105,0.06);color:var(--text);}
    [data-theme="light"] .nav-item.active{background:rgba(5,150,105,0.1);color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);}
    [data-theme="light"] .nav-item-cta{background:rgba(220,38,38,0.06)!important;color:#dc2626!important;border-color:rgba(220,38,38,0.2)!important;}
  </style>
<script>(function(){var t=localStorage.getItem('batchd-theme')||'dark';document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body>

<!-- Auth gate -->
<div class="auth-gate" id="auth-gate">
  <div class="auth-card">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:24px;">
      <span style="font-family:'Figtree',sans-serif;font-weight:800;font-size:18px;color:var(--accent);">Batch'd</span>
    </div>
    <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:22px;margin-bottom:4px;">Manufacturer Portal</div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:24px;">Sign in to access your manufacturer dashboard.</div>
    <div id="auth-msg" style="display:none;" class="msg error"></div>

// ── Manufacturer intelligence helpers ───────────────────────────
function lotsMatch(a, b) {
  if (!a || !b) return false;
  const clean = s => s.trim().toUpperCase().replace(/[_\s]/g, '-');
  const ca = clean(a), cb = clean(b);
  if (ca === cb) return true;
  if (ca.startsWith(cb) || cb.startsWith(ca)) return true;
  const stem = s => s.replace(/[-]?\d{2}[:]\d{2}$/, '').replace(/[-]\d{2,4}[A-Z]?$/, '');
  if (stem(ca) === stem(cb)) return true;
  if (stem(ca).startsWith(stem(cb)) || stem(cb).startsWith(stem(ca))) return true;
  return false;
}

function productNameMatch(a, b) {
  if (!a || !b) return false;
  const clean = s => s.toLowerCase().replace(/[^a-z0-9\s]/g, '').trim();
  const ca = clean(a), cb = clean(b);
  if (ca === cb) return true;
  const words = s => s.split(/\s+/).filter(w => w.length > 2);
  const wa = words(ca), wb = words(cb);
  const shared = wa.filter(w => wb.includes(w));
  return shared.length >= Math.min(2, Math.min(wa.length, wb.length));
}

    } else {
      queries.push(Promise.resolve({data:[]}));
    }

    queries.push(
      sb.from('recall_events').select('id,product_name,lot_number,severity,reason,is_drill,published_at').eq('source_org_id', _orgId).order('published_at',{ascending:false}).limit(20)
    );

        </div>

          <div style="padding:12px 14px;border-right:1px solid var(--glass-border);">
            <div style="font-size:18px;font-weight:700;color:${matchedShipments.length?'var(--info)':'var(--muted)'};line-height:1;margin-bottom:3px;">${matchedShipments.length}</div>

function toggleTheme(){var h=document.documentElement,c=h.getAttribute('data-theme')||'dark',n=c==='dark'?'light':'dark';h.setAttribute('data-theme',n);localStorage.setItem('batchd-theme',n);var m=document.getElementById('ti-moon'),s=document.getElementById('ti-sun');if(m&&s){m.style.display=n==='light'?'none':'block';s.style.display=n==='light'?'block':'none';}}
document.addEventListener('DOMContentLoaded',function(){var t=localStorage.getItem('batchd-theme')||'dark';var m=document.getElementById('ti-moon'),s=document.getElementById('ti-sun');if(m&&s){m.style.display=t==='light'?'none':'block';s.style.display=t==='light'?'block':'none';}});
async function doAuth() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const msg   = document.getElementById('auth-msg');
  const btn   = document.getElementById('auth-btn');
  msg.style.display = 'none';
  if (!email || !pw) { showAuthMsg('Please enter your email and password.'); return; }
  btn.disabled = true; btn.innerHTML = '<div class="spinner"></div> Signing in…';
  try {
    const { data, error } = await sb.auth.signInWithPassword({ email, password: pw });
    if (error) throw error;
    _session = data.session;
    await initPortal(data.user);
  } catch(e) {
    showAuthMsg(e.message || 'Incorrect email or password.');
    btn.disabled = false; btn.innerHTML = 'Sign in →';
  }
}

function showAuthMsg(txt) {
  const el = document.getElementById('auth-msg');
  el.textContent = txt; el.style.display = 'block';
}

async function signOut() {
  await sb.auth.signOut();
  location.reload();
}

async function initPortal(user) {
  const { data: member } = await sb.from('organisation_members')
    .select('organisation_id, role')
    .eq('user_id', user.id)
    .maybeSingle();

  if (!member) { showAuthMsg('No organisation found for this account. <a href="/manufacturer-signup.html" style="color:var(--accent);">Create one here →</a>'); return; }

  // Only redirect staff — corp_admin can access manufacturer portal during development
  if (member.role === 'store_manager') {
    window.location.replace('https://app.batchdapp.com');
    return;
  }
  if (member.role === 'staff') {
    window.location.replace('https://batchd-app.netlify.app');
    return;
  }

  _orgId = member.organisation_id;
  _userRole = member.role;

  const { data: org } = await sb.from('organisations').select('name').eq('id', _orgId).single();
  _orgName = org?.name || 'My Organisation';
  if (org?.language) _mfrLang = org.language;

  document.getElementById('auth-gate').style.display = 'none';
  document.getElementById('app-shell').style.display = 'flex';

  const firstName = user.user_metadata?.first_name || user.email?.split('@')[0] || 'User';
  document.getElementById('user-name').textContent = firstName;
  document.getElementById('user-avatar').textContent = firstName[0].toUpperCase();
  document.getElementById('topbar-sub').textContent = _orgName + ' · ' + (_userRole === 'corp_admin' ? 'Corp Admin' : 'Manufacturer');
  const roleLabel = document.getElementById('user-role-label');
  if (roleLabel) roleLabel.textContent = _userRole || 'mfr_admin';

  // Apply saved language preference
  if (_mfrLang && _mfrLang !== 'en') applyMfrLang(_mfrLang);

  checkMfrOnboarding();
  showPanel('overview');
  loadTriageBadge();
}

// ── Panel router ───────────────────────────────────────────────
function showPanel(name) {
  const titles = { overview:'Dashboard', recalls:'Recalls', push:'Push a Recall', history:'Recall History', acknowledgements:'Acknowledgements', partners:'Trading Partners', shipments:'Shipments', suppliers:'Supplier Risk', my_suppliers:'My Suppliers', products:'Products', lots:'Lot Codes', triage:'Complaint Triage', widget:'Widget Setup', investigations:'Investigations', settings:'Settings', compliance:'Compliance', mock_audit:'Mock Audit', timeline:'Incident Timeline' };
  document.getElementById('topbar-title').textContent = titles[name] || name;
  document.querySelectorAll('.nav-item').forEach(el => {
    el.classList.toggle('active', el.getAttribute('onclick')?.includes(`'${name}'`));
  });
  _pushStep = 1;
  const fns = { overview: renderOverview, recalls: renderMfrRecalls, push: renderPush, drills: renderDrills, history: renderHistory, acknowledgements: renderAcknowledgements, partners: renderPartners, products: renderProducts, lots: renderLots, shipments: renderShipments, suppliers: renderSupplierRisk, my_suppliers: renderMySuppliers, patterns: renderPatterns, triage: renderTriage, widget: renderWidgetSetup, investigations: renderInvestigations, settings: renderMfrSettings, compliance: renderMfrCompliance, mock_audit: renderMockAudit, timeline: renderIncidentTimeline };
  const panelFn = fns[name];
  if (panelFn) {
    const result = panelFn();
    // Re-apply language after async panel renders so nav stays translated
    if (result && typeof result.then === 'function') {
      result.then(() => { if (_mfrLang && _mfrLang !== 'en') applyMfrLang(_mfrLang); });
    } else {
      if (_mfrLang && _mfrLang !== 'en') applyMfrLang(_mfrLang);
    }
  }
}

// ── Overview ───────────────────────────────────────────────────

    sb.from('product_lots').select('id').eq('manufacturer_id', _orgId).limit(1),

  const events = eventsRes.data || [];
  const acks   = acksRes.data  || [];
  const liveRecalls = events.filter(e => !e.is_drill).length;
  const drills      = events.filter(e => e.is_drill).length;
  const confirmed   = acks.filter(a => a.status === 'confirmed').length;
  const pending     = acks.filter(a => a.status === 'notified').length;

  // ── Onboarding checklist ────────────────────────────────────
  const steps = [

    { done: shipmentCount > 0, label: 'Log a shipment',                       sub: 'Record which lots were delivered to which retail stores',      panel: 'shipments',icon: '🚚' },
    { done: partnerCount > 0,  label: 'Connect a retail trading partner',     sub: 'Your recall notifications go to all confirmed partners',       panel: 'partners', icon: '🤝' },

        <div style="display:flex;gap:3px;">

          <div onclick="${s.done?'':(`showPanel('${s.panel}')`+';')}" style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;border:1px solid ${s.done?'rgba(52,211,153,0.2)':'var(--glass-border)'};background:${s.done?'rgba(52,211,153,0.04)':'var(--surface2)'};cursor:${s.done?'default':'pointer'};transition:all 0.15s;"

          </div>`).join('')}
      </div>
    </div>`;

  // Network effect banner
  el.innerHTML = `
    <div style="margin-bottom:18px;">

    ${onboardingHTML}

    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:20px;">
      ${['Product details','Classification','Review impact','Confirm & push'].map((l,i)=>`<div style="font-size:10px;color:${i+1===step?'var(--accent)':i+1<step?'var(--muted)':'var(--border)'};font-weight:${i+1===step?'600':'400'};flex:1;${i>0?'text-align:center':''}${i===3?';text-align:right':''}">${l}</div>`).join('')}

    el.innerHTML = `<div style="max-width:600px;">

    // Auto-load impact
    calculateImpactPreviewStep3();
    return;
  }
}

async function calculateImpactPreviewStep3() {
  const lot     = _pushDraft.lot;
  const barcode = _pushDraft.barcode;
  const preview = document.getElementById('impact-preview-step3');
  if (!preview) return;
  if (!lot && !barcode) {
    preview.innerHTML = `<div style="padding:12px 14px;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;font-size:11px;color:var(--muted);">No lot or barcode entered — shelf impact unknown. Recall will still push to all trading partners.</div>`;
    return;
  }
  const shipmentSelect = 'id, lot_number, barcode, quantity, unit, shipped_at, stores(name), organisations!shipments_retailer_id_fkey(name)';
  let hits = [];
  if (lot) { const { data } = await sb.from('shipments').select(shipmentSelect).eq('manufacturer_id', _orgId).eq('lot_number', lot); hits = [...hits, ...(data||[])]; }
  if (barcode) { const { data } = await sb.from('shipments').select(shipmentSelect).eq('manufacturer_id', _orgId).eq('barcode', barcode); const existing = new Set(hits.map(h=>h.id)); hits = [...hits, ...(data||[]).filter(h=>!existing.has(h.id))]; }
  if (hits.length === 0) {
    preview.innerHTML = `<div style="padding:12px 14px;background:rgba(106,175,158,0.06);border:1px solid var(--glass-border);border-radius:8px;font-size:11px;color:var(--muted);">No shipment records found for this lot/barcode — shelf impact unknown. Recall will still push to all trading partners.</div>`;
    return;
  }
  const byStore   = {};
  hits.forEach(h => { const k=h.stores?.name||'Unknown'; if (!byStore[k]) byStore[k]={retailer:h.organisations?.name||'—',qty:0,unit:h.unit,latest:h.shipped_at}; byStore[k].qty+=h.quantity; if(h.shipped_at>byStore[k].latest) byStore[k].latest=h.shipped_at; });
  const storeCount = Object.keys(byStore).length;
  const totalQty   = hits.reduce((s,h)=>s+h.quantity,0);
  const unit       = hits[0]?.unit||'units';
  const breakdown  = Object.entries(byStore).map(([store,d])=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(22,61,55,0.4);"><div><div style="font-size:11px;color:var(--text);font-weight:500;">${store}</div><div style="font-size:10px;color:var(--muted);">${d.retailer} · shipped ${fmtMfr(d.latest) || '—'}</div></div><div style="font-size:11px;font-weight:600;color:var(--warn);">${d.qty} ${d.unit}</div></div>`).join('');
  preview.innerHTML = `<div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.3);border-radius:8px;overflow:hidden;"><div style="padding:12px 14px;border-bottom:1px solid rgba(245,166,35,0.2);display:flex;align-items:center;justify-content:space-between;"><div style="display:flex;align-items:center;gap:8px;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span style="font-size:12px;font-weight:700;color:var(--warn);">Shelf impact: ${totalQty} ${unit} across ${storeCount} store${storeCount!==1?'s':''}</span></div><span style="font-size:10px;color:var(--muted);">From shipment records</span></div><div style="padding:4px 14px 8px;">${breakdown}</div></div>`;
}

async function pushRecall() {
  const product     = document.getElementById('p-product')?.value.trim();
  const lot         = document.getElementById('p-lot')?.value.trim();
  const barcode     = document.getElementById('p-barcode')?.value.trim();
  const reason      = document.getElementById('p-reason')?.value.trim();
  const description = document.getElementById('p-description')?.value.trim();
  const authority   = document.getElementById('p-authority')?.value.trim();
  const btn         = document.getElementById('btn-push');
  const msg         = document.getElementById('push-msg');

  msg.style.display = 'none';

  if (!product) { showPushMsg('Product name is required.', 'error'); return; }
  if (!reason)  { showPushMsg('Reason for recall is required.', 'error'); return; }
  if (!lot && !barcode) { showPushMsg('Please enter at least a lot number or barcode so retailers can identify the product.', 'warn'); return; }

  // ── Duplicate guard ────────────────────────────────────────────
  // Check for an existing recall_event with the same product + lot from this org
  // in the last 7 days. Prevents the multi-push bug that created 5 duplicate recalls.
  {
    const since = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000).toISOString();
    let dupQuery = sb.from('recall_events')
      .select('id, product_name, lot_number, created_at, is_drill')
      .eq('source_org_id', _orgId)
      .eq('product_name', product)
      .gte('created_at', since)
      .order('created_at', { ascending: false });
    if (lot) dupQuery = dupQuery.eq('lot_number', lot);
    const { data: dupes } = await dupQuery;

    if (dupes && dupes.length > 0) {
      const last = dupes[0];
      const lastDate = new Date(last.created_at).toLocaleString('en-GB', { dateStyle: 'medium', timeStyle: 'short' });
      const isDupe = confirm(
        `⚠ Duplicate detected\n\nA recall for "${last.product_name}"${last.lot_number ? ' / lot ' + last.lot_number : ''} was already pushed on ${lastDate}.\n\nPushing again will create a duplicate alert for all retailers.\n\nClick OK only if this is intentional (e.g. a correction or different affected market).`
      );
      if (!isDupe) return;
    }
  }
  // ── End duplicate guard ────────────────────────────────────────

  if (!confirm(`${_isDrill ? '[DRILL] ' : ''}Push recall for "${product}" to all affected retail partners?\n\nThis will send immediate email alerts.`)) return;

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Pushing recall…';

  try {
    // Call Supabase function to create recall event and distributions
    const { data: result, error } = await sb.rpc('push_recall', {
      p_product_name:  product,
      p_lot_number:    lot    || null,
      p_barcode:       barcode || null,
      p_severity:      _selectedSeverity,
      p_reason:        reason,
      p_description:   description || null,
      p_authority_ref: authority   || null,
      p_is_drill:      _isDrill,
    });
    if (error) throw error;

    // Get retailer admin emails to notify
    // Get retailer emails using the secure database function
    const { data: emailData } = await sb.rpc('get_retailer_emails', {
      p_recall_event_id: result.recall_event_id
    });
    const retailerEmails = emailData || [];

    // Send email notifications via Netlify function (server handles email lookup)
    const emailRes = await fetch('https://www.batchdapp.com/.netlify/functions/push-recall-email', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        recallEventId:    result.recall_event_id,
        productName:      product,
        lotNumber:        lot || null,
        barcode:          barcode || null,
        severity:         _selectedSeverity,
        reason,
        manufacturerName: _orgName,
        affectedStores:   result.stores_notified,
        isDrill:          _isDrill,
      }),
    });
    const emailResult = emailRes.ok ? await emailRes.json() : { sent: 0 };
    const emailsSent = emailResult.sent || 0;

    // Gather shelf impact for success screen
    let impactSummary = '';
    if (lot || barcode) {
      let impactQuery = sb.from('shipments')
        .select('quantity, unit, stores(name), organisations!shipments_retailer_id_fkey(name)')
        .eq('manufacturer_id', _orgId);
      if (lot && barcode) impactQuery = impactQuery.or(`lot_number.eq.${lot},barcode.eq.${barcode}`);
      else if (lot) impactQuery = impactQuery.eq('lot_number', lot);
      else impactQuery = impactQuery.eq('barcode', barcode);
      const { data: impactData } = await impactQuery;
      if (impactData?.length > 0) {
        const totalQty   = impactData.reduce((s, h) => s + h.quantity, 0);
        const unit       = impactData[0]?.unit || 'units';
        const storeNames = [...new Set(impactData.map(h => h.stores?.name).filter(Boolean))];
        impactSummary = `<div style="margin-top:10px;padding:10px 14px;background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.25);border-radius:8px;font-size:11px;color:var(--warn);text-align:left;">
          <strong>Shelf impact:</strong> ${totalQty} ${unit} across ${storeNames.length} store${storeNames.length!==1?'s':''}<br>
          <span style="color:var(--muted);">${storeNames.join(' · ')}</span>
        </div>`;
      }
    }

    // Show success — clear draft since recall was pushed successfully
    _pushDraft = { product: '', lot: '', barcode: '', reason: '', description: '', authority: '' };
    const el = document.getElementById('main-content');
    el.innerHTML = `
      <div style="max-width:500px;">
        <div style="background:${_isDrill?'rgba(245,166,35,0.08)':'rgba(255,92,92,0.08)'};border:1px solid ${_isDrill?'rgba(245,166,35,0.3)':'rgba(255,92,92,0.3)'};border-radius:12px;padding:28px;text-align:center;">
          <div style="font-size:36px;margin-bottom:12px;">${_isDrill ? '⚠' : '🚨'}</div>
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;margin-bottom:8px;">${_isDrill ? 'Drill dispatched' : 'Recall pushed'}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.7;margin-bottom:20px;">
            <strong style="color:var(--text);">${result.retailers_notified}</strong> retailer${result.retailers_notified!==1?'s':''} notified<br>
            <strong style="color:var(--text);">${result.stores_notified}</strong> store${result.stores_notified!==1?'s':''} have acknowledgement records created<br>
            ${emailsSent > 0 ? `Email alerts sent to <strong style="color:var(--text);">${emailsSent}</strong> contact${emailsSent!==1?'s':''}` : 'No retailer email contacts found — check trading partners'}
          </div>
          ${impactSummary}
          <div style="display:flex;gap:10px;justify-content:center;">
            <button class="btn-ghost" onclick="_mfrRecallsTab='active';showPanel('recalls')">View acknowledgements →</button>
            <button class="btn-ghost" onclick="_mfrRecallsTab='push';showPanel('recalls')">Push another recall</button>
          </div>
        </div>
      </div>`;

  } catch(e) {
    showPushMsg('Error: ' + (e.message || 'Could not push recall.'), 'error');
    btn.disabled = false;
    btn.innerHTML = _isDrill ? '⚠ Send mock drill →' : '🚨 Push recall →';
  }
}


// ── Recalls hub ────────────────────────────────────────────────
let _mfrRecallsTab = 'active'; // 'active' | 'push' | 'drills' | 'history'

async function renderMfrRecalls() {
  // Push and drill wizards render independently — no tab bar needed
  if (_mfrRecallsTab === 'push')   { renderPush(); return; }
  if (_mfrRecallsTab === 'drills') { renderDrills(); return; }

  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading recalls…</div>`;

  try {
    const { data: events } = await sb.from('recall_events')
      .select('*').eq('source_org_id', _orgId).order('published_at', {ascending:false});
    const allEvents = events || [];

    // Fetch acknowledgements for all events
    const eventIds = allEvents.map(e => e.id);
    let allAcks = [];
    let retailerInfo = {};
    if (eventIds.length > 0) {
      const { data: acks } = await sb.from('recall_acknowledgements')
        .select('*, stores(name), organisations(name, contact_email, recall_coordinator_name, recall_coordinator_contact)')
        .in('recall_event_id', eventIds)
        .order('created_at', {ascending:false});
      allAcks = acks || [];

      // Build retailer info map keyed by organisation_id
      allAcks.forEach(a => {
        if (a.organisation_id && a.organisations && !retailerInfo[a.organisation_id]) {
          retailerInfo[a.organisation_id] = a.organisations;
        }
      });
    }

    const liveEvents  = allEvents.filter(e => !e.is_drill);
    const drillEvents = allEvents.filter(e =>  e.is_drill);
    const liveCount   = liveEvents.length;

    // Update nav badge
    const badge = document.getElementById('recalls-badge');
    if (badge) {

    }

    const STEPS = ['notified','acknowledged','pulled','disposed','confirmed'];

              <div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid var(--border);">
                <span style="color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0;width:150px;">${new Date(ev.published_at||ev.created_at).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                <span style="color:var(--text);">🔔 Recall pushed by <strong>${_orgName}</strong>${ev.is_drill?' <span style="color:var(--warn);">[DRILL]</span>':''} · Reached ${orgIds.length} retailer${orgIds.length!==1?'s':''}</span>
              </div>
              ${evAcks.sort((a,b) => (a.acknowledged_at||a.created_at) > (b.acknowledged_at||b.created_at) ? 1 : -1).map(a => {
                const idx = STEPS.indexOf(a.status);
                const completedSteps = STEPS.slice(0, idx+1);
                return completedSteps.filter((_,i) => i > 0 || a.created_at).map((s, i) => {
                  const timeField = ['created_at','acknowledged_at','pulled_at','disposed_at','confirmed_at'][i];
                  const t = a[timeField] || (i===0 ? a.created_at : null);
                  if (!t) return '';
                  return `<div style="display:flex;gap:10px;padding:5px 0;border-bottom:1px solid rgba(22,61,55,0.4);">
                    <span style="color:var(--muted);font-family:'DM Mono',monospace;flex-shrink:0;width:150px;">${new Date(t).toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                    <span style="color:${s==='confirmed'?'var(--accent)':'var(--text)'};">✓ ${a.organisations?.name||'Retailer'} / ${a.stores?.name||'Store'}: ${STEP_LABELS[s]}</span>
                  </div>`;
                }).join('');
              }).join('')}
            </div>
            <div style="font-size:10px;color:var(--muted);margin-top:6px;">This log is timestamped and immutable. Download full documentation via History → Defense Package.</div>
          </div>
        </div>`;
    }

    // ── ACTIVE TAB ─────────────────────────────────────────────
    if (_mfrRecallsTab === 'active') {
      el.innerHTML = `
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px;">
          <div>
            <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">Recalls</div>
            <div style="font-size:11px;color:var(--muted);margin-top:2px;">${liveCount} live · ${drillEvents.length} drill${drillEvents.length!==1?'s':''}</div>
          </div>
        </div>
        ${tabBar('active')}
        ${liveEvents.length === 0 ? `
        <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:48px 24px;text-align:center;">
          <div style="font-size:32px;margin-bottom:12px;">✅</div>
          <div style="font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px;">No live recalls</div>
          <div style="font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.7;">Push a recall when a product needs to be removed from retailer shelves. All connected retail partners will be notified within 90 seconds.</div>
          <button onclick="_mfrRecallsTab='push';renderMfrRecalls()" style="background:var(--danger);color:#fff;border:none;border-radius:8px;padding:10px 22px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">+ Push a recall</button>
        </div>` :
        liveEvents.map(ev => {
          const evAcks = allAcks.filter(a => a.recall_event_id === ev.id);
          const confirmed = evAcks.filter(a => a.status==='confirmed').length;
          const pending   = evAcks.filter(a => a.status==='notified').length;
          const allDone   = evAcks.length > 0 && evAcks.every(a => a.status==='confirmed');
          const sevColor  = ev.severity?.includes('class_i')&&!ev.severity?.includes('ii')&&!ev.severity?.includes('iii') ? 'var(--danger)' : ev.severity?.includes('class_ii') ? 'var(--warn)' : 'var(--muted)';
          return `<div style="margin-bottom:20px;background:var(--surface);border:1px solid ${pending>0?'rgba(255,92,92,0.3)':allDone?'rgba(52,211,153,0.25)':'var(--glass-border)'};border-radius:12px;overflow:hidden;">
            <div style="padding:16px 18px;border-bottom:1px solid var(--border);">
              <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">
                    <div style="width:8px;height:8px;border-radius:50%;background:${sevColor};flex-shrink:0;${!ev.severity?.includes('ii')&&!ev.severity?.includes('iii')&&ev.severity?.includes('i')?'box-shadow:0 0 8px rgba(255,92,92,0.5);':''}"></div>
                    <div style="font-size:15px;font-weight:700;color:var(--text);">${ev.product_name||'—'}</div>
                    ${pending>0?`<span style="font-size:10px;background:rgba(255,92,92,0.12);color:var(--danger);padding:2px 8px;border-radius:10px;font-weight:600;">${pending} awaiting</span>`:''}
                    ${allDone?`<span style="font-size:10px;background:rgba(52,211,153,0.12);color:var(--accent);padding:2px 8px;border-radius:10px;font-weight:600;">✓ ALL CONFIRMED</span>`:''}
                  </div>
                  <div style="font-size:12px;color:var(--muted);">
                    ${ev.lot_number?`${regionTermMfr('lot_short')}: <span style="font-family:'DM Mono',monospace;color:var(--text);">${ev.lot_number}</span> · `:''}
                    ${ev.severity?formatSeverityMfr(ev.severity).label:'—'} · ${ev.reason||'—'}
                    <br><span style="font-size:11px;">Pushed ${new Date(ev.published_at||ev.created_at).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</span>
                  </div>
                </div>
                <div style="display:flex;gap:7px;flex-shrink:0;flex-wrap:wrap;">
                  <button onclick="generateLegalPackage('${ev.id}')" style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--info);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;">🛡 Defense Package</button>
                  <button onclick="setTimelineContext('${ev.id}',this)" data-product="${(ev.product_name||'').replace(/"/g,'&quot;')}" style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--accent);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;">📅 Timeline</button>
                </div>
              </div>
            </div>
            <div style="padding:14px 18px;">
              ${ackTable(ev.id, false)}
              ${collabSection(ev)}
            </div>
          </div>`;
        }).join('')}`;

    // ── HISTORY TAB ────────────────────────────────────────────
    } else if (_mfrRecallsTab === 'history') {
      const fmtDate = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
      el.innerHTML = `
        <div style="margin-bottom:16px;">
          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">Recalls</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${allEvents.length} total events</div>
        </div>
        ${tabBar('history')}
        ${allEvents.length === 0 ? `<div class="empty" style="padding:40px 24px;text-align:center;">No recalls pushed yet.</div>` :
        allEvents.map(ev => {
          const evAcks = allAcks.filter(a => a.recall_event_id === ev.id);
          const confirmed = evAcks.filter(a=>a.status==='confirmed').length;
          return `<div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:10px;padding:14px 16px;margin-bottom:10px;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap;">
                  <span style="font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600;background:${ev.is_drill?'rgba(245,166,35,0.12)':'rgba(255,92,92,0.12)'};color:${ev.is_drill?'var(--warn)':'var(--danger)'};">${ev.is_drill?'DRILL':'LIVE'}</span>
                  <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--muted);">${fmtDate(ev.created_at)}</span>
                  ${confirmed>0?`<span style="font-size:10px;color:var(--accent);">✓ ${confirmed}/${evAcks.length} confirmed</span>`:''}
                </div>
                <div style="font-size:14px;font-weight:600;color:var(--text);">${ev.product_name||'—'}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:3px;">${ev.severity?formatSeverityMfr(ev.severity).label:''}${ev.lot_number?' · Lot: '+ev.lot_number:''}${ev.reason?' · '+ev.reason:''}</div>
              </div>
              <div style="display:flex;gap:7px;flex-wrap:wrap;flex-shrink:0;">
                <button onclick="setTimelineContext('${ev.id}',this)" data-product="${(ev.product_name||'').replace(/"/g,'&quot;')}" style="background:rgba(52,211,153,0.1);border:1px solid rgba(52,211,153,0.3);color:var(--accent);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;">📅 Timeline</button>
                <button onclick="generateLegalPackage('${ev.id}')" style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--info);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;">🛡 Defense Package</button>
                <button onclick="openCAPForm('${ev.id}','${(ev.product_name||'').replace(/'/g,"\\'")}','${(ev.lot_number||'').replace(/'/g,"\\'")}','${(ev.reason||'').replace(/'/g,"\\'")}' )" style="background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--warn);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;">📋 Action Plan</button>
              </div>
            </div>
            ${evAcks.length > 0 ? `<div style="margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">${ackTable(ev.id, ev.is_drill)}</div>` : ''}
            ${collabSection(ev)}
          </div>`;
        }).join('')}`;
    }

  } catch(e) {
    document.getElementById('main-content').innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error: ${e.message}</div>`;
  }
}

function toggleMfrCollabLog(recallEventId) {
  const el = document.getElementById('mfr-collab-log-' + recallEventId);
  if (!el) return;
  el.style.display = el.style.display === 'none' ? '' : 'none';
}

                  style="background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--warn);border-radius:7px;padding:6px 11px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap;">

// ── Acknowledgements ───────────────────────────────────────────
async function renderAcknowledgements() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  try {
  const { data: events } = await sb.from('recall_events').select('id, product_name, is_drill, created_at').eq('source_org_id', _orgId).order('created_at', { ascending: false });
  const eventIds = (events || []).map(e => e.id);

  if (eventIds.length === 0) {
    el.innerHTML = `<div class="empty">No recalls pushed yet.</div>`; return;
  }

  const { data: acks } = await sb.from('recall_acknowledgements')
    .select('*, organisations(name)')
    .in('recall_event_id', eventIds)
    .order('created_at', { ascending: false });

  const list = acks || [];
  const eventMap = Object.fromEntries((events||[]).map(e => [e.id, e]));

  el.innerHTML = `
    <div style="margin-bottom:16px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">Retailer acknowledgements</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${list.length} store-level acknowledgement records</div>
    </div>
    <div class="panel">
      <div class="panel-body" style="padding:0;">
        <table class="ack-table" style="padding:0 18px;">
          <thead><tr style="padding:0 18px;">
            <th style="padding:12px 18px;">Recall</th>
            <th style="padding:12px 18px;">Retailer</th>
            <th style="padding:12px 18px;">Status</th>
            <th style="padding:12px 18px;">Units pulled</th>
            <th style="padding:12px 18px;">Updated</th>
          </tr></thead>
          <tbody>
            ${list.length === 0 ? `<tr><td colspan="5"><div class="empty">No acknowledgements yet.</div></td></tr>` :
            list.map(a => {
              const ev = eventMap[a.recall_event_id];
              return `<tr>
                <td style="padding:9px 18px;">
                  <div style="font-size:11px;color:var(--text);">${ev?.product_name||'—'}</div>
                  ${ev?.is_drill ? `<span class="recall-badge badge-drill" style="margin-top:2px;display:inline-block;">Drill</span>` : ''}
                </td>
                <td style="padding:9px 18px;color:var(--muted)">${a.organisations?.name||'—'}</td>
                <td style="padding:9px 18px;">
                  <span class="status-pill s-${a.status}">${a.status.charAt(0).toUpperCase() + a.status.slice(1)}</span>
                </td>
                <td style="padding:9px 18px;color:var(--muted)">${a.units_pulled ?? '—'}</td>
                <td style="padding:9px 18px;color:var(--muted)">${a.acknowledged_at ? fmtMfr(a.acknowledged_at) : '—'}</td>
              </tr>`;}).join('')}
          </tbody>
        </table>
      </div>
    </div>`;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);font-size:12px;padding:20px;">Error loading acknowledgements: ${e.message}</div>`;
  }
}

// ── Trading partners ───────────────────────────────────────────

        ${confirmed.length === 0

async function loadScanIntelligenceData(sharingPartners) {
  const el = document.getElementById('scan-intel-data');
  if (!el || !sharingPartners.length) return;
  try {
    // Fetch our registered lot numbers
    const { data: lots } = await sb.from('product_lots').select('lot_number, products(name)').eq('manufacturer_id', _orgId);
    const lotNums = (lots||[]).map(l => l.lot_number).filter(Boolean);
    if (!lotNums.length) { el.innerHTML = '<div style="font-size:11px;color:var(--muted);">No lot codes registered — add lots to see scan intelligence.</div>'; return; }

    // Fetch scans for our lots from consenting retailers (RLS policy handles the filter)
    const { data: scans } = await sb.from('scans')
      .select('lot_number, store_name, organisation_id, created_at, removed_from_shelf_at')
      .in('lot_number', lotNums.slice(0, 100));

    const scanList = scans || [];
    if (!scanList.length) { el.innerHTML = '<div style="font-size:11px;color:var(--muted);">No scan records found yet — retailers may not have scanned these lots in yet.</div>'; return; }

    // Build lot-level summary
    const byLot = {};
    scanList.forEach(s => {
      const lot = s.lot_number;
      if (!byLot[lot]) byLot[lot] = { lot, scans: 0, stores: new Set(), lastScan: null, pulled: 0 };
      byLot[lot].scans++;
      if (s.store_name) byLot[lot].stores.add(s.store_name);
      if (s.removed_from_shelf_at) byLot[lot].pulled++;
      if (!byLot[lot].lastScan || s.created_at > byLot[lot].lastScan) byLot[lot].lastScan = s.created_at;
    });

    const totalScans  = scanList.length;
    const totalStores = new Set(scanList.map(s => s.store_name).filter(Boolean)).size;
    const totalLots   = Object.keys(byLot).length;

    el.innerHTML = `
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-bottom:16px;">
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:var(--accent);">${totalScans}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;">Total scans</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:var(--text);">${totalLots}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;">Lots scanned</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:var(--text);">${totalStores}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;">Stores</div>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px;text-align:center;">
          <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;color:${lotNums.length-totalLots>0?'var(--warn)':'var(--muted)'};">${lotNums.length - totalLots}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:0.06em;">Not yet scanned</div>
        </div>
      </div>
      <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Per lot</div>
      <div style="border:1px solid var(--border);border-radius:8px;overflow:hidden;">
        <table style="width:100%;border-collapse:collapse;font-size:11px;">
          <thead><tr style="background:var(--surface2);">
            <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">${regionTermMfr('lot_short')}</th>
            <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">Scans</th>
            <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">Stores</th>
            <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">Pulled</th>
            <th style="padding:8px 12px;text-align:left;color:var(--muted);font-weight:600;font-size:10px;text-transform:uppercase;letter-spacing:0.06em;">Last scan</th>
          </tr></thead>
          <tbody>
            ${Object.values(byLot).sort((a,b) => b.scans - a.scans).map((l,i) => `
              <tr style="border-top:1px solid var(--border);${i%2?'':'background:rgba(0,0,0,0.06)'};">
                <td style="padding:8px 12px;font-family:'DM Mono',monospace;color:var(--text);">${l.lot}</td>
                <td style="padding:8px 12px;font-weight:700;color:var(--accent);">${l.scans}</td>
                <td style="padding:8px 12px;color:var(--muted);">${l.stores.size}</td>
                <td style="padding:8px 12px;color:${l.pulled>0?'var(--warn)':'var(--muted)'};">${l.pulled}</td>
                <td style="padding:8px 12px;color:var(--muted);">${l.lastScan?fmtMfr(l.lastScan):'—'}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
      <div style="font-size:10px;color:var(--muted);margin-top:8px;">Aggregate only — no individual scan records or consumer data. Shared by ${sharingPartners.map(p=>p.organisations?.name||'Retailer').join(', ')}.</div>`;
  } catch(e) {
    if (el) el.innerHTML = `<div style="font-size:11px;color:var(--muted);">Could not load scan data: ${e.message}</div>`;
  }
}

async function pwSendRequest(orgId, orgNameEncoded) {
  const orgName = decodeURIComponent(orgNameEncoded);
  const btn = document.getElementById('pw-confirm-btn');
  if (btn) { btn.disabled=true; btn.textContent='Sending…'; }
  const { error } = await sb.from('trading_partners').insert({ manufacturer_id:_orgId, retailer_id:orgId, status:'pending' });
  if (error) { showToast('Error: '+error.message,'error',4000); if(btn){btn.disabled=false;btn.textContent='Send request →';} return; }
  document.getElementById('partner-wizard-modal')?.remove();
  showToast('Connection request sent to '+orgName,'ok',3000);
  renderPartners();
}

function openPartnerRequest() {
  document.getElementById('partner-request-form').style.display = 'block';
  document.getElementById('partner-req-msg').style.display = 'none';
  document.getElementById('partner-search-results').innerHTML = '';
  document.getElementById('partner-search-input').value = '';
  setTimeout(() => document.getElementById('partner-search-input').focus(), 50);
}

function closePartnerRequest() {
  document.getElementById('partner-request-form').style.display = 'none';
}

let _searchTimeout;
function searchRetailers() {
  clearTimeout(_searchTimeout);
  _searchTimeout = setTimeout(async () => {
    const query = document.getElementById('partner-search-input').value.trim();
    const resultsEl = document.getElementById('partner-search-results');
    if (query.length < 2) { resultsEl.innerHTML = ''; return; }

    resultsEl.innerHTML = `<div style="display:flex;align-items:center;gap:8px;color:var(--muted);font-size:11px;"><div class="spinner"></div> Searching…</div>`;

    // Get existing partner retailer IDs to exclude
    const { data: existing } = await sb.from('trading_partners').select('retailer_id').eq('manufacturer_id', _orgId);
    const existingIds = (existing || []).map(p => p.retailer_id);

    const { data: orgs } = await sb.from('organisations')
      .select('id, name, contact_email, type')
      .ilike('name', `%${query}%`)
      .eq('type', 'retailer');

    const available = (orgs || []).filter(o => !existingIds.includes(o.id));

    if (available.length === 0) {
      resultsEl.innerHTML = `<div style="font-size:11px;color:var(--muted);padding:8px 0;">No retailer organisations found matching "${query}"</div>`;
      return;
    }

    resultsEl.innerHTML = available.map(o => `
      <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;margin-bottom:6px;">
        <div>
          <div style="font-size:12px;font-weight:600;color:var(--text);">${o.name}</div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px;">${o.contact_email||'No email on file'}</div>
        </div>
        <button class="btn-primary" style="font-size:11px;padding:7px 12px;" onclick="sendPartnerRequest('${o.id}', '${o.name.replace(/'/g,"\\'")}')">
          Send request
        </button>
      </div>`).join('');
  }, 300);
}

async function sendPartnerRequest(retailerId, retailerName) {
  const msgEl = document.getElementById('partner-req-msg');
  msgEl.style.display = 'none';

  const { data: { session } } = await sb.auth.getSession();

  const { error } = await sb.from('trading_partners').insert({
    manufacturer_id: _orgId,
    retailer_id: retailerId,
    status: 'pending',
    invited_by: session.user.id,
  });

  if (error) {
    msgEl.textContent = error.message || 'Could not send request.';
    msgEl.style.display = 'block';
    msgEl.style.background = 'rgba(255,92,92,0.1)';
    msgEl.style.border = '1px solid rgba(255,92,92,0.3)';
    msgEl.style.color = 'var(--danger)';
    return;
  }

  closePartnerRequest();
  renderPartners();
}

async function loadLotsForProduct() {

async function saveShipment() {
  const retailerId = document.getElementById('s-partner').value;
  const storeId    = document.getElementById('s-store').value;
  const productId  = document.getElementById('s-product').value;
  const lotNumber  = document.getElementById('s-lot').value;
  const qty        = document.getElementById('s-qty').value;
  const unit       = document.getElementById('s-unit').value;
  const date       = document.getElementById('s-date').value;
  const ref        = document.getElementById('s-ref').value.trim();
  const notes      = document.getElementById('s-notes').value.trim();
  const btn        = document.getElementById('btn-save-shipment');

  if (!retailerId) { showShipmentMsg('Please select a retailer partner.', 'error'); return; }
  if (!storeId)    { showShipmentMsg('Please select a store.', 'error'); return; }
  if (!productId)  { showShipmentMsg('Please select a product.', 'error'); return; }
  if (!lotNumber)  { showShipmentMsg('Please select a lot code.', 'error'); return; }
  if (!qty || qty < 1) { showShipmentMsg('Please enter a valid quantity.', 'error'); return; }
  if (!date)       { showShipmentMsg('Please enter a shipped date.', 'error'); return; }

  // Get barcode from product
  const { data: product } = await sb.from('products').select('barcode').eq('id', productId).single();

  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  const { error } = await sb.from('shipments').insert({
    manufacturer_id:    _orgId,
    retailer_id:        retailerId,
    store_id:           storeId,
    product_id:         productId,
    lot_number:         lotNumber,
    barcode:            product?.barcode || null,
    quantity:           parseInt(qty),
    unit:               unit,
    shipped_at:         new Date(date).toISOString(),
    reference_document: ref || null,
    notes:              notes || null,
  });

  if (error) {
    showShipmentMsg(error.message || 'Could not log shipment.', 'error');
    btn.disabled = false; btn.innerHTML = 'Log shipment';
    return;
  }

  closeShipmentForm();
  renderShipments();
}

}

// ── Complaint Pattern Detection ────────────────────────────────

function detectComplaintPatterns(complaints, windowDays = 7) {
  const cutoff = Date.now() - windowDays * 24 * 60 * 60 * 1000;
  const recent = (complaints || []).filter(c =>
    new Date(c.created_at).getTime() > cutoff &&
    !['closed','resolved'].includes(c.status)
  );

  if (recent.length < 2) return [];

  // Group by product key: barcode (exact) or product name (first word, lowercased)
  const groups = {};
  recent.forEach(c => {
    const keys = [];
    if (c.barcode) keys.push('barcode:' + c.barcode.trim().toLowerCase());
    if (c.product_name) {
      const word = c.product_name.trim().toLowerCase().split(/\s+/)[0];
      if (word && word.length > 2) keys.push('name:' + word);
    }
    keys.forEach(k => {
      if (!groups[k]) groups[k] = { key: k, complaints: [], productName: c.product_name, barcode: c.barcode, lotNumbers: new Set() };
      groups[k].complaints.push(c);
      if (c.lot_number) groups[k].lotNumbers.add(c.lot_number);
    });
  });

  // Deduplicate: if same complaint appears under multiple keys, keep the most specific (barcode)
  const seen = new Set();
  const patterns = [];

  Object.values(groups)
    .filter(g => g.complaints.length >= 2)
    .sort((a, b) => b.complaints.length - a.complaints.length)
    .forEach(g => {
      // Deduplicate complaints across groups
      const unique = g.complaints.filter(c => !seen.has(c.id));
      if (unique.length < 2) return;
      unique.forEach(c => seen.add(c.id));

      const criticalCount = unique.filter(c => c.triage_level === 'critical').length;
      const seriousCount  = unique.filter(c => c.triage_level === 'serious').length;
      const total = unique.length;

      // Determine alert level
      let level, title, colour, bg;
      if (criticalCount >= 2 || (criticalCount >= 1 && seriousCount >= 1)) {
        level = 'systemic'; colour = 'var(--danger)'; bg = 'rgba(255,92,92,0.08)';
        title = 'Potential systemic issue';
      } else if (total >= 5 || seriousCount >= 3) {
        level = 'volume'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.08)';
        title = 'Volume alert';
      } else {
        level = 'emerging'; colour = 'var(--warn)'; bg = 'rgba(245,166,35,0.06)';
        title = 'Emerging pattern';
      }

      const lots = [...g.lotNumbers].slice(0, 3).join(', ');
      const categories = [...new Set(unique.map(c => c.triage_category).filter(Boolean))];

      patterns.push({ level, title, colour, bg, productName: g.productName, barcode: g.barcode, lots, total, criticalCount, seriousCount, categories, complaints: unique, windowDays });
    });

  return patterns;
}

function patternAlertHTML(pattern, idx) {
  const lotStr = pattern.lots ? ` · Lot${pattern.lots.includes(',') ? 's' : ''}: <span style="font-family:'DM Mono',monospace;">${pattern.lots}</span>` : '';

    pattern.seriousCount  ? `<span style="color:var(--warn);">${pattern.seriousCount} serious</span>` : '',
    (pattern.total - pattern.criticalCount - pattern.seriousCount) > 0 ? `<span style="color:var(--muted);">${pattern.total - pattern.criticalCount - pattern.seriousCount} monitor</span>` : ''
  ].filter(Boolean).join(' · ');

  return `
    <div id="pattern-alert-${idx}" style="background:${pattern.bg};border:1px solid ${pattern.colour.replace('var(', 'rgba(').replace('--danger)', '255,92,92,0.35)').replace('--warn)', '245,166,35,0.35)')};border-radius:12px;padding:16px;position:relative;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">

            <span style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${pattern.total} complaints · ${pattern.windowDays}d window</span>
          </div>
          <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${pattern.productName || 'Unknown product'}${lotStr}</div>
          <div style="font-size:12px;color:var(--muted);line-height:1.5;">${breakdown}${catStr}</div>
        </div>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          ${pattern.level !== 'emerging' ? `
            <button onclick="pushFromTriage(${JSON.stringify(pattern.productName||'')},${JSON.stringify(pattern.lots||'')},${JSON.stringify(pattern.barcode||'')},${JSON.stringify(pattern.categories[0]||'')},${JSON.stringify(pattern.title+': '+pattern.total+' complaints in '+pattern.windowDays+' days')})"
              style="background:var(--danger);color:#fff;border:none;border-radius:7px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap;">
              Push Recall
            </button>` : ''}
          <button onclick="document.getElementById('pattern-alert-${idx}').style.display='none'"
            style="background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;" title="Dismiss">×</button>
        </div>
      </div>
      <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap;">

          <span onclick="_triageView='detail';_triageComplaint='${c.id}';renderTriage()"
            style="font-size:11px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);padding:2px 8px;border-radius:4px;cursor:pointer;border:1px solid var(--glass-border);"
            title="${c.triage_summary || ''}">
            ${c.complaint_number || c.id.slice(0,8)}
          </span>`).join('')}
        ${pattern.complaints.length > 4 ? `<span style="font-size:11px;color:var(--muted);padding:2px 4px;">+${pattern.complaints.length-4} more</span>` : ''}
      </div>
    </div>`;
