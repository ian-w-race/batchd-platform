      <div style="font-size:36px;margin-bottom:16px;">🔍</div>
      <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;">Running audit checks…</div>
      <div style="font-size:12px;color:var(--muted);" id="audit-progress">Loading data…</div>
      <div style="margin-top:16px;background:var(--surface2);border-radius:8px;height:6px;overflow:hidden;">
        <div id="audit-bar" style="height:100%;background:var(--accent);width:0%;transition:width 0.3s;"></div>
      </div>
    </div>`;

  const setProgress = (pct, msg) => {
    const bar = document.getElementById('audit-bar');
    const prog = document.getElementById('audit-progress');
    if (bar) bar.style.width = pct + '%';
    if (prog) prog.textContent = msg;
  };

  try {
    setProgress(10, 'Loading organisation data…');
    const [orgRes, productsRes, lotsRes, shipmentsRes, partnersRes, recallsRes] = await Promise.all([
      sb.from('organisations').select('recall_coordinator_name, recall_coordinator_contact, regulatory_frameworks, region').eq('id', _orgId).single(),
      sb.from('products').select('id, name').eq('manufacturer_id', _orgId),
      sb.from('product_lots').select('id, lot_number').eq('manufacturer_id', _orgId),
      sb.from('shipments').select('id, lot_number, retailer_id, shipped_at').eq('manufacturer_id', _orgId).limit(200),
      sb.from('trading_partners').select('id, retailer_id').eq('manufacturer_id', _orgId).eq('status', 'active'),
      sb.from('recall_events').select('id, product_name, is_drill, created_at, cap_data').eq('source_org_id', _orgId),
    ]);

    const data = {
      org: orgRes.data, products: productsRes.data, lots: lotsRes.data,
      shipments: shipmentsRes.data, partners: partnersRes.data, recalls: recallsRes.data,
    };

    // Filter checks by framework
    const activeFrameworks = data.org?.regulatory_frameworks || [];
    let checksToRun = AUDIT_CHECKS.filter(c => {
      if (framework !== 'all') return c.framework === framework;
      if (activeFrameworks.length === 0) return true;
      return activeFrameworks.includes(c.framework) ||
             (c.framework === 'mattilsynet' && activeFrameworks.includes('eu_178')) ||
             (c.framework === 'eu_178' && activeFrameworks.includes('mattilsynet'));
    });
    if (checksToRun.length === 0) checksToRun = AUDIT_CHECKS;

    const results = [];
    for (let i = 0; i < checksToRun.length; i++) {
      const check = checksToRun[i];
      setProgress(10 + Math.round((i / checksToRun.length) * 85), `Checking: ${check.question.slice(0, 60)}…`);
      await new Promise(r => setTimeout(r, 120)); // brief pause for UX
      try {
        const result = await check.check(data);
        results.push({ ...check, result });
      } catch(e) {
        results.push({ ...check, result: { pass: false, detail: 'Check failed: ' + e.message } });
      }
    }

    setProgress(100, 'Complete!');
    await new Promise(r => setTimeout(r, 400));

    _auditResults = results;
    _auditRunning = false;
    renderAuditResults(el);
  } catch(e) {
    _auditRunning = false;
    el.innerHTML = `<div style="color:var(--danger);padding:20px;">Audit failed: ${e.message}<br><button onclick="_auditResults=null;renderMockAudit()" style="margin-top:12px;background:var(--surface);border:1px solid var(--glass-border);color:var(--text);border-radius:8px;padding:7px 14px;font-size:12px;cursor:pointer;">Try again</button></div>`;
  }
}

function renderAuditResults(el) {
  const results = _auditResults || [];
  const passed   = results.filter(r => r.result.pass).length;
  const partial  = results.filter(r => !r.result.pass && r.result.partial).length;
  const failed   = results.filter(r => !r.result.pass && !r.result.partial).length;
  const critical = results.filter(r => !r.result.pass && r.severity === 'critical').length;
  const pct = Math.round(passed / results.length * 100);
  const scoreColor = pct >= 80 ? 'var(--accent)' : pct >= 55 ? 'var(--warn)' : 'var(--danger)';

  el.innerHTML = `
    <div style="max-width:760px;">
      <!-- Header -->
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:12px;">
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Mock Audit Results</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">${results.length} checks · ${new Date().toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="_auditResults=null;renderMockAudit()" style="background:var(--surface);border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:7px 12px;font-size:12px;cursor:pointer;">↺ Re-run</button>
          <button onclick="downloadAuditReport()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;">↓ Download Report</button>
        </div>
      </div>

      <!-- Score card -->
      <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;padding:20px;margin-bottom:20px;display:grid;grid-template-columns:auto 1fr;gap:20px;align-items:center;">
        <div style="text-align:center;min-width:90px;">
          <div style="font-size:48px;font-weight:800;color:${scoreColor};font-family:'Figtree',sans-serif;line-height:1;">${pct}%</div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;">Audit Score</div>
        </div>
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text);margin-bottom:10px;">
            ${pct >= 80 ? '✅ Well prepared — minor gaps to close' : pct >= 55 ? '⚠️ Partially prepared — address failures before an inspection' : '🔴 Significant gaps — act before a real audit or recall event'}
          </div>
          <div style="display:flex;gap:16px;flex-wrap:wrap;">
            <div style="font-size:12px;color:var(--accent);">✓ ${passed} passed</div>
            ${partial > 0 ? `<div style="font-size:12px;color:var(--warn);">⚠ ${partial} partial</div>` : ''}
            <div style="font-size:12px;color:var(--danger);">✗ ${failed} failed</div>
            ${critical > 0 ? `<div style="font-size:12px;color:var(--danger);font-weight:700;">🔴 ${critical} critical failure${critical!==1?'s':''}</div>` : ''}
          </div>
        </div>
      </div>

      <!-- Results by severity -->
      ${['critical','major','minor'].map(sev => {
        const items = results.filter(r => r.severity === sev);
        if (!items.length) return '';
        const sevLabels = { critical:'Critical', major:'Major', minor:'Minor' };
        const sevColors = { critical:'var(--danger)', major:'var(--warn)', minor:'var(--muted)' };
        return `
        <div style="margin-bottom:16px;">
          <div style="font-size:11px;font-weight:700;color:${sevColors[sev]};text-transform:uppercase;letter-spacing:0.1em;margin-bottom:8px;">${sevLabels[sev]} checks</div>
          <div style="display:flex;flex-direction:column;gap:8px;">
            ${items.map(r => {
              const statusColor = r.result.pass ? 'var(--accent)' : r.result.partial ? 'var(--warn)' : 'var(--danger)';
              const statusIcon  = r.result.pass ? '✓' : r.result.partial ? '⚠' : '✗';
              const statusLabel = r.result.pass ? 'PASS' : r.result.partial ? 'PARTIAL' : 'FAIL';
              return `
              <div style="background:var(--surface);border:1px solid ${r.result.pass ? 'var(--border)' : statusColor.replace('var(','rgba(').replace('--danger)','255,92,92,0.3)').replace('--warn)','245,166,35,0.3)').replace('--accent)','52,211,153,0.3)')};border-radius:10px;padding:14px 16px;">
                <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:6px;">
                  <div style="font-size:12px;font-weight:600;color:var(--text);flex:1;">${r.question}</div>
                  <span style="font-size:10px;font-family:'DM Mono',monospace;font-weight:700;padding:2px 8px;border-radius:4px;background:${statusColor.replace('var(','rgba(').replace('--danger)','255,92,92,0.12)').replace('--warn)','245,166,35,0.12)').replace('--accent)','52,211,153,0.12)')};color:${statusColor};flex-shrink:0;">${statusIcon} ${statusLabel}</span>
                </div>
                <div style="font-size:11px;color:${r.result.pass ? 'var(--muted)' : statusColor};margin-bottom:6px;">${r.result.detail}</div>
                <div style="display:flex;gap:12px;flex-wrap:wrap;">
                  <span style="font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${r.regulation}</span>
                </div>
                ${!r.result.pass ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;padding-top:6px;border-top:1px solid var(--border);font-style:italic;">💬 ${r.auditorNote}</div>` : ''}
              </div>`;
            }).join('')}
          </div>
        </div>`;
      }).join('')}

      <div style="text-align:center;padding:8px 0;"><button onclick="_auditResults=null;renderMockAudit()" style="background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;text-decoration:underline;">← Run another audit</button></div>
    </div>`;
}

async function downloadAuditReport() {
  const results = _auditResults || [];
  const passed = results.filter(r => r.result.pass).length;
  const pct = Math.round(passed / results.length * 100);
  const today = new Date().toLocaleDateString('en-GB', { day:'numeric', month:'long', year:'numeric' });
  const { data: org } = await sb.from('organisations').select('name, recall_coordinator_name').eq('id', _orgId).single();

  const lines = [
    'MOCK AUDIT REPORT', `━`.repeat(64),
    `Organisation: ${org?.name || _orgName}`,
    `Prepared by: ${org?.recall_coordinator_name || 'Not designated'}`,
    `Date: ${today}`,
    `Overall Score: ${pct}% (${passed}/${results.length} checks passed)`,
    '', `━`.repeat(64), '',
    ...results.map((r, i) => [
      `${String(i+1).padStart(2)}. [${r.result.pass ? 'PASS' : r.result.partial ? 'PARTIAL' : 'FAIL'}] ${r.question}`,
      `    Regulation: ${r.regulation}`,
      `    Finding: ${r.result.detail}`,
      r.result.pass ? '' : `    Auditor note: ${r.auditorNote}`,
      '',
    ].filter(l => l !== null).join('\n')),
    `━`.repeat(64),
    `Generated by Batch'd Mock Audit · ${today}`,
    `This report is confidential and intended for internal use.`,
    `Address all failures before a regulatory inspection or recall event.`,
  ];

  const blob = new Blob([lines.join('\n')], { type: 'text/plain;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `batched_mock_audit_${new Date().toISOString().slice(0,10)}.txt`;
  a.click(); URL.revokeObjectURL(url);
  showToast('Audit report downloaded', 'ok', 2500);
}

// 5. INCIDENT TIMELINE
// ═══════════════════════════════════════════════════════════════

let _timelineRecallId = null;
let _timelineProduct  = '';

function setTimelineContext(recallId, btn) {
  _timelineRecallId = recallId;
  _timelineProduct  = btn.closest('[data-product]')?.dataset?.product
    || btn.getAttribute('data-product') || '';
  showPanel('timeline');
}

async function renderIncidentTimeline() {
  const el = document.getElementById('main-content');
  if (!_timelineRecallId) {
    el.innerHTML = `<div style="color:var(--muted);padding:40px;text-align:center;">Open a recall from <button onclick="_mfrRecallsTab='history';showPanel('recalls')" style="background:none;border:none;color:var(--accent);cursor:pointer;text-decoration:underline;font-family:inherit;font-size:inherit;">Recall History</button> to view its incident timeline.</div>`;
    return;
  }

  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Building timeline…</div>`;

  const [eventRes, acksRes, distRes, invRes, complaintsRes, shipmentsRes] = await Promise.all([
    sb.from('recall_events').select('*').eq('id', _timelineRecallId).single(),
    sb.from('recall_acknowledgements').select('*, organisations(name)').eq('recall_event_id', _timelineRecallId).order('updated_at', { ascending: true }),
    sb.from('recall_distributions').select('*, organisations!recall_distributions_retailer_org_id_fkey(name)').eq('recall_event_id', _timelineRecallId),
    sb.from('investigation_requests').select('*, investigation_responses(id, submitted_at, retailer_org_id, issue_found, store_name)').eq('manufacturer_id', _orgId).order('created_at', { ascending: true }),
    sb.from('complaints').select('*').ilike('product_name', '%' + (_timelineProduct||'').split(' ')[0] + '%').order('created_at', { ascending: true }).limit(10),
    sb.from('shipments').select('*, stores(name), organisations!shipments_retailer_id_fkey(name)').eq('manufacturer_id', _orgId).ilike('lot_number', '%' + (eventRes.data?.lot_number||'N/A').slice(0,10) + '%').limit(20),
  ]);

  const ev = eventRes.data;
  const acks = acksRes.data || [];
  const dists = distRes.data || [];
  const invs = invRes.data || [];
  const complaints = complaintsRes.data || [];
  const shipments = shipmentsRes.data || [];
  if (!ev) { el.innerHTML = `<div style="color:var(--danger)">Recall event not found.</div>`; return; }

  const fmt = d => d ? new Date(d).toLocaleString('en-GB',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
  const recallTime = new Date(ev.created_at);
  const deltaH = d => d ? Math.round((new Date(d) - recallTime) / 36e5 * 10) / 10 : null;

  // Build chronological event list
  const events = [];

  // Shipments (before recall)
  for (const s of shipments) {
    events.push({ time: new Date(s.shipped_at), type:'shipment', color:'var(--muted)',
      icon:'📦', title:`Shipped to ${s.organisations?.name || 'retailer'}`,
      detail:`${s.quantity||'?'} ${s.unit||'units'} · Lot ${s.lot_number||'?'} → ${s.stores?.name || s.organisations?.name || ''}` });
  }

  // Complaints (before or near recall)
  for (const c of complaints) {
    events.push({ time: new Date(c.created_at), type:'complaint', color:'var(--warn)',
      icon:'📝', title:`Complaint received — ${c.triage_level||'unknown'} priority`,
      detail:`${c.product_name||''} · ${c.complaint_type||''} · ${c.store_name||''}` });
  }

  // Investigations
  for (const inv of invs) {
    events.push({ time: new Date(inv.created_at), type:'investigation', color:'var(--warn)',
      icon:'🔍', title:`Field investigation launched — ${inv.issue_type||''}`,
      detail:`${inv.product_name} · ${(inv.investigation_responses||[]).length} responses · Status: ${inv.status}` });
    for (const resp of (inv.investigation_responses||[])) {
      if (resp.submitted_at) events.push({ time: new Date(resp.submitted_at), type:'inv_response', color: resp.issue_found ? 'var(--danger)' : 'var(--accent)',
        icon: resp.issue_found ? '⚠' : '✓', title:`Investigation response — ${resp.store_name || 'store'}`,
        detail:`Issue ${resp.issue_found ? 'CONFIRMED' : 'not found'}` });
    }
  }

  // Recall pushed
  events.push({ time: recallTime, type:'recall', color:'var(--danger)', icon:'🚨', isPrimary: true,
    title:`${ev.is_drill ? 'DRILL' : 'RECALL'} PUSHED — ${ev.product_name}`,
    detail:`${ev.severity||''} · ${ev.reason||''} · Lot: ${ev.lot_number||'N/A'} · Notified ${dists.length} retailer${dists.length!==1?'s':''}` });

  // Acknowledgement steps
  const ackStatuses = ['acknowledged','pulled','disposed','confirmed'];
  for (const ack of acks) {
    const retailer = ack.organisations?.name || 'Store';
    if (ackStatuses.includes(ack.status)) {
      const statusColors = { acknowledged:'var(--info)', pulled:'var(--warn)', disposed:'var(--warn)', confirmed:'var(--accent)' };
      const statusIcons  = { acknowledged:'👁', pulled:'🏪', disposed:'🗑', confirmed:'✅' };
      const h = deltaH(ack.updated_at);
      events.push({ time: new Date(ack.updated_at), type:'ack', color: statusColors[ack.status],
        icon: statusIcons[ack.status], title:`${retailer} — ${ack.status.toUpperCase()}`,
        detail:`${h !== null ? `+${h}h from recall push` : ''}` });
    }
  }

  // Sort chronologically
  events.sort((a,b) => a.time - b.time);

  // Find last event time for axis
  const lastTime = events.length ? events[events.length-1].time : recallTime;
  const totalDuration = Math.max(1, (lastTime - events[0]?.time) / 36e5);

  el.innerHTML = `
    <div style="max-width:780px;">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
        <button onclick="_mfrRecallsTab='history';showPanel('recalls')" style="background:var(--surface);border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;">← Recall History</button>
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Incident Timeline — ${ev.product_name}</div>
          <div style="font-size:12px;color:var(--muted);">
            ${events.length} events · Lot ${ev.lot_number||'N/A'} ·
            ${ev.is_drill ? '<span style="color:var(--info);">MOCK DRILL</span>' : '<span style="color:var(--danger);">LIVE RECALL</span>'}
          </div>
        </div>
      </div>

      <!-- Key metrics strip -->
      ${(() => {
        const firstAck = acks.find(a => a.status === 'acknowledged' || a.status === 'pulled' || a.status === 'confirmed');
        const firstPull = acks.find(a => a.status === 'pulled' || a.status === 'confirmed');
        const confirmedCount = acks.filter(a => a.status === 'confirmed').length;
        const h1 = firstAck ? deltaH(firstAck.updated_at) : null;
        const h2 = firstPull ? deltaH(firstPull.updated_at) : null;
        return `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px;">
          ${[
            { label:'Retailers notified', value: dists.length, color:'var(--text)' },
            { label:'Time to first ack', value: h1 !== null ? h1+'h' : '—', color: h1 !== null && h1 <= 4 ? 'var(--accent)' : 'var(--warn)' },
            { label:'Time to first pull', value: h2 !== null ? h2+'h' : '—', color: h2 !== null && h2 <= 2 ? 'var(--accent)' : h2 !== null && h2 <= 24 ? 'var(--warn)' : 'var(--danger)' },
            { label:'Stores confirmed', value: confirmedCount + '/' + acks.length, color: confirmedCount === acks.length && acks.length > 0 ? 'var(--accent)' : 'var(--warn)' },
          ].map(k => `<div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:10px;padding:10px 14px;">
            <div style="font-size:18px;font-weight:700;color:${k.color};font-family:'Figtree',sans-serif;">${k.value}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${k.label}</div>
          </div>`).join('')}
        </div>`;
      })()}

      <!-- Timeline -->
      <div style="position:relative;padding-left:32px;">
        <!-- Vertical line -->
        <div style="position:absolute;left:11px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom, var(--border), var(--border));border-radius:1px;"></div>

        ${events.map((ev_item, i) => {
          const isRecall = ev_item.isPrimary;
          const bgColor  = isRecall ? 'rgba(255,92,92,0.08)' : 'var(--surface)';
          const border   = isRecall ? '1px solid rgba(255,92,92,0.35)' : '1px solid var(--border)';
          const h = i > 0 ? deltaH(ev_item.time) : null;
          return `
          <div style="position:relative;margin-bottom:12px;">
            <!-- Dot -->
            <div style="position:absolute;left:-25px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid ${ev_item.color};background:${ev_item.color.replace('var(','rgba(').replace('--danger)','255,92,92,0.25)').replace('--warn)','245,166,35,0.25)').replace('--accent)','52,211,153,0.25)').replace('--info)','56,189,248,0.25)').replace('--muted)','106,175,158,0.15)')};"></div>
            <!-- Card -->
            <div style="background:${bgColor};border:${border};border-radius:10px;padding:12px 14px;">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
                <div style="flex:1;">
                  <div style="font-size:12px;font-weight:${isRecall?'700':'600'};color:${isRecall?ev_item.color:'var(--text)'};">${ev_item.icon} ${ev_item.title}</div>
                  ${ev_item.detail ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">${ev_item.detail}</div>` : ''}
                </div>
                <div style="text-align:right;flex-shrink:0;">
                  <div style="font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${ev_item.time.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</div>
                  ${h !== null && isRecall === false ? `<div style="font-size:10px;color:${ev_item.color};">${h > 0 ? '+'+h+'h' : h === 0 ? 'at recall' : h+'h'}</div>` : ''}
                </div>
              </div>
            </div>
          </div>`;
        }).join('')}

        ${events.length === 0 ? `<div style="color:var(--muted);font-size:13px;padding:20px 0;">No events found for this recall.</div>` : ''}
      </div>

      <div style="display:flex;justify-content:center;gap:10px;margin-top:20px;">
        <button onclick="generateLegalPackage('${_timelineRecallId}')" style="background:rgba(56,189,248,0.1);border:1px solid rgba(56,189,248,0.3);color:var(--info);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">🛡 Generate Legal Package</button>
        <button onclick="openCAPForm('${_timelineRecallId}','${_timelineProduct}','')" style="background:rgba(245,166,35,0.1);border:1px solid rgba(245,166,35,0.3);color:var(--warn);border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;">📋 Corrective Action Plan</button>
      </div>
    </div>`;
}
</script>

<script>

function showTraceQR(encodedLot, productName, barcode) {
  const lot = decodeURIComponent(encodedLot);
  const baseUrl = 'https://batchd-app.netlify.app/trace.html';
  const params = new URLSearchParams();
  if (lot) params.set('lot', lot);
  if (barcode) params.set('barcode', barcode);
  const traceUrl = baseUrl + '?' + params.toString();

  document.getElementById('trace-qr-modal')?.remove();

  const modal = document.createElement('div');
  modal.id = 'trace-qr-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:28px;width:100%;max-width:420px;text-align:center;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;text-align:left;">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--text);">Consumer Transparency QR</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">${productName} · Lot ${lot}</div>
        </div>
        <button onclick="document.getElementById('trace-qr-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
      </div>

      <!-- QR code via qrserver.com free API -->
      <div style="background:#fff;border-radius:12px;padding:16px;display:inline-block;margin-bottom:16px;">
        <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(traceUrl)}" width="200" height="200" alt="QR Code" style="display:block;">
      </div>

      <div style="font-size:11px;color:var(--muted);margin-bottom:16px;line-height:1.6;">
        Print this QR code on your product packaging. When consumers scan it, they see a real-time traceability record and recall status for this lot.
      </div>

      <div style="background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:10px;font-size:11px;font-family:'DM Mono',monospace;color:var(--muted);word-break:break-all;text-align:left;margin-bottom:16px;">${traceUrl}</div>

      <div style="display:flex;gap:8px;justify-content:center;">
        <button onclick="copyTraceUrl('${traceUrl.replace(/'/g,"\\'")}',this)" style="background:var(--surface2);border:1px solid var(--glass-border);color:var(--text);border-radius:8px;padding:8px 16px;font-size:12px;cursor:pointer;font-family:inherit;">Copy URL</button>
        <a href="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data=${encodeURIComponent(traceUrl)}" download="batchd-qr-${lot.replace(/[^a-zA-Z0-9]/g,'-')}.png" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none;">↓ Download QR</a>
      </div>
    </div>`;

  document.body.appendChild(modal);
}

function copyTraceUrl(url, btn) {
  navigator.clipboard.writeText(url).then(() => {
    const orig = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.style.color = 'var(--accent)';
    setTimeout(() => { btn.textContent = orig; btn.style.color = 'var(--text)'; }, 2000);
  });
}
</script>

<script>
// ═══════════════════════════════════════════════════════════════
// MY SUPPLIERS (ingredient supplier traceability)
// ═══════════════════════════════════════════════════════════════

async function renderMySuppliers() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading suppliers…</div>`;

  const [connsRes, receiptsRes] = await Promise.all([
    sb.from('supplier_connections').select('*, organisations!supplier_connections_supplier_id_fkey(id,name,contact_email,region)').eq('manufacturer_id', _orgId).order('created_at',{ascending:false}),
    sb.from('ingredient_receipts').select('*').eq('manufacturer_id', _orgId).order('shipped_at',{ascending:false}).limit(50),
  ]);

  const connections = connsRes.data || [];
  const receipts    = receiptsRes.data || [];
  const active = connections.filter(c => c.status === 'active');
  const pending = connections.filter(c => c.status === 'pending');

  el.innerHTML = `
    <div style="max-width:760px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap;">
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">My Suppliers</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">Ingredient and raw material suppliers — the one-step-back chain required by EU 178/2002 Art. 18 and FSMA 204.</div>
        </div>
        <div style="display:flex;gap:8px;">
          <button onclick="openInviteSupplier()" style="background:var(--surface);border:1px solid var(--glass-border);color:var(--text);border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            Invite by Email
          </button>
          <button onclick="openAddSupplier()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Connect (on Batch'd)
          </button>
        </div>
      </div>

      <!-- Regulatory context -->
      <div style="background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:10px;padding:14px 16px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.6;">
        <strong style="color:var(--text);">One step back (ett ledd tilbake)</strong> — EU 178/2002 Art. 18 and Matloven §14 require you to identify the immediate supplier of every ingredient. FSMA 204 requires this as a Key Data Element. Connect your ingredient suppliers here so they can log what they shipped to you.
      </div>

      <!-- Pending -->
      ${pending.length > 0 ? `
      <div style="margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--warn);margin-bottom:8px;">Pending (${pending.length})</div>
        ${pending.map(c => `
          <div style="background:rgba(245,166,35,0.06);border:1px solid rgba(245,166,35,0.25);border-radius:10px;padding:14px 16px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
            <div>
              <div style="font-size:13px;font-weight:600;color:var(--text);">${c.organisations?.name||'Unknown'}</div>
              <div style="font-size:11px;color:var(--muted);">${c.organisations?.contact_email||''} · Invitation sent</div>
            </div>
            <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--warn);padding:2px 8px;border:1px solid rgba(245,166,35,0.3);border-radius:5px;">PENDING</span>
          </div>`).join('')}
      </div>` : ''}

      <!-- Active connections -->
      <div style="margin-bottom:20px;">
        <div style="font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:8px;">Connected Suppliers (${active.length})</div>
        ${active.length === 0 ? `
          <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:36px;text-align:center;">
            <div style="font-size:28px;margin-bottom:10px;">🏭</div>
            <div style="font-weight:600;color:var(--text);margin-bottom:6px;">No connected suppliers yet</div>
            <div style="font-size:12px;color:var(--muted);max-width:320px;margin:0 auto 14px;">Connect your ingredient and raw material suppliers to establish the one-step-back traceability chain.</div>
            <button onclick="openAddSupplier()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 18px;font-size:13px;font-weight:600;cursor:pointer;">Connect your first supplier →</button>
          </div>` :
          active.map(c => {
            const supplierReceipts = receipts.filter(r => r.supplier_id === c.supplier_id);
            return `
            <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:16px 18px;margin-bottom:10px;">
              <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
                <div>
                  <div style="font-size:13px;font-weight:600;color:var(--text);">${c.organisations?.name||'Unknown'}</div>
                  <div style="font-size:11px;color:var(--muted);">${c.organisations?.contact_email||''}</div>
                </div>
                <div style="display:flex;align-items:center;gap:8px;">
                  <span style="font-size:10px;font-family:'DM Mono',monospace;color:var(--accent);padding:2px 8px;border:1px solid rgba(52,211,153,0.3);border-radius:5px;">ACTIVE</span>
                  <span style="font-size:11px;color:var(--muted);">${supplierReceipts.length} receipt${supplierReceipts.length!==1?'s':''}</span>
                </div>
              </div>
              ${supplierReceipts.length > 0 ? `
                <table style="width:100%;border-collapse:collapse;">
                  <thead><tr>
                    <th style="text-align:left;padding:6px 0;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);">Ingredient</th>
                    <th style="text-align:left;padding:6px 0;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);">Lot</th>
                    <th style="text-align:left;padding:6px 0;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);">Qty</th>
                    <th style="text-align:left;padding:6px 0;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);">Date</th>
                  </tr></thead>
                  <tbody>
                    ${supplierReceipts.slice(0,3).map(r => `<tr>
                      <td style="padding:7px 0;font-size:12px;color:var(--text);">${r.ingredient_name||'—'}</td>
                      <td style="padding:7px 0;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${r.lot_number||'—'}</td>
                      <td style="padding:7px 0;font-size:11px;color:var(--muted);">${r.quantity||''} ${r.unit||''}</td>
                      <td style="padding:7px 0;font-size:11px;color:var(--muted);">${r.shipped_at ? fmtMfr(r.shipped_at) : '—'}</td>
                    </tr>`).join('')}
                  </tbody>
                </table>
              ` : `<div style="font-size:12px;color:var(--muted);">No ingredient receipts logged. Ask your supplier to log shipments via the supplier portal.</div>`}
            </div>`;
          }).join('')}
      </div>

      <!-- Recent ingredient receipts -->
      ${receipts.length > 0 ? `
      <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:18px;">
        <div style="font-size:12px;font-weight:600;color:var(--text);margin-bottom:12px;">Recent Ingredient Receipts (${receipts.length})</div>
        <table style="width:100%;">
          <thead><tr>
            ${['Ingredient','Lot / Batch','Supplier','Qty','Shipped','Ref'].map(h=>`<th style="text-align:left;padding:7px 0;font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:0.06em;border-bottom:1px solid var(--border);">${h}</th>`).join('')}
          </tr></thead>
          <tbody>
            ${receipts.map(r=>`<tr>
              <td style="padding:8px 0;font-size:12px;font-weight:500;color:var(--text);">${r.ingredient_name||'—'}</td>
              <td style="padding:8px 0;font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;">${r.lot_number||'—'}</td>
              <td style="padding:8px 0;font-size:11px;color:var(--muted);">${r.supplier_name||'—'}</td>
              <td style="padding:8px 0;font-size:11px;color:var(--muted);">${r.quantity||''} ${r.unit||''}</td>
              <td style="padding:8px 0;font-size:11px;color:var(--muted);">${r.shipped_at ? fmtMfr(r.shipped_at) : '—'}</td>
              <td style="padding:8px 0;font-size:10px;color:var(--muted);font-family:'DM Mono',monospace;">${r.reference_document||'—'}</td>
            </tr>`).join('')}
          </tbody>
        </table>
      </div>` : ''}
    </div>`;
}

function openAddSupplier() {
  document.getElementById('add-supplier-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'add-supplier-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:28px;width:100%;max-width:480px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div style="font-size:14px;font-weight:700;color:var(--text);">Connect Ingredient Supplier</div>
        <button onclick="document.getElementById('add-supplier-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:16px;line-height:1.6;">Search for your ingredient supplier. If they are already on Batch'd, they can accept your connection and log ingredient shipments directly. If not, you can log receipts manually.</div>

      <div style="display:flex;gap:8px;margin-bottom:12px;">
        <input id="supplier-search-input" type="text" placeholder="Search by organisation name…" oninput="searchForSupplier()" style="flex:1;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;outline:none;">
        <button onclick="searchForSupplier()" style="background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:9px 14px;color:var(--muted);cursor:pointer;">🔍</button>
      </div>
      <div id="supplier-search-results" style="margin-bottom:14px;"></div>

      <div style="border-top:1px solid var(--border);padding-top:14px;margin-top:4px;">
        <div style="font-size:11px;color:var(--muted);margin-bottom:10px;">Or log a manual receipt without a portal connection:</div>
        <button onclick="document.getElementById('add-supplier-modal').remove();openManualReceipt()" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:9px;font-size:13px;font-weight:600;color:var(--text);cursor:pointer;font-family:inherit;">+ Log Manual Receipt</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function searchForSupplier() {
  const q = document.getElementById('supplier-search-input')?.value.trim();
  const res = document.getElementById('supplier-search-results');
  if (!res || q.length < 2) { if(res) res.innerHTML=''; return; }
  const { data } = await sb.from('organisations').select('id,name,contact_email').ilike('name','%'+q+'%').neq('id',_orgId).limit(5);
  res.innerHTML = (data||[]).length === 0 ? `<div style="font-size:12px;color:var(--muted);padding:8px;">No organisations found.</div>` :
    (data||[]).map(org => `
      <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;margin-bottom:6px;">
        <div>
          <div style="font-size:13px;font-weight:600;color:var(--text);">${org.name}</div>
          <div style="font-size:11px;color:var(--muted);">${org.contact_email||''}</div>
        </div>
        <button onclick="connectSupplier('${org.id}','${org.name.replace(/'/g,"\\'")}',this)"
          style="background:var(--accent);color:#065f46;border:none;border-radius:7px;padding:6px 12px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;">Connect</button>
      </div>`).join('');
}

async function connectSupplier(supplierId, supplierName, btn) {
  btn.textContent = 'Connecting…'; btn.disabled = true;
  const { error } = await sb.from('supplier_connections').insert({
    manufacturer_id: _orgId,
    supplier_id: supplierId,
    status: 'pending',
  });
  if (error) { btn.textContent = 'Error'; return; }
  document.getElementById('add-supplier-modal').remove();
  showToast(`Connection request sent to ${supplierName}`, 'ok', 3000);
  renderMySuppliers();
}

function openManualReceipt() {
  document.getElementById('manual-receipt-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'manual-receipt-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div>
          <div style="font-size:14px;font-weight:700;color:var(--text);">Log Ingredient Receipt</div>
          <div style="font-size:11px;color:var(--muted);margin-top:2px;">One-step-back traceability record (EU 178/2002 Art. 18 · FSMA 204)</div>
        </div>
        <button onclick="document.getElementById('manual-receipt-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
      </div>

      <div style="display:flex;flex-direction:column;gap:13px;">
        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Ingredient / raw material name *</label>
        <input id="mr-ingredient" type="text" placeholder="e.g. Wheat flour, Tomato paste, Olive oil" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>

        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Supplier name *</label>
        <input id="mr-supplier" type="text" placeholder="Supplier / producer name" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>

        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Lot / Batch number</label>
        <input id="mr-lot" type="text" placeholder="Supplier lot code" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;font-family:'DM Mono',monospace;box-sizing:border-box;"></div>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;">
          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Quantity</label>
          <input id="mr-qty" type="number" placeholder="0" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>
          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Unit</label>
          <select id="mr-unit" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;">
            <option value="kg">kg</option><option value="lbs">lbs</option>
            <option value="units">units</option><option value="cases">cases</option><option value="litres">litres</option>
          </select></div>
          <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Date received</label>
          <input id="mr-date" type="date" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>
        </div>

        <div><label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Reference document <span style="opacity:0.6;">(delivery note, PO, COA)</span></label>
        <input id="mr-ref" type="text" placeholder="e.g. DN-2026-0042 or COA-L12345" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:8px 10px;color:var(--text);font-size:13px;box-sizing:border-box;"></div>

        <div id="mr-msg" style="display:none;border-radius:8px;padding:9px 12px;font-size:12px;"></div>
        <div style="display:flex;justify-content:flex-end;gap:10px;">
          <button onclick="document.getElementById('manual-receipt-modal').remove()" style="background:transparent;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;">Cancel</button>
          <button onclick="saveManualReceipt()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;">Log Receipt</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function saveManualReceipt() {
  const ingredient = document.getElementById('mr-ingredient')?.value.trim();
  const supplier   = document.getElementById('mr-supplier')?.value.trim();
  const lot        = document.getElementById('mr-lot')?.value.trim();
  const qty        = parseFloat(document.getElementById('mr-qty')?.value || '0');
  const unit       = document.getElementById('mr-unit')?.value;
  const date       = document.getElementById('mr-date')?.value;
  const ref        = document.getElementById('mr-ref')?.value.trim();
  const msg        = document.getElementById('mr-msg');

  if (!ingredient || !supplier) {
    msg.style.display='block'; msg.style.background='rgba(255,92,92,0.1)'; msg.style.color='var(--danger)'; msg.style.border='1px solid rgba(255,92,92,0.3)'; msg.textContent='Ingredient name and supplier are required.';
    return;
  }

  const { error } = await sb.from('ingredient_receipts').insert({
    manufacturer_id: _orgId,
    ingredient_name: ingredient,
    supplier_name: supplier,
    lot_number: lot || null,
    quantity: qty || null,
    unit: unit,
    shipped_at: date ? new Date(date).toISOString() : null,
    received_at: new Date().toISOString(),
    reference_document: ref || null,
  });

  if (error) {
    msg.style.display='block'; msg.style.background='rgba(255,92,92,0.1)'; msg.style.color='var(--danger)'; msg.style.border='1px solid rgba(255,92,92,0.3)'; msg.textContent='Error: ' + error.message;
    return;
  }
  document.getElementById('manual-receipt-modal').remove();
  showToast('Receipt logged', 'ok', 2500);
  renderMySuppliers();
}
</script>

<script>
// ── Supplier email invite ──────────────────────────────────────
function openInviteSupplier() {
  document.getElementById('invite-supplier-modal')?.remove();
  const modal = document.createElement('div');
  modal.id = 'invite-supplier-modal';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:9999;display:flex;align-items:center;justify-content:center;padding:20px;';
  modal.innerHTML = `
    <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:16px;padding:28px;width:100%;max-width:480px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <div>

        </div>
        <button onclick="document.getElementById('invite-supplier-modal').remove()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;">✕</button>
      </div>

      <div style="background:rgba(52,211,153,0.06);border:1px solid rgba(52,211,153,0.2);border-radius:8px;padding:12px 14px;font-size:12px;color:var(--muted);margin-bottom:18px;line-height:1.6;">
        Your supplier will receive a branded email with a link to create a free Batchd supplier account and accept your connection. Once connected, they can log ingredient shipments directly.
      </div>

      <div style="display:flex;flex-direction:column;gap:12px;">
        <div>
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Supplier email address *</label>
          <input id="inv-email" type="email" placeholder="supply@theircompany.com" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;outline:none;">
        </div>
        <div>
          <label style="font-size:12px;color:var(--muted);display:block;margin-bottom:5px;">Contact name at supplier <span style="opacity:0.6;">(optional)</span></label>
          <input id="inv-contact" type="text" placeholder="e.g. Sarah at Nordic Ingredients" style="width:100%;background:var(--surface2);border:1px solid var(--glass-border);border-radius:8px;padding:9px 11px;color:var(--text);font-size:13px;box-sizing:border-box;outline:none;">
        </div>
        <div id="inv-msg" style="display:none;border-radius:8px;padding:9px 12px;font-size:12px;"></div>

          <div style="font-size:20px;margin-bottom:8px;">✅</div>
          <div style="font-size:13px;font-weight:600;color:var(--text);">Invitation sent!</div>
          <div style="font-size:12px;color:var(--muted);margin-top:4px;">Your supplier will receive an email with a link to join Batchd. You can also copy the invite link:</div>
          <div id="inv-link" style="margin-top:10px;background:var(--surface2);border:1px solid var(--glass-border);border-radius:7px;padding:8px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);word-break:break-all;text-align:left;"></div>
          <button onclick="copyInviteLink()" style="margin-top:8px;background:var(--surface);border:1px solid var(--glass-border);border-radius:7px;padding:6px 14px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;">Copy link</button>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:10px;" id="inv-buttons">
          <button onclick="document.getElementById('invite-supplier-modal').remove()" style="background:transparent;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;">Cancel</button>
          <button onclick="sendSupplierInvite()" id="btn-send-inv" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Send Invite →</button>
        </div>
      </div>
    </div>`;
  document.body.appendChild(modal);
}

async function sendSupplierInvite() {
  const email   = document.getElementById('inv-email')?.value.trim();
  const contact = document.getElementById('inv-contact')?.value.trim();
  const btn     = document.getElementById('btn-send-inv');
  const msg     = document.getElementById('inv-msg');

  if (!email) {
    msg.style.display='block'; msg.style.background='rgba(255,92,92,0.1)'; msg.style.color='var(--danger)'; msg.style.border='1px solid rgba(255,92,92,0.3)'; msg.textContent='Enter a supplier email.';
    return;
  }

  btn.disabled = true; btn.textContent = 'Sending…';

  try {
    const resp = await fetch('/.netlify/functions/supplier-invite', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        manufacturer_id: _orgId,
        manufacturer_name: _orgName,
        supplier_email: email,
        invited_by: contact || null,
      }),
    });

    const data = await resp.json();

    if (!resp.ok || data.error) {
      msg.style.display='block'; msg.style.background='rgba(255,92,92,0.1)'; msg.style.color='var(--danger)'; msg.style.border='1px solid rgba(255,92,92,0.3)'; msg.textContent='Error: ' + (data.error || 'Could not send invite');
      btn.disabled=false; btn.textContent='Send Invite →'; return;
    }

    // Show success state
    document.getElementById('inv-buttons').style.display = 'none';
    document.getElementById('inv-success').style.display = 'block';
    document.getElementById('inv-link').textContent = data.invite_url;
    window._lastInviteUrl = data.invite_url;
    msg.style.display = 'none';

  } catch(e) {
    msg.style.display='block'; msg.style.background='rgba(255,92,92,0.1)'; msg.style.color='var(--danger)'; msg.style.border='1px solid rgba(255,92,92,0.3)'; msg.textContent='Error: ' + e.message;
    btn.disabled=false; btn.textContent='Send Invite →';
  }
}

function copyInviteLink() {
  const url = window._lastInviteUrl;
  if (!url) return;
  navigator.clipboard.writeText(url).then(() => {
    showToast('Invite link copied', 'ok', 2000);
  });
}
</script>

<script>

async function checkMfrOnboarding() {
  const key = 'batched_mfr_onboarded_' + _orgId;
  if (localStorage.getItem(key)) return;

  const [productsRes, partnersRes, shipmentsRes] = await Promise.all([
    sb.from('products').select('id', { count: 'exact', head: true }).eq('manufacturer_id', _orgId),
    sb.from('trading_partners').select('id', { count: 'exact', head: true }).eq('manufacturer_id', _orgId).eq('status', 'active'),
    sb.from('shipments').select('id', { count: 'exact', head: true }).eq('manufacturer_id', _orgId),
  ]);

  const hasProducts  = (productsRes.count  || 0) > 0;
  const hasPartners  = (partnersRes.count  || 0) > 0;
  const hasShipments = (shipmentsRes.count || 0) > 0;

  if (hasProducts && hasPartners && hasShipments) {
    localStorage.setItem(key, '1');
    return;
  }

  showMfrOnboarding({ hasProducts, hasPartners, hasShipments });
}

        <button onclick="prevMfrStep()" id="mfr-btn-prev" style="background:none;border:1px solid var(--glass-border);color:var(--muted);border-radius:8px;padding:9px 18px;font-size:13px;cursor:pointer;font-family:inherit;">← Back</button>

  ready: () => `
