async function renderTriageList(el) {
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading complaints…</div>`;
  try {
    let query = sb.from('complaints')
      .select('*')
      .eq('manufacturer_id', _orgId)
      .order('created_at', { ascending: false })
      .limit(100);

    const { data: complaints, error } = await query;
    if (error) throw error;

    // Update badge
    const critical = (complaints || []).filter(c => c.triage_level === 'critical' && c.status !== 'closed' && c.status !== 'resolved');
    const badge = document.getElementById('triage-badge');
    if (badge) { badge.textContent = critical.length; badge.style.display = critical.length ? 'inline' : 'none'; }

    const filterCounts = {
      all: (complaints||[]).length,
      critical: (complaints||[]).filter(c=>c.triage_level==='critical').length,
      serious: (complaints||[]).filter(c=>c.triage_level==='serious').length,
      monitor: (complaints||[]).filter(c=>c.triage_level==='monitor').length,
      pending: (complaints||[]).filter(c=>c.triage_level==='pending').length,
    };

    const filtered = _triageFilter === 'all' ? (complaints||[]) : (complaints||[]).filter(c => c.triage_level === _triageFilter);

    // Detect patterns
    const patterns = detectComplaintPatterns(complaints || []);

    el.innerHTML = `
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Complaint Triage</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">All complaints received about your products, triaged automatically by Batch'd AI.</div>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button onclick="triageShowNew()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;">+ Log Phone Complaint</button>
        </div>
      </div>
      ${mfrTriageTabBar('complaints', 0)}

      ${patterns.length > 0 ? `
        <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:20px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:2px;">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="var(--warn)" stroke-width="2.5"><path d="M12 2L2 19h20L12 2z"/><line x1="12" y1="9" x2="12" y2="14"/><circle cx="12" cy="17" r="0.7" fill="var(--warn)" stroke="none"/></svg>
            <span style="font-size:11px;font-weight:700;color:var(--warn);letter-spacing:0.06em;text-transform:uppercase;">Pattern${patterns.length > 1 ? 's' : ''} Detected</span>
          </div>
          ${patterns.map((p, i) => patternAlertHTML(p, i)).join('')}
        </div>
      ` : ''}

      <div style="display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;">
        ${[
          { key:'all',      label:'All',      dot:null,               activeColor:'var(--accent)', activeBg:'rgba(52,211,153,0.1)' },
          { key:'critical', label:'Critical', dot:'var(--danger)',    activeColor:'var(--danger)', activeBg:'rgba(255,92,92,0.1)' },
          { key:'serious',  label:'Serious',  dot:'var(--warn)',      activeColor:'var(--warn)',   activeBg:'rgba(245,166,35,0.1)' },
          { key:'monitor',  label:'Monitor',  dot:'var(--accent)',    activeColor:'var(--accent)', activeBg:'rgba(52,211,153,0.1)' },
          { key:'pending',  label:'Pending',  dot:'var(--info)',      activeColor:'var(--info)',   activeBg:'rgba(56,189,248,0.1)' }
        ].map(f => `
          <button onclick="_triageFilter='${f.key}';renderTriageList(document.getElementById('main-content'))"
            style="display:flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;border:1px solid ${_triageFilter===f.key?f.activeColor:'var(--border)'};background:${_triageFilter===f.key?f.activeBg:'transparent'};color:${_triageFilter===f.key?f.activeColor:'var(--muted)'};font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.15s;">
            ${f.dot ? `<span style="width:7px;height:7px;border-radius:50%;background:${f.dot};flex-shrink:0;display:inline-block;"></span>` : ''}
            ${f.label} <span style="opacity:0.6;">(${filterCounts[f.key]||0})</span>
          </button>`).join('')}
      </div>

      ${filtered.length === 0 ? `
        <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:48px;text-align:center;">
          <div style="font-size:28px;margin-bottom:12px;">📋</div>
          <div style="color:var(--text);font-weight:600;margin-bottom:6px;">No complaints yet</div>
          <div style="color:var(--muted);font-size:13px;">Complaints submitted via your triage widget or logged by staff will appear here.</div>
        </div>
      ` : `
        <div style="display:flex;flex-direction:column;gap:8px;">
          ${filtered.map(c => triageCardHTML(c)).join('')}
        </div>
      `}
    `;
  } catch(e) {
    el.innerHTML = `<div style="color:var(--danger);padding:20px;">Error loading complaints: ${e.message}</div>`;
  }
}

function triageLevelStyle(level) {
  if (level === 'critical') return { bg: 'rgba(255,92,92,0.12)',   color: 'var(--danger)', label: 'CRITICAL' };
  if (level === 'serious')  return { bg: 'rgba(245,166,35,0.12)',  color: 'var(--warn)',   label: 'SERIOUS'  };
  if (level === 'monitor')  return { bg: 'rgba(52,211,153,0.10)',  color: 'var(--accent)', label: 'MONITOR'  };
  return                           { bg: 'rgba(56,189,248,0.10)',  color: 'var(--info)',   label: 'PENDING'  };
}

function triageStatusLabel(status) {
  const map = { new:'New', triaged:'Triaged', follow_up_sent:'Follow-up Sent', investigating:'Investigating', resolved:'Resolved', recall_triggered:'Recall Triggered', closed:'Closed' };
  return map[status] || status;
}

function triageCardHTML(c) {
  const s = triageLevelStyle(c.triage_level);
  const date = new Date(c.created_at).toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
  return `
    <div onclick="triageOpenDetail('${c.id}')" style="background:var(--surface);border:1px solid ${c.triage_level==='critical'?'rgba(255,92,92,0.3)':'var(--border)'};border-radius:12px;padding:16px;cursor:pointer;transition:border-color 0.15s;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${c.triage_level==='critical'?'rgba(255,92,92,0.3)':'var(--border)'}'">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <span style="background:${s.bg};color:${s.color};font-size:10px;font-weight:700;font-family:'DM Mono',monospace;padding:3px 8px;border-radius:4px;letter-spacing:0.05em;">${s.label}</span>
          <span style="font-size:12px;font-family:'DM Mono',monospace;color:var(--muted);">${c.complaint_number || c.id.slice(0,8)}</span>
          ${c.triage_category ? `<span style="font-size:11px;color:var(--muted);background:var(--surface2);padding:2px 8px;border-radius:4px;">${c.triage_category}</span>` : ''}
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--muted);">${triageStatusLabel(c.status)}</span>
          <span style="font-size:11px;color:var(--muted);">${date}</span>
        </div>
      </div>
      <div style="margin-top:10px;">
        <div style="font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px;">${c.product_name || 'Product not specified'}</div>
        <div style="font-size:12px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;">${c.triage_summary || c.complaint_text}</div>
      </div>
      ${c.keywords_detected?.length ? `<div style="margin-top:8px;display:flex;gap:4px;flex-wrap:wrap;">${c.keywords_detected.slice(0,5).map(k=>`<span style="font-size:10px;font-family:'DM Mono',monospace;background:var(--surface2);color:var(--muted);padding:2px 6px;border-radius:3px;">${k}</span>`).join('')}</div>` : ''}
      <div style="margin-top:8px;font-size:11px;color:var(--muted);">
        ${c.customer_name ? `From: ${c.customer_name}` : 'Anonymous'} ${c.source ? '· via ' + c.source : ''} ${c.lot_number ? '· Lot: ' + c.lot_number : ''}
      </div>
    </div>
  `;
}

    </div>
  `;

  // Expose region updater globally for onchange
  window.tcUpdateState = function(countryName) {
    const code = Object.entries({Norway:'NO',Sweden:'SE',Denmark:'DK',Germany:'DE','United States':'US',Canada:'CA',Australia:'AU','United Kingdom':'GB',France:'FR',Italy:'IT',Spain:'ES',Mexico:'MX',Brazil:'BR'}).find(([n]) => n === countryName)?.[1];
    const wrap = document.getElementById('tc-state-wrap');
    const stateEl = document.getElementById('tc-state');
    const stateLabel = document.getElementById('tc-state-label');
    const reg = code ? REGIONS[code] : null;
    if (!reg) { wrap.style.display = 'none'; return; }
    wrap.style.display = 'block';
    stateLabel.textContent = reg.label + (reg.required ? ' *' : ' (optional)');
    stateEl.innerHTML = '<option value="">Select</option>' + reg.opts.map(o => `<option value="${o}">${o}</option>`).join('');
  };
}

async function submitPhoneComplaint() {

  const btn = document.getElementById('tc-submit');

  const hasProductVal = document.querySelector('input[name="tc-has-product"]:checked')?.value;

function showTriageMsg(txt, type) {
  const el = document.getElementById('tc-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(255,92,92,0.3)' : 'rgba(52,211,153,0.3)'}`;
}

async function updateTriageStatus(id, newStatus) {
  try {
    await sb.from('complaints').update({ status: newStatus }).eq('id', id);
    await sb.from('complaint_audit_log').insert({
      complaint_id: id,
      action: 'status_changed_to_' + newStatus,
      actor_id: _session?.user?.id || null,
      actor_label: 'Staff'
    });
    renderTriageDetail(document.getElementById('main-content'));
  } catch(e) {
    showToast('Error updating status: ' + e.message, 'error', 4000);
  }
}

function pushFromTriage(productName, lotNumber, barcode, triageCategory, triageSummary) {
  const reasonMap = {
    'Foreign Body': 'Foreign body contamination',
    'Adulteration': 'Potential adulteration',
    'Illness/Injury': 'Consumer illness reports',
    'Allergic Reaction': 'Undeclared allergen',
    'Spoilage': 'Product spoilage',
    'Mislabeling': 'Mislabeling'
  };
  const reason = reasonMap[triageCategory] || triageCategory || '';
  _pushDraft.product = productName || '';
  _pushDraft.lot = lotNumber || '';
  _pushDraft.barcode = barcode || '';
  _pushDraft.reason = reason;
  _pushDraft.description = triageSummary ? 'Triggered by complaint triage. ' + triageSummary : '';
  _pushDraft.authority = '';
  _selectedSeverity = 'class_i';
  _mfrRecallsTab='push';showPanel('recalls');
}

// Load triage badge count on init
async function loadTriageBadge() {
  try {
    const { data } = await sb.from('complaints')
      .select('id')
      .eq('manufacturer_id', _orgId)
      .eq('triage_level', 'critical')
      .not('status', 'in', '("closed","resolved")');
    const badge = document.getElementById('triage-badge');
    if (badge && data?.length) { badge.textContent = data.length; badge.style.display = 'inline'; }
  } catch(e) {}
}

function copyToClipboard(elementId, btn) {
  const el = document.getElementById(elementId);
  if (!el) return;
  const text = el.textContent.trim();
  navigator.clipboard.writeText(text).then(() => {
    const original = btn.textContent;
    btn.textContent = '✓ Copied';
    btn.style.background = 'rgba(52,211,153,0.2)';
    btn.style.color = 'var(--accent)';
    btn.style.borderColor = 'rgba(52,211,153,0.4)';
    setTimeout(() => {
      btn.textContent = original;
      btn.style.background = '';
      btn.style.color = '';
      btn.style.borderColor = '';
    }, 2000);
  }).catch(() => {
    // Fallback for older browsers
    const range = document.createRange();
    range.selectNode(el);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    window.getSelection().removeAllRanges();
    btn.textContent = '✓ Copied';
    setTimeout(() => { btn.textContent = btn.getAttribute('data-original') || 'Copy'; }, 2000);
  });
}

async function renderPatterns() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading pattern library…</div>`;

  // Get patterns for products belonging to this manufacturer's org
  // Patterns are keyed by product_name/product_key — match against our products
  const [patternsRes, productsRes] = await Promise.all([
    sb.from('code_patterns').select('*').order('scan_count', { ascending: false }),
    sb.from('products').select('name, barcode').eq('organisation_id', _orgId),
  ]);

  const allPatterns = patternsRes.data || [];
  const myProducts  = productsRes.data || [];

  // Match patterns to manufacturer's products by normalised name or barcode
  const myProductNames = new Set(myProducts.map(p => p.name?.toLowerCase().trim()));
  const myBarcodes     = new Set(myProducts.map(p => p.barcode).filter(Boolean));

  const matched = allPatterns.filter(p =>
    myProductNames.has(p.product_name?.toLowerCase().trim()) ||
    myProductNames.has(p.product_key?.toLowerCase().trim())  ||
    (p.barcode_number && myBarcodes.has(p.barcode_number))

          <th style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:12px 8px;border-bottom:1px solid var(--border);">Confidence</th>
          <th style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:12px 8px;border-bottom:1px solid var(--border);">Since</th>
          <th style="font-size:9px;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:12px 8px;border-bottom:1px solid var(--border);"></th>
        </tr></thead>
        <tbody>
          ${rows.map(p => `
            <tr>
              <td style="padding:10px 0;border-bottom:1px solid rgba(22,61,55,0.5);">
                <div style="font-size:12px;font-weight:600;color:var(--text);">${p.product_name||'—'}</div>

              </td>
              <td style="padding:10px 8px;border-bottom:1px solid rgba(22,61,55,0.5);font-size:11px;color:var(--muted);font-family:'DM Mono',monospace;max-width:160px;">${p.lot_format||'—'}</td>
              <td style="padding:10px 8px;border-bottom:1px solid rgba(22,61,55,0.5);font-size:10px;color:var(--muted);max-width:220px;line-height:1.5;">

              </td>
              <td style="padding:10px 8px;border-bottom:1px solid rgba(22,61,55,0.5);">
                <span style="font-size:10px;padding:2px 8px;border-radius:10px;background:${confBg(p.confidence_level)};color:${confColor(p.confidence_level)};text-transform:capitalize;">
                  ${p.confidence_level||'—'}

              <td style="padding:10px 8px;border-bottom:1px solid rgba(22,61,55,0.5);">

      </div>
      <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:10px;padding:14px 18px;">
        <div style="font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px;">High confidence patterns</div>
        <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:26px;color:var(--text);">${matched.filter(p=>p.confidence_level==='high').length}</div>
      </div>
    </div>

    <div style="margin-bottom:20px;padding:12px 16px;background:rgba(56,189,248,0.05);border:1px solid rgba(56,189,248,0.15);border-radius:8px;font-size:11px;color:var(--muted);line-height:1.6;">

    </div>`}

    ${unmatched.length > 0 ? `
    <div style="margin-bottom:8px;font-size:10px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--muted);">All other products in network</div>
    <div class="panel">
      <div class="panel-body">${patternTable(unmatched, '')}</div>
    </div>` : ''}`;
}

async function deleteMfrPattern(id, btn) {
  if (!confirm('Delete this learned pattern? The scanning app will re-learn it from future scans.')) return;
  btn.disabled = true; btn.textContent = '…';
  const { error } = await sb.from('code_patterns').delete().eq('id', id);
  if (error) { btn.disabled = false; btn.textContent = 'Delete'; showToast('Error: ' + error.message, 'error', 4000); return; }
  renderPatterns();
}

function openProductForm() {
  _editingProductId = null;
  document.getElementById('product-form-label').textContent = 'Add new product';
  ['p-name','p-barcode','p-desc'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('p-category').value = '';
  document.getElementById('p-ftl').value = 'false';
  document.getElementById('product-msg').style.display = 'none';
  document.getElementById('product-form').style.display = 'block';
  setTimeout(() => document.getElementById('p-name').focus(), 50);
}

async function editProduct(id) {
  const { data: p } = await sb.from('products').select('*').eq('id', id).single();
  if (!p) return;
  _editingProductId = id;
  document.getElementById('product-form-label').textContent = 'Edit product';
  document.getElementById('p-name').value    = p.name || '';
  document.getElementById('p-barcode').value = p.barcode || '';
  document.getElementById('p-desc').value    = p.description || '';
  document.getElementById('p-category').value = p.category || '';
  document.getElementById('p-ftl').value      = p.is_ftl ? 'true' : 'false';
  document.getElementById('product-msg').style.display = 'none';
  document.getElementById('product-form').style.display = 'block';
  document.getElementById('p-name').focus();
}

function closeProductForm() {
  _editingProductId = null;
  document.getElementById('product-form').style.display = 'none';
}

async function saveProduct() {
  const name     = document.getElementById('p-name').value.trim();
  const barcode  = document.getElementById('p-barcode').value.trim();
  const desc     = document.getElementById('p-desc').value.trim();
  const category = document.getElementById('p-category').value;
  const isFtl    = document.getElementById('p-ftl').value === 'true';
  const btn      = document.getElementById('btn-save-product');
  const msg      = document.getElementById('product-msg');

  msg.style.display = 'none';
  if (!name) { showProductMsg('Product name is required.', 'error'); return; }

  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  try {
    const payload = { name, barcode: barcode||null, description: desc||null, category: category||null, is_ftl: isFtl, manufacturer_id: _orgId };
    let error;
    if (_editingProductId) {
      ({ error } = await sb.from('products').update(payload).eq('id', _editingProductId));
    } else {
      ({ error } = await sb.from('products').insert(payload));
    }
    if (error) throw error;
    closeProductForm();
    renderProducts();
  } catch(e) {
    showProductMsg(e.message || 'Could not save product.', 'error');
    btn.disabled = false; btn.innerHTML = 'Save product';
  }
}

function showProductMsg(txt, type) {
  const el = document.getElementById('product-msg');
  if (!el) return;
  el.textContent = txt;
  el.style.display = 'block';
  el.style.background = type==='error'?'rgba(255,92,92,0.1)':'rgba(52,211,153,0.1)';
  el.style.border = type==='error'?'1px solid rgba(255,92,92,0.3)':'1px solid rgba(52,211,153,0.3)';
  el.style.color = type==='error'?'var(--danger)':'var(--accent)';
}

function openLotForm() {
  document.getElementById('lot-form').style.display = 'block';

}

function closeLotForm() {
  document.getElementById('lot-form').style.display = 'none';
}

async function saveLot() {
  const productId = document.getElementById('l-product').value;
  const lot       = document.getElementById('l-lot').value.trim();
  const prod      = document.getElementById('l-prod').value;
  const exp       = document.getElementById('l-exp').value;
  const notes     = document.getElementById('l-notes').value.trim();
  const btn       = document.getElementById('btn-save-lot');

  if (!productId) { showLotMsg('Please select a product.', 'error'); return; }
  if (!lot)       { showLotMsg('Lot number is required.', 'error'); return; }

  btn.disabled = true; btn.innerHTML = '<div class="spinner" style="border-top-color:#080f12;"></div> Saving…';

  try {
    const { error } = await sb.from('product_lots').insert({
      product_id:      productId,
      manufacturer_id: _orgId,
      lot_number:      lot,
      production_date: prod || null,
      expiry_date:     exp  || null,
      notes:           notes || null,
    });
    if (error) throw error;
    closeLotForm();
    renderLots();
  } catch(e) {
    showLotMsg(e.message || 'Could not register lot.', 'error');
    btn.disabled = false; btn.innerHTML = 'Register lot';
  }
}

async function deleteLot(id) {
  if (!confirm('Delete this lot code? This cannot be undone.')) return;
  const { error } = await sb.from('product_lots').delete().eq('id', id);
  if (!error) renderLots();
}

  el.style.color = type==='error'?'var(--danger)':'var(--accent)';
}

<script>
// ── INVESTIGATIONS ─────────────────────────────────────────────

const ISSUE_TYPES = {
  foreign_object:  { label: 'Foreign Object',          icon: '⚠️',  color: 'var(--danger)' },
  mold:            { label: 'Mold / Fungal Growth',     icon: '🍄',  color: 'var(--danger)' },
  mislabeling:     { label: 'Mislabeling / Wrong Product', icon: '🏷️', color: 'var(--warn)' },
  allergen:        { label: 'Undeclared Allergen',      icon: '⚡',  color: 'var(--danger)' },
  contamination:   { label: 'Contamination',            icon: '☣️',  color: 'var(--danger)' },
  discoloration:   { label: 'Discoloration / Quality',  icon: '🎨',  color: 'var(--warn)' },
  pest:            { label: 'Pest Contamination',       icon: '🐛',  color: 'var(--danger)' },
  packaging:       { label: 'Packaging Defect',         icon: '📦',  color: 'var(--warn)' },
  other:           { label: 'Other Issue',              icon: '❓',  color: 'var(--muted)' },
};

const URGENCY = {
  1: { label: 'Class I — 24h', color: 'var(--danger)', hours: 24 },
  2: { label: 'Class II — 72h', color: 'var(--warn)',   hours: 72 },
  3: { label: 'Standard — 7 days', color: 'var(--muted)', hours: 168 },
};

let _investView = 'list'; // list | create | detail
let _investId = null;
let _investComplaintId = null;
let _investPrefill = {};

async function renderInvestigations() {
  const el = document.getElementById('main-content');
  if (_investView === 'create') { renderInvestigationCreate(el); return; }
  if (_investView === 'detail' && _investId) { await renderInvestigationDetail(el, _investId); return; }
  await renderInvestigationList(el);
}

async function renderInvestigationList(el) {
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading investigations…</div>`;
  const { data: invs, error } = await sb.from('investigation_requests')
    .select('*, investigation_responses(id, issue_found)')
    .eq('manufacturer_id', _orgId)
    .order('created_at', { ascending: false });
  if (error) { el.innerHTML = `<div style="color:var(--danger)">Error: ${error.message}</div>`; return; }

  // Update badge
  const open = (invs||[]).filter(i => i.status === 'open' || i.status === 'in_progress');
  const badge = document.getElementById('invest-badge');
  if (badge) { badge.textContent = open.length; badge.style.display = open.length ? 'inline' : 'none'; }

  el.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:20px;flex-wrap:wrap;">
      <div>
        <div style="font-size:15px;font-weight:600;color:var(--text);">Field Investigations</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">Send inspection requests to retailers — collect photos and findings before deciding on a recall.</div>
      </div>
      <button onclick="_investView='create';_investPrefill={};renderInvestigations()" style="background:var(--accent);color:#065f46;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Investigation
      </button>
    </div>

    ${!invs?.length ? `
      <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:48px;text-align:center;">
        <div style="font-size:28px;margin-bottom:12px;">🔍</div>
        <div style="font-weight:600;color:var(--text);margin-bottom:6px;">No investigations yet</div>
        <div style="font-size:13px;color:var(--muted);max-width:320px;margin:0 auto;">Launch an investigation from a complaint to request retailers to inspect and report back.</div>
      </div>
    ` : `
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${invs.map(inv => {
          const it = ISSUE_TYPES[inv.issue_type] || ISSUE_TYPES.other;
          const urg = URGENCY[inv.urgency_class] || URGENCY[2];
          const responses = inv.investigation_responses || [];
          const found = responses.filter(r => r.issue_found).length;
          const deadline = inv.deadline_at ? new Date(inv.deadline_at) : null;
          const overdue = deadline && deadline < new Date() && inv.status !== 'closed';
          const statusColor = inv.status === 'closed' ? 'var(--muted)' : inv.status === 'escalated' ? 'var(--danger)' : overdue ? 'var(--danger)' : responses.length > 0 ? 'var(--warn)' : 'var(--info)';
          const statusLabel = inv.status === 'closed' ? 'Closed' : inv.status === 'escalated' ? 'Escalated' : overdue ? 'Overdue' : responses.length > 0 ? 'Responses in' : 'Awaiting responses';
          // Lifecycle step
          const invStepIdx = inv.status==='closed'||inv.status==='resolved'||inv.status==='escalated' ? 3 : responses.length > 0 ? 2 : 0;
          const stepHtml = buildStepCircles(['Launched','Awaiting','Responses in','Resolved'], invStepIdx, 18);
          return `
          
          <div onclick="_investView='detail';_investId='${inv.id}';renderInvestigations()" style="background:var(--surface);border:1px solid ${overdue?'rgba(255,92,92,0.35)':'var(--border)'};border-radius:12px;padding:16px;cursor:pointer;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='${overdue?'rgba(255,92,92,0.35)':'var(--border)'}'">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;">
              <div style="flex:1;min-width:0;">
                <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;">
                  <span style="font-size:11px;font-weight:700;font-family:'DM Mono',monospace;color:${it.color};text-transform:uppercase;">${it.icon} ${it.label}</span>
                  <span style="font-size:10px;font-family:'DM Mono',monospace;color:${urg.color};padding:1px 7px;border-radius:4px;background:${urg.color.replace('var(','rgba(').replace('--danger)','255,92,92,0.1)').replace('--warn)','245,166,35,0.1)').replace('--muted)','106,175,158,0.1)')};">${urg.label}</span>
                </div>

function selectInvestType(key) {
  document.getElementById('inv-type-val').value = key;
  document.querySelectorAll('[id^="inv-type-"]').forEach(btn => {
    const k = btn.id.replace('inv-type-','');
    if (k === key) {
      btn.style.background = ISSUE_TYPES[k]?.color?.replace('var(','rgba(').replace('--danger)','255,92,92,0.12)').replace('--warn)','245,166,35,0.12)').replace('--muted)','106,175,158,0.1)') || 'rgba(52,211,153,0.1)';
      btn.style.borderColor = ISSUE_TYPES[k]?.color || 'var(--accent)';
    } else {
      btn.style.background = 'var(--surface2)';
      btn.style.borderColor = 'var(--border)';
    }
  });
}

function selectInvestUrgency(val) {
  document.getElementById('inv-urgency-val').value = val;
  [1,2,3].forEach(k => {
    const btn = document.getElementById('inv-urg-'+k);
    if (!btn) return;
    if (k === parseInt(val)) {
      btn.style.borderColor = URGENCY[k].color;
      btn.style.background = URGENCY[k].color.replace('var(','rgba(').replace('--danger)','255,92,92,0.12)').replace('--warn)','245,166,35,0.12)').replace('--muted)','106,175,158,0.1)');
    } else {
      btn.style.borderColor = 'var(--border)';
      btn.style.background = 'var(--surface2)';
    }
  });
}

function showInvestMsg(txt, type) {
  const el = document.getElementById('inv-msg');
  if (!el) return;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(255,92,92,0.3)' : 'rgba(52,211,153,0.3)'}`;
  el.textContent = txt;
}

async function submitInvestigation() {
  const product = document.getElementById('inv-product')?.value.trim();
  const lot     = document.getElementById('inv-lot')?.value.trim();
  const barcode = document.getElementById('inv-barcode')?.value.trim();
  const type    = document.getElementById('inv-type-val')?.value;
  const desc    = document.getElementById('inv-desc')?.value.trim();
  const instructions = document.getElementById('inv-instructions')?.value.trim();
  const urgency = parseInt(document.getElementById('inv-urgency-val')?.value || '2');

  if (!product) { showInvestMsg('Product name is required.', 'error'); return; }
  if (!type)    { showInvestMsg('Please select an issue type.', 'error'); return; }
  if (!desc)    { showInvestMsg('Issue description is required.', 'error'); return; }

  const btn = document.getElementById('inv-submit');
  btn.disabled = true; btn.textContent = 'Launching…';

  const hours = URGENCY[urgency]?.hours || 72;
  const deadline = new Date(Date.now() + hours * 3600000).toISOString();

  const { data: inv, error } = await sb.from('investigation_requests').insert({
    complaint_id: _investComplaintId || null,
    manufacturer_id: _orgId,
    product_name: product,
    lot_number: lot || null,
    barcode: barcode || null,
    issue_type: type,
    issue_description: desc,
    instructions: instructions || null,
    urgency_class: urgency,
    deadline_at: deadline,
    status: 'open',
    created_by: (await sb.auth.getUser()).data?.user?.id || null,
  }).select().single();

  if (error) { showInvestMsg('Error: ' + error.message, 'error'); btn.disabled = false; btn.textContent = 'Launch Investigation'; return; }

  // Notify trading partners
  try {
    const { data: partners } = await sb.from('trading_partners')
      .select('organisations!trading_partners_retailer_id_fkey(name, contact_email)')
      .eq('manufacturer_id', _orgId)
      .eq('status', 'active');

    const emails = (partners||[])
      .map(p => p.organisations?.contact_email)
      .filter(Boolean);

    if (emails.length) {
      await fetch('/.netlify/functions/investigation-notify', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'notify_retailers',
          investigation_id: inv.id,
          product_name: product,
          lot_number: lot,
          issue_type: type,
          issue_description: desc,
          instructions,
          urgency_class: urgency,
          deadline_at: deadline,
          manufacturer_name: _orgName,
          retailer_emails: emails,
        }),
      });
    }
  } catch(e) { console.warn('Notification failed:', e); }

  showToast('Investigation launched — retailers have been notified', 'ok', 3000);
  _investComplaintId = null;
  _investView = 'detail';
  _investId = inv.id;
  renderInvestigations();
}

              ${photos.length > 0 ? `<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;">
                ${photos.map(p => `<img src="data:${p.media_type||'image/jpeg'};base64,${p.b64}" style="width:100px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--glass-border);cursor:pointer;" onclick="window.open(this.src,'_blank')">`).join('')}
              </div>` : ''}
            </div>`;
          }).join('')}
        </div>
      `}
    </div>`;

  // Load intelligence panel after render (inside scope where inv is defined)
  if (inv.product_name || inv.lot_number) {
    setTimeout(() => renderMfrIntelligencePanel('mfr-inv-intel', inv.product_name, inv.lot_number), 100);
  }
}

// Auto-triggers when 3+ responses arrive — no button needed
async function autoSynthesizeInvestigation(id, inv, responses) {
  try {
    const res = await fetch('/.netlify/functions/ai-analyze', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        task: 'synthesize_investigation',
        data: { investigation: inv, responses },
      }),
    });
    const json = await res.json();
    const summary = (json.result || '').trim();
    if (summary) {
      await sb.from('investigation_requests').update({ findings_summary: summary }).eq('id', id);
      // Refresh the detail view if still visible
      const el = document.getElementById('main-content');
      if (el && _investId === id) renderInvestigationDetail(el, id);
    }
  } catch(e) {
    console.error('Auto-synthesis failed:', e);
  }
}

async function generateInvestigationSummary(id) {
  const btn = document.getElementById('btn-gen-summary');
  if (btn) { btn.disabled = true; btn.textContent = '✨ Generating summary…'; }

  const { data: inv } = await sb.from('investigation_requests').select('*').eq('id', id).single();
  const { data: responses } = await sb.from('investigation_responses').select('*').eq('investigation_id', id);

  const res = await fetch('/.netlify/functions/investigation-notify', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      type: 'summarize_findings',
      investigation_id: id,
      product_name: inv.product_name,
      issue_type: inv.issue_type,
      issue_description: inv.issue_description,
      responses: responses || [],
    }),
  });

  const data = await res.json();
  if (data.summary) {
    await sb.from('investigation_requests').update({ findings_summary: data.summary }).eq('id', id);
    showToast('AI summary generated', 'ok', 2500);
    renderInvestigationDetail(document.getElementById('main-content'), id);
  }
}

async function closeInvestigation(id) {
  await sb.from('investigation_requests').update({ status: 'closed' }).eq('id', id);
  renderInvestigationDetail(document.getElementById('main-content'), id);
}

async function escalateInvestigationToRecall(id) {
  const { data: inv } = await sb.from('investigation_requests').select('*').eq('id', id).single();
  if (!inv) return;
  await sb.from('investigation_requests').update({ status: 'escalated', recall_escalated: true }).eq('id', id);
  showToast('Escalated — pre-filling Push Recall form', 'ok', 2500);
  // Pre-fill push recall form
  _pushDraft = {
    product: inv.product_name || '',
    lot: inv.lot_number || '',
    barcode: inv.barcode || '',
    reason: ISSUE_TYPES[inv.issue_type]?.label || inv.issue_type,
    description: inv.issue_description || '',
    severity: inv.urgency_class === 1 ? 'Critical' : inv.urgency_class === 2 ? 'High' : 'Medium',
    authority: '',
    is_drill: false,
  };
  _mfrRecallsTab='push';showPanel('recalls');
}
</script>

function applyMfrLang(lang) {
  const t = MFR_I18N[lang] || MFR_I18N.en;

  // Update nav item text — replace last text node, preserving SVG children
  document.querySelectorAll('.nav-item[onclick]').forEach(btn => {
    const match = btn.getAttribute('onclick')?.match(/showPanel\('([^']+)'\)/);
    if (!match) return;
    const key = NAV_MAP[match[1]];
    if (!key || !t[key]) return;
    // Walk childNodes backwards — skip whitespace-only nodes to avoid
    // appending after a badge <span>, which causes text duplication
    for (let i = btn.childNodes.length - 1; i >= 0; i--) {
      const node = btn.childNodes[i];
      if (node.nodeType === 3 && node.textContent.trim()) {
        node.textContent = '\n        ' + t[key] + '\n      ';
        break;
      }
    }
  });

  // Update section labels in order
  const sections = document.querySelectorAll('.nav-section');
  const sectionKeys = ['sec_overview','sec_recalls','sec_operations','sec_products','sec_compliance','sec_network','sec_account'];
  sections.forEach((el, i) => {
    if (sectionKeys[i] && t[sectionKeys[i]]) el.textContent = t[sectionKeys[i]];
  });

  // Update topbar sub (role label)
  const topbarSub = document.getElementById('topbar-sub');
  if (topbarSub) {
    const role = _userRole === 'corp_admin' ? (t.topbar_admin || 'Corp Admin') : (t.topbar_mfr || 'Manufacturer');
    topbarSub.textContent = _orgName + ' · ' + role;
  }
}

function selectMfrLang(val) {
  _mfrLang = val;
  const el = document.getElementById('mfr-set-lang');
  if (el) el.value = val;
  ['en','no'].forEach(k => {
    const btn = document.getElementById('mfr-lang-' + k);
    if (!btn) return;
    btn.style.background = k === val ? 'rgba(52,211,153,0.1)' : 'var(--surface2)';
    btn.style.borderColor = k === val ? 'var(--accent)' : 'var(--border)';
    btn.style.color = k === val ? 'var(--accent)' : 'var(--text)';
  });
  applyMfrLang(val);
}

// Market selection state
let _mfrMarkets = new Set();

function initMfrMarkets(frameworks) {
  _mfrMarkets = new Set();
  const NO_KEYS = ['mattilsynet','eu_178'];
  const US_KEYS = ['fda_food','fsma_204','usda_fsis'];
  if ((frameworks||[]).length === 0) {
    const region = document.getElementById('mfr-set-region')?.value || 'no';
    if (region === 'no' || region === 'both') _mfrMarkets.add('no');
    if (region === 'us' || region === 'both') _mfrMarkets.add('us');
  } else {
    if (NO_KEYS.some(k => frameworks.includes(k))) _mfrMarkets.add('no');
    if (US_KEYS.some(k => frameworks.includes(k))) _mfrMarkets.add('us');
  }
  if (_mfrMarkets.size === 0) _mfrMarkets.add('no');
  renderMfrMarketButtons();
}

function toggleMfrMarket(market) {
  if (_mfrMarkets.has(market) && _mfrMarkets.size > 1) {
    _mfrMarkets.delete(market);
  } else {
    _mfrMarkets.add(market);
  }
  renderMfrMarketButtons();
}

function renderMfrMarketButtons() {
  ['no','us'].forEach(m => {
    const btn   = document.getElementById('mfr-market-' + m);
    const check = document.getElementById('mfr-market-' + m + '-check');
    if (!btn || !check) return;
    const active = _mfrMarkets.has(m);
    btn.style.borderColor = active ? 'rgba(52,211,153,0.5)' : 'var(--border)';
    btn.style.background  = active ? 'rgba(52,211,153,0.07)' : 'var(--surface2)';
    check.style.borderColor = active ? 'var(--accent)' : 'var(--border)';
    check.style.background  = active ? 'var(--accent)' : 'transparent';
    check.textContent = active ? '✓' : '';
    check.style.color = '#065f46';
  });
}

function toggleMfrFramework(key) {} // legacy no-op

async function saveMfrSettings() {
  const name   = document.getElementById('mfr-set-name')?.value.trim();
  const email  = document.getElementById('mfr-set-email')?.value.trim();
  const region = document.getElementById('mfr-set-region')?.value;
  const lang   = document.getElementById('mfr-set-lang')?.value || 'en';
  const msg    = document.getElementById('mfr-set-msg');
  if (!name) { showMfrMsg(msg, 'Organisation name is required.', 'error'); return; }
  const { error } = await sb.from('organisations').update({ name, contact_email: email, region, language: lang }).eq('id', _orgId);
  if (error) { showMfrMsg(msg, 'Error: ' + error.message, 'error'); return; }
  _orgName = name;
  document.getElementById('topbar-sub').textContent = _orgName + ' · ' + (_userRole === 'corp_admin' ? 'Corp Admin' : 'Manufacturer');
  showMfrMsg(msg, '✓ Changes saved', 'ok');
}

async function saveMfrFrameworks() {
  const msg = document.getElementById('mfr-fw-msg');
  const selected = [];
  if (_mfrMarkets.has('no')) selected.push('mattilsynet','eu_178');
  if (_mfrMarkets.has('us')) selected.push('fda_food','fsma_204','usda_fsis');
  const { error } = await sb.from('organisations').update({ regulatory_frameworks: selected }).eq('id', _orgId);
  if (error) { showMfrMsg(msg, 'Error: ' + error.message, 'error'); return; }
  showMfrMsg(msg, '✓ Markets saved — compliance panel updated', 'ok');
}

async function saveMfrCoordinator() {
  const name    = document.getElementById('mfr-coord-name')?.value.trim();
  const contact = document.getElementById('mfr-coord-contact')?.value.trim();
  const msg     = document.getElementById('mfr-coord-msg');
  const { error } = await sb.from('organisations').update({ recall_coordinator_name: name, recall_coordinator_contact: contact }).eq('id', _orgId);
  if (error) { showMfrMsg(msg, 'Error: ' + error.message, 'error'); return; }
  showMfrMsg(msg, '✓ Coordinator saved', 'ok');
}

function showMfrMsg(el, txt, type) {
  if (!el) return;
  el.style.display = 'block';
  el.style.background = type === 'error' ? 'rgba(255,92,92,0.1)' : 'rgba(52,211,153,0.1)';
  el.style.color = type === 'error' ? 'var(--danger)' : 'var(--accent)';
  el.style.border = `1px solid ${type === 'error' ? 'rgba(255,92,92,0.3)' : 'rgba(52,211,153,0.3)'}`;
  el.textContent = txt;
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
</script>

async function renderMfrCompliance() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading compliance data…</div>`;

  // Load org data + activity counts for scoring
  const drillCutoff = new Date(Date.now() - 365*86400000).toISOString();
  const [orgRes, productsRes, lotsRes, shipmentsRes, partnersRes, recallsRes, drillsRes] = await Promise.all([
    sb.from('organisations').select('recall_coordinator_name, recall_coordinator_contact, regulatory_frameworks, region').eq('id', _orgId).single(),
    sb.from('products').select('id').eq('manufacturer_id', _orgId),
    sb.from('product_lots').select('id').eq('manufacturer_id', _orgId),
    sb.from('shipments').select('id').eq('manufacturer_id', _orgId),
    sb.from('trading_partners').select('id').eq('manufacturer_id', _orgId).eq('status', 'active'),
    sb.from('recall_events').select('id').eq('source_org_id', _orgId),
    sb.from('mock_recall_drills').select('id, created_at').eq('initiating_org_id', _orgId).gte('created_at', drillCutoff).limit(5),
  ]);

  const org = orgRes.data || {};
  const frameworks = org.regulatory_frameworks || (org.region === 'us' ? ['fda_food','fsma_204'] : ['mattilsynet','eu_178']);
  const hasCoord    = !!(org.recall_coordinator_name && org.recall_coordinator_contact);
  const hasLots     = (lotsRes.data||[]).length > 0;
  const hasShipments= (shipmentsRes.data||[]).length > 0;
  const hasPartners = (partnersRes.data||[]).length > 0;
  const hasProducts = (productsRes.data||[]).length > 0;
  const hasDrills   = (drillsRes.data||[]).length > 0;
  const lastDrill   = drillsRes.data?.[0] || null;

  // Overall readiness score
  // Score across all checklist items from active frameworks (more granular than 5 items)
  const checkResults_tmp = {
    mf_coord:hasCoord, fda_coord:hasCoord, f204_coord:hasCoord, fsis_coord:hasCoord,
    mf_lots:hasLots, f204_lots:hasLots, mf_ship:hasShipments, eu_customer:hasShipments,
    fda_partner:hasPartners, mf_partner:hasPartners, mf_drill:hasDrills, fda_mock:hasDrills,
    mf_plan:hasCoord&&hasPartners, eu_supplier:hasShipments, eu_hazard:'self_declare',
    eu_notify:hasCoord, fda_plan:hasCoord, fda_haccp:'self_declare', fda_rfr:hasCoord,
    f204_plan:hasLots&&hasCoord, f204_kde:hasLots&&hasShipments, f204_export:hasShipments,
    fsis_est:'self_declare', fsis_plan:hasCoord,
  };
  const allFrameworkItems = (frameworks || []).flatMap(fk => (MFR_FRAMEWORKS[fk]?.checklist||[]));
  const scorableItems = allFrameworkItems.filter(i => checkResults_tmp[i.id] !== 'self_declare');
  const passingItems  = scorableItems.filter(i => checkResults_tmp[i.id] === true);
  const overallPct    = scorableItems.length > 0 ? Math.round(passingItems.length / scorableItems.length * 100) : 0;
  const scoreColor = overallPct >= 80 ? 'var(--accent)' : overallPct >= 50 ? 'var(--warn)' : 'var(--danger)';

  el.innerHTML = `
    <div style="max-width:760px;">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;gap:16px;flex-wrap:wrap;">
        <div>
          <div style="font-size:15px;font-weight:600;color:var(--text);">Compliance Centre</div>
          <div style="font-size:12px;color:var(--muted);margin-top:2px;">Regulatory readiness across your active frameworks. Your legal protection depends on this.</div>
        </div>
        <div style="display:flex;align-items:center;gap:14px;background:var(--surface);border:1px solid var(--glass-border);border-radius:10px;padding:14px 20px;">
          <div style="width:52px;height:52px;border-radius:50%;background:conic-gradient(${scoreColor} ${overallPct*3.6}deg, var(--surface2) 0deg);display:flex;align-items:center;justify-content:center;flex-shrink:0;">
            <div style="width:38px;height:38px;border-radius:50%;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:${scoreColor};">${overallPct}%</div>
          </div>
          <div>
            <div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px;">Overall Readiness</div>
            <div style="font-size:13px;font-weight:700;color:${scoreColor};">${overallPct>=80?'Good standing':overallPct>=50?'Needs attention':'Action required'}</div>
            <div style="font-size:10px;color:var(--muted);margin-top:2px;">${passingItems.length}/${scorableItems.length} checks passing · ${lastDrill?'Last drill: '+new Date(lastDrill.created_at).toLocaleDateString('en-GB',{day:'numeric',month:'short'}):'No drill on record'}</div>
          </div>
        </div>
      </div>

      ${!frameworks.length ? `
        <div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:12px;padding:20px;margin-bottom:20px;">
          <div style="font-size:13px;font-weight:600;color:var(--warn);margin-bottom:6px;">⚠ No regulatory frameworks configured</div>
          <div style="font-size:12px;color:var(--muted);">Go to <button onclick="showPanel('settings')" style="background:none;border:none;color:var(--accent);cursor:pointer;font-family:inherit;font-size:12px;padding:0;text-decoration:underline;">Settings → Regulatory Frameworks</button> to tell Batch'd which frameworks apply to your organisation. This drives everything in this panel.</div>
        </div>` : ''}

      ${frameworks.map(fwKey => {
        const fw = MFR_FRAMEWORKS[fwKey];
        if (!fw) return '';

        // Score checklist items
        // 'self_declare' = can't check from DB data; needs manual confirmation
        const checkResults = {
          mf_coord:   hasCoord,
          fda_coord:  hasCoord,
          f204_coord: hasCoord,
          fsis_coord: hasCoord,
          mf_lots:    hasLots,
          f204_lots:  hasLots,
          mf_ship:    hasShipments,
          eu_customer:hasShipments,
          fda_partner:hasPartners,
          mf_partner: hasPartners,
          mf_drill:   hasDrills,
          fda_mock:   hasDrills,
          mf_plan:    hasCoord && hasPartners,
          eu_supplier:hasShipments,
          eu_hazard:  'self_declare', // hazard analysis — external document, must be self-declared
          eu_notify:  hasCoord,
          fda_plan:   hasCoord,
          fda_haccp:  'self_declare', // HACCP plan — external document, must be self-declared
          fda_rfr:    hasCoord,
          f204_plan:  hasLots && hasCoord,
          f204_kde:   hasLots && hasShipments,
          f204_export:hasShipments,
          fsis_est:   'self_declare', // FSIS establishment number — must be self-declared
          fsis_plan:  hasCoord,
        };

        const items = fw.checklist || [];
        const passed = items.filter(i => checkResults[i.id]).length;
        const pct = items.length ? Math.round(passed/items.length*100) : 0;

        return `
        <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:14px;overflow:hidden;margin-bottom:16px;">
          <!-- Framework header -->
          <div style="background:linear-gradient(135deg,rgba(${fw.color.includes('34d')?'52,211,153':fw.color.includes('60a')?'96,165,250':fw.color.includes('93c')?'147,197,253':fw.color.includes('a78')?'167,139,250':'245,158,11'},0.1) 0%,transparent 100%);padding:18px 20px;border-bottom:1px solid var(--border);">
            <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;">
              <div>
                <div style="font-size:14px;font-weight:700;color:var(--text);">${fw.flag} ${fw.label}</div>
                <div style="font-size:12px;color:var(--muted);margin-top:3px;">
                  <strong style="color:${fw.color};">${fw.authority.name}</strong> ·
                  ${fw.authority.phone} ·
                  <a href="${fw.authority.url}" target="_blank" style="color:${fw.color};text-decoration:none;">${fw.authority.label} ↗</a>
                </div>
              </div>
              <div style="text-align:right;">
                <div style="font-size:20px;font-weight:800;color:${pct>=80?'var(--accent)':pct>=50?'var(--warn)':'var(--danger)'};">${pct}%</div>
                <div style="font-size:10px;color:var(--muted);">${passed}/${items.length} checks</div>
              </div>
            </div>
          </div>

          <!-- Key deadlines -->
          <div style="padding:16px 20px;border-bottom:1px solid var(--border);">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Key Obligations & Deadlines</div>
            <div style="display:flex;flex-direction:column;gap:7px;">
              ${(fw.deadlines||[]).map(d => `
                <div style="display:flex;align-items:flex-start;gap:10px;">
                  <span style="width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0;background:${d.urgency==='high'?'var(--danger)':'var(--warn)'};"></span>
                  <div>
                    <span style="font-size:12px;font-weight:600;color:var(--text);">${d.label}:</span>
                    <span style="font-size:12px;color:var(--muted);"> ${d.detail}</span>
                  </div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Compliance checklist -->
          <div style="padding:16px 20px;">
            <div style="font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Compliance Checklist</div>
            ${items.map(item => {
              const pass = checkResults[item.id];
              const isSelf = pass === 'self_declare';
              const bgColor = isSelf ? 'rgba(245,166,35,0.1)' : pass ? 'rgba(52,211,153,0.15)' : 'rgba(255,92,92,0.1)';
              const bdColor = isSelf ? 'rgba(245,166,35,0.3)' : pass ? 'rgba(52,211,153,0.4)' : 'rgba(255,92,92,0.3)';
              const icon    = isSelf ? '?' : pass ? '✓' : '✗';
              const iconCol = isSelf ? 'var(--warn)' : pass ? 'var(--accent)' : 'var(--danger)';
              const titleCol= isSelf ? 'var(--text)' : pass ? 'var(--text)' : 'var(--muted)';
              const detailCol= isSelf ? 'var(--warn)' : pass ? 'var(--muted)' : 'var(--warn)';
              const action  = item.action;
              return '<div style="display:flex;align-items:flex-start;gap:10px;padding:9px 0;border-bottom:1px solid rgba(22,61,55,0.4);">'
                + '<div style="width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:1px;background:'+bgColor+';border:1px solid '+bdColor+';display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:'+iconCol+';">'+icon+'</div>'
                + '<div style="flex:1;">'
                + '<div style="font-size:12px;color:'+titleCol+';">'+item.label
                + (isSelf ? ' <span style="font-size:9px;font-family:\'DM Mono\',monospace;padding:1px 6px;border-radius:3px;background:rgba(245,166,35,0.1);color:var(--warn);margin-left:4px;">SELF-DECLARE</span>' : '')
                + '</div>'
                + '<div style="font-size:11px;color:'+detailCol+';margin-top:1px;line-height:1.4;">'+item.detail+'</div>'
                + (!pass && !isSelf && action ? '<div style="font-size:11px;color:var(--info);margin-top:4px;font-style:italic;">→ '+action+'</div>' : '')
                + (isSelf ? '<div style="font-size:11px;color:var(--warn);margin-top:4px;">→ Keep this document on file and ensure it is current. Batch’d cannot verify it automatically.</div>' : '')
                + '</div></div>';
            }).join('')}
          </div>
        </div>`;
      }).join('')}

      <!-- Export & Documents section -->

async function exportShipmentAudit() {
  const { data: shipments } = await sb.from('shipments')
    .select('*, organisations!shipments_retailer_id_fkey(name)')
    .eq('manufacturer_id', _orgId)
    .order('shipped_at', { ascending: false });

  if (!shipments?.length) { showToast('No shipment records to export', 'warn', 3000); return; }

  const rows = [['Shipped At','Product','Lot Number','Barcode','Retailer','Store','Quantity','Unit','Reference Doc']];
  for (const s of shipments) {
    rows.push([
      s.shipped_at ? new Date(s.shipped_at).toISOString() : '',
      s.product_name || '', s.lot_number || '', s.barcode || '',
      s.organisations?.name || s.retailer_id || '',
      s.store_name || '', s.quantity || '', s.unit || '',
      s.reference_document || '',
    ]);
  }
  const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `batched_shipment_audit_${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
  showToast(`Exported ${shipments.length} shipment records`, 'ok', 3000);
}

async function renderSupplierRisk() {
  const el = document.getElementById('main-content');
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Computing supplier risk scores…</div>`;

  // Load all data needed for scoring
  const [shipmentsRes, recallsRes, invRes, complaintsRes] = await Promise.all([
    sb.from('shipments').select('lot_number, product_name, retailer_id, shipped_at, organisations!shipments_retailer_id_fkey(name)').eq('manufacturer_id', _orgId).order('shipped_at', { ascending: false }),
    sb.from('recall_events').select('id, product_name, lot_number, reason, severity, created_at, is_drill').eq('source_org_id', _orgId).eq('is_drill', false),
    sb.from('investigation_requests').select('id, product_name, lot_number, issue_type, status, investigation_responses(issue_found)').eq('manufacturer_id', _orgId),
    sb.from('complaints').select('product_name, lot_number, triage_level, created_at').eq('receiving_org_id', _orgId).limit(200),
  ]);

  const shipments  = shipmentsRes.data  || [];
  const recalls    = recallsRes.data    || [];
  const invs       = invRes.data        || [];
  const complaints = complaintsRes.data || [];

  // Build retailer risk map
  // Key: retailer org ID → { name, shipmentCount, recallCount, invFoundCount, complaintCount, lastShipment }
  const retailerMap = {};

  for (const s of shipments) {
    const id   = s.retailer_id;
    const name = s.organisations?.name || id?.slice(0,8) || 'Unknown';
    if (!retailerMap[id]) retailerMap[id] = { name, shipmentCount:0, recallCount:0, invFoundCount:0, criticalComplaints:0, lastShipment:null, lots:new Set() };
    retailerMap[id].shipmentCount++;
    retailerMap[id].lots.add(s.lot_number);
    const d = new Date(s.shipped_at);
    if (!retailerMap[id].lastShipment || d > retailerMap[id].lastShipment) retailerMap[id].lastShipment = d;
  }

  // Count recalls per retailer (via acknowledgements)
  for (const r of recalls) {
    // A recall affects all retailers who received that lot
    for (const id of Object.keys(retailerMap)) {
      const lots = retailerMap[id].lots;
      if (r.lot_number && lots.has(r.lot_number)) retailerMap[id].recallCount++;
    }
  }

  // Count investigations with confirmed issues per retailer
  for (const inv of invs) {
    const responses = inv.investigation_responses || [];
    const foundResponses = responses.filter(r => r.issue_found);
    for (const resp of foundResponses) {
      // retailer_org_id is on the response — match to our map
      if (retailerMap[resp.retailer_org_id]) retailerMap[resp.retailer_org_id].invFoundCount++;
    }
  }

  // Risk score formula:
  // Base: shipments = activity baseline
  // Recall involvement: +30 per recall
  // Investigation confirmed issue: +20 per confirmed finding
  // Critical complaints: +15 per critical
  // Score capped 0–100, then bucketed: Low/Medium/High/Critical
  const retailers = Object.entries(retailerMap).map(([id, r]) => {
    const rawScore = (r.recallCount * 30) + (r.invFoundCount * 20) + (r.criticalComplaints * 15);
    const score = Math.min(100, rawScore);
    const level = score === 0 ? 'low' : score < 30 ? 'medium' : score < 60 ? 'high' : 'critical';
    return { id, ...r, lots: r.lots.size, score, level };
  }).sort((a,b) => b.score - a.score);

  const levelColors = { critical:'var(--danger)', high:'var(--warn)', medium:'var(--info)', low:'var(--accent)' };
  const levelBg = { critical:'rgba(255,92,92,0.1)', high:'rgba(245,166,35,0.1)', medium:'rgba(56,189,248,0.1)', low:'rgba(52,211,153,0.1)' };

  el.innerHTML = `
    <div style="max-width:780px;">
      <div style="margin-bottom:20px;">
        <div style="font-size:15px;font-weight:600;color:var(--text);">Retailer Risk Scores</div>
        <div style="font-size:12px;color:var(--muted);margin-top:2px;">Risk scored per retail partner based on recall involvement, confirmed investigation findings, and complaint patterns. Use this to prioritise relationships and focus quality control efforts.</div>
      </div>

      <div style="background:rgba(56,189,248,0.06);border:1px solid rgba(56,189,248,0.2);border-radius:10px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:var(--muted);line-height:1.6;">
        <strong style="color:var(--info);">How scores are calculated:</strong>
        Recall involvement (+30 per recall event affecting that retailer) · Confirmed investigation findings (+20 each) · Critical complaints (+15 each). Score 0 = Low · 1–29 = Medium · 30–59 = High · 60+ = Critical.
      </div>

      ${retailers.length === 0 ? `<div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:48px;text-align:center;"><div style="font-size:28px;margin-bottom:12px;">📊</div><div style="font-weight:600;color:var(--text);">No shipment data yet</div><div style="font-size:13px;color:var(--muted);margin-top:6px;">Log shipments to your trading partners to start tracking risk scores.</div></div>`
      : `
      <!-- Summary strip -->
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;">
        ${['critical','high','medium','low'].map(level => {
          const count = retailers.filter(r => r.level === level).length;
          return `<div style="background:var(--surface);border:1px solid ${levelColors[level].replace('var(','rgba(').replace('--danger)','255,92,92,0.3)').replace('--warn)','245,166,35,0.3)').replace('--info)','56,189,248,0.3)').replace('--accent)','52,211,153,0.3)')};border-radius:10px;padding:12px;">
            <div style="font-size:22px;font-weight:800;color:${levelColors[level]};font-family:'Figtree',sans-serif;">${count}</div>
            <div style="font-size:11px;color:var(--muted);text-transform:capitalize;">${level} risk</div>
          </div>`;
        }).join('')}
      </div>

      <!-- Retailer cards -->
      <div style="display:flex;flex-direction:column;gap:10px;">
        ${retailers.map(r => `
        <div style="background:var(--surface);border:1px solid var(--glass-border);border-radius:12px;padding:16px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
          <!-- Risk badge -->
          <div style="min-width:70px;text-align:center;">
            <div style="font-size:22px;font-weight:800;color:${levelColors[r.level]};font-family:'Figtree',sans-serif;">${r.score}</div>
            <div style="font-size:10px;font-weight:700;text-transform:uppercase;color:${levelColors[r.level]};padding:2px 8px;border-radius:4px;background:${levelBg[r.level]};display:inline-block;margin-top:2px;">${r.level}</div>
          </div>

          <!-- Details -->
          <div style="flex:1;min-width:0;">
            <div style="font-size:14px;font-weight:600;color:var(--text);margin-bottom:4px;">${r.name}</div>
            <div style="display:flex;gap:12px;flex-wrap:wrap;">
              <span style="font-size:11px;color:var(--muted);">📦 ${r.shipmentCount} shipment${r.shipmentCount!==1?'s':''} · ${r.lots} lot${r.lots!==1?'s':''}</span>
              ${r.recallCount > 0 ? `<span style="font-size:11px;color:var(--danger);">⚠ ${r.recallCount} recall involvement${r.recallCount!==1?'s':''}</span>` : '<span style="font-size:11px;color:var(--accent);">✓ No recalls</span>'}
              ${r.invFoundCount > 0 ? `<span style="font-size:11px;color:var(--warn);">🔍 ${r.invFoundCount} confirmed finding${r.invFoundCount!==1?'s':''}</span>` : ''}
            </div>
            ${r.lastShipment ? `<div style="font-size:11px;color:var(--muted);margin-top:3px;">Last shipment: ${r.lastShipment.toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>` : ''}
          </div>

          ${r.level === 'critical' || r.level === 'high' ? `
          <div style="text-align:right;flex-shrink:0;">
            <div style="font-size:11px;color:${levelColors[r.level]};font-weight:600;margin-bottom:4px;">Action recommended</div>
            <div style="font-size:10px;color:var(--muted);">${r.level === 'critical' ? 'Escalate — conduct immediate review' : 'Review recall and investigation records'}</div>
          </div>` : ''}
        </div>`).join('')}
      </div>`}

      <div style="font-size:11px;color:var(--muted);text-align:center;padding:16px 0 4px;">
        Scores update in real time as recalls, investigations, and complaints are recorded in Batch'd.
      </div>
    </div>`;
}

      const partners = data.partners?.length || 0;
      const pass = n > 0 && partners > 0;
      return { pass, detail: pass
        ? `✓ ${n} shipment records covering ${partners} retail partner${partners!==1?'s':''}`

    id: 'trading_partners', framework: 'mattilsynet', severity: 'major',

    auditorNote: 'Auditor will ask for a list of all retailers and distributors who carry your products.',
    check: async (data) => {

    auditorNote: 'The auditor will ask to see your written procedure. Generate one from the Compliance panel.',
    check: async (data) => {
      const hasCoord = !!(data.org?.recall_coordinator_name);
      const hasShipments = (data.shipments?.length || 0) > 0;
      return { pass: hasCoord && hasShipments, partial: hasCoord || hasShipments,
        detail: hasCoord && hasShipments

    id: 'mock_drill', framework: 'mattilsynet', severity: 'minor',
    question: 'Has a mock recall drill been conducted in the last 12 months?',

    auditorNote: 'Auditors increasingly ask for evidence of tested procedures. An untested recall plan is a theoretical plan.',
    check: async (data) => {
      const drills = data.recalls?.filter(r => r.is_drill) || [];

        detail: recent.length > 0 ? `✓ ${recent.length} drill${recent.length!==1?'s':''} in last 12 months`
        : drills.length > 0 ? `⚠ Drills on record but none in last 12 months (last: ${fmtMfr(drills[0].created_at) || '—'})`
        : 'No mock recall drills on record. Run a drill from the scanning app Manager → Mock Recall Drill.' };
    }
  },
  // ── FDA / FSMA ──────────────────────────────────────────
  {
    id: 'rfr_process', framework: 'fda_food', severity: 'critical',
    question: 'Is there a documented process for FDA Reportable Food Registry (RFR) notification within 24 hours?',
    regulation: 'FDA 21 CFR 7 · Reportable Food Registry — Class I: 24-hour notification',
    auditorNote: 'FDA will ask: "If you discovered a Class I issue at 2am, could you submit an RFR notification within 24 hours?" Your Batchd recall push creates the evidence trail.',
    check: async (data) => {

      const hasPartners = (data.partners?.length || 0) > 0;
      return { pass: hasCoord && hasPartners, partial: hasCoord,
        detail: hasCoord && hasPartners ? '✓ Coordinator + distribution network in place for RFR process'
        : hasCoord ? '⚠ Coordinator assigned but no distribution network to notify'

    }
  },
  {
    id: 'fsma_traceability_plan', framework: 'fsma_204', severity: 'critical',
    question: 'Has a FSMA 204 Traceability Plan been documented (§ 1.1315)?',
    regulation: 'FSMA 204 § 1.1315 — compliance: July 20 2028',
    auditorNote: 'FDA will request the Traceability Plan document. It must contain: recordkeeping procedures, FTL food identification, TLC assignment method, point of contact, retention policy.',
    check: async (data) => {
      const hasAll = !!(data.org?.recall_coordinator_name) && (data.lots?.length||0) > 0 && (data.shipments?.length||0) > 0;
      return { pass: hasAll, partial: !!(data.org?.recall_coordinator_name),
        detail: hasAll ? '✓ All 5 required elements can be demonstrated — generate plan from Compliance panel'
        : '⚠ Generate your Traceability Plan from the Compliance panel. Requires coordinator + lot codes + shipment records.' };

  },
  {
    id: 'kde_24h', framework: 'fsma_204', severity: 'critical',
    question: 'Can KDE (Key Data Elements) records be provided to FDA within 24 hours as an electronic sortable spreadsheet?',
    regulation: 'FSMA 204 § 1.1455 — 24-hour electronic provision requirement',
    auditorNote: 'FDA can request all traceability records for a specific food and date range. You must produce a complete CSV within 24 hours. The Batchd audit export satisfies this.',
    check: async (data) => {
      const n = data.shipments?.length || 0;
      return { pass: n > 0, detail: n > 0

    id: 'cap_post_recall', framework: 'fda_food', severity: 'major',

    auditorNote: 'FDA will ask: after your last recall, what corrective actions did you take and is the Food Safety Plan updated?',
    check: async (data) => {
      const recallsWithCAP = (data.recalls||[]).filter(r => !r.is_drill && r.cap_data);

      if (allRecalls.length === 0) return { pass: true, detail: '✓ No recall events on record — no CAP required yet' };
      return { pass: recallsWithCAP.length === allRecalls.length,
        partial: recallsWithCAP.length > 0,
        detail: recallsWithCAP.length === allRecalls.length
          ? `✓ CAP documented for all ${allRecalls.length} recall event${allRecalls.length!==1?'s':''}`
          : `⚠ ${allRecalls.length - recallsWithCAP.length} recall${allRecalls.length-recallsWithCAP.length!==1?'s':''} without a Corrective Action Plan — generate from Recall History` };

    question: 'Is a USDA FSIS establishment number registered for all meat, poultry, and egg products?',

    check: async (data) => {
      return { pass: false, partial: false,
        detail: 'Manual verification required — confirm FSIS establishment number is on all product labels. FSIS verification cannot be automated from Batch\'d.' };

  },
];


// ── Mock Recall Drills ────────────────────────────────────────
let _drillStep = 0; // 0=list, 1=step1, 2=step2, 3=step3
let _drillDraft = { product:'', lot:'', reason:'Simulated contamination — drill exercise', description:'', targetHours:4 };

async function renderDrills() {
  const el = document.getElementById('main-content');
  if (_drillStep > 0) { renderDrillWizard(el); return; }
  el.innerHTML = `<div style="display:flex;align-items:center;gap:10px;color:var(--muted);"><div class="spinner"></div> Loading…</div>`;
  try {
    const { data: drills } = await sb.from('mock_recall_drills')
      .select('id, created_at, recall_event_id')
      .eq('initiating_org_id', _orgId)
      .order('created_at', {ascending:false})
      .limit(20);
    const evIds = (drills||[]).map(d=>d.recall_event_id).filter(Boolean);

          <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;">Mock Recall Drills</div>

        </div>

function renderDrillWizard(el) {
  const step = _drillStep;
  const progressBar = `

      ${[1,2,3].map(i=>`<div style="flex:1;height:3px;border-radius:2px;background:${i<=step?'var(--accent)':'var(--border)'};transition:background 0.25s;"></div>`).join('')}
    </div>
    <div style="display:flex;justify-content:space-between;margin-bottom:22px;">
      ${['Define scenario','Review','Confirm & push'].map((l,i)=>`<div style="font-size:10px;color:${i+1<=step?'var(--accent)':'var(--muted)'};font-weight:${i+1===step?'600':'400'};flex:1;${i===1?'text-align:center':''}${i===2?';text-align:right':''}">${l}</div>`).join('')}
    </div>`;

  if (step === 1) {
    el.innerHTML = `<div style="max-width:580px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;">New mock recall drill</div>

        <strong style="color:var(--warn);">What is a mock recall drill?</strong><br>
        You push a simulated recall to your retail partners — they respond through the normal 5-step chain. All records are clearly marked as a drill. When complete, you generate a compliance report showing response times per store.
      </div>
      <div class="panel"><div class="panel-body">
        <div id="drill-msg" style="display:none;" class="msg"></div>
        <div class="field"><label>Simulated product *</label>
          <input id="d-product" type="text" placeholder="e.g. Tine Helmelk 1L" value="${_drillDraft.product}" oninput="_drillDraft.product=this.value">
        </div>
        <div class="field"><label>Simulated lot code</label>
          <input id="d-lot" type="text" placeholder="e.g. DRILL-2026-04-01" value="${_drillDraft.lot}" oninput="_drillDraft.lot=this.value">
        </div>
        <div class="field"><label>Scenario description *</label>
          <input id="d-reason" type="text" placeholder="e.g. Simulated undeclared allergen — milk" value="${_drillDraft.reason}" oninput="_drillDraft.reason=this.value">
        </div>
        <div class="field" style="margin-bottom:0;"><label>Target response time</label>
          <select id="d-target" oninput="_drillDraft.targetHours=parseInt(this.value)">
            <option value="2" ${_drillDraft.targetHours===2?'selected':''}>2 hours</option>
            <option value="4" ${_drillDraft.targetHours===4?'selected':''}>4 hours</option>
            <option value="8" ${_drillDraft.targetHours===8?'selected':''}>8 hours</option>
            <option value="24" ${_drillDraft.targetHours===24?'selected':''}>24 hours</option>
          </select>
        </div>
      </div></div>
      <div style="display:flex;justify-content:space-between;margin-top:14px;">
        <button onclick="_drillStep=0;renderDrills()" class="btn-ghost">← Back</button>
        <button onclick="drillStep1Next()" class="btn-primary" style="padding:10px 24px;">Continue →</button>
      </div>
    </div>`;
    return;
  }

  if (step === 2) {
    el.innerHTML = `<div style="max-width:580px;">
      <div style="font-family:'Figtree',sans-serif;font-weight:700;font-size:16px;margin-bottom:4px;">Review drill scenario</div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:20px;">Step 2 of 3</div>
      ${progressBar}
      <div class="panel" style="margin-bottom:14px;">
        <div class="panel-header"><div class="panel-title">Drill summary</div></div>
        <div class="panel-body" style="display:flex;flex-direction:column;gap:8px;font-size:13px;">
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Product</span><strong style="color:var(--text);">${_drillDraft.product}</strong></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Lot code</span><strong style="color:var(--text);font-family:'DM Mono',monospace;">${_drillDraft.lot||'Not specified'}</strong></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Scenario</span><strong style="color:var(--text);">${_drillDraft.reason}</strong></div>
          <div style="display:flex;justify-content:space-between;"><span style="color:var(--muted);">Target response</span><strong style="color:var(--text);">${_drillDraft.targetHours} hours</strong></div>

      </div>

function drillStep1Next() {
  const product = document.getElementById('d-product')?.value.trim();
  const reason  = document.getElementById('d-reason')?.value.trim();
  _drillDraft.product = product;
  _drillDraft.lot     = document.getElementById('d-lot')?.value.trim();
  _drillDraft.reason  = reason;
  _drillDraft.targetHours = parseInt(document.getElementById('d-target')?.value||'4');
  const msg = document.getElementById('drill-msg');
  if (!product) { msg.style.display='block'; msg.className='msg error'; msg.textContent='Product name required.'; return; }
  if (!reason)  { msg.style.display='block'; msg.className='msg error'; msg.textContent='Scenario description required.'; return; }
  _drillStep = 2;
  renderDrills();
}

async function pushDrill() {
  const btn = event?.target;
  if (btn) { btn.disabled=true; btn.textContent='Pushing drill…'; }
  try {
    const { data: result, error } = await sb.rpc('push_recall', {
      p_product_name:  _drillDraft.product,
      p_lot_number:    _drillDraft.lot    || null,
      p_barcode:       null,
      p_severity:      'class_ii',
      p_reason:        _drillDraft.reason,
      p_description:   `MOCK RECALL DRILL — Target response time: ${_drillDraft.targetHours} hours. This is a test exercise only.`,
      p_authority_ref: null,
      p_is_drill:      true,
    });
    if (error) throw error;

    // Show completion
    const el = document.getElementById('main-content');
    el.innerHTML = `<div style="max-width:500px;">
      <div style="background:rgba(245,166,35,0.08);border:1px solid rgba(245,166,35,0.3);border-radius:14px;padding:28px;text-align:center;">
        <div style="font-size:36px;margin-bottom:14px;">⚠</div>
        <div style="font-family:'Figtree',sans-serif;font-weight:800;font-size:20px;margin-bottom:8px;">Drill dispatched</div>
        <div style="font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:20px;">
          <strong style="color:var(--text);">${result?.retailers_notified||0}</strong> retailer${(result?.retailers_notified||0)!==1?'s':''} notified<br>
          <strong style="color:var(--text);">${result?.stores_notified||0}</strong> store${(result?.stores_notified||0)!==1?'s':''} have drill records created<br>
          Target response time: <strong style="color:var(--text);">${_drillDraft.targetHours} hours</strong>
        </div>
        <div style="background:var(--surface2);border-radius:8px;padding:12px 14px;font-size:11px;color:var(--muted);line-height:1.7;margin-bottom:20px;text-align:left;">
          Track per-store responses in <strong style="color:var(--text);">Acknowledgements</strong>. When all stores confirm, you can generate a drill compliance report from the corporate dashboard Compliance panel.
        </div>
        <div style="display:flex;gap:10px;justify-content:center;">
          <button onclick="_mfrRecallsTab='active';showPanel('recalls')" class="btn-ghost">Track responses →</button>

        </div>
      </div>
    </div>`;
    _drillStep = 0;
  } catch(e) {
    showToast('Error: '+e.message, 'error', 4000);
    if (btn) { btn.disabled=false; btn.textContent='⚠ Push drill to all partners →'; }
  }
}

  el.innerHTML = `
