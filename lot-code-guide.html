<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>What is a lot code? — Batch'd</title>
<style>
  /* ─── Screen styles ─── */
  :root {
    --bg: #ffffff;
    --surface: #f5f7f6;
    --surface2: #eef1ef;
    --border: #e2e8e5;
    --text: #1a201d;
    --muted: #5a6661;
    --accent: #077A55;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .page {
    max-width: 760px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 22px;
  }
  .brand {
    font-weight: 800;
    letter-spacing: 0.02em;
    font-size: 18px;
    color: var(--text);
  }
  .brand-tag {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-family: 'Courier New', monospace;
  }
  .actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .btn {
    padding: 9px 16px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: #fff;
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: inherit;
  }
  .btn.primary {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .btn.toggle {
    padding: 6px 12px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'Courier New', monospace;
  }
  .btn.toggle.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.01em;
    margin: 0 0 12px;
  }
  .lede {
    font-size: 14px;
    line-height: 1.65;
    color: var(--muted);
    margin: 0 0 22px;
    max-width: 64ch;
  }
  h2 {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 700;
    color: var(--accent);
    margin: 28px 0 10px;
  }
  .examples {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
  }
  .example {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: 10px;
    padding: 14px;
    page-break-inside: avoid;
  }
  .example .code {
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text);
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 9px 12px;
    text-align: center;
    margin-bottom: 8px;
  }
  .example .caption {
    font-size: 12px;
    line-height: 1.5;
    color: var(--muted);
    text-align: center;
  }
  .where-lead {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--text);
    margin-bottom: 6px;
  }
  ul.bullets {
    list-style: none;
    padding: 0;
    margin: 4px 0 0;
  }
  ul.bullets li {
    padding: 5px 0 5px 20px;
    position: relative;
    font-size: 13px;
    line-height: 1.55;
    color: var(--text);
  }
  ul.bullets li::before {
    content: "·";
    position: absolute;
    left: 6px;
    color: var(--muted);
    font-weight: bold;
    font-family: 'Courier New', monospace;
  }
  ul.bullets.x li::before {
    content: "×";
    color: var(--muted);
  }
  .tip {
    margin-top: 22px;
    padding: 14px 16px;
    background: rgba(7, 122, 85, 0.06);
    border: 1px solid rgba(7, 122, 85, 0.25);
    border-radius: 10px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.65;
  }
  .tip strong { color: var(--accent); }
  .footer {
    margin-top: 28px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    color: var(--muted);
    line-height: 1.6;
  }

  /* ─── Print styles ─── */
  @media print {
    .topbar .actions, .no-print { display: none !important; }
    body { background: #fff; }
    .page {
      max-width: 100%;
      padding: 0;
    }
    .topbar {
      padding-bottom: 12px;
      margin-bottom: 16px;
    }
    h1 { font-size: 22px; margin-bottom: 8px; }
    .lede { font-size: 12px; margin-bottom: 16px; }
    h2 { font-size: 10px; margin: 20px 0 8px; }
    .example { background: #fff; padding: 10px; }
    .example .code { font-size: 13px; padding: 7px 10px; }
    .example .caption { font-size: 11px; }
    .examples { gap: 8px; }
    .where-lead { font-size: 12px; }
    ul.bullets li { font-size: 11.5px; padding: 3px 0 3px 18px; }
    .tip {
      background: #fff;
      border: 1px solid #c8d0cc;
      font-size: 11.5px;
      padding: 10px 12px;
    }
    .footer { font-size: 10px; }
    @page { margin: 0.5in; }
  }

  /* ─── Mobile ─── */
  @media (max-width: 520px) {
    .topbar { flex-wrap: wrap; }
    .examples { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="topbar">
    <div>
      <div class="brand">Batch'd</div>
      <div class="brand-tag">Lot Code Guide</div>
    </div>
    <div class="actions no-print">
      <button class="btn toggle" id="btn-region-us" onclick="setRegion('us')">English</button>
      <button class="btn toggle" id="btn-region-no" onclick="setRegion('no')">Norsk</button>
      <button class="btn primary" onclick="window.print()">Print</button>
    </div>
  </div>

  <h1 id="h1">What is a lot code?</h1>
  <p class="lede" id="lede"></p>

  <h2 id="h2-examples"></h2>
  <div class="examples" id="examples"></div>

  <h2 id="h2-where"></h2>
  <p class="where-lead" id="where-lead"></p>
  <ul class="bullets" id="where-bullets"></ul>

  <h2 id="h2-not"></h2>
  <ul class="bullets x" id="not-bullets"></ul>

  <div class="tip" id="tip"></div>

  <div class="footer" id="footer"></div>
</div>

<script>
// ─── Content ────────────────────────────────────────────────────────────
const COPY = {
  en: {
    htmlLang: 'en',
    h1: 'What is a lot code?',
    lede: "A lot code (also called a batch number) identifies a specific production run of a food product. It's how recalls find their way to your store — and how Batch'd matches your scans to active recall alerts. If a product is on your shelf without its lot code captured, a recall might miss it.",
    h2Examples: 'What they look like',
    examples: [
      { code: '17.06.26 T707',           caption: 'Inkjet date + lot — most common across cartons and bags' },
      { code: '06.06.26*1599 10:48-7',   caption: 'Two-line stamp with asterisk — common on dairy products' },
      { code: 'Batch: 1324820',          caption: 'Labeled "Batch:" or "Lot:" — sticker labels on deli, meat, fish' },
      { code: 'L24-2851',                caption: 'Short alphanumeric — common on US packaged goods' }
    ],
    h2Where: 'Where to look',
    whereLead: 'Almost always printed close to the best-by or expiry date. Common spots include:',
    where: [
      'Bottom of cans, jars, and tubs',
      'Back panel or seal of bagged products',
      'Top edge or fold of cartons',
      'Stamped on lids of yoghurt and other cups',
      'Crimped end of tubes (Kavli, Stabburet, etc.)',
      'Printed sticker label on deli, meat, and fish products'
    ],
    h2Not: "What they're NOT",
    not: [
      'The barcode (digits under the parallel lines)',
      'The country / plant approval (e.g. "NO 1234 EF")',
      'The net weight ("0,400 kg" or "200g")',
      'The use-by date by itself — that\'s a date, not a lot code'
    ],
    tip: "<strong>Tip:</strong> When in doubt, capture EVERYTHING small printed near the best-by date. Batch'd will sort out which characters matter.",
    footer: "Print and post in store back-of-house areas so staff have a quick reference when scanning. Generated by Batch'd · regulatory references depend on your jurisdiction (FSMA 204 in the US, EU 178/2002 + Mattilsynet in Norway)."
  },
  no: {
    htmlLang: 'no',
    h1: 'Hva er en partikode?',
    lede: "En partikode (også kalt parti, partinummer, batch eller charge) identifiserer en spesifikk produksjonsbatch av et matprodukt. Det er sånn tilbaketrekkinger finner veien til butikken din — og slik Batch'd matcher skanningene dine mot aktive tilbaketrekkingsvarsler. Hvis et produkt er i hyllen din uten at partikoden er fanget, kan et tilbaketrekk gå glipp av det.",
    h2Examples: 'Slik ser de ut',
    examples: [
      { code: '17.06.26 T707',           caption: 'Inkjet-dato + parti — vanligst på kartonger og poser' },
      { code: '06.06.26*1599 10:48-7',   caption: 'To-linjes stempel med stjerne — vanlig på meieriprodukter' },
      { code: 'Parti: 1324820',          caption: 'Etikett med "Parti:", "Batch:" eller "Lot:" — fersk kjøtt, fisk, deli' },
      { code: 'L24-2851',                caption: 'Kort alfanumerisk kode — vanlig på amerikanske produkter' }
    ],
    h2Where: 'Hvor skal du lete',
    whereLead: 'Nesten alltid trykket nær holdbarhetsdatoen. Vanlige steder:',
    where: [
      'Bunnen av bokser, glass og beholdere',
      'Bakpanelet eller forseglingen på poser',
      'Toppen eller falsen på kartonger',
      'Stemplet på lokket av yoghurt og andre beger',
      'Den krympede enden av tuber (Kavli, Stabburet, osv.)',
      'Trykket etikett på fersk kjøtt, fisk og delikatesseprodukter'
    ],
    h2Not: 'Hva de IKKE er',
    not: [
      'Strekkoden (tallene under de parallelle strekene)',
      'Plantenummer (f.eks. "NO 1234 EF")',
      'Nettovekten ("0,400 kg" eller "200g")',
      'Holdbarhetsdatoen alene — det er en dato, ikke en partikode'
    ],
    tip: "<strong>Tips:</strong> Ved tvil — fang ALT som er trykt med små tegn nær holdbarhetsdatoen. Batch'd sorterer ut hvilke tegn som betyr noe.",
    footer: "Skriv ut og heng opp i butikkens lager- eller pauserom så ansatte har en rask referanse når de skanner. Generert av Batch'd · regelverkshenvisninger avhenger av land (FSMA 204 i USA, EU 178/2002 + Mattilsynet i Norge)."
  }
};

// Escape HTML for safe injection
function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'
  })[c]);
}

function getInitialRegion() {
  const params = new URLSearchParams(window.location.search);
  const r = (params.get('region') || params.get('lang') || 'us').toLowerCase();
  return (r === 'no') ? 'no' : 'us';
}

function setRegion(region) {
  region = (region === 'no') ? 'no' : 'us';
  const data = COPY[region === 'no' ? 'no' : 'en'];

  document.documentElement.lang = data.htmlLang;
  document.title = data.h1 + " — Batch'd";

  document.getElementById('h1').textContent           = data.h1;
  document.getElementById('lede').textContent         = data.lede;
  document.getElementById('h2-examples').textContent  = data.h2Examples;
  document.getElementById('h2-where').textContent     = data.h2Where;
  document.getElementById('where-lead').textContent   = data.whereLead;
  document.getElementById('h2-not').textContent       = data.h2Not;
  document.getElementById('tip').innerHTML            = data.tip;
  document.getElementById('footer').textContent       = data.footer;

  document.getElementById('examples').innerHTML = data.examples.map(e => `
    <div class="example">
      <div class="code">${esc(e.code)}</div>
      <div class="caption">${esc(e.caption)}</div>
    </div>`).join('');

  document.getElementById('where-bullets').innerHTML = data.where.map(s =>
    `<li>${esc(s)}</li>`
  ).join('');

  document.getElementById('not-bullets').innerHTML = data.not.map(s =>
    `<li>${esc(s)}</li>`
  ).join('');

  document.getElementById('btn-region-us').classList.toggle('active', region === 'us');
  document.getElementById('btn-region-no').classList.toggle('active', region === 'no');

  // Update URL without reload so a printed page reflects the chosen region
  // and the URL is shareable. Wrapped in try/catch for environments that
  // restrict history.
  try {
    const u = new URL(window.location.href);
    u.searchParams.set('region', region);
    window.history.replaceState({}, '', u.toString());
  } catch (_) {}
}

setRegion(getInitialRegion());
</script>
</body>
</html>
